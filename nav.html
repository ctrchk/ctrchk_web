<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#121f14">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="城市運輸單車">
  <link rel="apple-touch-icon" href="/images/icon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>單車徑導航 - 城市運輸單車</title>
  <link rel="stylesheet" href="/css/main.css">
  <!-- MapLibre GL JS (free, open-source Mapbox GL fork) -->
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" crossorigin="">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" crossorigin="">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; overflow: hidden;
      background: var(--app-bg-primary, #121f14);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', sans-serif;
      color: var(--app-text-primary, #e8f5e9);
    }

    /* ── Full-screen map ── */
    #nav-map {
      position: fixed; inset: 0; z-index: 0;
      background: var(--app-bg-primary, #121f14);
    }

    /* ── Top bar ── */
    #nav-topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      padding: calc(env(safe-area-inset-top) + 0.55em) 0.8em 0.65em;
      background: linear-gradient(to bottom, rgba(18,31,20,0.96) 78%, transparent);
      color: #e8f5e9;
      display: flex; align-items: center; gap: 0.7em;
    }
    body.app-light-theme #nav-topbar {
      background: linear-gradient(to bottom, rgba(240,248,240,0.97) 75%, transparent);
      color: #1b3a1f;
    }
    #btn-nav-back {
      background: rgba(255,255,255,0.12); border: none; color: inherit;
      width: 38px; height: 38px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1em; flex-shrink: 0; text-decoration: none;
    }
    body.app-light-theme #btn-nav-back { background: rgba(0,0,0,0.08); }
    #nav-title-wrap {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.24em;
    }
    #nav-title {
      font-weight: bold;
      font-size: 1em;
      line-height: 1.15;
    }
    #nav-topbar-meta {
      display: flex;
      align-items: center;
      gap: 0.45em;
      min-width: 0;
      flex-wrap: wrap;
    }
    .nav-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35em;
      padding: 0.22em 0.55em;
      border-radius: 999px;
      font-size: 0.72em;
      line-height: 1.2;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      max-width: 100%;
    }
    body.app-light-theme .nav-chip { background: rgba(0,0,0,0.08); }
    #nav-road-name {
      min-width: 0;
      max-width: 18em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #nav-junction-distance strong { color: #7df9ff; font-weight: 700; }
    #nav-pushbike-warning {
      display: none;
      color: #121f14;
      background: #BFE340;
      font-weight: 700;
    }
    #nav-pushbike-warning.show { display: inline-flex; }
    #btn-heading-up,
    .btn-nav-icon {
      background: rgba(255,255,255,0.12); border: none; color: #e8f5e9;
      width: 38px; height: 38px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1em; flex-shrink: 0; transition: background 0.2s;
    }
    #btn-heading-up.active,
    .btn-nav-icon.active { background: #FFD700; color: #121f14; }
    #btn-parking-toggle { color: #FFD700; }
    #btn-parking-toggle.active { background: #FFD700; color: #121f14; }

    /* ── Turn instruction banner (shown during active navigation) ── */
    #turn-banner {
      display: none;
      position: fixed; top: calc(env(safe-area-inset-top) + 3.5em); left: 0; right: 0;
      z-index: 200;
      background: rgba(4, 80, 22, 0.96);
      border-bottom: 2px solid #04D93C;
      padding: 0.7em 1em;
      display: none; align-items: center; gap: 0.8em;
    }
    #turn-banner.show { display: flex; }
    #turn-icon { font-size: 2em; flex-shrink: 0; min-width: 1.8em; text-align: center; }
    #turn-text-wrap { flex: 1; }
    #turn-dist { font-size: 1.3em; font-weight: bold; color: #BFE340; }
    #turn-instruction { font-size: 0.85em; opacity: 0.85; }

    /* ── Route planner panel ── */
    #planner-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
      background: var(--app-bg-secondary, #1a2d1c);
      color: var(--app-text-primary, #e8f5e9);
      border-radius: 18px 18px 0 0;
      padding: 0.9em 1em calc(env(safe-area-inset-bottom) + 0.9em);
      box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    #planner-panel.collapsed { transform: translateY(calc(100% - 3.8em)); }
    body.is-pwa #planner-panel {
      bottom: calc(4.5em + env(safe-area-inset-bottom));
    }

    /* drag handle */
    .panel-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.2); margin: 0 auto 0.8em;
      cursor: pointer;
    }

    /* ── Plan form ── */
    .plan-row {
      display: flex; align-items: center; gap: 0.6em; margin-bottom: 0.6em;
    }
    .plan-row-icon {
      font-size: 1.1em; width: 1.4em; text-align: center; flex-shrink: 0;
    }
    .plan-input {
      flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; color: var(--app-text-primary, #e8f5e9); padding: 0.55em 0.8em; font-size: 0.92em;
      appearance: none; outline: none;
    }
    .plan-input:focus { border-color: #04D93C; }
    .plan-input option { background: var(--app-bg-secondary, #1a2d1c); }

    #btn-plan-route {
      width: 100%; padding: 0.85em; border: none; border-radius: 10px;
      background: #04D93C; color: #121f14; font-size: 1em; font-weight: bold;
      cursor: pointer; margin-top: 0.4em; letter-spacing: 0.03em;
      transition: background 0.2s;
    }
    #btn-plan-route:hover { background: #06f043; }
    #btn-plan-route:disabled { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.4); cursor: default; }

    /* ── Route summary (shown after planning) ── */
    #route-summary {
      display: none; margin-top: 0.6em;
      background: rgba(4,217,60,0.08); border-radius: 10px; border: 1px solid rgba(4,217,60,0.25);
      padding: 0.75em 1em;
    }
    #route-summary.show { display: block; }
    .route-summary-row {
      display: flex; justify-content: space-between;
      font-size: 0.88em; margin-bottom: 0.3em; opacity: 0.85;
    }
    .route-summary-row strong { color: #BFE340; }
    #btn-start-nav {
      width: 100%; padding: 0.85em; border: none; border-radius: 10px;
      background: #BFE340; color: #121f14; font-size: 1em; font-weight: bold;
      cursor: pointer; margin-top: 0.6em; letter-spacing: 0.03em;
      transition: background 0.2s; display: none;
    }
    #btn-start-nav.show { display: block; }
    #btn-start-nav:hover { background: #d4f060; }

    /* ── Active nav stats bar (shown during navigation) ── */
    #nav-stats-bar {
      display: none; gap: 0; border-radius: 10px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
    }
    #nav-stats-bar.show { display: flex; }
    .nav-stat {
      flex: 1; text-align: center; padding: 0.6em 0.3em;
      background: rgba(255,255,255,0.05);
      border-right: 1px solid rgba(255,255,255,0.07);
    }
    .nav-stat:last-child { border-right: none; }
    .nav-stat .val { font-size: 1.1em; font-weight: bold; color: #BFE340; }
    .nav-stat .lbl { font-size: 0.62em; opacity: 0.6; margin-top: 0.1em; }

    #btn-end-nav {
      width: 100%; padding: 0.7em; border: none; border-radius: 8px;
      background: rgba(231,76,60,0.8); color: #fff; font-size: 0.9em; font-weight: bold;
      cursor: pointer; margin-top: 0.5em;
    }

    /* ── GPS accuracy dot ── */
    #gps-dot {
      position: fixed; bottom: calc(env(safe-area-inset-bottom) + 0.5em); left: 1em; z-index: 201;
      display: flex; align-items: center; gap: 0.4em;
      background: rgba(18,31,20,0.8); border-radius: 20px; padding: 0.25em 0.7em;
      font-size: 0.7em; opacity: 0.8; color: var(--app-text-primary, #e8f5e9);
    }
    body.app-light-theme #gps-dot { background: rgba(240,248,240,0.9); color: #1b3a1f; }
    #gps-dot-indicator {
      width: 8px; height: 8px; border-radius: 50%; background: #aaa;
      transition: background 0.5s;
    }
    #gps-dot-indicator.good { background: #04D93C; animation: pulse 1.5s infinite; }
    #gps-dot-indicator.searching { background: #f39c12; }
    body.is-pwa #gps-dot {
      bottom: calc(4.8em + env(safe-area-inset-bottom));
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.4; }
    }

    /* ── Zoom control (reposition above panel) ── */
    .maplibregl-ctrl-bottom-right { bottom: 45vh !important; }

    /* ── Loading overlay ── */
    #nav-loading {
      position: fixed; inset: 0; z-index: 500;
      background: var(--app-bg-primary, #121f14); color: var(--app-text-primary, #e8f5e9);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1em;
    }
    #nav-loading.hidden { display: none; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #04D93C; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Post-ride summary view ── */
    #arrived-overlay {
      display: none; position: fixed; inset: 0; z-index: 600;
      background: rgba(18,31,20,0.96); align-items: center; justify-content: center;
      flex-direction: column; text-align: center; padding: 1.2em;
    }
    body.app-light-theme #arrived-overlay { background: rgba(240,248,240,0.97); color: #1b3a1f; }
    #arrived-overlay.show { display: flex; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    #summary-card {
      width: min(520px, 95vw);
      border-radius: 16px;
      border: 1px solid rgba(4, 217, 60, 0.25);
      background: rgba(18, 31, 20, 0.88);
      padding: 1em;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    body.app-light-theme #summary-card {
      background: rgba(255, 255, 255, 0.92);
      border-color: rgba(46, 125, 50, 0.3);
    }
    #arrived-emoji { font-size: 2.8em; margin-bottom: 0.2em; }
    #arrived-title { font-size: 1.35em; font-weight: bold; color: #BFE340; margin-bottom: 0.8em; }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.6em;
      margin-bottom: 0.9em;
    }
    .summary-item {
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 0.55em 0.4em;
    }
    body.app-light-theme .summary-item { background: rgba(0,0,0,0.05); }
    .summary-item .val { font-size: 1.04em; font-weight: 700; color: #BFE340; }
    body.app-light-theme .summary-item .val { color: #2e7d32; }
    .summary-item .lbl { font-size: 0.7em; opacity: 0.72; margin-top: 0.2em; }
    #summary-map {
      width: 100%;
      height: 220px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
      margin-bottom: 0.9em;
    }
    #btn-arrived-done {
      background: #04D93C; color: #121f14; border: none;
      width: 100%;
      padding: 0.8em 1.2em; border-radius: 10px; font-size: 0.96em; font-weight: bold;
      cursor: pointer;
    }

    /* ── Panel collapsed title ── */
    #panel-collapsed-title {
      display: none; align-items: center; gap: 0.5em;
      font-size: 0.88em; font-weight: bold; color: #a8d8a0;
    }
    #planner-panel.collapsed #panel-collapsed-title { display: flex; }
    #planner-panel.collapsed #planner-form { display: none; }
    #planner-panel.collapsed #route-summary { display: none !important; }
    #planner-panel.collapsed #btn-start-nav { display: none !important; }
    #planner-panel.collapsed #nav-stats-bar { display: none !important; }
    #planner-panel.collapsed #btn-end-nav { display: none; }

    /* ── maplibre custom user dot ── */
    .user-dot {
      width: 18px; height: 18px; border-radius: 50%;
      background: #04D93C; border: 3px solid #fff;
      box-shadow: 0 0 8px rgba(4,217,60,0.6);
    }
    .user-cone {
      width: 0; height: 0; position: absolute; top: -14px; left: 50%;
      transform: translateX(-50%);
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-bottom: 14px solid rgba(4,217,60,0.5);
    }
    .user-dot-wrap {
      position: relative; width: 18px; height: 18px;
    }

    /* ── Light theme overrides ── */
    body.app-light-theme .plan-input,
    body:not(.app-theme-explicit):not(.app-light-theme) .plan-input {
      /* only dark fallback; light applied below */
    }
    body.app-light-theme .plan-input {
      background: rgba(0,0,0,0.06);
      border-color: rgba(0,0,0,0.18);
      color: var(--app-text-primary, #1b3a1f);
    }
    body.app-light-theme .plan-input option { background: var(--app-bg-secondary, #eaf4ea); }
    body.app-light-theme #turn-banner {
      background: rgba(240,248,240,0.97);
      border-bottom-color: #2e7d32;
      color: #1b3a1f;
    }
    body.app-light-theme #turn-dist { color: #2e7d32; }
    body.app-light-theme #nav-stats-bar {
      border-color: rgba(0,0,0,0.12);
    }
    body.app-light-theme .nav-stat {
      background: rgba(0,0,0,0.04);
      border-right-color: rgba(0,0,0,0.08);
    }
    body.app-light-theme .nav-stat .val { color: #2e7d32; }
    body.app-light-theme #btn-plan-route:disabled {
      background: rgba(0,0,0,0.1);
      color: rgba(0,0,0,0.35);
    }
    body.app-light-theme #nav-loading {
      background: var(--app-bg-primary, #f5faf5);
      color: var(--app-text-primary, #1b3a1f);
    }
    body.app-light-theme .panel-handle { background: rgba(0,0,0,0.15); }
    body.app-light-theme #panel-collapsed-title { color: #2e7d32; }
    @media (prefers-color-scheme: light) {
        body:not(.app-theme-explicit) #nav-topbar { background: linear-gradient(to bottom, rgba(240,248,240,0.97) 75%, transparent); color: #1b3a1f; }
        body:not(.app-theme-explicit) #btn-nav-back { background: rgba(0,0,0,0.08); }
        body:not(.app-theme-explicit) .plan-input { background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.18); color: var(--app-text-primary, #1b3a1f); }
        body:not(.app-theme-explicit) .plan-input option { background: var(--app-bg-secondary, #eaf4ea); }
        body:not(.app-theme-explicit) #turn-banner { background: rgba(240,248,240,0.97); border-bottom-color: #2e7d32; color: #1b3a1f; }
        body:not(.app-theme-explicit) #turn-dist { color: #2e7d32; }
        body:not(.app-theme-explicit) #nav-stats-bar { border-color: rgba(0,0,0,0.12); }
        body:not(.app-theme-explicit) .nav-stat { background: rgba(0,0,0,0.04); border-right-color: rgba(0,0,0,0.08); }
        body:not(.app-theme-explicit) .nav-stat .val { color: #2e7d32; }
        body:not(.app-theme-explicit) #btn-plan-route:disabled { background: rgba(0,0,0,0.1); color: rgba(0,0,0,0.35); }
        body:not(.app-theme-explicit) #nav-loading { background: var(--app-bg-primary, #f5faf5); color: var(--app-text-primary, #1b3a1f); }
        body:not(.app-theme-explicit) #gps-dot { background: rgba(240,248,240,0.9); color: #1b3a1f; }
        body:not(.app-theme-explicit) #arrived-overlay { background: rgba(240,248,240,0.97); color: #1b3a1f; }
        body:not(.app-theme-explicit) .panel-handle { background: rgba(0,0,0,0.15); }
        body:not(.app-theme-explicit) #panel-collapsed-title { color: #2e7d32; }
    }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="nav-loading">
    <div class="spinner"></div>
    <p data-i18n="nav_loading">正在載入地圖...</p>
  </div>

  <!-- Full-screen map -->
  <div id="nav-map"></div>

  <!-- Top bar -->
  <div id="nav-topbar">
    <a href="javascript:navBack()" id="btn-nav-back" aria-label="返回">
      <i class="fas fa-chevron-left"></i>
    </a>
    <div id="nav-title-wrap">
      <span id="nav-title" data-i18n="nav_title">🗺️ 單車徑導航</span>
      <div id="nav-topbar-meta">
        <span id="nav-road-name" class="nav-chip" data-i18n="road_searching">定位中…</span>
        <span id="nav-junction-distance" class="nav-chip">下一路口 <strong>--</strong></span>
        <span id="nav-pushbike-warning" class="nav-chip"><i class="fas fa-person-walking"></i><span id="nav-pushbike-text">請推車</span></span>
      </div>
    </div>
    <button id="btn-parking-toggle" title="顯示泊車位（銀卡）" aria-label="泊車位" style="display:none;"
      onclick="toggleParkingLayer()"
      class="btn-nav-icon">
      <i class="fas fa-parking"></i>
    </button>
    <button id="btn-heading-up" title="切換地圖方向" aria-label="切換地圖方向">
      <i class="fas fa-compass"></i>
    </button>
  </div>

  <!-- Turn instruction banner -->
  <div id="turn-banner" aria-live="polite">
    <div id="turn-icon">↑</div>
    <div id="turn-text-wrap">
      <div id="turn-dist">-- m</div>
      <div id="turn-instruction" data-i18n="nav_continue">沿單車徑繼續前行</div>
    </div>
  </div>

  <!-- GPS accuracy indicator -->
  <div id="gps-dot">
    <div id="gps-dot-indicator"></div>
    <span id="gps-dot-label">GPS</span>
  </div>

  <!-- Bottom planner panel -->
  <div id="planner-panel">
    <div class="panel-handle" id="panel-handle"></div>

    <!-- Collapsed title (only visible when panel is collapsed) -->
    <div id="panel-collapsed-title">
      <i class="fas fa-map-marked-alt"></i>
      <span id="collapsed-summary-text" data-i18n="nav_plan">規劃單車路線</span>
    </div>

    <!-- Full planner form -->
    <div id="planner-form">
      <div class="plan-row">
        <span class="plan-row-icon" style="color:#04D93C;">📍</span>
        <input class="plan-input" id="sel-from" list="landmark-options" aria-label="選擇起點" data-i18n-placeholder="from_placeholder" placeholder="輸入或選擇起點（可自訂地址）">
      </div>
      <div id="waypoints-container"></div>
      <div class="plan-row">
        <span class="plan-row-icon" style="color:#e74c3c;">🏁</span>
        <input class="plan-input" id="sel-to" list="landmark-options" aria-label="選擇終點" data-i18n-placeholder="to_placeholder" placeholder="輸入或選擇終點（可自訂地址）">
      </div>
      <datalist id="landmark-options"></datalist>
      <div class="plan-row" id="add-waypoint-row" style="display:none; margin-bottom:0.8em;">
        <span class="plan-row-icon"></span>
        <button id="btn-add-waypoint" style="background:none; border:1px dashed rgba(255,255,255,0.3); color:#a8d8a0; padding:0.4em 1em; border-radius:8px; font-size:0.85em; cursor:pointer; width:100%;">
          <i class="fas fa-plus"></i> 新增停靠點（銀卡/金卡）
        </button>
      </div>
      <div class="plan-row">
        <span class="plan-row-icon">🚴</span>
        <select id="sel-profile" class="plan-input" aria-label="路線偏好">
          <option value="safety" data-i18n="profile_safety">安全路線（優先單車徑）</option>
          <option value="trekking" data-i18n="profile_trekking">遠足路線（混合路面）</option>
          <option value="fastbike" data-i18n="profile_fastbike">快速路線（最快到達）</option>
          <option value="shortest" data-i18n="profile_shortest">最短路線（最短距離）</option>
        </select>
      </div>
      <button id="btn-plan-route" disabled data-i18n="btn_plan">🔍 規劃路線</button>

      <!-- Route summary (after planning) -->
      <div id="route-summary">
        <div class="route-summary-row">
          <span data-i18n="rs_dist">路線長度</span><strong id="rs-dist">--</strong>
        </div>
        <div class="route-summary-row">

  <script src="/js/pwa.js"></script>
  <script>
  (function () {
    'use strict';

    // ── Landmarks (start/end points for route planning) ────────────────────
    const LANDMARKS = [
      // 將軍澳 / TKO
      { id: 'poa',   name: '寶琳（新都城二期）', lat: 22.32424, lon: 114.25696 },

      { id: 'tkv',   name: '將軍澳村',           lat: 22.32480, lon: 114.24900 },
      { id: 'hah',   name: '坑口站',             lat: 22.31240, lon: 114.26550 },
      { id: 'tko',   name: '將軍澳中心',         lat: 22.30738, lon: 114.25666 },
      { id: 'tik',   name: '調景嶺（彩明苑）',   lat: 22.30046, lon: 114.25331 },
      { id: 'lhp',   name: '康城（日出康城）',   lat: 22.29070, lon: 114.26692 },
      { id: 'tkoi',  name: '將軍澳創新園',       lat: 22.28570, lon: 114.27240 },
      // 沙田 / Sha Tin
      { id: 'st_centre', name: '沙田市中心',     lat: 22.38200, lon: 114.18800 },
      { id: 'st_park',   name: '沙田公園',       lat: 22.38500, lon: 114.18600 },
      { id: 'st_racecourse', name: '沙田馬場',   lat: 22.37800, lon: 114.19200 },
      { id: 'tai_wai',   name: '大圍站',         lat: 22.37300, lon: 114.17800 },
      { id: 'fo_tan',    name: '火炭站',         lat: 22.39500, lon: 114.19800 },
      { id: 'uni',       name: '大學站',         lat: 22.41300, lon: 114.20900 },
      { id: 'tai_po',    name: '大埔墟站',       lat: 22.44800, lon: 114.17200 },
      // 港島 / HK Island
      { id: 'np_pier',   name: '北角碼頭',       lat: 22.29356, lon: 114.20105 },
      { id: 'east_walk', name: '東岸板道',       lat: 22.29225, lon: 114.20991 },
      { id: 'quarry_bay',name: '鰂魚涌',         lat: 22.28800, lon: 114.21900 },
      // 新界 / NT
      { id: 'tuen_mun',  name: '屯門市中心',     lat: 22.39100, lon: 113.97600 },
      { id: 'yuen_long', name: '元朗市中心',     lat: 22.44500, lon: 114.02200 },
      { id: 'tin_shui_wai', name: '天水圍',      lat: 22.45700, lon: 114.00100 },
    ];

    // ── Local routing policy (strict cycling-only) ────────────────────────
    const VIRTUAL_LINK_COST_MULTIPLIER = 100;
    const ARRIVAL_AUTO_FINISH_METERS = 8;
    const NAV_SPEED_KMH = 15;
    const PUSHBIKE_SPEED_KMH = 4;
    const ADDRESS_SUGGEST_MIN_CHARS = 2;
    const ADDRESS_SUGGEST_DEBOUNCE_MS = 250;
    const NOMINATIM_LIMIT = 5;

    // Maximum time (ms) to wait for map initial load before hiding the overlay
    const MAP_LOADING_TIMEOUT_MS = 12000;
    const TKO_DEFAULT_CENTER = [114.2597, 22.3083];
    const DEFAULT_NAV_ZOOM = 18;
    const DEFAULT_NAV_PITCH = 60;
    const VIRTUAL_LINK_MAX_M = 30;
    const SNAP_MAX_METERS = 45;
    const JUNCTION_DETECT_METERS = 15;
    const JUNCTION_HIGHLIGHT_METERS = 80;
    const GRID_CELL_DEG = 0.00045;

    // ── State ─────────────────────────────────────────────────────────────
    let map = null;
    let userMarker = null;
    let watchId = null;
    let headingUp = false;         // true = rotate map to face travel direction
    let isFollowing = true;        // true = auto-pan to user location
    let lastLat = null, lastLon = null;
    let lastBearing = 0;
    let lastSpeedKmh = 0;
    let fallbackUsed = false;      // prevent repeated fallbackToRasterTiles() calls
    let loadingTimer = null;       // safety timeout for loading overlay

    // Navigation state
    let isNavigating = false;
    let waypointsCount = 0;
    let plannedRoute = null;       // route coords [[lon,lat],…]
    let plannedSteps = [];         // turn-by-turn steps
    let navAnimationStep = 0;
    let currentStepIdx = 0;
    let navStartTime = null;
    let navDistTravelledM = 0;
    let navTotalDistM = 0;
    let plannedFrom = null;        // start point for re-draw after style change
    let plannedTo = null;          // end point for re-draw after style change
    let tkoGeoJsonData = null;     // cached TKO GeoJSON data
    let processedTrackNetwork = null;
    let networkLines = [];
    let networkIndex = new Map();
    let networkJunctions = turf.featureCollection([]);
    let routeLineFeature = null;
    let routeJunctions = [];
    let routeFxTimer = null;
    let lastSnappedLngLat = null;
    let lastCameraBearing = 0;
    let activeMatch = null;
    let activeRouteCoords = null;
    let networkGraph = null;
    let navTrailCoords = [];
    let navSummaryMap = null;
    let finishInProgress = false;
    let wakeLock = null;

    // ── Helpers ──────────────────────────────────────────────────────────
    function haversineM(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
      const Δφ = (lat2 - lat1) * Math.PI / 180;
      const Δλ = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function bearingDeg(lat1, lon1, lat2, lon2) {
      const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
      const Δλ = (lon2 - lon1) * Math.PI / 180;
      const y = Math.sin(Δλ) * Math.cos(φ2);
      const x = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
      return ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
    }

    function formatDist(m) {
      if (m >= 1000) return `${(m / 1000).toFixed(1)} km`;
      return `${Math.round(m)} m`;
    }

    function formatMinutes(mins) {
      if (mins < 60) return `${Math.round(mins)} 分鐘`;
      const h = Math.floor(mins / 60), m = Math.round(mins % 60);
      return `${h} 小時 ${m} 分鐘`;
    }

    function formatJunctionDist(meters) {
      return meters == null || !Number.isFinite(meters) ? '--' : formatDist(meters);
    }

    function getGridKey(lon, lat) {
      return `${Math.floor(lon / GRID_CELL_DEG)}:${Math.floor(lat / GRID_CELL_DEG)}`;
    }

    function getGridKeysForBBox(bbox) {
      const [minX, minY, maxX, maxY] = bbox;
      const keys = [];
      for (let x = Math.floor(minX / GRID_CELL_DEG); x <= Math.floor(maxX / GRID_CELL_DEG); x++) {
        for (let y = Math.floor(minY / GRID_CELL_DEG); y <= Math.floor(maxY / GRID_CELL_DEG); y++) {
          keys.push(`${x}:${y}`);
        }
      }
      return keys;
    }

    function normalizeTrackData(data) {
      const features = [];
      (data && Array.isArray(data.features) ? data.features : []).forEach((feature) => {
        if (!feature || !feature.geometry) return;
        const props = { ...(feature.properties || {}) };
        if (feature.geometry.type === 'LineString') {
          const coords = (feature.geometry.coordinates || [])
            .map(c => [Number(c[0]), Number(c[1])])
            .filter(c => Number.isFinite(c[0]) && Number.isFinite(c[1]));
          if (coords.length >= 2) {
            features.push(turf.lineString(coords, { ...props, linkType: 'cycle-track', isVirtual: false }));
          }
          return;
        }
        if (feature.geometry.type === 'MultiLineString') {
          (feature.geometry.coordinates || []).forEach((part, partIdx) => {
            const coords = (part || [])
              .map(c => [Number(c[0]), Number(c[1])])
              .filter(c => Number.isFinite(c[0]) && Number.isFinite(c[1]));
            if (coords.length >= 2) {
              features.push(turf.lineString(coords, {
                ...props,
                _multiPart: partIdx,
                linkType: 'cycle-track',
                isVirtual: false,
              }));
            }
          });
        }
      });
      return features;
    }

    function buildVirtualLinks(lineFeatures, thresholdMeters) {
      const endpoints = [];
      const buckets = new Map();

      lineFeatures.forEach((feature, lineIdx) => {
        const coords = feature.geometry.coordinates || [];
        if (coords.length < 2) return;
        [
          { lineIdx, endpointType: 'start', coord: coords[0] },
          { lineIdx, endpointType: 'end', coord: coords[coords.length - 1] },
        ].forEach((endpoint) => {
          endpoints.push(endpoint);
          const key = getGridKey(endpoint.coord[0], endpoint.coord[1]);
          if (!buckets.has(key)) buckets.set(key, []);
          buckets.get(key).push(endpoint);
        });
      });

      const links = [];
      const seen = new Set();
      endpoints.forEach((a) => {
        const [lon, lat] = a.coord;
        const x = Math.floor(lon / GRID_CELL_DEG);
        const y = Math.floor(lat / GRID_CELL_DEG);
        for (let dx = -1; dx <= 1; dx++) {
          for (let dy = -1; dy <= 1; dy++) {
            const nearby = buckets.get(`${x + dx}:${y + dy}`) || [];
            nearby.forEach((b) => {
              if (a.lineIdx === b.lineIdx) return;
              const linePairKey = [a.lineIdx, b.lineIdx].sort((m, n) => m - n).join(':');
              const endpointPairKey = `${linePairKey}:${a.endpointType}:${b.endpointType}`;
              const reverseKey = `${linePairKey}:${b.endpointType}:${a.endpointType}`;
              if (seen.has(endpointPairKey) || seen.has(reverseKey)) return;
              const distance = turf.distance(turf.point(a.coord), turf.point(b.coord), { units: 'meters' });
              if (distance >= thresholdMeters || distance === 0) return;
              links.push(turf.lineString([a.coord, b.coord], {
                linkType: 'push-bike',
                isVirtual: true,
                roadName: 'Push Bike Link',
                distance_m: Number(distance.toFixed(2)),
              }));
              seen.add(endpointPairKey);
            });
          }
        }
      });
      return links;
    }

    function buildLineSpatialIndex(lineFeatures) {
      const index = new Map();
      lineFeatures.forEach((feature, idx) => {
        getGridKeysForBBox(turf.bbox(feature)).forEach((key) => {
          if (!index.has(key)) index.set(key, []);
          index.get(key).push(idx);
        });
      });
      return index;
    }

    function getCandidateLineIndexes(coord) {
      const [lon, lat] = coord;
      const x = Math.floor(lon / GRID_CELL_DEG);
      const y = Math.floor(lat / GRID_CELL_DEG);
      const idxs = new Set();
      for (let dx = -1; dx <= 1; dx++) {
        for (let dy = -1; dy <= 1; dy++) {
          const key = `${x + dx}:${y + dy}`;
          (networkIndex.get(key) || []).forEach(v => idxs.add(v));
        }
      }
      return idxs.size ? Array.from(idxs) : networkLines.map((_, idx) => idx);
    }

    function buildJunctionCollection(lineFeatures) {
      const counts = new Map();
      lineFeatures.forEach((feature) => {
        (feature.geometry.coordinates || []).forEach((coord) => {
          const key = `${coord[0].toFixed(6)}:${coord[1].toFixed(6)}`;
          counts.set(key, (counts.get(key) || 0) + 1);
        });
      });
      return turf.featureCollection(
        Array.from(counts.entries())
          .filter(([, count]) => count >= 3)
          .map(([key, count]) => {
            const [lon, lat] = key.split(':').map(Number);
            return turf.point([lon, lat], { degree: count });
          })
      );
    }

    function preprocessTrackNetwork(data) {
      const normalized = normalizeTrackData(data);
      const virtualLinks = buildVirtualLinks(normalized, VIRTUAL_LINK_MAX_M);
      const features = [...normalized, ...virtualLinks];
      return {
        type: 'FeatureCollection',
        features,
      };
    }

    function buildRoutingGraph(lineFeatures) {
      const nodes = new Map();
      const adjacency = new Map();
      const edgeLookup = new Map();

      function ensureNode(coord) {
        const id = `${coord[0].toFixed(6)}:${coord[1].toFixed(6)}`;
        if (!nodes.has(id)) nodes.set(id, { id, coord: [coord[0], coord[1]] });
        if (!adjacency.has(id)) adjacency.set(id, []);
        return id;
      }

      function addEdge(aId, bId, distanceM, linkType) {
        if (!Number.isFinite(distanceM) || distanceM <= 0) return;
        const isPushBike = linkType === 'push-bike';
        const cost = isPushBike ? distanceM * VIRTUAL_LINK_COST_MULTIPLIER : distanceM;
        const edge = { to: bId, distanceM, cost, linkType: isPushBike ? 'push-bike' : 'cycle-track' };
        adjacency.get(aId).push(edge);
        edgeLookup.set(`${aId}|${bId}`, edge);
      }

      lineFeatures.forEach((feature) => {
        const coords = feature && feature.geometry ? feature.geometry.coordinates : null;
        if (!Array.isArray(coords) || coords.length < 2) return;
        const linkType = feature.properties && feature.properties.linkType === 'push-bike'
          ? 'push-bike'
          : 'cycle-track';
        for (let i = 0; i < coords.length - 1; i++) {
          const from = coords[i];
          const to = coords[i + 1];
          const aId = ensureNode(from);
          const bId = ensureNode(to);
          const d = haversineM(from[1], from[0], to[1], to[0]);
          addEdge(aId, bId, d, linkType);
          addEdge(bId, aId, d, linkType);
        }
      });

      return { nodes, adjacency, edgeLookup, nodeIds: Array.from(nodes.keys()) };
    }

    function nearestGraphNode(coord) {
      if (!networkGraph || !networkGraph.nodeIds || !networkGraph.nodeIds.length) return null;
      let best = null;
      networkGraph.nodeIds.forEach((id) => {
        const node = networkGraph.nodes.get(id);
        const d = haversineM(coord[1], coord[0], node.coord[1], node.coord[0]);
        if (!best || d < best.distance) best = { id, distance: d, coord: node.coord };
      });
      return best;
    }

    function findRouteWithAStar(startId, endId) {
      if (!networkGraph || startId == null || endId == null) return null;
      const gScore = new Map();
      const fScore = new Map();
      const cameFrom = new Map();
      const open = new Set([startId]);

      gScore.set(startId, 0);
      const startNode = networkGraph.nodes.get(startId);
      const endNode = networkGraph.nodes.get(endId);
      fScore.set(startId, haversineM(startNode.coord[1], startNode.coord[0], endNode.coord[1], endNode.coord[0]));

      while (open.size) {
        let current = null;
        let currentF = Infinity;
        open.forEach((nodeId) => {
          const score = fScore.get(nodeId) ?? Infinity;
          if (score < currentF) {
            currentF = score;
            current = nodeId;
          }
        });
        if (current == null) break;
        if (current === endId) {
          const pathNodeIds = [current];
          while (cameFrom.has(pathNodeIds[0])) {
            pathNodeIds.unshift(cameFrom.get(pathNodeIds[0]));
          }
          return { pathNodeIds, totalCost: gScore.get(endId) ?? Infinity };
        }
        open.delete(current);

        const neighbors = networkGraph.adjacency.get(current) || [];
        neighbors.forEach((edge) => {
          const tentativeG = (gScore.get(current) ?? Infinity) + edge.cost;
          if (tentativeG >= (gScore.get(edge.to) ?? Infinity)) return;
          cameFrom.set(edge.to, current);
          gScore.set(edge.to, tentativeG);
          const nb = networkGraph.nodes.get(edge.to);
          const heuristic = haversineM(nb.coord[1], nb.coord[0], endNode.coord[1], endNode.coord[0]);
          fScore.set(edge.to, tentativeG + heuristic);
          open.add(edge.to);
        });
      }
      return null;
    }

    function buildPathMetrics(pathNodeIds) {
      let distanceM = 0;
      let pushBikeM = 0;
      if (!networkGraph || !Array.isArray(pathNodeIds)) return { distanceM, pushBikeM, etaMinutes: 0 };
      for (let i = 0; i < pathNodeIds.length - 1; i++) {
        const edge = networkGraph.edgeLookup.get(`${pathNodeIds[i]}|${pathNodeIds[i + 1]}`);
        if (!edge) continue;
        distanceM += edge.distanceM;
        if (edge.linkType === 'push-bike') pushBikeM += edge.distanceM;
      }
      const cycleM = Math.max(0, distanceM - pushBikeM);
      const etaHours = (cycleM / 1000) / NAV_SPEED_KMH + (pushBikeM / 1000) / PUSHBIKE_SPEED_KMH;
      return {
        distanceM,
        pushBikeM,
        etaMinutes: Math.max(1, Math.round(etaHours * 60)),
      };
    }

    function planLocalCyclingRoute(fromCoord, toCoord) {
      if (!networkGraph || !networkGraph.nodeIds.length) return null;
      const fromSnap = snapCoordinateToNetwork(fromCoord);
      const toSnap = snapCoordinateToNetwork(toCoord);
      const startNode = nearestGraphNode(fromSnap.coordinate);
      const endNode = nearestGraphNode(toSnap.coordinate);
      if (!startNode || !endNode) return null;
      const result = findRouteWithAStar(startNode.id, endNode.id);
      if (!result || !result.pathNodeIds || result.pathNodeIds.length < 2) return null;

      const coords = result.pathNodeIds.map(nodeId => networkGraph.nodes.get(nodeId).coord.slice());
      const first = coords[0];
      const last = coords[coords.length - 1];
      if (haversineM(fromSnap.coordinate[1], fromSnap.coordinate[0], first[1], first[0]) > 1.2) {
        coords.unshift(fromSnap.coordinate.slice(0, 2));
      }
      if (haversineM(toSnap.coordinate[1], toSnap.coordinate[0], last[1], last[0]) > 1.2) {
        coords.push(toSnap.coordinate.slice(0, 2));
      }
      const metrics = buildPathMetrics(result.pathNodeIds);
      metrics.distanceM += haversineM(fromCoord[1], fromCoord[0], fromSnap.coordinate[1], fromSnap.coordinate[0]);
      metrics.distanceM += haversineM(toCoord[1], toCoord[0], toSnap.coordinate[1], toSnap.coordinate[0]);

      return {
        coords,
        distanceM: metrics.distanceM,
        etaMinutes: metrics.etaMinutes,
        pushBikeM: metrics.pushBikeM,
      };
    }

    function getNearestNetworkMatch(coord) {
      if (!networkLines.length || typeof turf === 'undefined') return null;
      const point = turf.point(coord);
      let best = null;
      getCandidateLineIndexes(coord).forEach((idx) => {
        const feature = networkLines[idx];
        const snapped = turf.nearestPointOnLine(feature, point, { units: 'meters' });
        const dist = snapped && snapped.properties ? Number(snapped.properties.dist || Infinity) : Infinity;
        if (!best || dist < best.distance) {
          best = {
            feature,
            snapped,
            distance: dist,
          };
        }
      });
      return best;
    }

    function snapCoordinateToNetwork(coord) {
      const match = getNearestNetworkMatch(coord);
      if (!match || !match.snapped || match.distance > SNAP_MAX_METERS) {
        return {
          coordinate: coord,
          match: null,
          isSnapped: false,
        };
      }
      return {
        coordinate: match.snapped.geometry.coordinates.slice(0, 2),
        match,
        isSnapped: true,
      };
    }

    function smoothBearing(nextBearing) {
      if (!Number.isFinite(nextBearing)) return lastCameraBearing;
      const current = Number.isFinite(lastCameraBearing) ? lastCameraBearing : 0;
      const delta = ((nextBearing - current + 540) % 360) - 180;
      lastCameraBearing = (current + delta * 0.28 + 360) % 360;
      return lastCameraBearing;
    }

    function computeHeadingFromMovement(coord) {
      if (!lastSnappedLngLat) return lastCameraBearing || 0;
      const movement = turf.distance(turf.point(lastSnappedLngLat), turf.point(coord), { units: 'meters' });
      if (movement < 1.5) return lastCameraBearing || 0;
      return turf.bearing(turf.point(lastSnappedLngLat), turf.point(coord));
    }

    function extractRoadName(props) {
      if (!props) return '單車徑';
      return props.roadName ||
        props.ROAD_NAME ||
        props.ROADNAME ||
        props.route_name ||
        props.routeName ||
        props.NAME_CHI ||
        props.NAME ||
        props.STREET ||
        props.STREETNAME ||
        props.name ||
        (props.linkType === 'push-bike' ? 'Push Bike Link' : '單車徑');
    }

    function updateTopBarMeta(match, distanceToJunctionMeters) {
      const lang = localStorage.getItem('appLang') === 'en' ? 'en' : 'zh';
      const junctionLabel = lang === 'en' ? 'Next junction' : '下一路口';
      const locatingLabel = lang === 'en' ? 'Locating…' : '定位中…';
      const roadEl = document.getElementById('nav-road-name');
      const junctionEl = document.getElementById('nav-junction-distance');
      const pushBikeEl = document.getElementById('nav-pushbike-warning');
      if (roadEl) roadEl.textContent = match ? extractRoadName(match.feature.properties) : locatingLabel;
      if (junctionEl) junctionEl.innerHTML = `${junctionLabel} <strong>${formatJunctionDist(distanceToJunctionMeters)}</strong>`;
      if (pushBikeEl) pushBikeEl.classList.toggle('show', !!(match && match.feature && match.feature.properties && match.feature.properties.linkType === 'push-bike'));
    }

    function projectRouteToNetwork(coords) {
      if (!Array.isArray(coords) || !coords.length || !networkLines.length) return coords;
      const projected = [];
      coords.forEach((coord) => {
        const snapped = snapCoordinateToNetwork(coord);
        const nextCoord = snapped.isSnapped ? snapped.coordinate : coord;
        const prev = projected[projected.length - 1];
        if (!prev || haversineM(prev[1], prev[0], nextCoord[1], nextCoord[0]) > 1.5) {
          projected.push(nextCoord);
        }
      });
      return projected.length >= 2 ? projected : coords;
    }

    function buildRouteJunctions(coords) {
      if (!coords || coords.length < 2 || !networkJunctions.features.length) return [];
      const routeLine = turf.lineString(coords);
      return networkJunctions.features
        .map((feature) => {
          const snapped = turf.nearestPointOnLine(routeLine, feature, { units: 'meters' });
          const dist = Number(snapped.properties && snapped.properties.dist || Infinity);
          if (!Number.isFinite(dist) || dist > JUNCTION_DETECT_METERS) return null;
          let coordIndex = 0;
          let coordDist = Infinity;
          coords.forEach((coord, idx) => {
            const d = turf.distance(turf.point(coord), feature, { units: 'meters' });
            if (d < coordDist) {
              coordDist = d;
              coordIndex = idx;
            }
          });
          return {
            point: feature,
            routeLocation: Number(snapped.properties && snapped.properties.location || 0),
            coordIndex,
          };
        })
        .filter(Boolean)
        .sort((a, b) => a.routeLocation - b.routeLocation)
        .filter((entry, idx, arr) => idx === 0 || Math.abs(entry.routeLocation - arr[idx - 1].routeLocation) > 20);
    }

    /** Turn type → emoji arrow */
    function turnEmoji(modifier) {
      const m = (modifier || '').toLowerCase();
      if (m.includes('sharp right') || m.includes('uturn')) return '↩';
      if (m.includes('right')) return '↱';
      if (m.includes('sharp left')) return '↪';
      if (m.includes('left')) return '↰';
      if (m.includes('slight right')) return '↗';
      if (m.includes('slight left')) return '↖';
      return '↑';
    }

    /** Translate local maneuver to Chinese instruction */
    function stepInstruction(step) {
      if (!step) return '繼續前行';
      const type = step.maneuver && step.maneuver.type;
      const modifier = step.maneuver && step.maneuver.modifier;
      const road = step.name ? `「${step.name}」` : '';
      if (type === 'arrive') return `抵達${road}目的地`;
      if (type === 'depart') return `出發，沿${road}前行`;
      if (type === 'turn') {
        const dir = modifier
          ? modifier.replace('sharp ', '急').replace('slight ', '輕微').replace('right', '右轉').replace('left', '左轉').replace('uturn', 'U形轉').replace('straight', '直行')
          : '直行';
        return `${dir}${road ? `，進入${road}` : ''}`;
      }
      if (type === 'continue') return `繼續沿${road}前行`;
      if (type === 'roundabout' || type === 'rotary') return `進入迴旋處${road}`;
      if (type === 'fork') return `保持${modifier === 'right' ? '右側' : '左側'}分叉${road}`;
      return `繼續前行${road}`;
    }

    /** Convert bearing-change degrees to turn modifier string */
    function turnModifier(delta) {
      if (delta >  90) return 'sharp right';
      if (delta >  45) return 'right';
      if (delta >   0) return 'slight right';
      if (delta === 0) return 'straight';
      if (delta < -90) return 'sharp left';
      if (delta < -45) return 'left';
      return 'slight left';
    }

    /**
     * Derive turn-by-turn navigation steps from a coordinate array.
     * Each step has { maneuver: { type, modifier }, name, pt: [lon, lat] }
     * where pt is the endpoint of that leg (the turn / destination position).
     */
    function computeNavSteps(coords) {
      if (!coords || coords.length < 2) return [];
      const TURN_THRESH_DEG = 30;  // min bearing change to count as a turn
      const MIN_SEP_M = 30;        // min distance between consecutive turns
      const steps = [];
      let prevTurnIdx = 0;

      for (let i = 1; i < coords.length - 1; i++) {
        const bPrev = bearingDeg(coords[i-1][1], coords[i-1][0], coords[i][1], coords[i][0]);
        const bNext = bearingDeg(coords[i][1],   coords[i][0],   coords[i+1][1], coords[i+1][0]);
        const delta = ((bNext - bPrev + 540) % 360) - 180; // normalise to -180..180
        if (Math.abs(delta) < TURN_THRESH_DEG) continue;
        const d = haversineM(coords[prevTurnIdx][1], coords[prevTurnIdx][0], coords[i][1], coords[i][0]);
        if (d < MIN_SEP_M) continue; // merge turns that are too close together
        steps.push({
          maneuver: { type: 'turn', modifier: turnModifier(delta) },
          name: '',
          pt: coords[i],
        });
        prevTurnIdx = i;
      }

      // Prepend depart step.
      // pt points to the first turn (or destination on a straight route) so that
      // updateNavProgress advances the step when the rider reaches that waypoint.
      steps.unshift({
        maneuver: { type: 'depart', modifier: 'straight' },
        name: '出發',
        pt: steps.length ? steps[0].pt : coords[coords.length - 1],
      });

      // Append arrive step
      steps.push({
        maneuver: { type: 'arrive', modifier: '' },
        name: '目的地',
        pt: coords[coords.length - 1],
      });

      return steps;
    }

    // ── Map initialisation ────────────────────────────────────────────────
    function initMap() {
      // Guard: maplibregl may not be available if the CDN script failed to load
      if (typeof maplibregl === 'undefined') {
        const el = document.getElementById('nav-loading');
        if (el) {
          el.innerHTML = '<p style="color:#BFE340; text-align:center; padding:1em; line-height:1.7;">' +
            '⚠️ 地圖庫載入失敗，請檢查網絡連接後重試。<br><br>' +
            '<a href="javascript:history.back()" style="color:#04D93C;">← 返回</a></p>';
        }
        return;
      }
      // Check for WebGL support before attempting to create the map
      if (typeof maplibregl.supported === 'function' && !maplibregl.supported()) {
        const el = document.getElementById('nav-loading');
        el.innerHTML = '<p style="color:#BFE340; text-align:center; padding:1em; line-height:1.7;">' +
          '⚠️ 你的裝置不支援 WebGL，無法顯示地圖。<br>' +
          '<small style="opacity:0.7;">請嘗試在 Safari 或 Chrome 中重新開啟此頁面。</small><br><br>' +
          '<a href="javascript:history.back()" style="color:#04D93C;">← 返回</a></p>';
        return;
      }

      // Safety timeout: hide loading overlay after MAP_LOADING_TIMEOUT_MS even if map fails to load
      loadingTimer = setTimeout(() => {
        document.getElementById('nav-loading').classList.add('hidden');
      }, MAP_LOADING_TIMEOUT_MS);

      // Choose map style based on current theme
      const isLightTheme = document.body.classList.contains('app-light-theme') ||
        (!document.body.classList.contains('app-theme-explicit') &&
          window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches);
      const mapStyle = isLightTheme
        ? 'https://tiles.openfreemap.org/styles/liberty'
        : 'https://tiles.openfreemap.org/styles/dark';

      map = new maplibregl.Map({
        container: 'nav-map',
        // OpenFreeMap free vector tiles (no API key, no usage limits)
        style: mapStyle,
        center: TKO_DEFAULT_CENTER,
        zoom: DEFAULT_NAV_ZOOM,
        pitch: DEFAULT_NAV_PITCH,
        bearing: 0,
        antialias: true,
        attributionControl: false,
      });

      map.addControl(new maplibregl.AttributionControl({ compact: true }), 'bottom-left');
      map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'bottom-right');

      map.on('load', () => {
        clearTimeout(loadingTimer);
        addCyclewayLayers();
        add3DBuildingsLayer();
        loadTkoGeoJson();
        map.easeTo({ zoom: DEFAULT_NAV_ZOOM, pitch: DEFAULT_NAV_PITCH, duration: 0 });

        map.on('dragstart', () => {
            if (isFollowing) {
                isFollowing = false;
                document.getElementById('btn-heading-up').classList.remove('active');
                console.log('[Nav] Auto-follow disabled due to user interaction');
            }
        });

        document.getElementById('nav-loading').classList.add('hidden');

        // Always attempt to start GPS to trigger browser prompt immediately
        startGPS();

        const isApp = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true || document.body.classList.contains('is-pwa');
        if (!isApp) {
            document.getElementById('gps-dot').style.cursor = 'pointer';
            document.getElementById('gps-dot').onclick = () => {
                startGPS();
            };
        }
      });

      function add3DBuildingsLayer() {
        if (!map) return;
        // Search for a 'building' layer in the basemap style
        const layers = map.getStyle().layers;
        let buildingLayerId = null;
        for (const layer of layers) {
          if (layer.source && (layer['source-layer'] === 'building' || layer.id.includes('building'))) {
            buildingLayerId = layer.id;
            break;
          }
        }

        // If the style already has a 3D extrusion layer, we're good.
        // Otherwise, add a generic one if a building source exists.
        if (!map.getLayer('3d-buildings')) {
            const src = map.getSource('openfreemap') ? 'openfreemap' : (map.getSource('openmaptiles') ? 'openmaptiles' : null);
            if (src) {
                map.addLayer({
                    'id': '3d-buildings',
                    'source': src,
                    'source-layer': 'building',
                    'type': 'fill-extrusion',
                    'minzoom': 15,
                    'paint': {
                        'fill-extrusion-color': '#aaa',
                        'fill-extrusion-height': ['get', 'render_height'],
                        'fill-extrusion-base': ['get', 'render_min_height'],
                        'fill-extrusion-opacity': 0.6
                    }
                }, findFirstSymbolLayer());
            }
        }
      }

      map.on('error', (e) => {
        console.warn('[Nav] Map error:', e);
        // Fallback to OSM raster tiles if vector tile source fails.
        // Guard ensures this runs at most once — the 'error' event fires for
        // every failed tile request, so without the guard each tile 404 would
        // call setStyle() again and crash the browser.
        fallbackToRasterTiles();
      });
    }

    /** Fallback raster tiles if OpenFreeMap unavailable */
    function fallbackToRasterTiles() {
      // Guard: only run once. The MapLibre 'error' event fires for every failed
      // tile request, so without this flag each 404 would call setStyle() again,
      // causing repeated map resets that freeze/crash the browser on mobile.
      if (fallbackUsed) return;
      fallbackUsed = true;

      clearTimeout(loadingTimer);
      document.getElementById('nav-loading').classList.add('hidden');
      // Replace style with a simple raster source
      try {
        const isLight = document.body.classList.contains('app-light-theme') ||
          (!document.body.classList.contains('app-theme-explicit') &&
            window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches);
        const fallbackTiles = isLight
          ? ['https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png']
          : ['https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'];
        map.setStyle({
          version: 8,
          sources: {
            'osm-raster': {
              type: 'raster',
              tiles: fallbackTiles,
              tileSize: 256,
              attribution: '© OpenStreetMap © CartoDB',
              maxzoom: 19,
            },
          },
          layers: [{ id: 'osm-raster', type: 'raster', source: 'osm-raster' }],
        });
        map.once('styledata', () => {
          addTkoLocalLayer(tkoGeoJsonData);
          // Re-draw planned route if one was active before the style reset
          if (plannedRoute && plannedRoute.length && plannedFrom && plannedTo) {
            drawPlannedRoute(plannedRoute, plannedFrom, plannedTo);
          }
        });
      } catch (e) { console.warn('[Nav] Fallback raster also failed', e); }
    }

    /** Add custom cycleway style layers on top of the vector basemap */
    function addCyclewayLayers() {
      // Find transportation source by checking common source IDs and any vector source with transportation layer
      const candidateIds = ['openmaptiles', 'maptiler_planet', 'planet', 'openfreemap', 'vectorTiles'];
      let src = null;
      for (const id of candidateIds) {
        if (map.getSource(id)) { src = id; break; }
      }
      // Fallback: scan all sources for a vector type
      if (!src) {
        const style = map.getStyle();
        if (style && style.sources) {
          for (const [id, s] of Object.entries(style.sources)) {
            if (s.type === 'vector') { src = id; break; }
          }
        }
      }
      if (!src) return;

      // Layer 1: Cycleway background fill (wide green strip)
      if (!map.getLayer('ctrc-cycleway-fill')) {
        map.addLayer({
          id: 'ctrc-cycleway-fill',
          type: 'line',
          source: src,
          'source-layer': 'transportation',
          filter: ['any',
            ['==', ['get', 'subclass'], 'cycleway'],
            ['all', ['==', ['get', 'class'], 'path'], ['==', ['get', 'bicycle'], 'designated']],
          ],
          paint: {
            'line-color': '#00C853',
            'line-width': ['interpolate', ['linear'], ['zoom'],
              12, 2, 15, 5, 17, 10, 19, 18],
            'line-opacity': 0.75,
          },
        }, findFirstSymbolLayer());
      }

      // Layer 2: Dashed centerline (mimics road markings)
      if (!map.getLayer('ctrc-cycleway-center')) {
        map.addLayer({
          id: 'ctrc-cycleway-center',
          type: 'line',
          source: src,
          'source-layer': 'transportation',
          filter: ['any',
            ['==', ['get', 'subclass'], 'cycleway'],
            ['all', ['==', ['get', 'class'], 'path'], ['==', ['get', 'bicycle'], 'designated']],
          ],
          minzoom: 15,
          paint: {
            'line-color': '#FFFFFF',
            'line-width': 1.2,
            'line-dasharray': [4, 4],
            'line-opacity': 0.65,
          },
        }, findFirstSymbolLayer());
      }
    }

    /** Find first symbol layer to insert below it */
    function findFirstSymbolLayer() {
      const layers = map.getStyle().layers || [];
      for (const layer of layers) {
        if (layer.type === 'symbol') return layer.id;
      }
      return undefined;
    }

    /** Merge multiple GeoJSON FeatureCollections into one */
    function mergeGeoJsonCollections(collections) {
      const features = [];
      collections.forEach(col => {
        if (col && Array.isArray(col.features)) features.push(...col.features);
      });
      return { type: 'FeatureCollection', features };
    }

    /** Load all government cycling datasets + local TKO tracks */
    async function loadTkoGeoJson() {
      const sources = [
        '/data/tko_tracks.json',
        '/CYCFACI.gdb_CYCTRACK_converted.geojson',
        '/CYCFACI.gdb_CYCRAMP_converted.geojson',
      ];
      try {
        // Fetch all sources in parallel
        const responses = await Promise.all(sources.map(url => fetch(url).catch(() => null)));
        const datasets = await Promise.all(responses.map(async (resp, i) => {
          if (!resp || !resp.ok) { console.warn('[Nav] Failed to load', sources[i]); return null; }
          try { return await resp.json(); } catch (e) { return null; }
        }));

        // Merge all valid datasets
        const valid = datasets.filter(d => d && Array.isArray(d.features));
        if (!valid.length) throw new Error('No cycling data loaded');

        const merged = mergeGeoJsonCollections(valid);
        tkoGeoJsonData = merged;
        processedTrackNetwork = preprocessTrackNetwork(merged);
        networkLines = processedTrackNetwork.features.slice();
        networkIndex = buildLineSpatialIndex(networkLines);
        networkJunctions = buildJunctionCollection(networkLines);
        networkGraph = buildRoutingGraph(networkLines);
        addTkoLocalLayer(processedTrackNetwork);
        updateTopBarMeta(null, null);

        // Load parking spaces for silver/gold card users
        loadParkingSpaces();
      } catch (e) {
        console.warn('[Nav] Cycling dataset load failed:', e);
        // Fallback: try local TKO data only
        try {
          const resp = await fetch('/data/tko_tracks.json');
          if (resp.ok) {
            const data = await resp.json();
            if (data && Array.isArray(data.features)) {
              tkoGeoJsonData = data;
              processedTrackNetwork = preprocessTrackNetwork(data);
              networkLines = processedTrackNetwork.features.slice();
              networkIndex = buildLineSpatialIndex(networkLines);
              networkJunctions = buildJunctionCollection(networkLines);
              networkGraph = buildRoutingGraph(networkLines);
              addTkoLocalLayer(processedTrackNetwork);
              updateTopBarMeta(null, null);
            }
          }
        } catch (e2) { console.warn('[Nav] Fallback TKO load also failed', e2); }
      }
    }

    /** Load cycling parking spaces — visible to silver/gold card users */
    async function loadParkingSpaces(retryCount = 0) {
      try {
        // Check user permission using standard permission system
        if (typeof window.hasPermission !== 'function') {
            if (retryCount < 5) {
                console.log('[Nav] hasPermission not ready, retrying... ' + retryCount);
                setTimeout(() => loadParkingSpaces(retryCount + 1), 1000);
            }
            return;
        }

        const hasParkingPerm = window.hasPermission('map_cycparkspace');
        if (!hasParkingPerm) {
            console.log('[Nav] User does not have parking space permission');
            return;
        }

        const resp = await fetch('/CYCFACI.gdb_CYCPARKSPACE_converted.geojson');
        if (!resp.ok) return;
        const data = await resp.json();
        if (!data || !Array.isArray(data.features)) return;

        if (!map) return;

        if (!map.getSource('cyc-parking')) {
          map.addSource('cyc-parking', { type: 'geojson', data });
        } else {
          map.getSource('cyc-parking').setData(data);
        }

        // Parking circle layer
        if (!map.getLayer('cyc-parking-circles')) {
          map.addLayer({
            id: 'cyc-parking-circles',
            type: 'circle',
            source: 'cyc-parking',
            layout: { visibility: 'none' }, // hidden by default; toggle via button
            paint: {
              'circle-radius': ['interpolate', ['linear'], ['zoom'], 12, 4, 16, 10, 19, 18],
              'circle-color': '#FFD700',
              'circle-stroke-color': '#ffffff',
              'circle-stroke-width': 2,
              'circle-opacity': 0.9,
            },
          });
        }

        // Parking label layer
        if (!map.getLayer('cyc-parking-labels')) {
          map.addLayer({
            id: 'cyc-parking-labels',
            type: 'symbol',
            source: 'cyc-parking',
            minzoom: 15,
            layout: {
              visibility: 'none',
              'text-field': ['concat', ['to-string', ['get', 'PARKING_SPACE']], ' 位'],
              'text-size': 11,
              'text-offset': [0, 1.4],
              'text-anchor': 'top',
            },
            paint: {
              'text-color': '#FFD700',
              'text-halo-color': '#000000',
              'text-halo-width': 1.5,
            },
          });
        }

        // Show the parking toggle button
        const btn = document.getElementById('btn-parking-toggle');
        if (btn) btn.style.display = '';
      } catch (e) {
        console.warn('[Nav] Parking spaces load failed:', e);
      }
    }

    let parkingVisible = false;
    function toggleParkingLayer() {
      if (!map) return;
      parkingVisible = !parkingVisible;
      const vis = parkingVisible ? 'visible' : 'none';
      ['cyc-parking-circles', 'cyc-parking-labels'].forEach(id => {
        if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', vis);
      });
      const btn = document.getElementById('btn-parking-toggle');
      if (btn) {
        btn.classList.toggle('active', parkingVisible);
        btn.title = parkingVisible ? '隱藏泊車位' : '顯示泊車位（銀卡）';
      }
    }

    function addTkoLocalLayer(data) {
      if (!map) return;
      if (map.getSource('tko-cycleways')) {
        // Source already exists — update data
        if (data) map.getSource('tko-cycleways').setData(data);
        if (map.getSource('tko-junctions')) map.getSource('tko-junctions').setData(networkJunctions);
        return;
      }

      map.addSource('tko-cycleways', {
        type: 'geojson',
        data: data || { type: 'FeatureCollection', features: [] },
      });

      // ── Layer 1: Wide edge outline for lane-level clarity (zoom ≥ 16) ──
      map.addLayer({
        id: 'tko-cycleway-edge',
        type: 'line',
        source: 'tko-cycleways',
        minzoom: 16,
        paint: {
          'line-color': ['case',
            ['==', ['get', 'linkType'], 'push-bike'], '#8C6A00',
            '#0086B3'
          ],
          'line-width': ['interpolate', ['linear'], ['zoom'],
            16, 16, 17, 24, 19, 36],
          'line-opacity': 0.22,
          'line-gap-width': 0,
          'line-cap': 'round',
          'line-join': 'round',
        },
      });

      // ── Layer 2: Main track fill ──
      map.addLayer({
        id: 'tko-cycleway-bg',
        type: 'line',
        source: 'tko-cycleways',
        paint: {
          'line-color': ['case',
            ['==', ['get', 'linkType'], 'push-bike'], '#FFD166',
            '#00E5FF'
          ],
          'line-width': ['interpolate', ['linear'], ['zoom'],
            10, 1.5, 12, 3, 15, 6, 17, 12, 19, 20],
          'line-opacity': 0.85,
          'line-cap': 'round',
          'line-join': 'round',
        },
      });

      // ── Layer 3: Dashed centerline (zoom ≥ 14) ──
      map.addLayer({
        id: 'tko-cycleway-center',
        type: 'line',
        source: 'tko-cycleways',
        minzoom: 14,
        paint: {
          'line-color': '#FFFFFF',
          'line-width': ['interpolate', ['linear'], ['zoom'], 14, 1, 17, 2],
          'line-dasharray': ['case',
            ['==', ['get', 'linkType'], 'push-bike'], ['literal', [1.2, 1.8]],
            ['literal', [4, 5]]
          ],
          'line-opacity': 0.55,
        },
      });

      // ── Layer 4: Direction arrows (zoom ≥ 15) ──
      map.addLayer({
        id: 'tko-cycleway-arrows',
        type: 'symbol',
        source: 'tko-cycleways',
        minzoom: 15,
        layout: {
          'symbol-placement': 'line',
          'symbol-spacing': 80,
          'icon-image': 'triangle-11',
          'icon-size': 0.65,
          'icon-rotate': 90,
          'icon-rotation-alignment': 'map',
          'icon-allow-overlap': true,
        },
        paint: {
          'icon-color': '#ffffff',
          'icon-opacity': 0.7,
        },
      });

      // ── Junctions source ──
      if (!map.getSource('tko-junctions')) {
        map.addSource('tko-junctions', {
          type: 'geojson',
          data: networkJunctions,
        });
      } else {
        map.getSource('tko-junctions').setData(networkJunctions);
      }
    }

    // ── GPS ───────────────────────────────────────────────────────────────
    const GPS_OPTS = { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 };

    function clearGpsWatch() {
      if (watchId !== null && 'geolocation' in navigator) {
        navigator.geolocation.clearWatch(watchId);
      }
      watchId = null;
    }

    function startGPS() {
      if (typeof window.confirmLocationPermission === 'function') {
        window.confirmLocationPermission(() => _startGPSActual(), () => {
          setGpsDot('error', '需要位置權限');
        });
      } else {
        _startGPSActual();
      }
    }

    function _startGPSActual() {
      if (!('geolocation' in navigator)) {
        setGpsDot('error', '不支援 GPS');
        return;
      }
      setGpsDot('searching', '搜尋中...');
      navigator.geolocation.getCurrentPosition(
        pos => { handlePosition(pos); startWatch(); },
        err => { setGpsDot('error', 'GPS 錯誤'); startWatch(); },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    }

    function startWatch() {
      if (watchId !== null) return;
      watchId = navigator.geolocation.watchPosition(handlePosition, onGpsError, GPS_OPTS);
    }

    function updateCamera(lngLat, bearing) {
      if (!map || !isFollowing) return;
      const nextBearing = headingUp ? smoothBearing(bearing) : 0;

      // Dynamically adjust pitch based on speed (simulated 3D feel)
      const targetPitch = isNavigating ? Math.min(75, DEFAULT_NAV_PITCH + (lastSpeedKmh * 0.5)) : DEFAULT_NAV_PITCH;

      map.easeTo({
       center: lngLat,
       bearing: nextBearing,
       zoom: isNavigating ? Math.max(DEFAULT_NAV_ZOOM, 18.5) : DEFAULT_NAV_ZOOM,
       pitch: targetPitch,
       duration: 550,
       easing: t => 1 - Math.pow(1 - t, 2),
      });
    }

    function handlePosition(pos) {
      const { latitude: lat, longitude: lon, accuracy, speed, heading } = pos.coords;
      const acc = Math.round(accuracy);
      setGpsDot(acc < 20 ? 'good' : acc < 50 ? 'fair' : 'searching', `±${acc} m`);

      const rawCoord = [lon, lat];
      const snapped = snapCoordinateToNetwork(rawCoord);
      const activeCoord = snapped.coordinate;
      activeMatch = snapped.match;

      if (lastSnappedLngLat) {
       const d = haversineM(lastSnappedLngLat[1], lastSnappedLngLat[0], activeCoord[1], activeCoord[0]);
       if (d > 1.2 && isNavigating) navDistTravelledM += d;
      }
      if (lastLat !== null && lastLon !== null && !snapped.isSnapped) {
       const dRaw = haversineM(lastLat, lastLon, lat, lon);
       if (dRaw > 2 && isNavigating && !lastSnappedLngLat) navDistTravelledM += dRaw;
      }
      lastLat = lat; lastLon = lon;
      lastSpeedKmh = speed != null ? speed * 3.6 : 0;

      const liveHeading = Number.isFinite(heading) && heading >= 0 ? heading : computeHeadingFromMovement(activeCoord);
      lastBearing = smoothBearing(liveHeading);

      updateUserMarker(activeCoord[1], activeCoord[0], lastBearing);
      updateCamera(activeCoord, lastBearing);

      if (isNavigating) {
       const tail = navTrailCoords[navTrailCoords.length - 1];
       if (!tail || haversineM(tail[1], tail[0], activeCoord[1], activeCoord[0]) > 1.5) {
         navTrailCoords.push(activeCoord.slice(0, 2));
       }
       updateNavProgress(activeCoord[1], activeCoord[0], activeMatch);
      } else {
       updateTopBarMeta(activeMatch, getDistanceToNextJunction(activeCoord));
      }

      lastSnappedLngLat = activeCoord;
    }

    function onGpsError(err) {
      setGpsDot('error', err.message.length < 30 ? err.message : 'GPS 錯誤');
    }

    function setGpsDot(state, text) {
      const dot = document.getElementById('gps-dot-indicator');
      const lbl = document.getElementById('gps-dot-label');
      dot.className = 'gps-dot-indicator';
      if (state === 'good') dot.classList.add('good');
      else if (state === 'searching' || state === 'fair') dot.classList.add('searching');
      if (lbl && text) lbl.textContent = text;
    }

    // ── User marker (with direction cone) ────────────────────────────────
    function updateUserMarker(lat, lon, bearing) {
      const el = document.getElementById('user-marker-el') || createUserMarkerEl();
      const cone = el.querySelector('.user-cone');
      if (cone) cone.style.transform = `translateX(-50%) rotate(${bearing - 180}deg)`;

      if (!userMarker) {
        userMarker = new maplibregl.Marker({ element: el, anchor: 'center' })
          .setLngLat([lon, lat])
          .addTo(map);
      } else {
        userMarker.setLngLat([lon, lat]);
      }
    }

    function createUserMarkerEl() {
      const wrap = document.createElement('div');
      wrap.id = 'user-marker-el';
      wrap.className = 'user-dot-wrap';
      wrap.innerHTML = '<div class="user-cone"></div><div class="user-dot"></div>';
      return wrap;
    }

    // ── Route planning ────────────────────────────────────────────────────
    function resolveLandmark(rawValue) {
      const v = (rawValue || '').trim();
      if (!v) return null;
      if (v === '__gps__' || v === '📍 使用目前位置') return { id: '__gps__' };
      return LANDMARKS.find(l => l.id === v || l.name === v) || null;
    }

    async function geocodeAddress(rawValue) {
      const q = String(rawValue || '').trim();
      if (!q) return null;
      const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(q + ', Hong Kong')}`;
      const resp = await fetch(url, {
        headers: { 'Accept': 'application/json' }
      });
      if (!resp.ok) return null;
      const rows = await resp.json();
      if (!Array.isArray(rows) || !rows.length) return null;
      const hit = rows[0];
      return {
        id: '__custom__',
        name: q,
        lat: parseFloat(hit.lat),
        lon: parseFloat(hit.lon),
      };
    }

    function getLandmarkSuggestions(keyword) {
      const q = String(keyword || '').trim();
      if (!q) return [];
      const lower = q.toLowerCase();
      return LANDMARKS
        .map(l => l.name)
        .filter(name => name.toLowerCase().includes(lower))
        .slice(0, 8);
    }

    let suggestionAbortController = null;
    let suggestionSeq = 0;
    async function fetchAddressSuggestions(rawValue) {
      const q = String(rawValue || '').trim();
      if (q.length < ADDRESS_SUGGEST_MIN_CHARS) {
        populateSelects();
        return;
      }
      const localMatches = getLandmarkSuggestions(q);
      populateSelects(localMatches);
      const seq = ++suggestionSeq;
      if (suggestionAbortController) suggestionAbortController.abort();
      suggestionAbortController = new AbortController();
      const url = `https://nominatim.openstreetmap.org/search?format=json&limit=${NOMINATIM_LIMIT}&q=${encodeURIComponent(q + ', Hong Kong')}`;
      try {
        const resp = await fetch(url, {
          headers: { 'Accept': 'application/json' },
          signal: suggestionAbortController.signal
        });
        if (!resp.ok) {
          populateSelects();
          return;
        }
        const rows = await resp.json();
        if (seq !== suggestionSeq) return;
        const options = Array.isArray(rows)
          ? rows.map(r => String(r.display_name || '').trim()).filter(Boolean)
          : [];
        populateSelects([...localMatches, ...options]);
      } catch (e) {
        if (e && e.name === 'AbortError') return;
        populateSelects(localMatches);
      }
    }

    async function resolveRawInput(val) {
        let res = resolveLandmark(val);
        if (!res) res = await geocodeAddress(val);
        if (res && res.id === '__gps__') {
            const pos = await new Promise((resolve, reject) => {
                navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 10000 });
            });
            return { id: '__gps__', name: '目前位置', lat: pos.coords.latitude, lon: pos.coords.longitude };
        }
        return res;
    }

    async function planRoute() {
      const fromRaw = document.getElementById('sel-from').value;
      const toRaw   = document.getElementById('sel-to').value;
      const waypointInputs = Array.from(document.querySelectorAll('.waypoint-input'));

      if (!fromRaw || !toRaw) return;

      const btn = document.getElementById('btn-plan-route');
      btn.disabled = true;
      btn.textContent = '正在取得位置...';

      try {
          const from = await resolveRawInput(fromRaw);
          const to = await resolveRawInput(toRaw);
          const points = [from];

          for (const wp of waypointInputs) {
              const val = wp.value.trim();
              if (val) {
                  const resolved = await resolveRawInput(val);
                  if (resolved) points.push(resolved);
              }
          }
          points.push(to);

          if (points.length < 2) throw new Error('Points resolve failed');

          btn.textContent = '正在規劃...';
          document.getElementById('route-summary').classList.remove('show');
          document.getElementById('btn-start-nav').classList.remove('show');
          clearRouteLayers();

          let fullCoords = [];
          let totalDist = 0;
          let totalMinutes = 0;

          for (let i = 0; i < points.length - 1; i++) {
              const segment = planLocalCyclingRoute([points[i].lon, points[i].lat], [points[i+1].lon, points[i+1].lat]);
              if (!segment || !segment.coords) throw new Error(`Segment ${i} not found`);

              if (i === 0) {
                  fullCoords = segment.coords;
              } else {
                  fullCoords = fullCoords.concat(segment.coords.slice(1));
              }
              totalDist += segment.distanceM;
              totalMinutes += segment.etaMinutes;
          }

          plannedRoute = fullCoords;
          activeRouteCoords = fullCoords;
          routeLineFeature = turf.lineString(fullCoords);
          routeJunctions = buildRouteJunctions(fullCoords);
          plannedSteps = computeNavSteps(fullCoords);
          navTotalDistM = totalDist;

          drawPlannedRoute(fullCoords, from, to);

          document.getElementById('rs-dist').textContent = `${(totalDist / 1000).toFixed(1)} km`;
          document.getElementById('rs-time').textContent = formatMinutes(totalMinutes);
          document.getElementById('rs-turns').textContent =
            `${plannedSteps.filter(s => s.maneuver.type === 'turn').length} 個`;
          document.getElementById('route-summary').classList.add('show');
          document.getElementById('btn-start-nav').classList.add('show');

          const lngs = fullCoords.map(c => c[0]), lats = fullCoords.map(c => c[1]);
          map.fitBounds([
            [Math.min(...lngs), Math.min(...lats)],
            [Math.max(...lngs), Math.max(...lats)],
          ], { padding: { top: 80, bottom: 320, left: 40, right: 40 } });
          expandPanel();

      } catch (err) {
          console.error('[Nav] Routing failed:', err);
          alert('規劃失敗：' + err.message);
      }

      btn.disabled = false;
      btn.textContent = '🔍 規劃路線';
    }

    function startRouteFx() {
      stopRouteFx();

      const animate = (timestamp) => {
        if (!isNavigating && !plannedRoute) return;
        if (!map || !map.getStyle()) return;

        if (map.getLayer('planned-route-flow')) {
          const phase = (timestamp / 50) % 10;
          map.setPaintProperty('planned-route-flow', 'line-dasharray', [0.8, 2.4 + (phase * 0.05)]);
        }

        if (map.getLayer('planned-route-junction-guide')) {
          const opacity = 0.35 + ((Math.sin(timestamp / 500) + 1) * 0.22);
          map.setPaintProperty('planned-route-junction-guide', 'line-opacity', opacity);
        }

        routeFxTimer = requestAnimationFrame(animate);
      };

      routeFxTimer = requestAnimationFrame(animate);
    }

    function stopRouteFx() {
      if (routeFxTimer) {
          cancelAnimationFrame(routeFxTimer);
      }
      routeFxTimer = null;
    }

    function getDistanceToNextJunction(coord) {
      if (!coord) return null;
      const currentPoint = turf.point(coord);
      if (routeLineFeature && routeJunctions.length) {
        const onRoute = turf.nearestPointOnLine(routeLineFeature, currentPoint, { units: 'meters' });
        const routeLocation = Number(onRoute.properties && onRoute.properties.location || 0);
        const nextRouteJunction = routeJunctions.find(j => j.routeLocation > routeLocation + 5);
        if (nextRouteJunction) {
          return turf.distance(currentPoint, nextRouteJunction.point, { units: 'meters' });
        }
      }
      let nearest = Infinity;
      networkJunctions.features.forEach((feature) => {
        const dist = turf.distance(currentPoint, feature, { units: 'meters' });
        if (dist < nearest) nearest = dist;
      });
      return Number.isFinite(nearest) && nearest < 250 ? nearest : null;
    }

    function updateJunctionGuide(coord) {
      if (!map || !map.getSource('planned-route-junction-guide')) return null;
      let guideFeature = turf.featureCollection([]);
      let distanceToNext = null;
      if (coord && routeLineFeature && routeJunctions.length && activeRouteCoords && activeRouteCoords.length > 1) {
        const currentPoint = turf.point(coord);
        const onRoute = turf.nearestPointOnLine(routeLineFeature, currentPoint, { units: 'meters' });
        const routeLocation = Number(onRoute.properties && onRoute.properties.location || 0);
        const nextJunction = routeJunctions.find(j => j.routeLocation > routeLocation + 5);
        if (nextJunction) {
          distanceToNext = turf.distance(currentPoint, nextJunction.point, { units: 'meters' });
          if (distanceToNext <= JUNCTION_HIGHLIGHT_METERS) {
            const start = Math.max(0, nextJunction.coordIndex - 1);
            const end = Math.min(activeRouteCoords.length, nextJunction.coordIndex + 4);
            const coords = activeRouteCoords.slice(start, end);
            if (coords.length >= 2) {
              guideFeature = turf.featureCollection([turf.lineString(coords)]);
            }
          }
        }
      }
      map.getSource('planned-route-junction-guide').setData(guideFeature);
      return distanceToNext;
    }

    function drawPlannedRoute(coords, from, to) {
      if (!map) return;
      // Save for re-draw after potential style change (e.g. fallback to raster)
      plannedFrom = from;
      plannedTo = to;
      activeRouteCoords = coords;

      // Route polyline source
      if (!map.getSource('planned-route')) {
        map.addSource('planned-route', {
          type: 'geojson',
          data: { type: 'Feature', geometry: { type: 'LineString', coordinates: coords } },
        });
      } else {
        map.getSource('planned-route').setData(
          { type: 'Feature', geometry: { type: 'LineString', coordinates: coords } }
        );
      }

      // ── 3D Lane Rendering ──

      // Layer 1: Bottom dark shadow/outline
      if (!map.getLayer('planned-route-shadow')) {
        map.addLayer({
          id: 'planned-route-shadow',
          type: 'line',
          source: 'planned-route',
          paint: { 'line-color': '#02172d', 'line-width': 16, 'line-opacity': 0.3, 'line-blur': 6 },
        });
      }

      // Layer 2: Wide gray asphalt base
      if (!map.getLayer('planned-route-asphalt')) {
        map.addLayer({
          id: 'planned-route-asphalt',
          type: 'line',
          source: 'planned-route',
