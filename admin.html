<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員後台 - 城市運輸單車</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .admin-container {
            max-width: 1100px;
            margin: 2em auto;
            padding: 0 1em;
        }
        .admin-header-bar {
            background: linear-gradient(to right, #2c3e50, #3d5166);
            color: white;
            padding: 1.5em 2em;
            border-radius: 8px;
            margin-bottom: 2em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-header-bar h1 {
            margin: 0;
            font-size: 1.5em;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1em;
            margin-bottom: 2em;
        }
        .stat-card {
            background: white;
            padding: 1.5em;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
        }
        .stat-card .stat-num {
            font-size: 2.5em;
            font-weight: bold;
            color: #04D93C;
            display: block;
        }
        .stat-card .stat-label {
            color: #666;
            font-size: 0.9em;
        }
        .search-bar {
            display: flex;
            gap: 1em;
            margin-bottom: 1.5em;
        }
        .search-bar input {
            flex: 1;
            padding: 0.8em;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
        }
        .search-bar button {
            padding: 0.8em 1.5em;
            background: #04D93C;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .users-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .users-table th {
            background: #2c3e50;
            color: white;
            padding: 0.8em 1em;
            text-align: left;
            font-size: 0.9em;
        }
        .users-table td {
            padding: 0.8em 1em;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.9em;
            vertical-align: middle;
        }
        .users-table tr:hover { background: #f9f9f9; }
        .role-badge {
            display: inline-block;
            padding: 0.25em 0.7em;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
        }
        .role-admin { background: #2c3e50; color: white; }
        .role-senior { background: #ffc107; color: #333; }
        .role-junior { background: #e0e0e0; color: #555; }
        .verified-badge { color: #04D93C; }
        .unverified-badge { color: #e74c3c; }
        .action-btn {
            padding: 0.3em 0.8em;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            margin-right: 0.3em;
        }
        .btn-promote { background: #ffc107; color: #333; }
        .btn-demote { background: #e0e0e0; color: #555; }
        .btn-admin { background: #2c3e50; color: white; }
        .btn-delete { background: #e74c3c; color: white; }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5em;
            margin-top: 1.5em;
        }
        .pagination button {
            padding: 0.5em 1em;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            background: white;
        }
        .pagination button.active {
            background: #04D93C;
            color: white;
            border-color: #04D93C;
        }
        .tab-bar {
            display: flex;
            gap: 0;
            margin-bottom: 1.5em;
            border-bottom: 2px solid #ddd;
        }
        .tab-btn {
            padding: 0.8em 1.5em;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 1em;
            color: #666;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }
        .tab-btn.active {
            color: #04D93C;
            border-bottom-color: #04D93C;
            font-weight: bold;
        }
        #create-admin-section {
            background: white;
            padding: 2em;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            max-width: 500px;
        }
        #create-admin-section h3 { color: #2c3e50; margin-top: 0; }
        #create-admin-section .form-group { margin-bottom: 1em; }
        #create-admin-section label { display: block; margin-bottom: 0.3em; font-weight: bold; }
        #create-admin-section input {
            width: 100%;
            padding: 0.7em;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1em;
            box-sizing: border-box;
        }
        .loading { text-align: center; padding: 3em; color: #666; }
        #access-denied {
            text-align: center;
            padding: 4em 2em;
        }
    </style>

    <script>
        // 頁面守衛 - 檢查是否為管理員
        (function() {
            const token = localStorage.getItem('accessToken');
            if (!token) {
                alert('請先登入管理員帳戶。');
                window.location.replace('/login.html');
                throw new Error('Unauthorized');
            }
            // JWT decode (不驗證簽名，只讀取 payload)
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                if (payload.role !== 'admin') {
                    document.addEventListener('DOMContentLoaded', function() {
                        document.getElementById('admin-content').style.display = 'none';
                        document.getElementById('access-denied').style.display = 'block';
                    });
                }
            } catch (e) {
                alert('Token 無效，請重新登入。');
                window.location.replace('/login.html');
                throw new Error('Invalid token');
            }
        })();
    </script>
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div id="access-denied" style="display:none;">
            <i class="fas fa-ban" style="font-size:4em; color:#e74c3c;"></i>
            <h2>權限不足</h2>
            <p>你沒有管理員權限，無法訪問此頁面。</p>
            <a href="/dashboard.html" class="cta-button">返回儀表板</a>
        </div>

        <div id="admin-content" class="admin-container">
            <div class="admin-header-bar">
                <h1><i class="fas fa-shield-alt"></i> 管理員後台</h1>
                <span id="admin-user-info" style="font-size:0.9em; opacity:0.8;"></span>
            </div>

            <!-- 統計卡片 -->
            <div class="stats-grid" id="stats-grid">
                <div class="stat-card">
                    <span class="stat-num" id="stat-total">-</span>
                    <span class="stat-label">總用戶數</span>
                </div>
                <div class="stat-card">
                    <span class="stat-num" id="stat-senior">-</span>
                    <span class="stat-label">高級會員</span>
                </div>
                <div class="stat-card">
                    <span class="stat-num" id="stat-junior">-</span>
                    <span class="stat-label">初級會員</span>
                </div>
                <div class="stat-card">
                    <span class="stat-num" id="stat-verified">-</span>
                    <span class="stat-label">已驗證電郵</span>
                </div>
            </div>

            <!-- 標籤頁 -->
            <div class="tab-bar">
                <button class="tab-btn active" onclick="showTab('users')">
                    <i class="fas fa-users"></i> 用戶管理
                </button>
                <button class="tab-btn" onclick="showTab('create-admin')">
                    <i class="fas fa-user-plus"></i> 新增管理員
                </button>
                <button class="tab-btn" onclick="showTab('blog'); loadBlogPosts();">
                    <i class="fas fa-pen"></i> 網誌管理
                </button>
                <button class="tab-btn" onclick="showTab('push');">
                    <i class="fas fa-bell"></i> 推送通知
                </button>
            </div>

            <!-- 用戶管理標籤 -->
            <div id="tab-users">
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="搜尋電郵或姓名...">
                    <button onclick="loadUsers(1)"><i class="fas fa-search"></i> 搜尋</button>
                </div>

                <div id="users-loading" class="loading">
                    <i class="fas fa-spinner fa-spin" style="font-size:2em;"></i>
                    <p>正在載入用戶資料...</p>
                </div>

                <div id="users-table-container" style="display:none;">
                    <table class="users-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>電郵</th>
                                <th>姓名</th>
                                <th>角色</th>
                                <th>電郵驗證</th>
                                <th>騎行次數</th>
                                <th>總里程</th>
                                <th>登入方式</th>
                                <th>註冊日期</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="users-tbody"></tbody>
                    </table>
                    <div class="pagination" id="pagination"></div>
                </div>
            </div>

            <!-- 新增管理員標籤 -->
            <div id="tab-create-admin" style="display:none;">
                <div id="create-admin-section">
                    <h3><i class="fas fa-user-shield"></i> 新增管理員帳戶</h3>
                    <p style="color:#666; font-size:0.9em;">管理員帳戶只能通過此頁面創建，不可透過一般註冊頁面創建。</p>
                    <form id="create-admin-form">
                        <div class="form-group">
                            <label>電子郵件 *</label>
                            <input type="email" id="admin-email" required>
                        </div>
                        <div class="form-group">
                            <label>姓名 *</label>
                            <input type="text" id="admin-name" required>
                        </div>
                        <div class="form-group">
                            <label>密碼 *（至少 12 個字元）</label>
                            <input type="password" id="admin-password" required minlength="12">
                        </div>
                        <div class="form-group">
                            <label>確認密碼 *</label>
                            <input type="password" id="admin-confirm-password" required minlength="12">
                        </div>
                        <button type="submit" class="cta-button" style="width:100%;">
                            <i class="fas fa-plus"></i> 建立管理員帳戶
                        </button>
                    </form>
                </div>
            </div>
            <!-- 網誌管理標籤 -->
            <div id="tab-blog" style="display:none;">
                <div style="margin-bottom:1.5em; display:flex; gap:1em; align-items:center; flex-wrap:wrap;">
                    <h3 style="margin:0; flex:1;">網誌文章列表</h3>
                    <button class="cta-button" onclick="openBlogModal(null)" style="white-space:nowrap;">
                        <i class="fas fa-plus"></i> 撰寫新文章
                    </button>
                </div>

                <div id="blog-loading" class="loading">
                    <i class="fas fa-spinner fa-spin" style="font-size:2em;"></i>
                    <p>正在載入文章...</p>
                </div>

                <div id="blog-list-admin" style="display:none;"></div>
            </div>

            <!-- 推送通知標籤 -->
            <div id="tab-push" style="display:none;">
                <h3 style="margin-top:0;">📢 發送推送通知</h3>
                <p style="color:#555; font-size:0.9em;">可向所有用戶、指定用戶 ID 或指定角色類別發送自訂通知。</p>
                <form id="push-form" onsubmit="sendAdminPush(event)" style="max-width:540px;">
                    <div style="margin-bottom:1em;">
                        <label style="display:block; font-weight:bold; margin-bottom:0.3em;">標題 <span style="color:red">*</span></label>
                        <input type="text" id="push-title" required maxlength="80"
                               placeholder="e.g. 🚲 新路線上線！"
                               style="width:100%; padding:0.6em 0.8em; border:1px solid #ccc; border-radius:6px; font-size:1em; box-sizing:border-box;">
                    </div>
                    <div style="margin-bottom:1em;">
                        <label style="display:block; font-weight:bold; margin-bottom:0.3em;">內容 <span style="color:red">*</span></label>
                        <textarea id="push-body" required maxlength="200" rows="3"
                                  placeholder="通知內容（最多 200 字）"
                                  style="width:100%; padding:0.6em 0.8em; border:1px solid #ccc; border-radius:6px; font-size:1em; resize:vertical; box-sizing:border-box;"></textarea>
                    </div>
                    <div style="margin-bottom:1em;">
                        <label style="display:block; font-weight:bold; margin-bottom:0.3em;">跳轉網址（可選）</label>
                        <input type="text" id="push-url" maxlength="200" placeholder="e.g. /routes 或留空"
                               style="width:100%; padding:0.6em 0.8em; border:1px solid #ccc; border-radius:6px; font-size:1em; box-sizing:border-box;">
                    </div>
                    <div style="margin-bottom:1em;">
                        <label style="display:block; font-weight:bold; margin-bottom:0.3em;">目標</label>
                        <select id="push-target-type" onchange="togglePushTarget()"
                                style="padding:0.5em 0.8em; border:1px solid #ccc; border-radius:6px; font-size:1em;">
                            <option value="all">所有訂閱者</option>
                            <option value="user">指定用戶 ID</option>
                            <option value="role">指定角色（user / senior / admin）</option>
                        </select>
                    </div>
                    <div id="push-target-user" style="margin-bottom:1em; display:none;">
                        <label style="display:block; font-weight:bold; margin-bottom:0.3em;">用戶 ID</label>
                        <input type="number" id="push-user-id" min="1" placeholder="數字 ID"
                               style="width:100%; padding:0.6em 0.8em; border:1px solid #ccc; border-radius:6px; font-size:1em; box-sizing:border-box;">
                    </div>
                    <div id="push-target-role" style="margin-bottom:1em; display:none;">
                        <label style="display:block; font-weight:bold; margin-bottom:0.3em;">角色</label>
                        <input type="text" id="push-role" placeholder="user / senior / admin"
                               style="width:100%; padding:0.6em 0.8em; border:1px solid #ccc; border-radius:6px; font-size:1em; box-sizing:border-box;">
                    </div>
                    <button type="submit" class="cta-button" id="push-submit-btn">
                        <i class="fas fa-paper-plane"></i> 發送通知
                    </button>
                </form>
                <div id="push-result" style="margin-top:1em;"></div>
            </div>
        </div>
    </main>

    <!-- 網誌編輯 Modal -->
    <div id="blog-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1000; overflow-y:auto; padding:2em 1em;">
        <div style="background:white; max-width:700px; margin:0 auto; border-radius:12px; padding:2em; position:relative;">
            <button onclick="closeBlogModal()" style="position:absolute; top:1em; right:1em; background:none; border:none; font-size:1.5em; cursor:pointer; color:#888;">&times;</button>
            <h3 id="blog-modal-title" style="margin-top:0; color:#2c3e50;"><i class="fas fa-pen"></i> 撰寫網誌文章</h3>
            <form id="blog-form">
                <input type="hidden" id="blog-edit-id">
                <div style="margin-bottom:1em;">
                    <label style="display:block; margin-bottom:0.3em; font-weight:bold;">標題 *</label>
                    <input type="text" id="blog-title" required maxlength="255"
                        style="width:100%; padding:0.7em; border:1px solid #ddd; border-radius:4px; font-size:1em; box-sizing:border-box;">
                </div>
                <div style="margin-bottom:1em;">
                    <label style="display:block; margin-bottom:0.3em; font-weight:bold;">摘要</label>
                    <textarea id="blog-summary" rows="3" maxlength="500"
                        style="width:100%; padding:0.7em; border:1px solid #ddd; border-radius:4px; font-size:1em; box-sizing:border-box; resize:vertical;"></textarea>
                </div>
                <div style="margin-bottom:1em;">
                    <label style="display:block; margin-bottom:0.3em; font-weight:bold;">封面圖片網址</label>
                    <input type="url" id="blog-image-url"
                        style="width:100%; padding:0.7em; border:1px solid #ddd; border-radius:4px; font-size:1em; box-sizing:border-box;"
                        placeholder="https://...">
                </div>
                <div style="margin-bottom:1.5em;">
                    <label style="display:block; margin-bottom:0.3em; font-weight:bold;">正文內容（支援 HTML）*</label>
                    <textarea id="blog-content" rows="15" required
                        style="width:100%; padding:0.7em; border:1px solid #ddd; border-radius:4px; font-size:0.95em; font-family:monospace; box-sizing:border-box; resize:vertical;"></textarea>
                </div>
                <button type="submit" class="cta-button" style="width:100%;">
                    <i class="fas fa-save"></i> 儲存文章
                </button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 香港城市運輸單車. All Rights Reserved.</p>
    </footer>

    <script src="/js/main.js"></script>
    <script src="/js/login.js"></script>
    <script>
        let currentPage = 1;

        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('[id^="tab-"]').forEach(t => t.style.display = 'none');
            document.getElementById(`tab-${tab}`).style.display = 'block';
            // 找到對應的標籤按鈕並標記為活動狀態
            const btn = document.querySelector(`.tab-btn[onclick*="'${tab}'"]`);
            if (btn) btn.classList.add('active');
        }

        async function loadUsers(page = 1) {
            currentPage = page;
            const search = document.getElementById('search-input').value.trim();
            const token = localStorage.getItem('accessToken');

            document.getElementById('users-loading').style.display = 'block';
            document.getElementById('users-table-container').style.display = 'none';

            try {
                const url = `/api/admin-users?page=${page}&limit=20${search ? '&search=' + encodeURIComponent(search) : ''}`;
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.message || '載入失敗');
                }

                const data = await response.json();
                renderUsersTable(data.users);
                renderPagination(data.pagination);
                updateStats(data.users, data.pagination.total);

                document.getElementById('users-loading').style.display = 'none';
                document.getElementById('users-table-container').style.display = 'block';

            } catch (err) {
                document.getElementById('users-loading').innerHTML = `<p style="color:red;">載入失敗: ${err.message}</p>`;
            }
        }

        function updateStats(users, total) {
            document.getElementById('stat-total').textContent = total;
            // 以下統計僅反映當前頁面的用戶，並非全站總計
            const senior = users.filter(u => u.user_role === 'senior').length;
            const junior = users.filter(u => u.user_role === 'junior').length;
            const verified = users.filter(u => u.email_verified).length;
            document.getElementById('stat-senior').textContent = `${senior}（本頁）`;
            document.getElementById('stat-junior').textContent = `${junior}（本頁）`;
            document.getElementById('stat-verified').textContent = `${verified}（本頁）`;
        }

        function renderUsersTable(users) {
            const tbody = document.getElementById('users-tbody');
            tbody.innerHTML = users.map(user => {
                const roleClass = user.user_role === 'admin' ? 'role-admin' : 
                                  user.user_role === 'senior' ? 'role-senior' : 'role-junior';
                const roleLabel = user.user_role === 'admin' ? '管理員' :
                                  user.user_role === 'senior' ? '高級會員' : '初級會員';
                const verifiedHtml = user.email_verified 
                    ? '<i class="fas fa-check-circle verified-badge" title="已驗證"></i>'
                    : '<i class="fas fa-times-circle unverified-badge" title="未驗證"></i>';
                const date = user.created_at ? new Date(user.created_at).toLocaleDateString('zh-HK') : '-';
                
                return `
                    <tr>
                        <td>${user.id}</td>
                        <td>${escapeHtml(user.email)}</td>
                        <td>${escapeHtml(user.full_name || '-')}</td>
                        <td><span class="role-badge ${roleClass}">${roleLabel}</span></td>
                        <td>${verifiedHtml}</td>
                        <td>${user.ride_count || 0}</td>
                        <td>${parseFloat(user.total_distance || 0).toFixed(1)} km</td>
                        <td>${user.auth_provider || 'email'}</td>
                        <td>${date}</td>
                        <td>
                            ${user.user_role !== 'senior' && user.user_role !== 'admin' 
                                ? `<button class="action-btn btn-promote" onclick="setRole(${user.id}, 'senior')">升級</button>` 
                                : ''}
                            ${user.user_role === 'senior' 
                                ? `<button class="action-btn btn-demote" onclick="setRole(${user.id}, 'junior')">降級</button>` 
                                : ''}
                            ${user.user_role !== 'admin' 
                                ? `<button class="action-btn btn-admin" onclick="setRole(${user.id}, 'admin')">設管理員</button>` 
                                : `<button class="action-btn btn-demote" onclick="setRole(${user.id}, 'senior')">移除管理員</button>`}
                            <button class="action-btn btn-delete" onclick="deleteUser(${user.id}, '${escapeHtml(user.email)}')">刪除</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function renderPagination(pagination) {
            const container = document.getElementById('pagination');
            const { page, totalPages } = pagination;
            let html = '';
            
            if (page > 1) html += `<button onclick="loadUsers(${page - 1})">上一頁</button>`;
            for (let i = Math.max(1, page - 2); i <= Math.min(totalPages, page + 2); i++) {
                html += `<button class="${i === page ? 'active' : ''}" onclick="loadUsers(${i})">${i}</button>`;
            }
            if (page < totalPages) html += `<button onclick="loadUsers(${page + 1})">下一頁</button>`;
            
            container.innerHTML = html;
        }

        async function setRole(userId, newRole) {
            const roleLabel = newRole === 'admin' ? '管理員' : newRole === 'senior' ? '高級會員' : '初級會員';
            if (!confirm(`確定要將此用戶設為「${roleLabel}」嗎？`)) return;

            const token = localStorage.getItem('accessToken');
            try {
                const response = await fetch('/api/admin-users', {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ action: 'set_role', user_id: userId, new_role: newRole })
                });
                const data = await response.json();
                if (response.ok) {
                    alert(data.message);
                    loadUsers(currentPage);
                } else {
                    alert('操作失敗: ' + data.message);
                }
            } catch (err) {
                alert('錯誤: ' + err.message);
            }
        }

        async function deleteUser(userId, email) {
            if (!confirm(`確定要永久刪除用戶「${email}」嗎？此操作無法復原！`)) return;

            const token = localStorage.getItem('accessToken');
            try {
                const response = await fetch('/api/admin-users', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ action: 'delete_user', user_id: userId })
                });
                const data = await response.json();
                if (response.ok) {
                    alert(data.message);
                    loadUsers(currentPage);
                } else {
                    alert('刪除失敗: ' + data.message);
                }
            } catch (err) {
                alert('錯誤: ' + err.message);
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.toString()
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // 建立管理員帳戶
        document.addEventListener('DOMContentLoaded', function() {
            // 顯示管理員資訊
            const userData = localStorage.getItem('user');
            if (userData) {
                const user = JSON.parse(userData);
                document.getElementById('admin-user-info').textContent = 
                    `管理員: ${user.full_name || user.email}`;
            }

            // 載入用戶列表
            loadUsers(1);

            // 建立管理員表單
            document.getElementById('create-admin-form').addEventListener('submit', async function(e) {
                e.preventDefault();
                const email = document.getElementById('admin-email').value;
                const name = document.getElementById('admin-name').value;
                const password = document.getElementById('admin-password').value;
                const confirmPw = document.getElementById('admin-confirm-password').value;

                if (password !== confirmPw) {
                    alert('兩次輸入的密碼不一致。');
                    return;
                }

                const token = localStorage.getItem('accessToken');
                try {
                    const response = await fetch('/api/admin-users', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ action: 'create_admin', email, full_name: name, password, role: 'admin' })
                    });
                    const data = await response.json();
                    if (response.ok) {
                        alert(`管理員帳戶「${email}」已成功建立！`);
                        document.getElementById('create-admin-form').reset();
                        loadUsers(1);
                    } else {
                        alert('建立失敗: ' + data.message);
                    }
                } catch (err) {
                    alert('錯誤: ' + err.message);
                }
            });
        });

        // 搜尋按 Enter 鍵
        document.addEventListener('keyup', function(e) {
            if (e.target.id === 'search-input' && e.key === 'Enter') {
                loadUsers(1);
            }
        });

        // ── 網誌管理 ──────────────────────────────────────────────────────────

        let editingPostId = null;

        async function loadBlogPosts() {
            const loadingEl = document.getElementById('blog-loading');
            const listEl = document.getElementById('blog-list-admin');
            loadingEl.style.display = 'block';
            listEl.style.display = 'none';

            try {
                const token = localStorage.getItem('accessToken');
                const resp = await fetch('/api/blog', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await resp.json();
                const posts = data.posts || [];

                if (posts.length === 0) {
                    listEl.innerHTML = '<p style="color:#888; text-align:center; padding:2em;">目前還沒有網誌文章。</p>';
                } else {
                    listEl.innerHTML = posts.map(post => `
                        <div style="background:white; border-radius:8px; padding:1.2em 1.5em; margin-bottom:1em; box-shadow:0 2px 6px rgba(0,0,0,0.07); display:flex; align-items:center; gap:1em; flex-wrap:wrap;">
                            <div style="flex:1; min-width:200px;">
                                <strong style="font-size:1.05em;">${escapeHtml(post.title)}</strong>
                                <div style="color:#888; font-size:0.85em; margin-top:0.2em;">
                                    <i class="fas fa-user"></i> ${escapeHtml(post.author_name || '管理員')}
                                    &nbsp;|&nbsp;
                                    <i class="fas fa-calendar-alt"></i> ${new Date(post.created_at).toLocaleDateString('zh-HK')}
                                </div>
                                ${post.summary ? `<p style="margin:0.4em 0 0; color:#666; font-size:0.9em;">${escapeHtml(post.summary)}</p>` : ''}
                            </div>
                            <div style="display:flex; gap:0.5em; flex-shrink:0;">
                                <a href="/blog_post?id=${post.id}" target="_blank" class="action-btn" style="background:#3498db; color:white; text-decoration:none; padding:0.3em 0.8em; border-radius:4px; font-size:0.8em;"><i class="fas fa-eye"></i> 查看</a>
                                <button class="action-btn btn-promote" onclick="openBlogModal(${post.id})"><i class="fas fa-edit"></i> 編輯</button>
                                <button class="action-btn btn-delete" onclick="deleteBlogPost(${post.id}, '${escapeHtml(post.title)}')"><i class="fas fa-trash"></i> 刪除</button>
                            </div>
                        </div>
                    `).join('');
                }

                loadingEl.style.display = 'none';
                listEl.style.display = 'block';
            } catch (err) {
                loadingEl.innerHTML = `<p style="color:red; text-align:center;">載入失敗: ${err.message}</p>`;
            }
        }

        async function openBlogModal(postId) {
            editingPostId = postId;
            document.getElementById('blog-edit-id').value = postId || '';
            document.getElementById('blog-title').value = '';
            document.getElementById('blog-summary').value = '';
            document.getElementById('blog-image-url').value = '';
            document.getElementById('blog-content').value = '';
            document.getElementById('blog-modal-title').innerHTML =
                postId ? '<i class="fas fa-edit"></i> 編輯網誌文章' : '<i class="fas fa-pen"></i> 撰寫新網誌文章';

            if (postId) {
                try {
                    const resp = await fetch(`/api/blog?id=${postId}`);
                    const data = await resp.json();
                    const post = data.post;
                    document.getElementById('blog-title').value = post.title || '';
                    document.getElementById('blog-summary').value = post.summary || '';
                    document.getElementById('blog-image-url').value = post.image_url || '';
                    document.getElementById('blog-content').value = post.content || '';
                } catch (err) {
                    alert('載入文章資料失敗: ' + err.message);
                    return;
                }
            }

            document.getElementById('blog-modal').style.display = 'block';
        }

        function closeBlogModal() {
            document.getElementById('blog-modal').style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('blog-form').addEventListener('submit', async function(e) {
                e.preventDefault();
                const token = localStorage.getItem('accessToken');
                const postId = document.getElementById('blog-edit-id').value;
                const body = {
                    title: document.getElementById('blog-title').value.trim(),
                    summary: document.getElementById('blog-summary').value.trim(),
                    image_url: document.getElementById('blog-image-url').value.trim(),
                    content: document.getElementById('blog-content').value
                };

                try {
                    const url = postId ? `/api/blog?id=${postId}` : '/api/blog';
                    const method = postId ? 'PUT' : 'POST';
                    const resp = await fetch(url, {
                        method,
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(body)
                    });
                    const data = await resp.json();
                    if (resp.ok) {
                        alert(postId ? '文章已更新！' : '文章已發布！');
                        closeBlogModal();
                        loadBlogPosts();
                    } else {
                        alert('儲存失敗: ' + data.message);
                    }
                } catch (err) {
                    alert('錯誤: ' + err.message);
                }
            });

            // 按 Escape 鍵關閉 Modal
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeBlogModal();
            });
        });

        async function deleteBlogPost(postId, title) {
            if (!confirm(`確定要刪除文章「${title}」嗎？此操作無法復原！`)) return;
            const token = localStorage.getItem('accessToken');
            try {
                const resp = await fetch(`/api/blog?id=${postId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await resp.json();
                if (resp.ok) {
                    alert('文章已刪除。');
                    loadBlogPosts();
                } else {
                    alert('刪除失敗: ' + data.message);
                }
            } catch (err) {
                alert('錯誤: ' + err.message);
            }
        }

        // ── 推送通知功能 ─────────────────────────────────────────────────────
        function togglePushTarget() {
            const type = document.getElementById('push-target-type').value;
            document.getElementById('push-target-user').style.display = type === 'user' ? 'block' : 'none';
            document.getElementById('push-target-role').style.display = type === 'role' ? 'block' : 'none';
        }

        async function sendAdminPush(e) {
            e.preventDefault();
            const btn = document.getElementById('push-submit-btn');
            const resultEl = document.getElementById('push-result');
            btn.disabled = true;
            btn.textContent = '發送中…';
            resultEl.textContent = '';

            const title = document.getElementById('push-title').value.trim();
            const body  = document.getElementById('push-body').value.trim();
            const url   = document.getElementById('push-url').value.trim() || '/';
            const type  = document.getElementById('push-target-type').value;
            const payload = { title, body, url };

            if (type === 'user') {
                const uid = document.getElementById('push-user-id').value.trim();
                if (!uid) { resultEl.textContent = '請填寫用戶 ID'; btn.disabled = false; btn.textContent = '發送通知'; return; }
                payload.target_user_id = parseInt(uid, 10);
            } else if (type === 'role') {
                const role = document.getElementById('push-role').value.trim();
                if (!role) { resultEl.textContent = '請填寫角色'; btn.disabled = false; btn.textContent = '發送通知'; return; }
                payload.target_category = role;
            }

            try {
                const token = localStorage.getItem('accessToken') || '';
                const res = await fetch('/api/admin-push', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(token ? { Authorization: `Bearer ${token}` } : {}),
                    },
                    body: JSON.stringify(payload),
                });
                const data = await res.json();
                if (res.ok) {
                    resultEl.style.color = 'green';
                    resultEl.textContent = `✅ 已發送至 ${data.sent} 個裝置${data.failed ? `（${data.failed} 個失敗）` : ''}${data.message ? '：' + data.message : ''}`;
                } else {
                    resultEl.style.color = 'red';
                    resultEl.textContent = '❌ ' + (data.message || '發送失敗');
                }
            } catch (err) {
                resultEl.style.color = 'red';
                resultEl.textContent = '❌ 錯誤：' + err.message;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> 發送通知';
            }
        }
    </script>
</body>
</html>
