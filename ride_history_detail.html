<!DOCTYPE html>
<html lang="zh-Hant">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>騎行詳情 - 城市運輸單車</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background: #121f14; color: #e8f5e9; font-family: -apple-system, sans-serif; }
        .detail-container { max-width: 800px; margin: 0 auto; padding: 1.5em 1em; }
        .back-btn { display: inline-flex; align-items: center; gap: 0.5em; color: #6dba65; text-decoration: none; font-weight: bold; margin-bottom: 1.5em; }

        .header-card { background: #1e3820; border-radius: 16px; padding: 1.5em; border: 1px solid #2d4d2d; margin-bottom: 1.5em; }
        .route-title { font-size: 1.5em; font-weight: bold; margin: 0 0 0.2em; color: #fff; }
        .ride-date { color: #a8d8a0; font-size: 0.9em; }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1em; margin-bottom: 1.5em; }
        .stat-card { background: #1e3820; border-radius: 12px; padding: 1.2em; border: 1px solid #2d4d2d; text-align: center; }
        .stat-card i { font-size: 1.5em; color: #6dba65; margin-bottom: 0.4em; }
        .stat-card .val { display: block; font-size: 1.4em; font-weight: bold; color: #fff; }
        .stat-card .lbl { font-size: 0.75em; color: #a8d8a0; }

        .rewards-section { background: rgba(109,186,101,0.1); border: 1px solid #6dba65; border-radius: 12px; padding: 1em 1.5em; margin-bottom: 1.5em; display: flex; justify-content: space-between; align-items: center; }
        .reward-item { display: flex; align-items: center; gap: 0.6em; font-weight: bold; color: #6dba65; }

        #map { height: 350px; width: 100%; border-radius: 16px; border: 1px solid #2d4d2d; margin-bottom: 1.5em; z-index: 1; }

        .loading-overlay { position: fixed; inset: 0; background: #121f14; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(109,186,101,0.2); border-top-color: #6dba65; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 1em; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-box { background: #3d1a1a; color: #ffabaf; padding: 1.5em; border-radius: 12px; text-align: center; border: 1px solid #632d2d; }
    </style>
</head>
<body>
    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
        <p>正在載入騎行數據...</p>
    </div>

    <div class="detail-container">
        <a href="/dashboard" class="back-btn"><i class="fas fa-arrow-left"></i> 返回我的紀錄</a>

        <div id="content" style="display:none;">
            <div class="header-card">
                <h1 id="route-name" class="route-title">載入中...</h1>
                <div id="ride-date" class="ride-date">---</div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fas fa-road"></i>
                    <span id="distance" class="val">0.0</span>
                    <span class="lbl">公里</span>
                </div>
                <div class="stat-card">
                    <i class="fas fa-stopwatch"></i>
                    <span id="duration" class="val">0</span>
                    <span class="lbl">分鐘</span>
                </div>
                <div class="stat-card">
                    <i class="fas fa-tachometer-alt"></i>
                    <span id="avg-speed" class="val">0.0</span>
                    <span class="lbl">平均時速 (km/h)</span>
                </div>
                <div class="stat-card">
                    <i class="fas fa-map-marker-alt"></i>
                    <span id="stops-count" class="val">0</span>
                    <span class="lbl">已到站點</span>
                </div>
            </div>

            <div class="rewards-section">
                <div class="reward-item">
                    <i class="fas fa-star"></i>
                    <span>+<span id="xp-earned">0</span> XP</span>
                </div>
                <div class="reward-item" id="coins-earned-wrap">
                    <i class="fas fa-coins" style="color:#ffd54f;"></i>
                    <span style="color:#ffd54f;">+<span id="coins-earned">0</span> 里程幣</span>
                </div>
            </div>

            <div id="map"></div>

            <div id="anti-cheat-notice" class="error-box" style="display:none; margin-top: 1em;">
                <i class="fas fa-exclamation-triangle" style="font-size: 2em; margin-bottom: 0.5em; display: block;"></i>
                <strong>此紀錄已作廢</strong>
                <p id="anti-cheat-reason" style="font-size: 0.9em; margin-top: 0.5em;"></p>
            </div>
        </div>

        <div id="error-view" style="display:none;" class="error-box">
            <p>無法找到該騎行紀錄或您無權查看。</p>
            <a href="/dashboard" class="back-btn" style="margin-top:1em;">返回</a>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const rideId = params.get('id');
            const token = localStorage.getItem('accessToken');

            if (!rideId || !token) {
                showError();
                return;
            }

            try {
                // Fetch ride history to find the specific one
                // Since there is no direct single-ride API, we fetch history and filter
                const resp = await fetch('/api/getHistory', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!resp.ok) throw new Error('API Error');
                const data = await resp.json();
                const ride = data.history.find(r => String(r.id) === rideId);

                if (!ride) {
                    showError();
                    return;
                }

                renderRide(ride);
            } catch (e) {
                console.error(e);
                showError();
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        });

        function renderRide(ride) {
            document.getElementById('content').style.display = 'block';
            document.getElementById('route-name').textContent = ride.route_name || '自由騎行';
            document.getElementById('ride-date').textContent = new Date(ride.ride_date).toLocaleString('zh-HK', {
                year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
            });

            document.getElementById('distance').textContent = parseFloat(ride.distance_km || 0).toFixed(1);
            document.getElementById('duration').textContent = ride.duration_minutes || 0;
            document.getElementById('avg-speed').textContent = parseFloat(ride.avg_speed_kmh || 0).toFixed(1);

            // Robust stops count
            let stopsCount = ride.stops_count;
            if (!stopsCount) {
                let sr = ride.stops_reached;
                if (typeof sr === 'string') {
                    try { sr = JSON.parse(sr); } catch(e) { sr = []; }
                }
                stopsCount = Array.isArray(sr) ? sr.length : 0;
            }
            document.getElementById('stops-count').textContent = stopsCount;

            document.getElementById('xp-earned').textContent = ride.xp_earned || 0;

            // Estimate coins if not directly in history (old system vs new)
            const coins = ride.random_bonus_coins || Math.round(parseFloat(ride.distance_km || 0) * 0.8);
            document.getElementById('coins-earned').textContent = coins;

            if (ride.anti_cheat) {
                document.getElementById('anti-cheat-notice').style.display = 'block';
                document.getElementById('anti-cheat-reason').textContent = ride.anti_cheat_reason || '均速過快或軌跡異常';
            }

            initMap(ride);
        }

        function initMap(ride) {
            const map = L.map('map', {
                zoomControl: false,
                attributionControl: false
            });

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19
            }).addTo(map);

            let polyline;
            if (ride.gpx_track) {
                try {
                    const geojson = JSON.parse(ride.gpx_track);
                    polyline = L.geoJSON(geojson, {
                        style: { color: '#04D93C', weight: 4, opacity: 0.8 }
                    }).addTo(map);
                    map.fitBounds(polyline.getBounds(), { padding: [20, 20] });
                } catch (e) {
                    console.warn('GPX track parsing failed', e);
                    useFallbackMap(map);
                }
            } else {
                useFallbackMap(map);
            }
        }

        function useFallbackMap(map) {
            // Default view to TKO if no track
            map.setView([22.305, 114.26], 14);
            const msg = L.divIcon({
                className: 'map-msg',
                html: '<div style="background:rgba(0,0,0,0.6); color:#fff; padding:5px 10px; border-radius:5px; white-space:nowrap;">無軌跡數據</div>'
            });
            L.marker([22.305, 114.26], { icon: msg }).addTo(map);
        }

        function showError() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error-view').style.display = 'block';
        }
    </script>
</body>
</html>
