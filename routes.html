<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#121f14">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="城市運輸單車">
    <link rel="apple-touch-icon" href="/images/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港城市運輸單車 - 單車路線</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
/* ════════ WEB-ONLY route list styles ════════ */
.filters-container {
    max-width: 1200px;
    margin: 0 auto 2em auto;
    padding: 1em;
}
.filter-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 1em;
    padding: 1em;
    align-items: center;
    background-color: #fff;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    position: relative;
    z-index: 2;
}
.filter-dropdown-container { position: relative; }
.filter-category-button {
    background-color: #2c3e50;
    color: #fff;
    border: none;
    padding: 0.8em 1.5em;
    border-radius: 50px;
    cursor: pointer;
    transition: background-color 0.3s ease, transform 0.3s ease;
    font-size: 1em;
    font-weight: bold;
}
.filter-category-button:hover, .filter-category-button.active {
    background-color: #04D93C;
    transform: translateY(-3px);
}
.filter-dropdown-menu {
    display: none;
    position: absolute;
    top: 110%;
    left: 0;
    background-color: #fff;
    border-radius: 8px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    padding: 1em;
    z-index: 100;
    min-width: 220px;
    max-height: 300px;
    overflow-y: auto;
}
.filter-dropdown-menu.show { display: block; }
.filter-dropdown-menu label {
    display: block;
    padding: 0.5em 0.8em;
    cursor: pointer;
    border-radius: 5px;
    transition: background-color 0.2s ease;
}
.filter-dropdown-menu label:hover { background-color: #f4f4f4; }
.filter-dropdown-menu input[type="checkbox"] { margin-right: 0.8em; }
.all-routes-section .route-cards-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 2em;
}
.route-card-full {
    background-color: #fff;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    transition: transform 0.3s ease;
    overflow: hidden;
}
.route-card-full:hover { transform: translateY(-5px); }
.route-card-full a { padding: 1.5em; display: block; color: inherit; }
.route-card-full a.disabled-link { pointer-events: none; cursor: default; }
.route-card-header { display: flex; align-items: center; margin-bottom: 1em; border-bottom: 1px solid #eee; padding-bottom: 1em; }
.route-id-code { font-size: 1.2em; font-weight: bold; padding: 0.5em 1em; border-radius: 5px; margin-right: 1em; white-space: nowrap; }
.route-alias { margin: 0; font-size: 1.3em; font-weight: bold; }
.route-card-content p { margin: 0.5em 0; }
.hero-search-container {
    max-width: 600px;
    margin: 2em auto 0 auto;
}
.search-input {
    width: 100%;
    padding: 1em 1.5em;
    border: none;
    border-radius: 50px;
    font-size: 1.1em;
    font-family: inherit;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: box-shadow 0.3s ease;
}
.search-input:focus {
    outline: none;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}
@media (max-width: 1100px) {
    .filter-controls { justify-content: center; }
    .search-container { flex-basis: 100%; max-width: none; }
}

/* ════════ APP-ONLY ride page styles ════════ */
/* Department selection screen */
#app-dept-select {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 1200;
    background: var(--app-bg-card, #1e3820);
    color: var(--app-text-primary, #e8f5e9);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', sans-serif;
    border-radius: 18px 18px 0 0;
    padding: 1.2em 1em calc(env(safe-area-inset-bottom) + 1em);
    box-shadow: 0 -4px 24px rgba(0,0,0,0.5);
    max-height: 80vh;
    overflow-y: auto;
}
#app-dept-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1199;
    background: rgba(0,0,0,0.5);
}
.app-dept-header {
    display: flex;
    align-items: center;
    gap: 0.7em;
    margin-bottom: 1.2em;
    flex-shrink: 0;
}
.app-dept-header h2 {
    font-size: 1.1em;
    font-weight: bold;
    flex: 1;
}
.app-dept-subtitle {
    font-size: 0.82em;
    color: var(--app-text-secondary, #a8d8a0);
    margin-bottom: 1.2em;
    opacity: 0.85;
}
.app-dept-card {
    background: var(--app-bg-card, #1e3820);
    border: 1.5px solid var(--app-border, #2d4d2d);
    border-radius: 14px;
    padding: 1.2em 1.2em 1em;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 0.8em;
}
.app-dept-card:active, .app-dept-card:hover {
    border-color: var(--app-accent, #6dba65);
    background: rgba(76,175,80,0.1);
}
.app-dept-card-title {
    font-size: 1.1em;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 0.4em;
}
.app-dept-card-region {
    font-size: 0.78em;
    color: var(--app-text-secondary, #a8d8a0);
    margin-top: 0.2em;
}
.app-dept-card-meta {
    font-size: 0.78em;
    color: var(--app-text-secondary, #a8d8a0);
    margin-top: 0.5em;
}
.app-dept-card-arrow {
    float: right;
    opacity: 0.6;
    font-size: 1.1em;
}
.app-dept-coming-soon {
    opacity: 0.45;
    cursor: not-allowed;
}
.app-dept-coming-soon:active, .app-dept-coming-soon:hover {
    border-color: var(--app-border, #2d4d2d);
    background: var(--app-bg-card, #1e3820);
}
.app-dept-unlock-btn {
    margin-top: 0.6em;
    background: linear-gradient(135deg, #00838F, #006064);
    color: white;
    border: none;
    padding: 0.4em 1em;
    border-radius: 20px;
    font-size: 0.82em;
    font-weight: bold;
    cursor: pointer;
}
.app-dept-promo-badge {
    background: #FF6F00;
    color: white;
    padding: 0.15em 0.5em;
    border-radius: 10px;
    font-size: 0.78em;
    font-weight: bold;
    margin-left: 0.4em;
}
.app-dept-locked-overlay {
    opacity: 0.8;
}

#app-ride-page {
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: var(--app-bg-primary, #121f14);
    color: var(--app-text-primary, #e8f5e9);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', sans-serif;
    overflow: hidden;
}
/* Search + filter bar */
.app-ride-topbar {
    padding: calc(env(safe-area-inset-top) + 0.6em) 0.8em 0.6em;
    background: var(--app-bg-primary, #121f14);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 0.5em;
}
.app-ride-search-row {
    display: flex;
    align-items: center;
    background: var(--app-bg-card, #1e3820);
    border-radius: 12px;
    padding: 0 0.8em;
    border: 1px solid var(--app-border, #2d4d2d);
    gap: 0.5em;
}
.app-ride-search-row i { color: var(--app-text-secondary, #a8d8a0); font-size: 1em; }
.app-ride-search-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--app-text-primary, #e8f5e9);
    font-size: 0.95em;
    padding: 0.7em 0;
    font-family: inherit;
}
.app-ride-search-input::placeholder { color: #5a7a5a; }

/* Filter chips */
.app-filter-row {
    display: flex;
    gap: 0.5em;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
}
.app-filter-row::-webkit-scrollbar { display: none; }
.app-filter-chip {
    flex-shrink: 0;
    padding: 0.35em 0.9em;
    border-radius: 20px;
    font-size: 0.78em;
    font-weight: bold;
    cursor: pointer;
    border: 1.5px solid var(--app-border, #2d4d2d);
    background: var(--app-bg-card, #1e3820);
    color: var(--app-text-secondary, #a8d8a0);
    transition: all 0.2s;
    white-space: nowrap;
    user-select: none;
}
.app-filter-chip.active {
    background: var(--app-accent, #6dba65);
    color: #121f14;
    border-color: var(--app-accent, #6dba65);
}
.app-filter-chip.random-btn {
    background: #2d4a3a;
    border-color: #4a7a5a;
    color: #a8d8a0;
}
.app-filter-chip.random-btn:active { background: var(--app-accent, #6dba65); color: #121f14; }
.app-filter-chip.dept-chip {
    background: rgba(109,186,101,0.15);
    border-color: var(--app-accent, #6dba65);
    color: var(--app-accent, #6dba65);
    font-weight: 600;
}

/* Map + start button area */
.app-map-section {
    flex-shrink: 0;
    position: relative;
    height: 42vh;
    min-height: 200px;
}
#app-ride-map {
    position: absolute;
    inset: 0;
    border-radius: 0;
    z-index: 0;
}
.app-start-ride-btn {
    position: absolute;
    bottom: 0.7em;
    right: 0.8em;
    z-index: 400;
    background: var(--app-accent-bright, #4caf50);
    color: #fff;
    border: none;
    border-radius: 25px;
    padding: 0.7em 1.4em;
    font-size: 0.95em;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(76,175,80,0.4);
    display: none;
    align-items: center;
    gap: 0.4em;
    transition: background 0.2s;
}
.app-start-ride-btn.visible { display: flex; }
.app-map-terminal-hint {
    position: absolute;
    bottom: 0.7em;
    left: 0.8em;
    z-index: 400;
    background: rgba(18,31,20,0.85);
    color: var(--app-text-secondary, #a8d8a0);
    padding: 0.4em 0.8em;
    border-radius: 8px;
    font-size: 0.75em;
    backdrop-filter: blur(4px);
    pointer-events: none;
}
#app-terminal-badge {
    position: absolute;
    top: 0.6em;
    left: 0.8em;
    z-index: 400;
    background: var(--app-accent, #6dba65);
    color: #121f14;
    padding: 0.3em 0.8em;
    border-radius: 20px;
    font-size: 0.78em;
    font-weight: bold;
    display: none;
    align-items: center;
    gap: 0.4em;
    cursor: pointer;
}
#app-terminal-badge.visible { display: flex; }

/* Route list */
.app-routes-list {
    flex: 1;
    overflow-y: auto;
    padding: 0.5em 0.8em;
    display: flex;
    flex-direction: column;
    gap: 0.5em;
    scrollbar-width: thin;
    scrollbar-color: #2d4d2d transparent;
    padding-bottom: calc(4.5em + env(safe-area-inset-bottom));
}
.app-route-card {
    background: var(--app-bg-card, #1e3820);
    border-radius: 12px;
    padding: 0.9em 1em;
    border: 1.5px solid var(--app-border, #2d4d2d);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
}
.app-route-card:active,
.app-route-card.selected {
    border-color: var(--app-accent, #6dba65);
    background: var(--app-bg-card2, #243824);
    box-shadow: 0 0 0 1px var(--app-accent, #6dba65);
}
.app-route-card.locked {
    opacity: 0.55;
    cursor: default;
}
.app-route-header {
    display: flex;
    align-items: center;
    gap: 0.7em;
    margin-bottom: 0.4em;
}
.app-route-id {
    font-size: 0.9em;
    font-weight: bold;
    padding: 0.2em 0.6em;
    border-radius: 6px;
    white-space: nowrap;
    color: #fff;
    min-width: 40px;
    text-align: center;
}
.app-route-alias {
    font-weight: bold;
    font-size: 0.95em;
    color: var(--app-text-primary, #e8f5e9);
    flex: 1;
}
.app-route-lock-badge {
    font-size: 0.7em;
    background: rgba(231,76,60,0.2);
    color: #e74c3c;
    padding: 0.1em 0.5em;
    border-radius: 8px;
    white-space: nowrap;
}
.app-route-coin-badge {
    font-size: 0.7em;
    background: rgba(230,161,23,0.2);
    color: #e6a817;
    padding: 0.1em 0.5em;
    border-radius: 8px;
    white-space: nowrap;
    border: 1px solid rgba(230,161,23,0.3);
}
.app-route-coin-badge.unlocked {
    background: rgba(109,186,101,0.15);
    color: var(--app-accent, #6dba65);
    border-color: rgba(109,186,101,0.3);
}
.app-route-meta {
    font-size: 0.78em;
    color: var(--app-text-secondary, #a8d8a0);
    display: flex;
    gap: 0.8em;
    flex-wrap: wrap;
}
.app-route-xp {
    font-size: 0.7em;
    background: rgba(109,186,101,0.15);
    color: var(--app-accent, #6dba65);
    padding: 0.1em 0.5em;
    border-radius: 8px;
    font-weight: bold;
}
/* Direction selector (shown when route is selected) */
.app-dir-row {
    display: flex;
    gap: 0.5em;
    margin-top: 0.6em;
    flex-wrap: wrap;
}
.app-dir-btn {
    flex: 1;
    min-width: 90px;
    padding: 0.5em 0.6em;
    border-radius: 8px;
    border: 1.5px solid var(--app-accent, #6dba65);
    background: transparent;
    color: var(--app-accent, #6dba65);
    font-size: 0.8em;
    font-weight: bold;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
}
.app-dir-btn.chosen {
    background: var(--app-accent, #6dba65);
    color: #121f14;
}
/* No routes found */
.app-no-routes {
    text-align: center;
    padding: 3em 1em;
    color: var(--app-text-secondary, #a8d8a0);
}
.app-no-routes i { font-size: 2em; display: block; margin-bottom: 0.5em; opacity: 0.4; }
.app-routes-divider {
    display: flex;
    align-items: center;
    gap: 0.6em;
    padding: 0.6em 0.4em;
    color: var(--app-text-secondary, #a8d8a0);
    font-size: 0.8em;
    opacity: 0.7;
}
.app-routes-divider::before,
.app-routes-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: currentColor;
    opacity: 0.4;
}
</style>
</head>
<body>

    <!-- ════════ WEB-ONLY route list ════════ -->
    <div id="header-placeholder" class="web-only"></div>

    <main class="main-content web-only">
        <section class="hero">
            <h1>所有單車路線</h1>
            <p>在這裡找到所有為你精心規劃的將軍澳和沙田區單車路線。</p>
            <div class="hero-search-container">
                <input type="text" id="hero-search-input" class="search-input" placeholder="搜尋路線編號、名稱、地點...">
            </div>
        </section>

        <section class="content all-routes-section">
            <div class="route-cards-container" id="all-routes-container">
            </div>
        </section>
    </main>

    <footer class="footer web-only">
        <p>&copy; 2026 香港城市運輸單車. All Rights Reserved.</p>
    </footer>

    <!-- ════════ APP-ONLY department selection screen ════════ -->
    <!-- ════════ APP-ONLY dept select sheet ════════ -->
    <div id="app-dept-overlay" onclick="hideDeptSheet()"></div>
    <div id="app-dept-select">
        <div class="app-dept-header">
            <h2>🗺️ 選擇騎行部門</h2>
            <button onclick="hideDeptSheet()" style="background:none;border:none;color:#a8d8a0;cursor:pointer;padding:0.2em;font-size:1.1em;margin-left:auto;"><i class="fas fa-times"></i></button>
        </div>
        <div class="app-dept-subtitle">選擇部門，即可查看對應地圖及路線</div>
        <div id="app-dept-list"></div>
    </div>

    <!-- ════════ APP-ONLY ride / cycling page ════════ -->
    <div id="app-ride-page" class="app-only" style="display:none;">

        <!-- Search + filter bar -->
        <div class="app-ride-topbar">
            <div class="app-ride-search-row">
                <i class="fas fa-search" style="margin-left:0.3em;"></i>
                <input type="text" id="app-search-input" class="app-ride-search-input"
                       placeholder="搜尋路線、別稱、總站...">
                <button id="app-search-clear" style="background:none;border:none;color:#5a7a5a;cursor:pointer;padding:0.3em;display:none;">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="app-filter-row" id="app-filter-row">
                <div class="app-filter-chip dept-chip" id="app-dept-chip" title="切換部門">🗺️ <span id="app-dept-label">將軍澳部</span></div>
                <div class="app-filter-chip active" data-filter="all">全部</div>
                <div class="app-filter-chip" data-filter="unlocked">已解鎖 🔓</div>
                <div class="app-filter-chip" data-filter="里程幣">🪙 里程幣</div>
                <div class="app-filter-chip" data-filter="通勤">通勤</div>
                <div class="app-filter-chip" data-filter="旅遊">旅遊</div>
                <div class="app-filter-chip" data-filter="循環">循環線</div>
                <div class="app-filter-chip" data-filter="新手必試">新手推薦</div>
                <div class="app-filter-chip" data-filter="長途">長途</div>
                <div class="app-filter-chip random-btn" id="app-random-btn">🎲 隨機</div>
            </div>
        </div>

        <!-- Map + start button -->
        <div class="app-map-section">
            <div id="app-ride-map"></div>
            <div id="app-terminal-badge" class="app-terminal-badge">
                <i class="fas fa-map-marker-alt"></i>
                <span id="app-terminal-name">-</span>
                <i class="fas fa-times" style="margin-left:0.3em; opacity:0.7;"></i>
            </div>
            <div class="app-map-terminal-hint" id="app-map-hint">點擊地圖上的車站 →</div>
            <button class="app-start-ride-btn" id="app-start-ride-btn">
                <i class="fas fa-play"></i> 開始騎行
            </button>
        </div>

        <!-- Route list -->
        <div class="app-routes-list" id="app-routes-list">
            <div class="app-no-routes"><i class="fas fa-spinner fa-spin"></i>載入路線中...</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="/js/main.js"></script>
    <script src="/js/pwa.js"></script>
<script>
// ════════ App Ride Page Logic ════════
(function() {
'use strict';

// XP thresholds and unlock table (mirrored from main.js)
const ROUTE_UNLOCK = {
    '7E':1,'7W':1,
    '900':1,'900A':1,'966T':1,
    '914':8,'966A':8,'966':8,
    '900S':1,'914B':1,'910':5,'901P':15,
    '914H':22,'920':22,'966B':22,
    '920X':30,'923':30,'966C':30,
    '928':38,'929':38,'961':38,'961P':38,
    '932':45,'935':45,'939':45,'939M':45,'962':45,'962A':45,
    '955':50,'955A':50,'955H':50,'960':50,'962P':50,'962X':50,
    'X935':50,'S90':50,'S91':50,
};
const ROUTE_XP = {
    '7E':80,'7W':80,
    '900':450,'900A':360,'966':110,'914':80,'966A':90,'900S':130,'901P':140,
    '910':100,'914B':80,'914H':80,'920':130,'966B':90,'920X':100,'923':160,
    '966C':90,'928':170,'929':160,'966T':320,'961':130,'961P':100,'932':220,
    '935':250,'939':120,'939M':120,'955':110,'955A':60,'955H':80,'960':400,
    '962':250,'962A':250,'962P':150,'962X':130,'X935':210,'S90':200,'S91':200,
};

// TKO terminal stations — coordinates verified from routes.json stop data
const TERMINALS = [

// Map of terminal name to terminal ID for route matching
const TERMINAL_NAMES = {};
TERMINALS.forEach(t => { TERMINAL_NAMES[t.name] = t.id; });

// State
let appRoutes = [];
let map = null;
let routeLayer = null;
let selectedRouteId = null;
let selectedDirIndex = 0;
let selectedTerminalId = null;
let activeFilter = 'all';
let searchTerm = '';
let userLevel = 1;
let isLoggedIn = false;

function getUserLevel() {
    try {
        const u = JSON.parse(localStorage.getItem('user') || '{}');
        return Math.max(1, parseInt(u.level || 1));
    } catch(e) { return 1; }
}

function isRouteUnlocked(routeId) {
    if (!isLoggedIn) return false; // not logged in, don't show unlock status
    const needed = ROUTE_UNLOCK[routeId] || 1;
    return userLevel >= needed;
}

function getUserCoins() {
    try {
        // Primary: merged game data in user object (set by initAppRide or dashboard)
        const u = JSON.parse(localStorage.getItem('user') || '{}');
        if (u.coins !== undefined) return parseInt(u.coins, 10);
        // Fallback: gameProfile key (set by check-in or ride completion)
        const gp = JSON.parse(localStorage.getItem('gameProfile') || '{}');
        return parseInt(gp.coins || 0, 10);
    } catch(e) { return 0; }
}

// Coin routes are always visible; locked only if user hasn't purchased
function isCoinRouteUnlocked(route) {
    if (!isLoggedIn) return false;
    // Check if user has purchased this route (stored in localStorage under 'unlockedCoinRoutes')
    try {
        const unlocked = JSON.parse(localStorage.getItem('unlockedCoinRoutes') || '[]');
        return unlocked.includes(route.id);
    } catch(e) { return false; }
}

// ── Map initialisation ─────────────────────────────────────────────────
function initMap() {
    if (map) return; // already initialized
    map = L.map('app-ride-map', {
        zoomControl: false,
        attributionControl: false,
    }).setView([22.308, 114.262], 13);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 18,
        attribution: '© OpenStreetMap © CartoDB'
    }).addTo(map);

    // Add zoom control (top-right)
    L.control.zoom({ position: 'topright' }).addTo(map);

    // Add terminal markers
    TERMINALS.forEach(terminal => {
        const icon = L.divIcon({
            className: '',
            html: `<div style="background:#4caf50;width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 4px rgba(76,175,80,0.8);cursor:pointer;"></div>`,
            iconSize: [12, 12], iconAnchor: [6, 6],
            tooltipAnchor: [8, 0]
        });
        const marker = L.marker([terminal.lat, terminal.lng], { icon })
            .addTo(map)
            .bindTooltip(terminal.name, { permanent: false, direction: 'right', className: 'app-map-tooltip' });
        marker.on('click', () => selectTerminal(terminal));
    });
}

function selectTerminal(terminal) {
    selectedTerminalId = terminal.id;
    const badge = document.getElementById('app-terminal-badge');
    document.getElementById('app-terminal-name').textContent = terminal.name;
    badge.classList.add('visible');
    document.getElementById('app-map-hint').style.display = 'none';
    map.setView([terminal.lat, terminal.lng], 14, { animate: true });
    renderRoutes();
}

function clearTerminal() {
    selectedTerminalId = null;
    document.getElementById('app-terminal-badge').classList.remove('visible');
    document.getElementById('app-map-hint').style.display = '';
    renderRoutes();
}

// ── GPX loading & route display ────────────────────────────────────────
async function showRouteOnMap(route, dirIndex) {
    if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
    const gpxEntry = route.gpx && route.gpx[dirIndex];
    if (!gpxEntry) return;

    try {
        const res = await fetch('/gpx/' + gpxEntry.file);
        if (!res.ok) return;
        const text = await res.text();
        const parser = new DOMParser();
        const gpxDoc = parser.parseFromString(text, 'application/xml');
        const pts = Array.from(gpxDoc.querySelectorAll('trkpt,rtept,wpt')).map(pt => [
            parseFloat(pt.getAttribute('lat')),
            parseFloat(pt.getAttribute('lon')),
        ]).filter(([la, lo]) => !isNaN(la) && !isNaN(lo));
        if (pts.length === 0) return;

        routeLayer = L.polyline(pts, {
            color: route.color || '#6dba65',
            weight: 4,
            opacity: 0.9,
        }).addTo(map);
        map.fitBounds(routeLayer.getBounds(), { padding: [30, 30] });
    } catch(e) {
        console.warn('[AppRide] GPX load failed:', e);
    }
}

// ── Route card rendering ───────────────────────────────────────────────
function routeBelongsToDept(route, deptId) {
    // Primary: use dept_id field if present
    if (route.dept_id) return route.dept_id === deptId;
    // Fallback: tag-based classification for legacy routes without dept_id
    if (deptId === 'tko') return route.tags && route.tags.some(t => t.includes('將軍澳'));
    if (deptId === 'hki') return route.tags && route.tags.some(t => t.includes('港島'));
    return false;
}

function matchesTerminal(route) {
    if (!selectedTerminalId) return true;
    const terminal = TERMINALS.find(t => t.id === selectedTerminalId);
    if (!terminal) return true;
    const name = terminal.name;
    return (route.start && route.start.includes(name)) ||
           (route.end && route.end.includes(name)) ||
           (route.via && route.via.includes(name));
}

function matchesFilter(route) {
    if (activeFilter === 'all') return true;
    if (activeFilter === 'unlocked') {
        if (!isLoggedIn) return false;
        if (route.is_special) return isCoinRouteUnlocked(route);
        return isRouteUnlocked(route.id);
    }
    if (activeFilter === '里程幣') return route.is_special && route.coin_cost > 0;
    if (activeFilter === '循環') return route.tags && route.tags.includes('循環線');
    if (activeFilter === '新手必試') return route.tags && route.tags.includes('新手必試');
    return route.nature === activeFilter || (route.tags && route.tags.includes(activeFilter));
}

function matchesSearch(route) {
    if (!searchTerm) return true;
    const haystack = [route.id, route.alias || '', route.start || '', route.end || '', route.via || '']
        .join(' ').toLowerCase();
    return haystack.includes(searchTerm);
}

function renderRoutes() {
    const container = document.getElementById('app-routes-list');
    if (!appRoutes.length) {
        container.innerHTML = '<div class="app-no-routes"><i class="fas fa-spinner fa-spin"></i>載入路線中...</div>';
        return;
    }

    // Filter routes by selected department
    let deptRoutes = appRoutes;
    if (selectedDeptId === 'tko') {
        deptRoutes = appRoutes.filter(r => routeBelongsToDept(r, 'tko'));
    } else if (selectedDeptId === 'hki') {
        deptRoutes = appRoutes.filter(r => routeBelongsToDept(r, 'hki'));
    }

    const filtered = deptRoutes.filter(r => matchesTerminal(r) && matchesFilter(r) && matchesSearch(r));

    if (filtered.length === 0) {
        container.innerHTML = '<div class="app-no-routes"><i class="fas fa-search"></i>找不到符合條件的路線</div>';
        return;
    }

    // Separate unlocked and locked routes, then sort each group
    const routeWithLock = filtered.map(route => {
        const needed = route.unlock_level || ROUTE_UNLOCK[route.id] || 1;
        const isCoinRoute = route.is_special && route.coin_cost > 0;
        const coinUnlocked = isCoinRoute && isCoinRouteUnlocked(route);
        const levelLocked = isLoggedIn && !isCoinRoute && userLevel < needed;
        const coinLocked = isLoggedIn && isCoinRoute && !coinUnlocked;
        // Dept lock: if route has dept_id, check if user has unlocked that department
        const deptId = route.dept_id;
        const deptLocked = !!(deptId && isLoggedIn && !getUnlockedDepartments().includes(deptId));
        const locked = levelLocked || coinLocked || deptLocked;
        return { route, needed, isCoinRoute, coinUnlocked, levelLocked, coinLocked, deptLocked, locked };
    });

    // Helper: numeric sort key for route ID (e.g. "900A" → 900.1, "914B" → 914.2)
    function routeSortKey(id) {
        const m = id.match(/^(\d+)([A-Z]?)(.*)$/i);
        if (!m) return [9999, 0];
        const num = parseInt(m[1], 10);
        const suffix = m[2] ? m[2].charCodeAt(0) - 64 : 0; // A=1, B=2, ...
        return num * 100 + suffix;
    }

    const unlockedRoutes = routeWithLock.filter(r => !r.locked)
        .sort((a, b) => routeSortKey(a.route.id) - routeSortKey(b.route.id));
    const lockedRoutes = routeWithLock.filter(r => r.locked)
        .sort((a, b) => a.needed - b.needed || routeSortKey(a.route.id) - routeSortKey(b.route.id));

    container.innerHTML = '';

    function buildCard({ route, needed, isCoinRoute, coinUnlocked, levelLocked, coinLocked, deptLocked, locked }) {
        const xp = route.xp_reward || ROUTE_XP[route.id] || 0;
        const isSelected = route.id === selectedRouteId;

        const card = document.createElement('div');
        card.className = 'app-route-card' + (locked ? ' locked' : '') + (isSelected ? ' selected' : '');
        if (isCoinRoute) card.classList.add('coin-route');
        card.dataset.routeId = route.id;

        let lockBadge = '';
        if (deptLocked) {
            lockBadge = `<span class="app-route-lock-badge">🔒 需解鎖部門</span>`;
        } else if (levelLocked) {
            lockBadge = `<span class="app-route-lock-badge">🔒 Lv.${needed}</span>`;
        } else if (coinLocked) {
            lockBadge = `<span class="app-route-coin-badge">🪙 ${route.coin_cost}</span>`;
        } else if (isCoinRoute) {
            lockBadge = `<span class="app-route-coin-badge unlocked">🪙 特別</span>`;
        } else if (xp > 0 && isLoggedIn) {
            lockBadge = `<span class="app-route-xp">+${xp} XP</span>`;
        }

        card.innerHTML = `
            <div class="app-route-header">
                <span class="app-route-id" style="background:${route.color||'#4caf50'}">${route.id}</span>
                <span class="app-route-alias">${route.alias && route.alias.trim() ? route.alias : route.id}</span>
                ${lockBadge}
            </div>
            <div class="app-route-meta">
                <span><i class="fas fa-map-marker-alt" style="font-size:0.9em;"></i> ${route.start || '—'}</span>
                ${(route.tags && route.tags.includes('循環線')) || !route.end ? '<span>循環</span>' : `<span>${(route.gpx && route.gpx.length > 1) ? '↔' : '→'} ${route.end}</span>`}
                ${route.time ? `<span><i class="fas fa-clock" style="font-size:0.9em;"></i> ${route.time}分</span>` : ''}
                ${route.length ? `<span>${route.length}</span>` : ''}
            </div>
        `;

        // Direction selector when selected
        if (isSelected && !locked && route.gpx && route.gpx.length > 0) {
            const dirRow = document.createElement('div');
            dirRow.className = 'app-dir-row';
            route.gpx.forEach((gpxItem, idx) => {
                const btn = document.createElement('button');
                btn.className = 'app-dir-btn' + (idx === selectedDirIndex ? ' chosen' : '');
                btn.textContent = gpxItem.label;
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectedDirIndex = idx;
                    document.getElementById('app-start-ride-btn').classList.add('visible');
                    renderRoutes();
                    showRouteOnMap(route, idx);
                });
                dirRow.appendChild(btn);
            });
            card.appendChild(dirRow);
        }

        if (!locked) {
            card.addEventListener('click', () => selectRoute(route));
        } else if (coinLocked) {
            card.addEventListener('click', () => purchaseCoinRoute(route));
        }

        return card;
    }

    unlockedRoutes.forEach(r => container.appendChild(buildCard(r)));

    if (unlockedRoutes.length > 0 && lockedRoutes.length > 0) {
        const divider = document.createElement('div');
        divider.className = 'app-routes-divider';
        divider.innerHTML = '<span>🔒 未解鎖路線</span>';
        container.appendChild(divider);
    }

    lockedRoutes.forEach(r => container.appendChild(buildCard(r)));
}

async function purchaseCoinRoute(route) {
    if (!isLoggedIn) {
        alert('請先登入以購買里程幣路線。');
        return;
    }
    const userCoins = getUserCoins();
    const cost = route.coin_cost || 0;
    if (userCoins < cost) {
        alert(`里程幣不足！\n需要 🪙${cost} 里程幣，你目前有 🪙${userCoins} 里程幣。\n完成騎行或每日簽到以賺取更多里程幣。`);
        return;
    }
    const confirmed = confirm(`解鎖「${route.alias || route.id}」需要 🪙${cost} 里程幣。\n你目前有 🪙${userCoins} 里程幣。\n\n確定購買？`);
    if (!confirmed) return;

    try {
        const token = localStorage.getItem('accessToken');
        const resp = await fetch('/api/getHistory?action=purchase-route', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`,
            },
            body: JSON.stringify({ route_id: route.id }),
        });
        if (resp.status === 401) {
            localStorage.removeItem('accessToken');
            localStorage.removeItem('user');
            alert('登入已過期，請重新登入後再試。');
            return;
        }
        const data = await resp.json();
        if (!resp.ok) {
            alert(data.message || '購買失敗，請稍後再試。');
            return;
        }
        // Update localStorage: coins and unlocked routes
        if (data.gameProfile) {
            const storedUser = JSON.parse(localStorage.getItem('user') || '{}');
            storedUser.coins = data.gameProfile.coins;
            storedUser.xp = data.gameProfile.xp;
            storedUser.level = data.gameProfile.level;
            localStorage.setItem('user', JSON.stringify(storedUser));
            localStorage.setItem('gameProfile', JSON.stringify(data.gameProfile));
        }
        const unlocked = JSON.parse(localStorage.getItem('unlockedCoinRoutes') || '[]');
        if (!unlocked.includes(route.id)) {
            unlocked.push(route.id);
            localStorage.setItem('unlockedCoinRoutes', JSON.stringify(unlocked));
        }
        if (data.already_unlocked) {
            alert(`「${route.alias || route.id}」已是你的解鎖路線！`);
        } else {
            alert(`🎉 成功解鎖「${route.alias || route.id}」！\n剩餘里程幣：🪙${data.gameProfile ? data.gameProfile.coins : getUserCoins()}`);
        }
        renderRoutes(); // Refresh to show route as unlocked
    } catch (e) {
        console.error('[purchaseCoinRoute]', e);
        alert('購買失敗，請稍後再試。');
    }
}

function selectRoute(route) {
    if (route.id === selectedRouteId) {
        // Deselect
        selectedRouteId = null;
        selectedDirIndex = 0;
        if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
        document.getElementById('app-start-ride-btn').classList.remove('visible');
        renderRoutes();
        return;
    }
    selectedRouteId = route.id;
    selectedDirIndex = 0;
    renderRoutes();

    // Auto-select first direction and show on map
    if (route.gpx && route.gpx.length > 0) {
        document.getElementById('app-start-ride-btn').classList.add('visible');
        showRouteOnMap(route, 0);
    }

    // Scroll the selected card into view
    const cards = document.querySelectorAll('.app-route-card.selected');
    if (cards.length) cards[0].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

            activeFilter = chip.dataset.filter;
            document.querySelectorAll('.app-filter-chip[data-filter]').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            renderRoutes();
        });
    });

    // Random button
    const randomBtn = document.getElementById('app-random-btn');
    if (randomBtn) {
        randomBtn.addEventListener('click', () => {
            // For non-logged-in users, only pick from freely available routes (no unlock req)
            // For logged-in users, only pick from unlocked routes
            const available = appRoutes.filter(r => {
                if (isLoggedIn) return isRouteUnlocked(r.id);
                return (ROUTE_UNLOCK[r.id] || 1) === 1; // only starter routes if not logged in
            });
            if (available.length === 0) return;
            const pick = available[Math.floor(Math.random() * available.length)];
            searchTerm = '';
            activeFilter = 'all';
            selectedTerminalId = null;
            document.getElementById('app-search-input').value = '';
            document.getElementById('app-search-clear').style.display = 'none';
            document.getElementById('app-terminal-badge').classList.remove('visible');
            document.getElementById('app-map-hint').style.display = '';
            document.querySelectorAll('.app-filter-chip[data-filter]').forEach(c => c.classList.remove('active'));
            document.querySelector('.app-filter-chip[data-filter="all"]').classList.add('active');
            renderRoutes();
            setTimeout(() => selectRoute(pick), 50);
        });
    }
});

async function purchaseDepartment(dept) {
    if (!isLoggedIn) {
        alert('請先登入以解鎖部門。');
        return;
    }
    const cost = dept.is_promo ? dept.promo_cost : dept.unlock_cost;
    const userCoins = getUserCoins();
    if (userCoins < cost) {
        alert(`里程幣不足！\n解鎖「${dept.name}」需要 🪙${cost} 里程幣，你目前有 🪙${userCoins} 里程幣。\n完成騎行或每日簽到以賺取更多里程幣。`);
        return;
    }
    const promoNote = dept.is_promo ? `\n🎉 推廣期優惠價：原價 🪙${dept.unlock_cost}，現只需 🪙${cost}！` : '';
    const confirmed = confirm(`解鎖「${dept.name}」需要 🪙${cost} 里程幣。${promoNote}\n你目前有 🪙${userCoins} 里程幣。\n\n確定解鎖？`);
    if (!confirmed) return;

    try {
        const token = localStorage.getItem('accessToken');
        const resp = await fetch('/api/getHistory?action=purchase-department', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ dept_id: dept.id }),
        });
        if (resp.status === 401) {
            localStorage.removeItem('accessToken');
            localStorage.removeItem('user');
            alert('登入已過期，請重新登入後再試。');
            return;
        }
        const data = await resp.json();
        if (!resp.ok) {
            alert(data.message || '解鎖失敗，請稍後再試。');
            return;
        }
        if (data.gameProfile) {
            const storedUser = JSON.parse(localStorage.getItem('user') || '{}');
            storedUser.coins = data.gameProfile.coins;
            localStorage.setItem('user', JSON.stringify(storedUser));
        }
        const unlockedDepts = getUnlockedDepartments();
        if (!unlockedDepts.includes(dept.id)) {
            unlockedDepts.push(dept.id);
            localStorage.setItem('unlockedDepartments', JSON.stringify(unlockedDepts));
        }
        if (data.already_unlocked) {
            alert(`「${dept.name}」已是你的解鎖部門！`);
        } else {
            alert(`🎉 成功解鎖「${dept.name}」！\n剩餘里程幣：🪙${data.gameProfile ? data.gameProfile.coins : getUserCoins()}`);
        }
        showDeptSheet(); // Refresh the sheet
    } catch (e) {
        console.error('[purchaseDepartment]', e);
        alert('解鎖失敗，請稍後再試。');
    }
}

function hideDeptSheet() {
    document.getElementById('app-dept-select').style.display = 'none';
    document.getElementById('app-dept-overlay').style.display = 'none';
}

// Keep showDeptSelect as an alias for compatibility (no longer switches pages)
function showDeptSelect(pushState) {
    showDeptSheet();
}

// Enter a department: show the map & route list
// pushState=true adds a history entry so the back button returns to dept selection
function enterDepartment(dept, pushState) {
    selectedDeptId = dept.id;

    if (pushState) {
        history.pushState({ page: 'routes', dept: dept.id }, '', '/routes?dept=' + dept.id);
    }

    // Update department label in filter row
    const deptLabel = document.getElementById('app-dept-label');
    if (deptLabel) deptLabel.textContent = dept.name;

    // Recenter map on department (initMap is idempotent; ensures map exists)
    initMap();
    map.setView(dept.mapCenter, dept.mapZoom, { animate: !!pushState });
    renderRoutes();
}

async function initAppRidePage() {
    if (_appRideInited) return;
    const ridePage = document.getElementById('app-ride-page');
    if (!ridePage) return;

    const isPwa = window.matchMedia('(display-mode: standalone)').matches ||
                  navigator.standalone === true ||
                  document.body.classList.contains('is-pwa');
    if (!isPwa) return;

    _appRideInited = true;

    isLoggedIn = !!localStorage.getItem('accessToken');
    userLevel = getUserLevel();

    // Fetch fresh user data (including coins/level) from the API to ensure up-to-date values
    if (isLoggedIn) {
        try {
            const storedUser = JSON.parse(localStorage.getItem('user') || '{}');
            const userId = storedUser.id;
            const token = localStorage.getItem('accessToken');
            if (userId && token) {
                const userResp = await fetch(`/api/user?user_id=${userId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (userResp.ok) {
                    const freshUser = await userResp.json();
                    // Merge fresh game data into localStorage user object
                    const merged = Object.assign({}, storedUser, {
                        level: freshUser.level ?? storedUser.level ?? 1,
                        xp:    freshUser.xp    ?? storedUser.xp    ?? 0,
                        coins: freshUser.coins ?? storedUser.coins ?? 0,
                    });
                    localStorage.setItem('user', JSON.stringify(merged));
                    userLevel = Math.max(1, parseInt(merged.level || 1));
                    // Sync server-side purchased coin routes
                    if (Array.isArray(freshUser.unlocked_coin_routes)) {
                        localStorage.setItem('unlockedCoinRoutes', JSON.stringify(freshUser.unlocked_coin_routes));
                    }
                    // Sync server-side unlocked departments
                    if (Array.isArray(freshUser.unlocked_departments)) {
                        localStorage.setItem('unlockedDepartments', JSON.stringify(freshUser.unlocked_departments));
                    }
                }
            }
        } catch (e) { console.error('[AppRide] Failed to fetch fresh user data:', e); }
    }

    // Init map
    initMap();

    // Load routes
    try {
        const res = await fetch('/routes.json');
        const data = await res.json();
        appRoutes = data.routes || [];

        // Merge display fields (alias, start, end, via, color, tags, nature, time, length)
        // from main.js const routes (window.CTRCHK_ROUTES) — single source of truth for UI display
        if (window.CTRCHK_ROUTES && window.CTRCHK_ROUTES.length) {
            const displayMap = new Map(window.CTRCHK_ROUTES.map(r => [r.id, r]));
            appRoutes = appRoutes.map(r => {
                const d = displayMap.get(r.id);
                if (!d) return r;
                return Object.assign({}, r, {
                    alias: d.alias || r.alias,
                    start: d.start || r.start,
                    // `end` may be null for circular routes; use d.end when explicitly set
                    end: d.end !== undefined ? d.end : r.end,
                    via: d.via || r.via,
                    color: d.color || r.color,
                    tags: d.tags || r.tags,
                    nature: d.nature || r.nature,
                    time: d.time || r.time,
                    length: d.length || r.length,
                });
            });
        }

        // Count routes per department by tag
        const tkoDept = DEPARTMENTS.find(d => d.id === 'tko');
        if (tkoDept) {
            tkoDept.routeCount = appRoutes.filter(r => routeBelongsToDept(r, 'tko')).length;
        }
        const hkiDept = DEPARTMENTS.find(d => d.id === 'hki');
        if (hkiDept) {
            hkiDept.routeCount = appRoutes.filter(r => routeBelongsToDept(r, 'hki')).length;
        }
    } catch(e) {
        console.warn('[AppRide] Failed to load routes:', e);
    }

    // Wire up dept chip to show sheet
    const deptChip = document.getElementById('app-dept-chip');
    if (deptChip) deptChip.addEventListener('click', showDeptSheet);

    // Show ride page directly (single-page design)
    ridePage.style.display = '';

    // Check URL for dept param — restore previous page state
    const urlParams = new URLSearchParams(window.location.search);
    const deptParam = urlParams.get('dept');
    const restoredDept = deptParam && DEPARTMENTS.find(d => d.id === deptParam && d.available);
    const activeDept = restoredDept || DEPARTMENTS.find(d => d.available);
    if (activeDept) {
        enterDepartment(activeDept, !restoredDept);
    }
}

// Handle browser back/forward navigation
window.addEventListener('popstate', (e) => {
    const state = e.state || {};
    if (state.page === 'routes' && state.dept) {
        const dept = DEPARTMENTS.find(d => d.id === state.dept);
        if (dept) { enterDepartment(dept, false); return; }
    }
    // Default: re-enter first available department
    const defaultDept = DEPARTMENTS.find(d => d.available);
    if (defaultDept) enterDepartment(defaultDept, false);
});

if (document.readyState !== 'loading') initAppRidePage();
else document.addEventListener('DOMContentLoaded', initAppRidePage);

// Re-run after PWA class is confirmed (pwa.js sets body.is-pwa on DOMContentLoaded)
document.addEventListener('DOMContentLoaded', () => {
    setTimeout(initAppRidePage, 150);
});

})();
</script>
