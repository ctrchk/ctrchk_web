          paint: {
            'line-color': '#444444',
            'line-width': 14,
            'line-opacity': 0.85,
            'line-cap': 'round',
            'line-join': 'round',
          },
        });
      }

      // Layer 3: Main neon route highlight (lane body)
      if (!map.getLayer('planned-route-line')) {
        map.addLayer({
          id: 'planned-route-line',
          type: 'line',
          source: 'planned-route',
          paint: {
            'line-color': '#00F3FF', // High-contrast neon cyan
            'line-width': 10,
            'line-opacity': 0.9,
            'line-cap': 'round',
            'line-join': 'round',
          },
        });
      }

      // Layer 4: Animated lane divider markings
      if (!map.getLayer('planned-route-lane-mark')) {
        map.addLayer({
          id: 'planned-route-lane-mark',
          type: 'line',
          source: 'planned-route',
          paint: {
            'line-color': '#FFFFFF',
            'line-width': 2,
            'line-opacity': 0.8,
            'line-dasharray': [2, 4],
          },
        });
      }

      if (!map.getLayer('planned-route-flow')) {
        map.addLayer({
          id: 'planned-route-flow',
          type: 'line',
          source: 'planned-route',
          paint: {
            'line-color': '#FFFFFF', // White flow for maximum visibility
            'line-width': 5,
            'line-opacity': 0.6,
            'line-dasharray': [0.8, 2.4],
            'line-cap': 'round',
            'line-join': 'round',
          },
        });
      }

      // Animated direction arrows on route
      if (!map.getLayer('planned-route-arrows')) {
        map.addLayer({
          id: 'planned-route-arrows',
          type: 'symbol',
          source: 'planned-route',
          minzoom: 13,
          layout: {
            'symbol-placement': 'line',
            'symbol-spacing': 42,
            'icon-image': 'triangle-11',   // built-in MapLibre icon
            'icon-size': 0.8,
            'icon-rotate': 90,
            'icon-rotation-alignment': 'map',
            'icon-allow-overlap': true,
          },
          paint: {
            'icon-color': '#ffffff',
            'icon-opacity': 0.9,
            'icon-halo-color': '#00E5FF',
            'icon-halo-width': 1.2,
          },
        });
      }

      if (!map.getSource('planned-route-junction-guide')) {
        map.addSource('planned-route-junction-guide', {
          type: 'geojson',
          data: turf.featureCollection([]),
        });
      }

      if (!map.getLayer('planned-route-junction-guide')) {
        map.addLayer({
          id: 'planned-route-junction-guide',
          type: 'line',
          source: 'planned-route-junction-guide',
          paint: {
            'line-color': '#00FFFF',
            'line-width': 9,
            'line-opacity': 0.4,
            'line-blur': 1.5,
            'line-cap': 'round',
            'line-join': 'round',
          },
        });
      }

      // Start / end markers
      addRouteMarker('start-marker', from.lon, from.lat, '#04D93C', '🚴');
      addRouteMarker('end-marker',   to.lon,   to.lat,   '#e74c3c', '🏁');
      startRouteFx();
    }

    function addRouteMarker(id, lon, lat, color, emoji) {
      const existing = document.getElementById(id);
      if (existing) existing.remove();
      const el = document.createElement('div');
      el.id = id;
      el.style.cssText = `width:32px;height:32px;border-radius:50%;background:${color};
        display:flex;align-items:center;justify-content:center;font-size:1em;
        border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.4);`;
      el.textContent = emoji;
      new maplibregl.Marker({ element: el, anchor: 'center' }).setLngLat([lon, lat]).addTo(map);
    }

    function clearRouteLayers() {
      stopRouteFx();
      ['planned-route-junction-guide','planned-route-arrows','planned-route-flow','planned-route-line','planned-route-shadow'].forEach(id => {
        if (map.getLayer(id)) map.removeLayer(id);
      });
      if (map.getSource('planned-route-junction-guide')) map.removeSource('planned-route-junction-guide');
      if (map.getSource('planned-route')) map.removeSource('planned-route');
      ['start-marker','end-marker'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.remove();
      });
      routeLineFeature = null;
      routeJunctions = [];
      activeRouteCoords = null;
    }

    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
                console.log('[Nav] Screen Wake Lock is active');
                wakeLock.addEventListener('release', () => {
                    console.log('[Nav] Screen Wake Lock was released');
                });
            }
        } catch (err) {
            console.error(`${err.name}, ${err.message}`);
        }
    }

    function releaseWakeLock() {
        if (wakeLock !== null) {
            wakeLock.release();
            wakeLock = null;
        }
    }

    // ── Active navigation ─────────────────────────────────────────────────
    function startNavigation() {
      if (!plannedRoute || !plannedSteps.length) return;
      isNavigating = true;
      finishInProgress = false;
      requestWakeLock();
      navStartTime = Date.now();
      navDistTravelledM = 0;
      currentStepIdx = 0;
      navTrailCoords = [];
      if (lastSnappedLngLat) navTrailCoords.push(lastSnappedLngLat.slice(0, 2));

      // Switch UI to nav mode
      document.getElementById('btn-start-nav').classList.remove('show');
      document.getElementById('route-summary').classList.remove('show');
      document.getElementById('nav-stats-bar').classList.add('show');
      document.getElementById('btn-end-nav').style.display = '';
      document.getElementById('turn-banner').classList.add('show');

      // Enable heading-up mode
      headingUp = true;
      document.getElementById('btn-heading-up').classList.add('active');

      collapsePanel();
      updateTurnBanner();
      updateNavStats();
      if (lastSnappedLngLat) {
        updateTopBarMeta(activeMatch, updateJunctionGuide(lastSnappedLngLat));
      }
    }

    function updateNavProgress(lat, lon, match) {
      if (!isNavigating || !plannedSteps.length) return;
      const currentCoord = [lon, lat];

      // Find next waypoint in current step
      const step = plannedSteps[currentStepIdx];
      if (!step || !step.pt) return;

      const lastPt = step.pt;  // [lon, lat] — endpoint of this leg
      const distToEnd = haversineM(lat, lon, lastPt[1], lastPt[0]);

      // Advance step when within 20 m of step end
      if (distToEnd < 20 && currentStepIdx < plannedSteps.length - 1) {
        currentStepIdx++;
        updateTurnBanner();
      }

      // Update distance to next turn
      document.getElementById('turn-dist').textContent = formatDist(distToEnd);
      const nextJunctionDistance = updateJunctionGuide(currentCoord);
      updateTopBarMeta(match || activeMatch, nextJunctionDistance);

      // Check if arrived (within 8 m of destination)
      const dest = plannedRoute[plannedRoute.length - 1];
      const distToDest = haversineM(lat, lon, dest[1], dest[0]);
      if (distToDest <= ARRIVAL_AUTO_FINISH_METERS) {
        finishNavigationSequence();
        return;
      }

      updateNavStats();

      // Auto-zoom near intersections
      if (distToEnd < 80) {
        map.easeTo({ zoom: DEFAULT_NAV_ZOOM, pitch: DEFAULT_NAV_PITCH, duration: 500 });
      } else if (distToEnd > 200 && map.getZoom() > DEFAULT_NAV_ZOOM) {
        map.easeTo({ zoom: DEFAULT_NAV_ZOOM, pitch: DEFAULT_NAV_PITCH, duration: 500 });
      }
    }

    function updateTurnBanner() {
      const step = plannedSteps[currentStepIdx];
      if (!step) return;
      const next = plannedSteps[currentStepIdx + 1];
      const modifier = next && next.maneuver ? next.maneuver.modifier : null;
      document.getElementById('turn-icon').textContent = next ? turnEmoji(modifier) : '✅';
      document.getElementById('turn-instruction').textContent = stepInstruction(next || step);
      document.getElementById('turn-dist').textContent = '-- m';
    }

    function updateNavStats() {
      const remain = Math.max(0, navTotalDistM - navDistTravelledM);
      const avgSpeed = navDistTravelledM > 0 && navStartTime
        ? (navDistTravelledM / 1000) / ((Date.now() - navStartTime) / 3600000)
        : null;
      const etaMins = (avgSpeed && avgSpeed > 1)
        ? (remain / 1000) / avgSpeed * 60
        : remain / 1000 / 15 * 60; // assume 15 km/h default

      document.getElementById('nav-stat-dist').textContent    = formatDist(navDistTravelledM);
      document.getElementById('nav-stat-remain').textContent  = formatDist(remain);
      document.getElementById('nav-stat-eta').textContent     = formatMinutes(etaMins);
      document.getElementById('nav-stat-speed').textContent   = lastSpeedKmh.toFixed(1);
    }

    async function saveNavigationRide(summary) {
      const token = localStorage.getItem('accessToken');
      if (!token) return { xpEarned: summary.xpEarned, saved: false };
      try {
        const fromName = (plannedFrom && plannedFrom.name) ? plannedFrom.name : '起點';
        const toName   = (plannedTo   && plannedTo.name)   ? plannedTo.name   : '終點';
        const payload = {
          route_id: 'HK_NAV',
          route_name: `自訂導航：${fromName} → ${toName}`,
          ride_date: new Date(summary.startTime).toISOString().slice(0, 10),
          start_time: new Date(summary.startTime).toISOString(),
          end_time: new Date(summary.endTime).toISOString(),
          distance_km: summary.distanceKm,
          duration_minutes: summary.durationMinutes,
          avg_speed_kmh: summary.avgSpeedKmh,
          stops_reached: [1, 2],
          stops_count: 2,
          all_stops: true,
          districts_count: 1,
          source: 'nav',
          ride_mode: 'free',
          xp_earned_override: summary.xpEarned,
          miles_reward_override: summary.distanceKm * 0.8,
          total_stops: 2,
          gpx_track: JSON.stringify(summary.pathCoords || []),
        };
        const res = await fetch('/api/getHistory', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify(payload),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        try {
          const raw = localStorage.getItem('user');
          if (raw) {
            const user = JSON.parse(raw);
            if (typeof data.level === 'number') user.level = data.level;
            if (typeof data.xp === 'number') user.xp = data.xp;
            if (typeof data.coins === 'number') user.coins = data.coins;
            if (typeof data.mileage_km_365 === 'number') {
              user.mileage_km_365 = data.mileage_km_365;
              user.mileage_rolling_km = data.mileage_km_365;
            }
            if (data.mileage_rank) {
              user.mileage_rank = data.mileage_rank;
              user.mileage_card = data.mileage_rank === 'gold' ? '金卡' : (data.mileage_rank === 'silver' ? '銀卡' : '銅卡');
            }
            user.total_rides = Number(user.total_rides || 0) + (data.skipped || data.voided ? 0 : 1);
            localStorage.setItem('user', JSON.stringify(user));
          }
        } catch (e) {}
        try {
          if (!data.skipped && !data.voided) {
            const history = JSON.parse(localStorage.getItem('rideHistory') || '[]');
            history.push({
              route_id: payload.route_id,
              date: payload.ride_date,
              start_time: payload.start_time,
              duration_minutes: payload.duration_minutes || 0,
              distance_km: payload.distance_km || 0,
              stops_count: payload.stops_count || 0,
              stops_reached: payload.stops_reached || [],
              all_stops: !!payload.all_stops,
              districts_count: payload.districts_count || 0,
            });
            if (history.length > 200) history.splice(0, history.length - 200);
            localStorage.setItem('rideHistory', JSON.stringify(history));
          }
        } catch (e) {}
        return { xpEarned: data.xp_earned || summary.xpEarned, saved: true };
      } catch (error) {
        console.warn('[Nav] save ride failed:', error);
        // Save to unsynced queue if API fails
        try {
            const unsynced = JSON.parse(localStorage.getItem('unsyncedRides') || '[]');
            unsynced.push(payload);
            localStorage.setItem('unsyncedRides', JSON.stringify(unsynced));
        } catch(ee) {}
        return { xpEarned: summary.xpEarned, saved: false };
      }
    }

    function renderSummaryMap(pathCoords) {
      const mapWrap = document.getElementById('summary-map');
      if (!mapWrap || typeof maplibregl === 'undefined') return;
      if (navSummaryMap) {
        navSummaryMap.remove();
        navSummaryMap = null;
      }
      if (!Array.isArray(pathCoords) || pathCoords.length < 2) {
        mapWrap.innerHTML = '<div style="padding:1.2em;color:#9cb39f;text-align:center;">無可用路徑資料</div>';
        return;
      }
      mapWrap.innerHTML = '';
      const isLightTheme = document.body.classList.contains('app-light-theme') ||
        (!document.body.classList.contains('app-theme-explicit') &&
          window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches);
      navSummaryMap = new maplibregl.Map({
        container: 'summary-map',
        style: isLightTheme ? 'https://tiles.openfreemap.org/styles/liberty' : 'https://tiles.openfreemap.org/styles/dark',
        center: pathCoords[0],
        zoom: 15,
        interactive: false,
        attributionControl: false,
      });
      navSummaryMap.on('load', () => {
        navSummaryMap.addSource('summary-path', {
          type: 'geojson',
          data: turf.lineString(pathCoords),
        });
        navSummaryMap.addLayer({
          id: 'summary-path-line',
          type: 'line',
          source: 'summary-path',
          paint: {
            'line-color': '#00E5FF',
            'line-width': 5,
            'line-opacity': 0.95,
            'line-cap': 'round',
            'line-join': 'round',
          },
        });
        const lngs = pathCoords.map(c => c[0]);
        const lats = pathCoords.map(c => c[1]);
        navSummaryMap.fitBounds([
          [Math.min(...lngs), Math.min(...lats)],
          [Math.max(...lngs), Math.max(...lats)],
        ], { padding: 30, duration: 0 });
      });
    }

    function generateTransparentTrackMap(coords) {
        if (!coords || coords.length < 2) return null;
        const canvas = document.createElement('canvas');
        canvas.width = 1000;
        canvas.height = 1000;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const lats = coords.map(c => c[1]);
        const lons = coords.map(c => c[0]);
        const minLat = Math.min(...lats), maxLat = Math.max(...lats);
        const minLon = Math.min(...lons), maxLon = Math.max(...lons);
        const latRange = maxLat - minLat || 0.0001;
        const lonRange = maxLon - minLon || 0.0001;
        const padding = 50;
        const drawW = canvas.width - padding * 2;
        const drawH = canvas.height - padding * 2;
        const scale = Math.min(drawW / lonRange, drawH / latRange);

        ctx.strokeStyle = '#00E5FF';
        ctx.lineWidth = 12;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        coords.forEach((c, i) => {
            const x = padding + (c[0] - minLon) * scale;
            const y = canvas.height - (padding + (c[1] - minLat) * scale);
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
        return canvas.toDataURL('image/png');
    }

    function showSummaryView(summary) {
      document.getElementById('summary-distance').textContent = `${summary.distanceKm.toFixed(2)} km`;
      document.getElementById('summary-time').textContent = formatMinutes(summary.durationMinutes);
      document.getElementById('summary-xp').textContent = `+${summary.xpEarned} XP`;
      renderSummaryMap(summary.pathCoords);
      document.getElementById('arrived-overlay').classList.add('show');

      // Add save track button if not exists
      let saveTrackBtn = document.getElementById('btn-nav-save-track');
      if (!saveTrackBtn) {
          saveTrackBtn = document.createElement('button');
          saveTrackBtn.id = 'btn-nav-save-track';
          saveTrackBtn.style.cssText = 'margin-bottom:1em; background:rgba(255,255,255,0.1); color:#fff; border:1px solid #555; padding:0.6em; border-radius:8px; font-size:0.85em; cursor:pointer; width:100%;';
          saveTrackBtn.innerHTML = '<i class="fas fa-download"></i> 保存透明背景軌跡圖';
          const card = document.getElementById('summary-card');
          card.insertBefore(saveTrackBtn, document.getElementById('btn-arrived-done'));
      }
      saveTrackBtn.onclick = () => {
          if (summary.pathCoords) {
              const dataUrl = generateTransparentTrackMap(summary.pathCoords);
              if (dataUrl) {
                  const link = document.createElement('a');
                  link.href = dataUrl;
                  link.download = `nav-track-${new Date().toISOString().slice(0,10)}.png`;
                  link.click();
              }
          }
      };
    }

    async function finishNavigationSequence() {
      if (finishInProgress) return;
      finishInProgress = true;
      isNavigating = false;
      releaseWakeLock();
      clearGpsWatch();
      stopRouteFx();
      document.getElementById('turn-banner').classList.remove('show');
      document.getElementById('nav-stats-bar').classList.remove('show');
      document.getElementById('btn-end-nav').style.display = 'none';
      headingUp = false;
      document.getElementById('btn-heading-up').classList.remove('active');
      map.easeTo({ bearing: 0, duration: 500 });

      const endTime = Date.now();
      const elapsedMinutes = navStartTime ? Math.max(1, Math.round((endTime - navStartTime) / 60000)) : 1;
      const distanceKm = Number((Math.max(navDistTravelledM, 0) / 1000).toFixed(2));
      const avgSpeedKmh = elapsedMinutes > 0 ? Number(((distanceKm / elapsedMinutes) * 60).toFixed(1)) : 0;
      const localXp = Math.max(1, Math.round(distanceKm * 20 * 0.8));
      const pathCoords = navTrailCoords.length >= 2
        ? navTrailCoords.slice()
        : (plannedRoute ? plannedRoute.slice() : []);
      const summary = {
        startTime: navStartTime || endTime,
        endTime,
        distanceKm,
        durationMinutes: elapsedMinutes,
        avgSpeedKmh,
        xpEarned: localXp,
        pathCoords,
      };
      const saveResult = await saveNavigationRide(summary);
      summary.xpEarned = saveResult.xpEarned;
      showSummaryView(summary);
    }

    function endNavigation() {
      isNavigating = false;
      finishInProgress = false;
      releaseWakeLock();
      document.getElementById('turn-banner').classList.remove('show');
      document.getElementById('nav-stats-bar').classList.remove('show');
      document.getElementById('btn-end-nav').style.display = 'none';
      document.getElementById('btn-start-nav').classList.remove('show');
      document.getElementById('route-summary').classList.remove('show');
      document.getElementById('arrived-overlay').classList.remove('show');
      headingUp = false;
      document.getElementById('btn-heading-up').classList.remove('active');
      map.easeTo({ bearing: 0, duration: 500 });
      expandPanel();
      clearRouteLayers();
      plannedRoute = null;
      plannedFrom = null;
      plannedTo = null;
      plannedSteps = [];
      navTotalDistM = 0;
      navTrailCoords = [];
      currentStepIdx = 0;
      document.getElementById('sel-from').value = '';
      document.getElementById('sel-to').value = '';
      if (navSummaryMap) {
        navSummaryMap.remove();
        navSummaryMap = null;
      }
      updateTopBarMeta(activeMatch, getDistanceToNextJunction(lastSnappedLngLat));
      checkPlanBtn();
    }

    // ── Panel collapse / expand ───────────────────────────────────────────
    function collapsePanel() {
      document.getElementById('planner-panel').classList.add('collapsed');
    }
    function expandPanel() {
      document.getElementById('planner-panel').classList.remove('collapsed');
    }

    // ── Heading-up / Follow toggle ─────────────────────────────────────────────────
    document.getElementById('btn-heading-up').addEventListener('click', () => {
      if (!isFollowing) {
          // Re-enable follow mode first
          isFollowing = true;
          headingUp = true; // start with heading up by default when re-enabling
      } else {
          headingUp = !headingUp;
      }

      document.getElementById('btn-heading-up').classList.toggle('active', headingUp && isFollowing);

      if (isFollowing && lastSnappedLngLat) {
          updateCamera(lastSnappedLngLat, lastBearing);
      }

      if (!headingUp && isFollowing) {
          map.easeTo({ bearing: 0, pitch: DEFAULT_NAV_PITCH, zoom: DEFAULT_NAV_ZOOM, duration: 500 });
      }
    });

    function cleanupNavRuntime() {
      clearGpsWatch();
      stopRouteFx();
    }

    // ── Back navigation ───────────────────────────────────────────────────
    window.navBack = function () {
      if (isNavigating) {
        if (!confirm('確定結束導航嗎？')) return;
        endNavigation();
      }
      cleanupNavRuntime();
      history.back();
    };

      // ── Populate landmark options ─────────────────────────────────────────
      function populateSelects(extraOptions = []) {
      const list = document.getElementById('landmark-options');
      if (!list) return;
      list.innerHTML = '';

      const gpsOpt = document.createElement('option');
      gpsOpt.value = '📍 使用目前位置';
      list.appendChild(gpsOpt);

      LANDMARKS.forEach(l => {
        const opt = document.createElement('option');
        opt.value = l.name;
        list.appendChild(opt);
      });

      const seen = new Set(['📍 使用目前位置', ...LANDMARKS.map(l => l.name)]);
      extraOptions.forEach(name => {
        const value = String(name || '').trim();
        if (!value || seen.has(value)) return;
        const opt = document.createElement('option');
        opt.value = value;
        list.appendChild(opt);
        seen.add(value);
      });
    }

    function checkPlanBtn() {
      const from = (document.getElementById('sel-from').value || '').trim();
      const to   = (document.getElementById('sel-to').value || '').trim();
      document.getElementById('btn-plan-route').disabled = !from || !to || from === to;
    }

    // ── Event listeners ───────────────────────────────────────────────────
    let suggestionTimer = null;
    function handleAddressInput(e) {
      checkPlanBtn();
      if (suggestionTimer) clearTimeout(suggestionTimer);
      const value = e && e.target ? e.target.value : '';
      suggestionTimer = setTimeout(() => { fetchAddressSuggestions(value); }, ADDRESS_SUGGEST_DEBOUNCE_MS);
    }
    document.getElementById('sel-from').addEventListener('input', handleAddressInput);
    document.getElementById('sel-to').addEventListener('input', handleAddressInput);
    document.getElementById('btn-plan-route').addEventListener('click', planRoute);
    document.getElementById('btn-start-nav').addEventListener('click', startNavigation);
    document.getElementById('btn-end-nav').addEventListener('click', () => {
      if (confirm('確定結束導航？')) endNavigation();
    });
    document.getElementById('btn-arrived-done').addEventListener('click', () => {
      endNavigation();
      location.href = '/dashboard';
    });
    window.addEventListener('pagehide', cleanupNavRuntime);
    window.addEventListener('beforeunload', cleanupNavRuntime);

    // Handle visibility change to re-acquire wake lock
    document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible' && isNavigating) {
            await requestWakeLock();
        }
    });

    // Panel handle toggle
    document.getElementById('panel-handle').addEventListener('click', () => {
      const panel = document.getElementById('planner-panel');
      panel.classList.toggle('collapsed');
    });

    function initWaypointUI() {
        const userRaw = localStorage.getItem('user');
        if (!userRaw) return;
        const user = JSON.parse(userRaw);
        const rank = String(user.permission_rank || user.mileage_rank || '').toLowerCase();

        const wpBtn = document.getElementById('btn-add-waypoint');
        document.getElementById('add-waypoint-row').style.display = 'flex';

        if (rank === 'silver' || rank === 'gold') {
            wpBtn.innerHTML = '<i class="fas fa-plus"></i> 新增停靠點';
        } else {
            wpBtn.innerHTML = '<i class="fas fa-lock"></i> 新增停靠點（銀卡/金卡解鎖）';
            wpBtn.style.opacity = '0.6';
        }

        const maxWps = rank === 'gold' ? 8 : (rank === 'silver' ? 3 : 0);

        wpBtn.onclick = () => {
            if (rank !== 'silver' && rank !== 'gold') {
                alert('新增停靠點為銀卡及金卡會員專屬功能。請完善個人資料以升級！');
                return;
            }
            if (waypointsCount >= maxWps) {
                alert(`你的等級最多支援 ${maxWps} 個停靠點。`);
                return;
            }
            const container = document.getElementById('waypoints-container');
            const row = document.createElement('div');
            row.className = 'plan-row';
            row.innerHTML = `
                <span class="plan-row-icon" style="color:#f1c232;">📍</span>
                <input class="plan-input waypoint-input" list="landmark-options" placeholder="輸入停靠點">
                <button class="remove-wp" style="background:none; border:none; color:#e74c3c; padding:0 0.5em; cursor:pointer;"><i class="fas fa-times"></i></button>
            `;
            container.appendChild(row);
            waypointsCount++;
            row.querySelector('.remove-wp').onclick = () => { row.remove(); waypointsCount--; };
        };
    }

    // ── Init ──────────────────────────────────────────────────────────────
    populateSelects();
    initWaypointUI();
    try {
      initMap();
    } catch (e) {
      console.error('[Nav] initMap failed:', e);
      const el = document.getElementById('nav-loading');
      if (el) {
        const msg = document.createElement('p');
        msg.style.cssText = 'color:#BFE340;text-align:center;padding:1em;line-height:1.7';
        const errSpan = document.createElement('small');
        errSpan.style.opacity = '0.7';
        errSpan.textContent = e.message;
        const backBtn = document.createElement('button');
        backBtn.style.cssText = 'color:#04D93C;background:none;border:none;cursor:pointer;font-size:1em;';
        backBtn.textContent = '← 返回';
        backBtn.addEventListener('click', () => history.back());
        msg.append('⚠️ 地圖初始化失敗。', document.createElement('br'), errSpan, document.createElement('br'), document.createElement('br'), backBtn);
        el.innerHTML = '';
        el.appendChild(msg);
      }
    }

  })();

  (function applyNavLang() {
    const lang = localStorage.getItem('appLang') === 'en' ? 'en' : 'zh';
    const t = NAV_I18N[lang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (t[key] !== undefined) el.textContent = t[key];
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.dataset.i18nPlaceholder;
      if (t[key] !== undefined) el.placeholder = t[key];
    });
    // Translate select options
    document.querySelectorAll('option[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (t[key] !== undefined) el.textContent = t[key];
    });
    const pushBikeText = document.getElementById('nav-pushbike-text');
    if (pushBikeText && t.pushbike_warning) pushBikeText.textContent = t.pushbike_warning;
  })();
