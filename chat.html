<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="城市運輸單車">
    <link rel="apple-touch-icon" href="/images/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用戶聊天 - 城市運輸單車</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script>
        (function() {
            const token = localStorage.getItem('accessToken');
            if (!token) {
                alert('你需要登入才能使用聊天功能。');
                window.location.replace('/login');
            }
        })();
    </script>
    <style>
        body.is-pwa, body {
            background: var(--app-bg-primary, #121f14);
            color: var(--app-text-primary, #e8f5e9);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', sans-serif;
        }
        @media (display-mode: standalone) {
            body { background: var(--app-bg-primary, #121f14); color: var(--app-text-primary, #e8f5e9); }
            footer { background: var(--app-bg-primary, #121f14); color: var(--app-text-secondary, #a8d8a0); border-top: 1px solid #2d4d2d; }
        }
        .chat-layout {
            display: flex;
            max-width: 900px;
            margin: 0 auto;
            height: calc(100vh - 120px);
            min-height: 400px;
            gap: 0;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2d4d2d;
        }
        /* ── Conversation List ── */
        .conv-panel {
            width: 280px;
            min-width: 200px;
            background: var(--app-bg-card, #1e3820);
            border-right: 1px solid #2d4d2d;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .conv-header {
            padding: 1em;
            border-bottom: 1px solid #2d4d2d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5em;
        }
        .conv-header h3 { margin: 0; font-size: 1em; color: var(--app-accent, #6dba65); }
        .btn-new-chat {
            background: var(--app-accent, #6dba65);
            color: #121f14;
            border: none;
            border-radius: 8px;
            padding: 0.35em 0.8em;
            font-size: 0.82em;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-new-chat:hover { background: #5aaa55; }
        .conv-search {
            padding: 0.6em;
            border-bottom: 1px solid #2d4d2d;
        }
        .conv-search input {
            width: 100%;
            background: #15291a;
            border: 1px solid #2d4d2d;
            border-radius: 8px;
            padding: 0.45em 0.7em;
            color: var(--app-text-primary, #e8f5e9);
            font-size: 0.88em;
            box-sizing: border-box;
        }
        .conv-search input::placeholder { color: #5a8a5a; }
        .conv-list { flex: 1; overflow-y: auto; }
        .conv-item {
            display: flex;
            align-items: center;
            gap: 0.7em;
            padding: 0.75em 1em;
            cursor: pointer;
            border-bottom: 1px solid #1a2d1a;
            transition: background 0.15s;
        }
        .conv-item:hover, .conv-item.active { background: #253d28; }
        .conv-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2d4d2d;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--app-accent, #6dba65);
            font-size: 1.1em;
            flex-shrink: 0;
            overflow: hidden;
        }
        .conv-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .conv-info { flex: 1; min-width: 0; }
        .conv-name { font-weight: 600; font-size: 0.9em; color: var(--app-text-primary, #e8f5e9); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .conv-last { font-size: 0.78em; color: var(--app-text-secondary, #a8d8a0); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .conv-unread {
            background: var(--app-accent, #6dba65);
            color: #121f14;
            border-radius: 10px;
            padding: 0.1em 0.5em;
            font-size: 0.75em;
            font-weight: bold;
            min-width: 1.4em;
            text-align: center;
        }
        /* ── Message Panel ── */
        .msg-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #121f14;
            min-width: 0;
        }
        .msg-header {
            padding: 0.85em 1.2em;
            border-bottom: 1px solid #2d4d2d;
            display: flex;
            align-items: center;
            gap: 0.8em;
            background: var(--app-bg-card, #1e3820);
        }
        .msg-header-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #2d4d2d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1em;
            color: var(--app-accent, #6dba65);
            flex-shrink: 0;
            overflow: hidden;
        }
        .msg-header-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .msg-header-name { font-weight: 700; color: var(--app-text-primary, #e8f5e9); font-size: 0.95em; }
        .msg-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--app-text-secondary, #a8d8a0);
            gap: 0.6em;
            font-size: 0.95em;
        }
        .msg-empty i { font-size: 2.5em; opacity: 0.5; }
        .msg-empty .btn-new-chat {
            margin-top: 0.4em;
        }
        .msg-list {
            flex: 1;
            overflow-y: auto;
            padding: 1em;
            display: flex;
            flex-direction: column;
            gap: 0.6em;
        }
        .msg-bubble-wrap {
            display: flex;
            align-items: flex-end;
            gap: 0.5em;
        }
        .msg-bubble-wrap.mine { flex-direction: row-reverse; }
        .bubble-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #2d4d2d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75em;
            color: var(--app-accent, #6dba65);
            flex-shrink: 0;
            overflow: hidden;
        }
        .bubble-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .msg-inner {
            max-width: 70%;
            min-width: 0;
        }
        .msg-bubble {
            padding: 0.6em 0.9em;
            border-radius: 14px;
            font-size: 0.9em;
            line-height: 1.45;
            word-break: break-word;
            overflow-wrap: break-word;
        }
        .msg-bubble.mine {
            background: var(--app-accent, #6dba65);
            color: #121f14;
            border-bottom-right-radius: 4px;
        }
        .msg-bubble.theirs {
            background: var(--app-bg-card, #1e3820);
            color: var(--app-text-primary, #e8f5e9);
            border: 1px solid #2d4d2d;
            border-bottom-left-radius: 4px;
        }
        .msg-time {
            font-size: 0.7em;
            color: var(--app-text-secondary, #a8d8a0);
            margin-top: 0.2em;
            text-align: right;
        }
        .msg-bubble-wrap.mine .msg-time { text-align: left; }
        .msg-input-bar {
            padding: 0.8em 1em;
            border-top: 1px solid #2d4d2d;
            display: flex;
            gap: 0.6em;
            background: var(--app-bg-card, #1e3820);
        }
        .msg-input-bar textarea {
            flex: 1;
            background: #15291a;
            border: 1px solid #2d4d2d;
            border-radius: 10px;
            padding: 0.6em 0.8em;
            color: var(--app-text-primary, #e8f5e9);
            font-size: 0.92em;
            resize: none;
            min-height: 40px;
            max-height: 120px;
            font-family: inherit;
            line-height: 1.4;
        }
        .msg-input-bar textarea:focus { outline: none; border-color: var(--app-accent, #6dba65); }
        .msg-input-bar textarea::placeholder { color: #5a8a5a; }
        .btn-send {
            background: var(--app-accent, #6dba65);
            color: #121f14;
            border: none;
            border-radius: 10px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1em;
            cursor: pointer;
            flex-shrink: 0;
            align-self: flex-end;
        }
        .btn-send:hover { background: #5aaa55; }
        .btn-send:disabled { background: #3a5a3a; cursor: not-allowed; }
        /* ── User Search Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: var(--app-bg-card, #1e3820);
            border: 1px solid #2d4d2d;
            border-radius: 14px;
            padding: 1.5em;
            width: 90%;
            max-width: 380px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }
        .modal-box h4 { margin: 0 0 0.8em; color: var(--app-accent, #6dba65); font-size: 1em; }
        .modal-search {
            width: 100%;
            background: #15291a;
            border: 1px solid #2d4d2d;
            border-radius: 8px;
            padding: 0.6em 0.8em;
            color: var(--app-text-primary, #e8f5e9);
            font-size: 0.9em;
            margin-bottom: 0.8em;
            box-sizing: border-box;
        }
        .modal-user-list { flex: 1; overflow-y: auto; }
        .modal-user-item {
            display: flex;
            align-items: center;
            gap: 0.7em;
            padding: 0.7em 0.3em;
            cursor: pointer;
            border-radius: 8px;
        }
        .modal-user-item:hover { background: #253d28; }
        .modal-user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #2d4d2d;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--app-accent, #6dba65);
            flex-shrink: 0;
            overflow: hidden;
        }
        .modal-user-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .modal-user-name { color: var(--app-text-primary, #e8f5e9); font-size: 0.92em; font-weight: 500; }
        .modal-close {
            background: transparent;
            border: none;
            color: var(--app-text-secondary, #a8d8a0);
            font-size: 1em;
            cursor: pointer;
            margin-top: 0.8em;
            width: 100%;
            padding: 0.5em;
        }
        /* ── Mobile panel toggle button ── */
        .btn-panel-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--app-accent, #6dba65);
            font-size: 1.3em;
            cursor: pointer;
            padding: 0.2em 0.3em;
            flex-shrink: 0;
        }
        .btn-back-to-list {
            display: none;
            background: none;
            border: none;
            color: var(--app-accent, #6dba65);
            font-size: 1.2em;
            cursor: pointer;
            padding: 0.2em 0.4em;
            flex-shrink: 0;
        }
        /* ── Conv panel overlay backdrop ── */
        .conv-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 99;
            background: rgba(0,0,0,0.45);
        }
        .conv-overlay.show { display: block; }
        /* ── Responsive (mobile) ── */
        @media (max-width: 600px) {
            .chat-layout { height: calc(100vh - 100px); position: relative; }
            /* Full-screen slide-in panel: slides in from the left */
            .conv-panel {
                width: 100%;
                min-width: 0;
                overflow: hidden;
                position: absolute;
                left: 0; top: 0;
                height: 100%;
                z-index: 10;
                transform: translateX(-100%);
                transition: transform 0.25s ease;
            }
            .conv-panel.open { transform: translateX(0); }
            /* Hide overlay on mobile (panel is full-screen, no backdrop needed) */
            .conv-overlay { display: none !important; }
            /* Show toggle/back buttons on mobile only */
            .btn-panel-toggle { display: flex; align-items: center; }
            .btn-back-to-list { display: flex; align-items: center; }
        }
        /* ── Light theme overrides ──────────────────────────────── */
        body.app-light-theme .chat-layout { border-color: var(--app-border, #c8e6c9); }
        body.app-light-theme .conv-panel { background: var(--app-bg-secondary, #eaf4ea); border-right-color: var(--app-border, #c8e6c9); }
        body.app-light-theme .conv-header { border-bottom-color: var(--app-border, #c8e6c9); }
        body.app-light-theme .conv-search { border-bottom-color: var(--app-border, #c8e6c9); }
        body.app-light-theme .conv-item { border-bottom-color: var(--app-border, #c8e6c9); }
        body.app-light-theme .msg-panel { background: var(--app-bg-primary, #f5faf5); }
        body.app-light-theme .msg-header { background: var(--app-bg-card, #ffffff); border-bottom-color: var(--app-border, #c8e6c9); }
        body.app-light-theme .conv-search input {
            background: var(--app-bg-card, #ffffff);
            border-color: var(--app-border, #c8e6c9);
            color: var(--app-text-primary, #1b3a1f);
        }
        body.app-light-theme .conv-search input::placeholder { color: var(--app-text-secondary, #2e7d32); opacity: 0.7; }
        body.app-light-theme .conv-avatar,
        body.app-light-theme .msg-header-avatar { background: var(--app-border, #c8e6c9); }
        body.app-light-theme .conv-item:hover,
        body.app-light-theme .conv-item.active { background: var(--app-bg-card, #ffffff); }
        body.app-light-theme .bubble-avatar,
        body.app-light-theme .modal-user-avatar { background: var(--app-border, #c8e6c9); }
        body.app-light-theme .msg-bubble.theirs {
            background: var(--app-bg-card2, #f0f8f0);
            border-color: var(--app-border, #c8e6c9);
            color: var(--app-text-primary, #1b3a1f);
        }
        body.app-light-theme .msg-input-bar { background: var(--app-bg-card, #ffffff); border-top-color: var(--app-border, #c8e6c9); }
        body.app-light-theme .msg-input-bar textarea {
            background: var(--app-bg-secondary, #eaf4ea);
            border-color: var(--app-border, #c8e6c9);
            color: var(--app-text-primary, #1b3a1f);
        }
        body.app-light-theme .msg-input-bar textarea::placeholder { color: var(--app-text-secondary, #2e7d32); opacity: 0.7; }
        body.app-light-theme .modal-box {
            background: var(--app-bg-card, #ffffff);
            border-color: var(--app-border, #c8e6c9);
        }
        body.app-light-theme .modal-search {
            background: var(--app-bg-secondary, #eaf4ea);
            border-color: var(--app-border, #c8e6c9);
            color: var(--app-text-primary, #1b3a1f);
        }
        body.app-light-theme .modal-user-item:hover { background: var(--app-bg-secondary, #eaf4ea); }
        body.app-light-theme .btn-send:disabled { background: var(--app-border, #c8e6c9); }
        @media (prefers-color-scheme: light) {
            body:not(.app-theme-explicit) .chat-layout { border-color: var(--app-border, #c8e6c9); }
            body:not(.app-theme-explicit) .conv-panel { background: var(--app-bg-secondary, #eaf4ea); border-right-color: var(--app-border, #c8e6c9); }
            body:not(.app-theme-explicit) .conv-header { border-bottom-color: var(--app-border, #c8e6c9); }
            body:not(.app-theme-explicit) .conv-search { border-bottom-color: var(--app-border, #c8e6c9); }
            body:not(.app-theme-explicit) .conv-item { border-bottom-color: var(--app-border, #c8e6c9); }
            body:not(.app-theme-explicit) .msg-panel { background: var(--app-bg-primary, #f5faf5); }
            body:not(.app-theme-explicit) .msg-header { background: var(--app-bg-card, #ffffff); border-bottom-color: var(--app-border, #c8e6c9); }
            body:not(.app-theme-explicit) .conv-search input { background: var(--app-bg-card, #ffffff); border-color: var(--app-border, #c8e6c9); color: var(--app-text-primary, #1b3a1f); }
            body:not(.app-theme-explicit) .conv-search input::placeholder { color: var(--app-text-secondary, #2e7d32); opacity: 0.7; }
            body:not(.app-theme-explicit) .conv-avatar,
            body:not(.app-theme-explicit) .msg-header-avatar { background: var(--app-border, #c8e6c9); }
            body:not(.app-theme-explicit) .conv-item:hover,
            body:not(.app-theme-explicit) .conv-item.active { background: var(--app-bg-card, #ffffff); }
            body:not(.app-theme-explicit) .bubble-avatar,
            body:not(.app-theme-explicit) .modal-user-avatar { background: var(--app-border, #c8e6c9); }
            body:not(.app-theme-explicit) .msg-bubble.theirs { background: var(--app-bg-card2, #f0f8f0); border-color: var(--app-border, #c8e6c9); color: var(--app-text-primary, #1b3a1f); }
            body:not(.app-theme-explicit) .msg-input-bar { background: var(--app-bg-card, #ffffff); border-top-color: var(--app-border, #c8e6c9); }
            body:not(.app-theme-explicit) .msg-input-bar textarea { background: var(--app-bg-secondary, #eaf4ea); border-color: var(--app-border, #c8e6c9); color: var(--app-text-primary, #1b3a1f); }
            body:not(.app-theme-explicit) .msg-input-bar textarea::placeholder { color: var(--app-text-secondary, #2e7d32); opacity: 0.7; }
            body:not(.app-theme-explicit) .modal-box { background: var(--app-bg-card, #ffffff); border-color: var(--app-border, #c8e6c9); }
            body:not(.app-theme-explicit) .modal-search { background: var(--app-bg-secondary, #eaf4ea); border-color: var(--app-border, #c8e6c9); color: var(--app-text-primary, #1b3a1f); }
            body:not(.app-theme-explicit) .modal-user-item:hover { background: var(--app-bg-secondary, #eaf4ea); }
            body:not(.app-theme-explicit) .btn-send:disabled { background: var(--app-border, #c8e6c9); }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="content animated-element" style="padding: 0.5em 0.5em 5em;">
            <!-- Mobile overlay backdrop -->
            <div class="conv-overlay" id="conv-overlay" onclick="closeConvPanel()"></div>
            <div class="chat-layout" id="chat-layout">
                <!-- 對話列表 -->
                <div class="conv-panel" id="conv-panel">
                    <div class="conv-header">
                        <button class="btn-panel-toggle" id="btn-panel-toggle" onclick="toggleConvPanel()" title="對話列表"><i class="fas fa-bars"></i></button>
                        <h3><i class="fas fa-comments"></i> 聊天</h3>
                        <div style="display:flex; gap:4px;">
                            <button class="btn-new-chat" onclick="openFriendModal()" title="好友列表"><i class="fas fa-user-friends"></i></button>
                            <button class="btn-new-chat" onclick="openNewChatModal()"><i class="fas fa-plus"></i></button>
                        </div>
                        <button class="btn-new-chat" id="support-entry-btn" style="background:#6dba65;" onclick="startSupportThread()">
                            <i class="fas fa-headset"></i> 客服
                        </button>
                    </div>
                    <div class="conv-search">
                        <input type="text" id="conv-search-input" placeholder="搜尋對話…" oninput="filterConvList(this.value)">
                    </div>
                    <div class="conv-list" id="conv-list">
                        <div style="padding: 1em; color: #5a8a5a; font-size:0.85em; text-align:center;">載入中…</div>
                    </div>
                </div>

                <!-- 訊息區 -->
                <div class="msg-panel" id="msg-panel">
                    <div class="msg-empty" id="msg-empty">
                        <i class="fas fa-comment-dots"></i>
                        <span id="msg-empty-text">選擇對話或開始新的聊天</span>
                        <button class="btn-new-chat" onclick="openNewChatModal()"><i class="fas fa-plus"></i> 新對話</button>
                        <button class="btn-new-chat" style="margin-top:0.3em;" onclick="openConvPanel()"><i class="fas fa-list"></i> 查看對話</button>
                    </div>

                    <div class="msg-header" id="msg-header" style="display:none;">
                        <button class="btn-back-to-list" onclick="openConvPanel()" title="返回列表"><i class="fas fa-chevron-left"></i></button>
                        <div class="msg-header-avatar" id="msg-header-avatar"><i class="fas fa-user"></i></div>
                        <span class="msg-header-name" id="msg-header-name"></span>
                    </div>
                    <div class="msg-list" id="msg-list" style="display:none;"></div>
                    <div class="msg-input-bar" id="msg-input-bar" style="display:none;">
                        <textarea id="msg-input" placeholder="輸入訊息… (最多 2000 字)" rows="1" maxlength="2000" onkeydown="onMsgKeydown(event)" oninput="autoGrow(this)"></textarea>
                        <button class="btn-send" id="btn-send" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 香港城市運輸單車. All Rights Reserved.</p>
    </footer>

    <!-- 新對話 Modal -->
    <div class="modal-overlay" id="new-chat-modal">
        <div class="modal-box">
            <h4><i class="fas fa-user-plus"></i> 開始新對話</h4>
            <input type="text" class="modal-search" id="user-search-input" placeholder="輸入對方用戶名（4-16）" oninput="searchUsers(this.value)">
            <button class="btn-new-chat" style="width:100%;margin-top:0.6em;" onclick="startChatByUsername()">以用戶名開始對話</button>
            <div class="modal-user-list" id="user-search-results">
                <div style="color:#5a8a5a;font-size:0.85em;text-align:center;">輸入名稱搜尋用戶</div>
            </div>
            <button class="modal-close" onclick="closeNewChatModal()"><i class="fas fa-times"></i> 關閉</button>
        </div>
    </div>

    <!-- 好友 Modal -->
    <div class="modal-overlay" id="friend-modal">
        <div class="modal-box">
            <h4><i class="fas fa-user-friends"></i> 好友與請求</h4>
            <div id="friend-requests-section" style="margin-bottom: 1em; border-bottom: 1px solid #2d4d2d; padding-bottom: 0.5em;">
                <div style="font-size: 0.8em; color: #a8d8a0; margin-bottom: 0.4em;">待處理請求</div>
                <div id="friend-requests-list"></div>
            </div>
            <div id="friends-section" style="flex: 1; overflow-y: auto;">
                <div style="font-size: 0.8em; color: #a8d8a0; margin-bottom: 0.4em;">我的好友</div>
                <div id="friends-list"></div>
            </div>
            <button class="modal-close" onclick="closeFriendModal()"><i class="fas fa-times"></i> 關閉</button>
        </div>
    </div>

    <script src="/js/main.js"></script>
    <script src="/js/pwa.js"></script>
    <script>
    (function() {
        const userData = localStorage.getItem('user');
        if (!userData) { window.location.replace('/login'); return; }
        const ME = JSON.parse(userData);
        const TOKEN = localStorage.getItem('accessToken') || '';
        const IS_SENIOR_ADMIN = String(ME.user_role || ME.role || '').toLowerCase() === 'senior_admin';
        const urlParams = new URLSearchParams(window.location.search);
        const SUPPORT_QUERY_MODE = urlParams.get('support') === '1';
        const SUPPORT_QUERY_THREAD_ID = parseInt(urlParams.get('thread_id') || '0', 10) || null;
        let currentPeerId = null;
        let currentPeerName = '';
        let currentPeerAvatar = '';
        let conversations = [];
        let pollTimer = null;
        let convRefreshTimer = null;
        let isLoadingMore = false;
        let oldestMsgId = null;
        let newestMsgId = null;
        let lastUnreadCount = -1; // -1 = not yet loaded; avoids false notification on first fetch
        let lastInboxMessageAt = '';
        let convRefreshPending = false;
        const msgCache = {};

        // ── Mobile conv-panel helpers ──────────────────────────────────────
        function isMobile() { return window.innerWidth <= 600; }
        function openConvPanel() {
            document.getElementById('conv-panel').classList.add('open');
            document.getElementById('conv-overlay').classList.add('show');
        }
        function closeConvPanel() {
            document.getElementById('conv-panel').classList.remove('open');
            document.getElementById('conv-overlay').classList.remove('show');
        }
        window.openConvPanel = openConvPanel;
        window.closeConvPanel = closeConvPanel;
        window.toggleConvPanel = function() {
            const panel = document.getElementById('conv-panel');
            if (panel.classList.contains('open')) {
                closeConvPanel();
            } else {
                openConvPanel();
            }
        };

        // ── Helpers ────────────────────────────────────────────────────────
        async function parseApiResponse(r) {
            let data = null;
            try {
                data = await r.json();
            } catch (_) {
                data = null;
            }
            if (!r.ok) {
                const msg = data?.message || `HTTP ${r.status}`;
                throw new Error(msg);
            }
            return data;
        }
        function fetchWithTimeout(url, options, timeout = 10000) {
            return Promise.race([
                fetch(url, options),
                new Promise((_, reject) => setTimeout(() => reject(new Error('請求超時')), timeout))
            ]);
        }
        function apiGet(url) {
            return fetchWithTimeout(url, { headers: { 'Authorization': `Bearer ${TOKEN}` } }).then(parseApiResponse);
        }
        function apiPost(url, body) {
            return fetchWithTimeout(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
                body: JSON.stringify(body)
            }).then(parseApiResponse);
        }
        async function ensureChatUsername() {
            const current = (ME.username || '').trim();
            if (/^[A-Za-z0-9_]{4,16}$/.test(current)) return true;
            // Try refreshing user data from server – DB migration auto-assigns usernames
            try {
                const freshUser = await apiGet(`/api/user?user_id=${parseInt(ME.id, 10)}`);
                if (freshUser && /^[A-Za-z0-9_]{4,16}$/.test((freshUser.username || '').trim())) {
                    ME.username = freshUser.username.trim();
                    const merged = { ...(JSON.parse(localStorage.getItem('user') || '{}')), username: ME.username };
                    localStorage.setItem('user', JSON.stringify(merged));
                    return true;
                }
            } catch (_) { /* continue to prompt */ }
            // Fall back to prompt if still no valid username
            let next = '';
            while (true) {
                next = (window.prompt('請先設定聊天用戶名（4-16位英數或底線）', current || '') || '').trim();
                if (!next) return false;
                if (!/^[A-Za-z0-9_]{4,16}$/.test(next)) {
                    alert('用戶名格式錯誤，請輸入 4-16 位英數或底線（_）');
                    continue;
                }
                break;
            }
            const result = await apiPost('/api/user', { user_id: ME.id, username: next });
            if (result && result.message && !String(result.message).toLowerCase().includes('updated')) {
                throw new Error(result.message || '設定用戶名失敗');
            }
            ME.username = next;
            const merged = { ...(JSON.parse(localStorage.getItem('user') || '{}')), username: next };
            localStorage.setItem('user', JSON.stringify(merged));
            return true;
        }
        function maybeNotifyIncoming(name, content) {
            if (!('Notification' in window)) return;
            if (document.visibilityState === 'visible') return;
            const body = String(content || '').trim().slice(0, 80) || '你有新訊息';
            if (Notification.permission === 'granted') {
                new Notification(`來自 ${name || '用戶'} 的新訊息`, {
                    body,
                    icon: '/images/icon-192.png',
                    badge: '/images/icon-192.png',
                    tag: 'chat-message',
                });
            } else if (Notification.permission !== 'denied') {
                Notification.requestPermission().catch(() => {});
            }
        }
        function timeStr(ts) {
            const d = new Date(ts);
            const now = new Date();
            const diffDays = Math.floor((now - d) / 86400000);
            if (diffDays === 0) return d.toLocaleTimeString('zh-Hant', { hour: '2-digit', minute: '2-digit' });
            if (diffDays === 1) return '昨天';
            return d.toLocaleDateString('zh-Hant', { month: 'numeric', day: 'numeric' });
        }

        // ── Conversation List ───────────────────────────────────────────────
        function loadConversations() {
            if (isSupportAdminMode) {
                loadSupportThreads({ focusThreadId: supportThreadId || SUPPORT_QUERY_THREAD_ID || null });
                return;
            }
            apiGet(`/api/chat?action=conversations&user_id=${ME.id}`).then(rows => {
                conversations = rows || [];
                if (conversations.length && !lastInboxMessageAt) {
                    lastInboxMessageAt = conversations[0].last_at || '';
                }
                const unread = conversations.reduce((s, c) => s + (parseInt(c.unread_count, 10) || 0), 0);
                if (unread > lastUnreadCount && lastUnreadCount >= 0) {
                    const latestPeer = conversations[0]?.peer_name || '用戶';
                    maybeNotifyIncoming(latestPeer, '你有新訊息');
                }
                lastUnreadCount = unread;
                renderConvList(conversations);
            }).catch(() => {});
        }
        // Throttled version: schedules at most one refresh per tick to avoid
        // multiple back-to-back calls (e.g. after send + poll both fire at once).
        // setTimeout(..., 0) defers execution to the next event-loop tick so that
        // any other synchronous callers within the same frame are coalesced.
        function scheduleConvRefresh() {
            if (convRefreshPending) return;
            convRefreshPending = true;
            setTimeout(() => {
                convRefreshPending = false;
                loadConversations();
            }, 0);
        }
        function renderConvList(list) {
            const el = document.getElementById('conv-list');
            if (!list.length) {
                el.innerHTML = '<div style="padding:1em;color:#5a8a5a;font-size:0.85em;text-align:center;">暫無對話</div>';
                return;
            }
            el.innerHTML = list.map(c => `
                <div class="conv-item${currentPeerId === c.peer_id ? ' active' : ''}"
                     onclick="${c.is_support ? `openSupportConversationItem(${Number(c.support_thread_id || 0)})` : `openConversation(${c.peer_id}, ${JSON.stringify(c.peer_name || '用戶').replace(/"/g, '&quot;')}, ${JSON.stringify(c.peer_avatar || '').replace(/"/g, '&quot;')})`}">
                    <div class="conv-avatar">${c.is_support ? '<i class="fas fa-headset"></i>' : avatarHtml(c.peer_avatar, 40)}</div>
                    <div class="conv-info">
                        <div class="conv-name">${escHtml(c.peer_name || '用戶')}</div>
                        <div class="conv-last">${escHtml((c.last_message || '').slice(0, 30))}</div>
                    </div>
                    ${parseInt(c.unread_count, 10) > 0 ? `<span class="conv-unread">${c.unread_count}</span>` : ''}
                </div>
            `).join('');
        }
        window.openSupportConversationItem = function(threadId) {
            if (IS_SENIOR_ADMIN) {
                window.location.href = threadId ? `/chat?support=1&thread_id=${threadId}` : '/chat?support=1';
                return;
            }
            if (threadId) {
                openSupportThread(threadId);
                return;
            }
            startSupportThread();
        };
        function filterConvList(q) {
            const filtered = conversations.filter(c => (c.peer_name || '').includes(q));
            renderConvList(filtered);
        }
        window.filterConvList = filterConvList;

        // ── Open Conversation ───────────────────────────────────────────────
        window.openConversation = function(peerId, peerName, peerAvatar) {
            isSupportMode = false;
            isSupportAdminMode = false;
            supportThreadId = null;
            supportThreadMeta = null;
            if (supportPollTimer) clearInterval(supportPollTimer);
            updateSupportComposerState();
            currentPeerId = peerId;
            currentPeerName = peerName;
            currentPeerAvatar = peerAvatar;
            oldestMsgId = null;
            newestMsgId = null;

            document.getElementById('msg-empty').style.display = 'none';
            document.getElementById('msg-header').style.display = 'flex';
            document.getElementById('msg-list').style.display = 'flex';
            document.getElementById('msg-input-bar').style.display = 'flex';
            document.getElementById('msg-header-avatar').innerHTML = `
                <a href="/profile_view.html?id=${peerId}" style="text-decoration:none; color:inherit; display:flex;">
                    ${avatarHtml(peerAvatar, 36)}
                </a>
            `;
            document.getElementById('msg-header-name').innerHTML = `
                <a href="/profile_view.html?id=${peerId}" style="text-decoration:none; color:inherit;">
                    ${escHtml(peerName || '用戶')}
                </a>
            `;

            // On mobile, close the side panel so the message area is fully visible
            if (isMobile()) closeConvPanel();

            renderConvList(conversations); // re-render to highlight active
            loadMessages(true);

            // Mark as read
            apiPost('/api/chat', { action: 'read', user_id: ME.id, peer_id: peerId });

            // Start polling
            clearInterval(pollTimer);
            pollTimer = setInterval(pollNewMessages, 3000);
        };

        function loadMessages(reset) {
            const peerId = currentPeerId;
            const params = new URLSearchParams({
                action: 'messages', user_id: ME.id, peer_id: peerId, limit: '40'
            });
            if (!reset && oldestMsgId) params.set('before', oldestMsgId);

            // Show cached messages instantly when switching conversations
            if (reset && msgCache[peerId] && msgCache[peerId].length) {
                const list = document.getElementById('msg-list');
                list.innerHTML = '';
                oldestMsgId = msgCache[peerId][0].id;
                newestMsgId = msgCache[peerId][msgCache[peerId].length - 1].id;
                renderMessages(msgCache[peerId], list, false);
                list.scrollTop = list.scrollHeight;
            }

            apiGet(`/api/chat?${params}`).then(msgs => {
                if (currentPeerId !== peerId) return; // user switched away, discard
                const list = document.getElementById('msg-list');
                if (reset) {
                    msgCache[peerId] = msgs;
                    list.innerHTML = '';
                    oldestMsgId = msgs.length ? msgs[0].id : null;
                    newestMsgId = msgs.length ? msgs[msgs.length - 1].id : null;
                    renderMessages(msgs, list, false);
                    list.scrollTop = list.scrollHeight;
                } else {
                    const frag = document.createElement('div');
                    renderMessages(msgs, frag, true);
                    list.insertBefore(frag, list.firstChild);
                    if (msgs.length) {
                        oldestMsgId = msgs[0].id;
                        msgCache[peerId] = [...msgs, ...(msgCache[peerId] || [])];
                    }
                    isLoadingMore = false;
                }
            }).catch(() => { isLoadingMore = false; });
        }

        function renderMessages(msgs, container, prepend) {
            const frag = document.createDocumentFragment();
            msgs.forEach(m => {
                const mine = m.sender_id === ME.id;
                const wrap = document.createElement('div');
                wrap.className = 'msg-bubble-wrap' + (mine ? ' mine' : '');
                wrap.dataset.msgId = m.id;
                const avatarUrl = mine ? (ME.avatar_url || '') : (currentPeerAvatar || '');
                const profileUrl = `/profile_view.html?id=${m.sender_id}`;
                wrap.innerHTML = `
                    <a href="${profileUrl}" class="bubble-avatar" style="text-decoration:none; color:inherit;">
                        ${avatarHtml(avatarUrl, 28)}
                    </a>
                    <div class="msg-inner">
                        <div class="msg-bubble ${mine ? 'mine' : 'theirs'}">${escHtml(m.content)}</div>
                        <div class="msg-time">${timeStr(m.created_at)}</div>
                    </div>
                `;
                frag.appendChild(wrap);
            });
            if (prepend) container.insertBefore(frag, container.firstChild);
            else container.appendChild(frag);
        }

        function pollNewMessages() {
            if (!currentPeerId) return;
            const peerId = currentPeerId;
            const list = document.getElementById('msg-list');
            // Use after=newestMsgId so the server only returns truly new messages;
            // fall back to 0 so we get the latest batch on first poll.
            const afterId = newestMsgId || 0;
            const params = new URLSearchParams({
                action: 'messages', user_id: ME.id, peer_id: peerId,
                after: afterId, limit: '20'
            });
            apiGet(`/api/chat?${params}`).then(msgs => {
                if (currentPeerId !== peerId) return;
                if (!msgs.length) return; // nothing new — common case, no extra work
                newestMsgId = msgs[msgs.length - 1].id;
                renderMessages(msgs, list, false);
                msgCache[peerId] = [...(msgCache[peerId] || []), ...msgs];
                list.scrollTop = list.scrollHeight;
                apiPost('/api/chat', { action: 'read', user_id: ME.id, peer_id: peerId });
                scheduleConvRefresh();
                const incoming = msgs.filter(m => m.sender_id !== ME.id);
                if (incoming.length) {
                    maybeNotifyIncoming(currentPeerName || '用戶', incoming[incoming.length - 1].content || '');
                }
            }).catch(() => {});
        }

        // Scroll up to load more
        document.getElementById('msg-list').addEventListener('scroll', function() {
            if (this.scrollTop < 60 && !isLoadingMore && currentPeerId) {
                isLoadingMore = true;
                const savedScroll = this.scrollHeight - this.scrollTop;
                loadMessages(false);
                setTimeout(() => {
                    this.scrollTop = this.scrollHeight - savedScroll;
                }, 200);
            }
        });

        // ── Send Message ────────────────────────────────────────────────────
        window.sendMessage = function() {
            const input = document.getElementById('msg-input');
            const text = (input.value || '').trim();
            if (!text || !currentPeerId) return;
            const btn = document.getElementById('btn-send');
            btn.disabled = true;
            input.value = '';
            input.style.height = 'auto';
            apiPost('/api/chat', {
                sender_id: ME.id,
                receiver_id: currentPeerId,
                content: text
            }).then(msg => {
                btn.disabled = false;
                if (msg && msg.id) {
                    const list = document.getElementById('msg-list');
                    const newMsg = { ...msg, sender_id: ME.id };
                    renderMessages([newMsg], list, false);
                    list.scrollTop = list.scrollHeight;
                    newestMsgId = msg.id;
                    scheduleConvRefresh();
                }
            }).catch(() => { btn.disabled = false; });
        };

        window.onMsgKeydown = function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        };

        window.autoGrow = function(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        };

        // ── New Chat Modal ──────────────────────────────────────────────────
        let userSearchTimer = null;
        window.openNewChatModal = function() {
            document.getElementById('new-chat-modal').classList.add('active');
            document.getElementById('user-search-input').value = '';
            document.getElementById('user-search-results').innerHTML =
                '<div style="color:#5a8a5a;font-size:0.85em;text-align:center;">輸入用戶名搜尋或直接開始</div>';
            loadAllUsers();
        };
        window.closeNewChatModal = function() {
            document.getElementById('new-chat-modal').classList.remove('active');
        };

        function loadAllUsers() {
            apiGet(`/api/chat?action=users&user_id=${ME.id}`).then(renderUserResults).catch(() => {});
        }

        // ── Support Mode (客服模式) ──────────────────────────────────────────
        const SUPPORT_AGENT_LABEL = '客服';
        const SUPPORT_NOTICE_TEXT = '客服人數有限 您可以先離開此頁面 我們將會儘快回復您 請耐心等候 您亦可選擇discord內的客服';

        // Current support thread context
        let supportThreadId = null;
        let supportThreadMeta = null;
        let supportThreads = [];
        let isSupportMode = false;
        let isSupportAdminMode = false;
        let supportOldestMsgId = null;
        let supportNewestMsgId = null;
        let supportMsgCache = [];
        let supportPollTimer = null;

        window.isSupportMode = function() { return isSupportMode; };

        function threadLabel(t) {
            const status = t?.status === 'claimed' ? '已認領' : '待認領';
            return `#${t?.id || ''}｜用戶 ${t?.user_id || '-'}｜${status}`;
        }
        function ensureSupportClaimButton() {
            let btn = document.getElementById('support-claim-btn');
            if (btn) return btn;
            const header = document.getElementById('msg-header');
            if (!header) return null;
            btn = document.createElement('button');
            btn.id = 'support-claim-btn';
            btn.className = 'btn-new-chat';
            btn.style.marginLeft = 'auto';
            btn.style.fontSize = '0.78em';
            btn.style.padding = '0.4em 0.65em';
            btn.innerHTML = '<i class="fas fa-hand-paper"></i> Claim';
            btn.onclick = claimCurrentSupportThread;
            header.appendChild(btn);
            return btn;
        }
        function updateSupportComposerState() {
            const input = document.getElementById('msg-input');
            const sendBtn = document.getElementById('btn-send');
            const claimBtn = ensureSupportClaimButton();
            if (!input || !sendBtn) return;

            if (!isSupportMode) {
                input.disabled = false;
                sendBtn.disabled = false;
                input.placeholder = '輸入訊息… (最多 2000 字)';
                if (claimBtn) claimBtn.style.display = 'none';
                return;
            }

            if (!isSupportAdminMode) {
                input.disabled = false;
                sendBtn.disabled = false;
                input.placeholder = '輸入訊息… (最多 2000 字)';
                if (claimBtn) claimBtn.style.display = 'none';
                return;
            }

            const myId = Number(ME.id);
            const claimedBy = Number(supportThreadMeta?.claimed_by_admin_id || 0);
            const canReply = claimedBy && claimedBy === myId;
            input.disabled = !canReply;
            sendBtn.disabled = !canReply;
            if (!claimedBy) input.placeholder = '此對話尚未 Claim，請先 Claim 後回覆';
            else if (!canReply) input.placeholder = '此對話已由其他高級管理員 Claim（唯讀）';
            else input.placeholder = '輸入客服回覆…';
            if (claimBtn) claimBtn.style.display = (!claimedBy || canReply) ? '' : 'none';
        }
        function renderSupportThreadList() {
            const el = document.getElementById('conv-list');
            if (!el) return;
            if (!supportThreads.length) {
                el.innerHTML = '<div style="padding:1em;color:#5a8a5a;font-size:0.85em;text-align:center;">目前沒有客服對話</div>';
                return;
            }
            const myId = Number(ME.id);
            el.innerHTML = supportThreads.map((t) => {
                const claimedBy = Number(t.claimed_by_admin_id || 0);
                const mine = claimedBy && claimedBy === myId;
                const locked = claimedBy && claimedBy !== myId;
                const stateText = mine ? '你已 Claim' : (locked ? `已由 #${claimedBy} Claim` : '待 Claim');
                return `
                    <div class="conv-item${Number(supportThreadId) === Number(t.id) ? ' active' : ''}" onclick="openSupportThreadAsAdmin(${t.id})">
                        <div class="conv-avatar"><i class="fas fa-headset"></i></div>
                        <div class="conv-info">
                            <div class="conv-name">客服對話 #${t.id}</div>
                            <div class="conv-last">${stateText}｜用戶 ${t.user_id}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        async function loadSupportThreads({ focusThreadId } = {}) {
            if (!IS_SENIOR_ADMIN) return;
            try {
                const payload = await apiGet(`/api/chat?action=support_threads&user_id=${ME.id}`);
                supportThreads = Array.isArray(payload?.threads) ? payload.threads : [];
                renderSupportThreadList();

                const activeExists = supportThreads.some((t) => Number(t.id) === Number(supportThreadId));
                const targetId = focusThreadId || SUPPORT_QUERY_THREAD_ID || (!activeExists ? supportThreads[0]?.id : null);
                if (targetId && Number(targetId) !== Number(supportThreadId)) {
                    const targetMeta = supportThreads.find((t) => Number(t.id) === Number(targetId)) || null;
                    openSupportThread(targetId, { adminMode: true, threadMeta: targetMeta });
                } else if (activeExists) {
                    const freshMeta = supportThreads.find((t) => Number(t.id) === Number(supportThreadId)) || null;
                    supportThreadMeta = freshMeta;
                    if (isSupportMode) {
                        document.getElementById('msg-header-name').textContent = threadLabel(freshMeta || { id: supportThreadId });
                        updateSupportComposerState();
                    }
                } else {
                    setMsgEmpty('目前沒有客服對話');
                }
            } catch (e) {
                const listEl = document.getElementById('conv-list');
                if (listEl) {
                    listEl.innerHTML = `<div style="padding:1em;color:#b04f4f;font-size:0.85em;text-align:center;">載入客服對話失敗：${escHtml(e.message || '未知錯誤')}</div>`;
                }
                setMsgEmpty(e.message || '載入客服對話失敗');
            }
        }
        window.openSupportThreadAsAdmin = function(threadId) {
            const meta = supportThreads.find((t) => Number(t.id) === Number(threadId)) || null;
            openSupportThread(threadId, { adminMode: true, threadMeta: meta });
        };
        async function claimCurrentSupportThread() {
            if (!isSupportAdminMode || !supportThreadId) return;
            try {
                const data = await apiPost('/api/chat', {
                    action: 'support_claim',
                    user_id: ME.id,
                    thread_id: supportThreadId
                });
                supportThreadMeta = Object.assign({}, supportThreadMeta || {}, {
                    claimed_by_admin_id: data?.claimed_by_admin_id || ME.id,
                    status: 'claimed'
                });
                updateSupportComposerState();
                await loadSupportThreads({ focusThreadId: supportThreadId });
            } catch (e) {
                alert(e.message || 'Claim 失敗');
                await loadSupportThreads({ focusThreadId: supportThreadId });
            }
        }

        function setMsgEmpty(text) {
            const el = document.getElementById('msg-empty-text');
            if (el) el.textContent = text;
        }

        function renderSupportMessages(messages, container, { reset = false } = {}) {
            if (!Array.isArray(messages)) return;
            if (reset) container.innerHTML = '';
            const frag = document.createDocumentFragment();
            messages.forEach(m => {
                const mine = String(m.sender_id) === String(ME.id);
                const wrap = document.createElement('div');
                wrap.className = 'msg-bubble-wrap' + (mine ? ' mine' : '');
                wrap.dataset.msgId = m.id;
                wrap.innerHTML = `
                    <div class="bubble-avatar">${avatarHtml(m.sender_avatar || '', 28)}</div>
                    <div class="msg-inner">
                        <div class="msg-bubble ${mine ? 'mine' : 'theirs'}">${escHtml(m.content)}</div>
                        <div class="msg-time">${timeStr(m.created_at)}</div>
                    </div>
                `;
                frag.appendChild(wrap);
            });
            container.appendChild(frag);
        }
        function renderClientSupportNotice(container) {
            if (!container) return;
            const wrap = document.createElement('div');
            wrap.className = 'msg-bubble-wrap';
            wrap.innerHTML = `
                <div class="bubble-avatar"><i class="fas fa-headset"></i></div>
                <div class="msg-inner">
                    <div class="msg-bubble theirs">${escHtml(SUPPORT_NOTICE_TEXT)}</div>
                    <div class="msg-time">${timeStr(new Date().toISOString())}</div>
                </div>
            `;
            container.appendChild(wrap);
        }

        async function startSupportThread() {
            setMsgEmpty(SUPPORT_NOTICE_TEXT);
            if (IS_SENIOR_ADMIN) {
                window.location.href = '/chat?support=1';
                return;
            }
            // Reuse latest support thread if exists, otherwise create new
            try {
                const existing = await apiGet(`/api/chat?action=support_threads&user_id=${ME.id}`);
                const threads = Array.isArray(existing?.threads) ? existing.threads : [];
                if (threads.length) {
                    openSupportThread(threads[0].id);
                    return;
                }
                const data = await apiPost('/api/chat', {
                    action: 'start_support_thread',
                    user_id: ME.id,
                });
                if (!data || !data.thread_id) {
                    alert(data?.message || '無法啟動客服模式');
                    return;
                }
                openSupportThread(data.thread_id);
            } catch (e) {
                alert(e.message || '啟動客服失敗');
            }
        }

        window.startSupportThread = startSupportThread;

        function openSupportThread(threadId, { adminMode = false, threadMeta = null } = {}) {
            supportThreadId = parseInt(threadId, 10);
            supportThreadMeta = threadMeta;
            isSupportMode = true;
            isSupportAdminMode = !!adminMode;

            currentPeerId = null;
            currentPeerName = '';
            currentPeerAvatar = '';
            oldestMsgId = null;
            newestMsgId = null;

            supportOldestMsgId = null;
            supportNewestMsgId = null;
            supportMsgCache = [];

            // UI: hide conversation list, show header/list/input
            document.getElementById('msg-empty').style.display = 'none';
            document.getElementById('msg-header').style.display = 'flex';
            document.getElementById('msg-list').style.display = 'flex';
            document.getElementById('msg-input-bar').style.display = 'flex';

            // Set header to客服 / 客服 thread
            document.getElementById('msg-header-name').textContent = isSupportAdminMode
                ? threadLabel(supportThreadMeta || { id: supportThreadId })
                : SUPPORT_AGENT_LABEL;
            document.getElementById('msg-header-avatar').innerHTML = '<i class="fas fa-headset"></i>';
            updateSupportComposerState();

            // disable normal conversations list interactions
            if (isMobile()) closeConvPanel();

            // Start polling support messages
            loadSupportMessages({ reset: true });
            if (supportPollTimer) clearInterval(supportPollTimer);
            supportPollTimer = setInterval(() => {
                loadSupportMessages({ reset: false });
            }, 2000);

            // Also stop normal polling
            if (pollTimer) clearInterval(pollTimer);
        }

        async function loadSupportMessages({ reset } = {}) {
            if (!supportThreadId) return;
            const params = new URLSearchParams({
                action: 'support_messages',
                user_id: ME.id,
                thread_id: supportThreadId,
                limit: '40'
            });
            if (!reset && supportNewestMsgId) params.set('after', supportNewestMsgId);
            // reset path uses initial fetch
            try {
                const payload = await apiGet(`/api/chat?${params}`);
                const messages = Array.isArray(payload) ? payload : (payload?.messages || []);
                if (!Array.isArray(messages)) return;

                const list = document.getElementById('msg-list');
                if (reset) {
                    supportMsgCache = messages;
                    list.innerHTML = '';
                    renderSupportMessages(messages, list, { reset: true });
                    if (!messages.length && !isSupportAdminMode) renderClientSupportNotice(list);
                    supportOldestMsgId = messages.length ? messages[0].id : null;
                    supportNewestMsgId = messages.length ? messages[messages.length - 1].id : null;
                    list.scrollTop = list.scrollHeight;
                    if (isSupportAdminMode) {
                        const freshMeta = supportThreads.find((t) => Number(t.id) === Number(supportThreadId));
                        if (freshMeta) {
                            supportThreadMeta = freshMeta;
                            document.getElementById('msg-header-name').textContent = threadLabel(freshMeta);
                            updateSupportComposerState();
                        }
                    }
                } else {
                    if (!messages.length) return;
                    supportMsgCache = [...supportMsgCache, ...messages];
                    renderSupportMessages(messages, list, { reset: false });
                    supportNewestMsgId = messages[messages.length - 1].id;
                    list.scrollTop = list.scrollHeight;
                }
            } catch (e) {}
        }

        // Override sendMessage in support mode
        const _origSendMessage = window.sendMessage;
        window.sendMessage = function() {
            if (!isSupportMode) return _origSendMessage();
            const input = document.getElementById('msg-input');
            const text = (input.value || '').trim();
            if (!text || !supportThreadId) return;
            const btn = document.getElementById('btn-send');
            btn.disabled = true;
            input.value = '';
            input.style.height = 'auto';
            apiPost('/api/chat', {
                action: 'support_send',
                thread_id: supportThreadId,
                user_id: ME.id,
                content: text,
            }).then(msg => {
                btn.disabled = false;
                // optimistic render
                if (msg && msg.id) {
                    document.getElementById('msg-list').innerHTML = document.getElementById('msg-list').innerHTML; // noop
                    loadSupportMessages({ reset: true });
                    if (isSupportAdminMode) loadSupportThreads({ focusThreadId: supportThreadId });
                }
            }).catch((err) => {
                btn.disabled = false;
                alert(err.message || '發送客服訊息失敗');
            });
        };


        window.searchUsers = function(q) {
            clearTimeout(userSearchTimer);
            userSearchTimer = setTimeout(() => {
                const url = `/api/chat?action=users&user_id=${ME.id}${q ? '&q=' + encodeURIComponent(q) : ''}`;
                apiGet(url).then(renderUserResults).catch(() => {});
            }, 300);
        };

        function renderUserResults(users) {
            const el = document.getElementById('user-search-results');
            if (!users || !users.length) {
                el.innerHTML = '<div style="color:#5a8a5a;font-size:0.85em;text-align:center;">未找到用戶</div>';
                return;
            }
            el.innerHTML = users.map(u => `
                <div class="modal-user-item" onclick="startChatWith(${u.id}, ${JSON.stringify(u.username || u.full_name || '用戶').replace(/"/g, '&quot;')}, ${JSON.stringify(u.avatar_url || '').replace(/"/g, '&quot;')})">
                    <div class="modal-user-avatar">${avatarHtml(u.avatar_url, 36)}</div>
                    <span class="modal-user-name">${escHtml(u.username || u.full_name || '用戶')}</span>
                </div>
            `).join('');
        }

        window.startChatWith = function(peerId, peerName, peerAvatar) {
            closeNewChatModal();
            closeFriendModal();
            openConversation(peerId, peerName, peerAvatar);
        };

        // ── Friend System ──
        window.openFriendModal = function() {
            document.getElementById('friend-modal').classList.add('active');
            loadFriendsData();
        };
        window.closeFriendModal = function() {
            document.getElementById('friend-modal').classList.remove('active');
        };

        async function loadFriendsData() {
            const reqsList = document.getElementById('friend-requests-list');
            const friendsList = document.getElementById('friends-list');
            if (!reqsList || !friendsList) return;
            reqsList.innerHTML = '<div style="text-align:center;font-size:0.8em;opacity:0.6;">載入中...</div>';
            friendsList.innerHTML = '<div style="text-align:center;font-size:0.8em;opacity:0.6;">載入中...</div>';

            try {
                console.log('[Chat] Loading friends for user:', ME.id);
                const [friends, requests] = await Promise.all([
                    apiGet(`/api/user?action=friends&user_id=${ME.id}`),
                    apiGet(`/api/user?action=friend_requests&user_id=${ME.id}`)
                ]);
                console.log('[Chat] Friends loaded:', friends);
                console.log('[Chat] Requests loaded:', requests);

                // Render requests
                if (requests && requests.length) {
                    reqsList.innerHTML = requests.map(r => `
                        <div class="modal-user-item" style="justify-content: space-between;">
                            <div style="display:flex; align-items:center; gap:8px;">
                                <div class="modal-user-avatar">${avatarHtml(r.avatar_url, 32)}</div>
                                <span class="modal-user-name">${escHtml(r.username || r.full_name)}</span>
                            </div>
                            <button class="btn-new-chat" style="padding: 2px 8px;" onclick="acceptFriend(${r.id})">接受</button>
                        </div>
                    `).join('');
                } else {
                    reqsList.innerHTML = '<div style="text-align:center;font-size:0.8em;opacity:0.5;padding:0.5em;">暫無請求</div>';
                }

                // Render friends
                if (friends && friends.length) {
                    friendsList.innerHTML = friends.map(f => `
                        <div class="modal-user-item" style="flex-direction:column; align-items:flex-start; padding: 10px; border-bottom: 1px solid #1a2d1a;">
                            <div style="display:flex; align-items:center; gap:8px; width:100%;">
                                <div class="modal-user-avatar" style="cursor:pointer;" onclick="window.location.href='/profile_view.html?id=${f.id}'">${avatarHtml(f.avatar_url, 36)}</div>
                                <div style="flex:1; cursor:pointer;" onclick="window.location.href='/profile_view.html?id=${f.id}'">
                                    <div class="modal-user-name">${escHtml(f.username || f.full_name)}</div>
                                    <div style="font-size:0.7em; color:#a8d8a0;">Lv.${Number(f.level || 1)} ${escHtml(f.mileage_rank || 'bronze')}｜${Number(f.mileage_km_365 || 0).toFixed(1)} km</div>
                                </div>
                                <i class="fas fa-comment-alt" style="opacity:0.6; cursor:pointer;" onclick="startChatWith(${f.id}, ${JSON.stringify(f.username || f.full_name).replace(/"/g, '&quot;')}, ${JSON.stringify(f.avatar_url || '').replace(/"/g, '&quot;')})"></i>
                            </div>
                        </div>
                    `).join('');
                } else {
                    friendsList.innerHTML = '<div style="text-align:center;font-size:0.8em;opacity:0.5;padding:1em;">暫無好友</div>';
                }

            } catch (e) {
                console.error('Load friends error:', e);
                reqsList.innerHTML = '<div style="text-align:center;font-size:0.8em;color:#b04f4f;padding:0.5em;">載入失敗</div>';
                friendsList.innerHTML = '<div style="text-align:center;font-size:0.8em;color:#b04f4f;padding:1em;">載入失敗</div>';
            }
        }

        window.acceptFriend = async function(friendId) {
            try {
                await apiPost('/api/user', { action: 'accept_friend', user_id: ME.id, friend_id: friendId });
                loadFriendsData();
                loadConversations();
            } catch (e) {
                alert('接受好友失敗');
            }
        };

        window.addFriend = async function(friendId) {
            try {
                await apiPost('/api/user', { action: 'add_friend', user_id: ME.id, friend_id: friendId });
                alert('好友請求已發送');
            } catch (e) {
                alert('發送請求失敗: ' + e.message);
            }
        };

        // Update search results to include "Add Friend" button
        function renderUserResults(users) {
            const el = document.getElementById('user-search-results');
            if (!users || !users.length) {
                el.innerHTML = '<div style="color:#5a8a5a;font-size:0.85em;text-align:center;">未找到用戶</div>';
                return;
            }
            el.innerHTML = users.map(u => `
                <div class="modal-user-item" style="justify-content: space-between;">
                    <div style="display:flex; align-items:center; gap:8px;" onclick="startChatWith(${u.id}, ${JSON.stringify(u.username || u.full_name || '用戶').replace(/"/g, '&quot;')}, ${JSON.stringify(u.avatar_url || '').replace(/"/g, '&quot;')})">
                        <div class="modal-user-avatar">${avatarHtml(u.avatar_url, 36)}</div>
                        <span class="modal-user-name">${escHtml(u.username || u.full_name || '用戶')}</span>
                    </div>
                    <button class="btn-new-chat" style="padding: 2px 8px; background: transparent; border: 1px solid #6dba65; color: #6dba65;" onclick="addFriend(${u.id})">
                        <i class="fas fa-user-plus"></i>
                    </button>
                </div>
            `).join('');
        }
        window.startChatByUsername = function() {
            const input = document.getElementById('user-search-input');
            const target = (input?.value || '').trim();
            if (!/^[A-Za-z0-9_]{4,16}$/.test(target)) {
                alert('請輸入 4-16 位有效用戶名');
                return;
            }
            apiGet(`/api/chat?action=start_chat&user_id=${ME.id}&target=${encodeURIComponent(target)}`).then((u) => {
                if (!u || !u.id) {
                    alert('找不到該用戶名');
                    return;
                }
                startChatWith(u.id, u.username || u.full_name || '用戶', u.avatar_url || '');
            }).catch(() => alert('找不到該用戶名'));
        };

        // Close modal on overlay click
        document.getElementById('new-chat-modal').addEventListener('click', function(e) {
            if (e.target === this) closeNewChatModal();
        });

        // ── XSS helper ─────────────────────────────────────────────────────
        function escHtml(s) {
            return String(s || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }
        function escAttr(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
        function avatarHtml(url, size) {
            const sz = size || 40;
            if (url) return `<img src="${escAttr(url)}" alt="頭像" style="width:${sz}px;height:${sz}px;object-fit:cover;border-radius:50%;" onerror="this.parentElement.innerHTML='<i class=\\'fas fa-user\\'></i>'">`;
            return '<i class="fas fa-user"></i>';
        }

        // ── Init ───────────────────────────────────────────────────────────
        (async function initChat() {
            // Request notification permission proactively for incoming message alerts
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission().catch(() => {});
            }
            const supportBtn = document.getElementById('support-entry-btn');
            if (IS_SENIOR_ADMIN && supportBtn) {
                supportBtn.style.display = 'none';
            }
            try {
                const ok = await ensureChatUsername();
                if (!ok) { window.location.replace('/dashboard'); return; }
            } catch (e) {
                alert(e.message || '請先設定用戶名');
                window.location.replace('/dashboard');
                return;
            }
            if (IS_SENIOR_ADMIN && SUPPORT_QUERY_MODE) {
                isSupportAdminMode = true;
                setMsgEmpty('載入客服對話中…');
                await loadSupportThreads({ focusThreadId: SUPPORT_QUERY_THREAD_ID || null });
            } else {
                loadConversations();
            }
            // Single conversation-list refresh timer (also handles unread badge updates)
            convRefreshTimer = setInterval(loadConversations, 6000);
            // On mobile, open the conversation panel on first load so users can see their conversations
            if (isMobile()) openConvPanel();
        })();
    })();
    </script>
</body>
</html>
