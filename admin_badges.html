<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>徽章與挑戰管理 - CTRCHK Admin</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body { background: var(--app-bg-primary, #0d1a12); color: var(--app-text-primary, #e8f5e9); }
        .admin-container { max-width: 1000px; margin: 2em auto; padding: 20px; }
        .card { background: var(--app-bg-card, #1e3820); border-radius: 16px; padding: 24px; margin-bottom: 24px; border: 1px solid var(--app-border, #2d4d2d); }
        h2 { color: var(--app-accent, #BFE340); margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 0.9em; color: var(--app-text-secondary, rgba(255,255,255,0.8)); margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--app-border, #2d4d2d); background: var(--app-bg-card2, #121f14); color: var(--app-text-primary, #fff); }
        .btn-primary { background: var(--app-accent, #BFE340); color: #121f14; border: none; padding: 14px 28px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; }

        .badge-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .badge-card { background: #121f14; border-radius: 12px; overflow: hidden; border: 1px solid #2d4d2d; }
        model-viewer { width: 100%; height: 200px; background: radial-gradient(#1e3820, #0d1a12); }
        .badge-info { padding: 15px; }
        .badge-tier { font-size: 0.7em; background: #BFE340; color: #000; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="admin-container">
        <a href="/admin" style="color: #a8d8a0; text-decoration: none; display: inline-block; margin-bottom: 20px;"><i class="fas fa-arrow-left"></i> 返回管理後台</a>

        <div class="card">
            <h2 id="badge-form-title"><i class="fas fa-medal"></i> 新增 3D 徽章</h2>
            <form id="badge-form">
                <input type="hidden" id="badge-id">
                <div class="badge-grid" style="grid-template-columns: 1fr 1fr;">
                    <div class="form-group">
                        <label>徽章名稱</label>
                        <input type="text" id="badge-name" required placeholder="例如：全港挑戰 100km 宗師">
                    </div>
                    <div class="form-group">
                        <label>對應級別 (Tier)</label>
                        <select id="badge-tier">
                            <option value="custom">普通徽章</option>
                            <option value="hk_30k">HK Challenge 30km</option>
                            <option value="hk_60k">HK Challenge 60km</option>
                            <option value="hk_100k">HK Challenge 100km</option>
                            <option value="accumulated_50km">累積騎行 50km</option>
                            <option value="experience_5km">體驗者 (單次 5km)</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea id="badge-desc" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label>GLB 模型 (從 /model/glb 選擇)</label>
                    <select id="badge-glb">
                        <option value="">請選擇 GLB 檔案</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>USDZ 模型 (從 /model/usdz 選擇)</label>
                    <select id="badge-usdz">
                        <option value="">請選擇 USDZ 檔案</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">儲存徽章</button>
            </form>
        </div>

        <div class="card">
            <h2><i class="fas fa-list"></i> 現有徽章庫</h2>
            <div id="badge-list" class="badge-grid">
                <!-- Badges here -->
            </div>
        </div>

        <div class="card">
            <h2><i class="fas fa-map-marker-alt"></i> 挑戰賽車站管理</h2>
            <div style="margin-bottom: 20px; overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; font-size: 0.9em;">
                    <thead>
                        <tr style="border-bottom: 1px solid #2d4d2d;">
                            <th style="padding: 10px; text-align: left;">ID</th>
                            <th style="padding: 10px; text-align: left;">站名</th>
                            <th style="padding: 10px; text-align: left;">道路</th>
                            <th style="padding: 10px; text-align: left;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="challenge-station-list"></tbody>
                </table>
            </div>
            <form id="challenge-station-form" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                <input type="text" id="st-id" placeholder="車站 ID (如 CH01)" required>
                <input type="text" id="st-name-zh" placeholder="中文站名" required>
                <input type="text" id="st-road" placeholder="道路名稱">
                <input type="number" id="st-lat" step="0.000001" placeholder="緯度" required>
                <input type="number" id="st-lon" step="0.000001" placeholder="經度" required>
                <label style="display: flex; align-items: center; gap: 5px; font-size: 0.8em;">
                    <input type="checkbox" id="st-terminal"> 設為總站
                </label>
                <button type="submit" class="btn-primary" style="grid-column: span 3; padding: 10px;">儲存車站</button>
            </form>
        </div>

        <div class="card">
            <h2><i class="fas fa-trophy"></i> 全港挑戰路線管理</h2>
            <div id="challenge-list" style="margin-bottom:20px;">
                <!-- Challenges -->
            </div>
            <form id="challenge-form" style="border-top:1px solid #2d4d2d; padding-top:20px;">
                <input type="hidden" id="ch-id">
                <div class="badge-grid" style="grid-template-columns: 1fr 1fr 1fr;">
                    <div class="form-group">
                        <label>Tier</label>
                        <select id="ch-tier">
                            <option value="hk_30k">30km</option>
                            <option value="hk_60k">60km</option>
                            <option value="hk_100k">100km</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>路線 ID (如 999)</label>
                        <input type="text" id="ch-route-id" required>
                    </div>
                    <div class="form-group">
                        <label>挑戰名稱</label>
                        <input type="text" id="ch-name" required>
                    </div>
                </div>
                <div class="badge-grid" style="grid-template-columns: 1fr 1fr 1fr;">
                    <div class="form-group">
                        <label>XP 獎勵</label>
                        <input type="number" id="ch-xp" value="4000">
                    </div>
                    <div class="form-group">
                        <label>里程幣獎勵</label>
                        <input type="number" id="ch-coins" value="250">
                    </div>
                    <div class="form-group">
                        <label>連結徽章 ID</label>
                        <input type="number" id="ch-badge-id">
                    </div>
                </div>
                <div class="badge-grid" style="grid-template-columns: 1fr 1fr;">
                    <div class="form-group">
                        <label>路線別稱</label>
                        <input type="text" id="ch-alias" placeholder="例：環全港極限挑戰">
                    </div>
                    <div class="form-group">
                        <label>路線顏色 (#HEX)</label>
                        <input type="text" id="ch-color" placeholder="#FFD700">
                    </div>
                </div>
                <div class="form-group">
                    <label>起點 / 終點站 (從下方挑戰車站選擇)</label>
                    <div style="display:flex; gap:10px;">
                        <select id="ch-start-select">
                            <option value="">請選擇起點</option>
                        </select>
                        <select id="ch-end-select">
                            <option value="">請選擇終點</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>路線站點設計 (點擊「加入」上方車站)</label>
                    <div id="ch-stops-builder" style="display:flex; flex-direction:column; gap:5px; background:rgba(0,0,0,0.2); padding:10px; border-radius:8px; margin-bottom:10px;">
                        <!-- Stops builder list -->
                    </div>
                    <textarea id="ch-stops" rows="4" style="display:none;" placeholder='[]'></textarea>
                </div>
                <div class="form-group">
                    <label>GPX 檔案 (從 /gpx 選擇)</label>
                    <select id="ch-gpx-select">
                        <option value="">請選擇 GPX</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">儲存挑戰及路線設定</button>
            </form>
        </div>
    </div>

    <script>
        async function loadModelFiles() {
            const res = await fetch('/api/admin?action=get-model-files', {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('accessToken')}` }
            });
            const data = await res.json();

            const glbSelect = document.getElementById('badge-glb');
            glbSelect.innerHTML = '<option value="">請選擇 GLB 檔案</option>' + data.glb.map(f => `<option value="/model/glb/${f}">${f}</option>`).join('');

            const usdzSelect = document.getElementById('badge-usdz');
            usdzSelect.innerHTML = '<option value="">請選擇 USDZ 檔案</option>' + data.usdz.map(f => `<option value="/model/usdz/${f}">${f}</option>`).join('');

            const gpxSelect = document.getElementById('ch-gpx-select');
            gpxSelect.innerHTML = '<option value="">請選擇 GPX</option>' + data.gpx.map(f => `<option value="${f}">${f}</option>`).join('');
        }

        let ALL_CHALLENGE_STATIONS = [];
        async function loadChallengeStations() {
            const res = await fetch('/api/admin?action=get-challenge-stations', {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('accessToken')}` }
            });
            ALL_CHALLENGE_STATIONS = await res.json();

            const list = document.getElementById('challenge-station-list');
            list.innerHTML = ALL_CHALLENGE_STATIONS.map(s => `
                <tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                    <td style="padding: 8px;">${s.id}</td>
                    <td style="padding: 8px;">${s.name_zh}</td>
                    <td style="padding: 8px;">${s.road_name || '-'}</td>
                    <td style="padding: 8px; display:flex; gap:5px;">
                        <button onclick="editStation(${JSON.stringify(s).replace(/"/g, '&quot;')})" class="btn-primary" style="padding: 4px 8px; width: auto; font-size: 0.8em;">編輯</button>
                        <button onclick="addStopToBuilder('${s.id}', '${s.name_zh}')" class="btn-primary" style="padding: 4px 8px; width: auto; font-size: 0.8em; background:#3498db; color:white;">加入路線</button>
                        <button onclick="deleteStation('${s.id}')" class="btn-primary" style="padding: 4px 8px; width: auto; font-size: 0.8em; background:#e74c3c; border:none; color:white;"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');

            // Update Start/End dropdowns
            const startSel = document.getElementById('ch-start-select');
            const endSel = document.getElementById('ch-end-select');
            const options = '<option value="">請選擇車站</option>' + ALL_CHALLENGE_STATIONS.map(s => `<option value="${s.id}">${s.id} ${s.name_zh}</option>`).join('');
            startSel.innerHTML = options;
            endSel.innerHTML = options;
        }

        let currentStops = [];
        function addStopToBuilder(id, name) {
            currentStops.push({ station_id: id, name: name, nature: 'both' });
            renderStopsBuilder();
        }

        function renderStopsBuilder() {
            const container = document.getElementById('ch-stops-builder');
            container.innerHTML = currentStops.map((s, idx) => `
                <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.1); padding:5px 10px; border-radius:5px;">
                    <span style="font-size:0.85em;">${idx+1}. ${s.station_id} ${s.name}</span>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <select onchange="updateStopNature(${idx}, this.value)" style="padding:2px; font-size:0.8em; width:auto; background:#121f14;">
                            <option value="both" ${s.nature==='both'?'selected':''}>普通</option>
                            <option value="start" ${s.nature==='start'?'selected':''}>起點</option>
                            <option value="end" ${s.nature==='end'?'selected':''}>終點</option>
                        </select>
                        <button onclick="removeStop(${idx})" style="background:none; border:none; color:#e74c3c; cursor:pointer;"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
            document.getElementById('ch-stops').value = JSON.stringify(currentStops);
        }

        window.updateStopNature = (idx, val) => { currentStops[idx].nature = val; renderStopsBuilder(); };
        window.removeStop = (idx) => { currentStops.splice(idx, 1); renderStopsBuilder(); };

        window.deleteStation = async (id) => {
            if (!confirm(`確定刪除車站 ${id}？`)) return;
            const res = await fetch('/api/admin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('accessToken')}` },
                body: JSON.stringify({ action: 'delete-challenge-station', id })
            });
            if (res.ok) { loadChallengeStations(); }
        };

        window.editStation = (s) => {
            document.getElementById('st-id').value = s.id;
            document.getElementById('st-name-zh').value = s.name_zh;
            document.getElementById('st-road').value = s.road || '';
            document.getElementById('st-lat').value = s.lat;
            document.getElementById('st-lon').value = s.lon;
            document.getElementById('st-terminal').checked = !!s.is_terminal;
        };

        document.getElementById('challenge-station-form').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                action: 'upsert-challenge-station',
                id: document.getElementById('st-id').value,
                name_zh: document.getElementById('st-name-zh').value,
                name_en: '', // Optional for now
                road_name: document.getElementById('st-road').value,
                lat: parseFloat(document.getElementById('st-lat').value),
                lon: parseFloat(document.getElementById('st-lon').value),
                is_terminal: document.getElementById('st-terminal').checked ? 1 : 0
            };
            const res = await fetch('/api/admin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('accessToken')}` },
                body: JSON.stringify(data)
            });
            if (res.ok) { alert('車站已儲存'); loadChallengeStations(); e.target.reset(); }
        };

        async function loadBadges() {
            const res = await fetch('/api/admin?action=badges', {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('accessToken')}` }
            });
            const badges = await res.json();
            const list = document.getElementById('badge-list');
            list.innerHTML = badges.map(b => `
                <div class="badge-card">
                    <model-viewer src="${b.model_url_glb}" ios-src="${b.model_url_usdz}" alt="${b.name}" auto-rotate camera-controls shadow-intensity="1"></model-viewer>
                    <div class="badge-info">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                            <span style="font-weight:bold;">ID: ${b.id} | ${b.name}</span>
                            <span class="badge-tier">${b.tier}</span>
                        </div>
                        <p style="font-size:0.8em; opacity:0.6; margin-bottom:10px;">${b.description || '無描述'}</p>
                        <button onclick="editBadge(${JSON.stringify(b).replace(/"/g, '&quot;')})" class="btn-primary" style="padding: 8px; font-size: 0.8em;">編輯徽章</button>
                    </div>
                </div>
            `).join('');
        }

        window.editBadge = (b) => {
            document.getElementById('badge-form-title').innerHTML = `<i class="fas fa-edit"></i> 編輯 3D 徽章 (ID: ${b.id})`;
            document.getElementById('badge-id').value = b.id;
            document.getElementById('badge-name').value = b.name;
            document.getElementById('badge-tier').value = b.tier;
            document.getElementById('badge-desc').value = b.description || '';
            document.getElementById('badge-glb').value = b.model_url_glb || '';
            document.getElementById('badge-usdz').value = b.model_url_usdz || '';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        async function loadChallenges() {
            const res = await fetch('/api/admin?action=get-hk-challenges');
            const challenges = await res.json();
            const list = document.getElementById('challenge-list');
            list.innerHTML = challenges.map(c => `
                <div style="padding:15px; background:rgba(0,0,0,0.2); border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <strong>[${c.tier}] ${c.name}</strong> (Route: ${c.route_id})
                        <div style="font-size:0.8em; opacity:0.7;">XP: ${c.xp_reward} | Coins: ${c.coin_reward} | Badge ID: ${c.badge_id || 'None'}</div>
                    </div>
                    <button onclick="editChallenge(${JSON.stringify(c).replace(/"/g, '&quot;')})" style="background:none; border:none; color:#BFE340; cursor:pointer;"><i class="fas fa-edit"></i></button>
                </div>
            `).join('');
        }

        window.editChallenge = async (c) => {
            document.getElementById('ch-id').value = c.id;
            document.getElementById('ch-tier').value = c.tier;
            document.getElementById('ch-route-id').value = c.route_id;
            document.getElementById('ch-name').value = c.name;
            document.getElementById('ch-xp').value = c.xp_reward;
            document.getElementById('ch-coins').value = c.coin_reward;
            document.getElementById('ch-badge-id').value = c.badge_id || '';

            try {
                const res = await fetch('/api/admin?action=get-managed-routes', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('accessToken')}` }
                });
                const data = await res.json();
                const route = data.routes.find(r => r.route_number === c.route_id && r.dept === 'challenge');
                if (route) {
                    document.getElementById('ch-alias').value = route.alias || '';
                    document.getElementById('ch-color').value = route.bg_color || '';
                    document.getElementById('ch-start-select').value = route.start_station_id || '';
                    document.getElementById('ch-end-select').value = route.end_station_id || '';
                    currentStops = route.stops || [];
                    renderStopsBuilder();
                    const gpxFile = route.gpx && route.gpx[0] ? route.gpx[0].file : '';
                    document.getElementById('ch-gpx-select').value = gpxFile;
                }
            } catch(e) {}
        };

        document.getElementById('challenge-form').onsubmit = async (e) => {
            e.preventDefault();
            const gpxFile = document.getElementById('ch-gpx-select').value;
            const gpxJson = gpxFile ? JSON.stringify([{ label: "挑戰路線", file: gpxFile }]) : "[]";

            const data = {
                action: 'upsert-hk-challenge',
                id: document.getElementById('ch-id').value,
                tier: document.getElementById('ch-tier').value,
                route_id: document.getElementById('ch-route-id').value,
                name: document.getElementById('ch-name').value,
                xp_reward: document.getElementById('ch-xp').value,
                coin_reward: document.getElementById('ch-coins').value,
                badge_id: document.getElementById('ch-badge-id').value,
                alias: document.getElementById('ch-alias').value,
                bg_color: document.getElementById('ch-color').value,
                start_station_id: document.getElementById('ch-start-select').value,
                end_station_id: document.getElementById('ch-end-select').value,
                stops: document.getElementById('ch-stops').value,
                gpx: gpxJson
            };
            const res = await fetch('/api/admin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(data)
            });
            if (res.ok) { alert('挑戰及路線已儲存'); loadChallenges(); }
            else { alert('儲存失敗'); }
        };

        document.getElementById('badge-form').onsubmit = async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('accessToken');
            const id = document.getElementById('badge-id').value;
            const data = {
                action: id ? 'update-badge' : 'create-badge',
                id: id,
                name: document.getElementById('badge-name').value,
                tier: document.getElementById('badge-tier').value,
                description: document.getElementById('badge-desc').value,
                model_url_glb: document.getElementById('badge-glb').value,
                model_url_usdz: document.getElementById('badge-usdz').value
            };
            const res = await fetch('/api/admin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(data)
            });
            if (res.ok) {
                alert(id ? '徽章已更新' : '徽章已新增');
                document.getElementById('badge-id').value = '';
                document.getElementById('badge-form-title').innerHTML = `<i class="fas fa-medal"></i> 新增 3D 徽章`;
                e.target.reset();
                loadBadges();
            }
            else { alert('儲存失敗'); }
        };

        loadModelFiles();
        loadBadges();
        loadChallenges();
        loadChallengeStations();
    </script>
</body>
</html>
