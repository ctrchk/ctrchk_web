        /* ── App Route Detail Theme ─────────────────────────────── */
        body {
            background: var(--app-bg-primary, #121f14);
            color: var(--app-text-primary, #e8f5e9);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', sans-serif;
        }
        main { padding: 0; }
        footer {
            background: var(--app-bg-primary, #121f14);
            color: var(--app-text-secondary, #a8d8a0);
            border-top: 1px solid #2d4d2d;
        }
        .route-hero {
            padding: calc(env(safe-area-inset-top) + 2em) 1.5em 2em;
            text-align: center;
        }
        .route-hero-title {
            font-size: 2em;
            margin-bottom: 0.5em;
            color: var(--app-text-primary, #e8f5e9);
        }
        .route-id-text {
            font-size: 1.1em;
            margin: 0;
            font-weight: bold;
            color: var(--app-text-secondary, #a8d8a0);
        }
        .route-detail-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5em;
            align-items: flex-start;
            max-width: 1000px;
            margin: 1.5em auto;
            padding: 0 1.2em;
        }
        .route-image-container {
            flex: 1;
            min-width: 280px;
            position: relative;
        }
        .route-detail-image {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }
        .gpx-download-button {
            display: block;
            width: 100%;
            text-align: center;
            background-color: var(--app-bg-card, #1e3820);
            color: var(--app-text-primary, #e8f5e9);
            border: 1px solid #2d4d2d;
            padding: 0.9em;
            border-radius: 10px;
            margin-top: 0.8em;
            transition: background-color 0.2s;
            font-weight: 600;
        }
        .gpx-download-button:hover {
            background-color: var(--app-accent, #6dba65);
            color: #121f14;
            border-color: transparent;
        }
        .route-detail-info {
            flex: 2;
            min-width: 280px;
        }
        .route-description {
            font-size: 1em;
            line-height: 1.7;
            margin-bottom: 1.5em;
            color: var(--app-text-primary, #e8f5e9);
        }
        .route-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 0.8em;
            margin-bottom: 1.5em;
            background-color: var(--app-bg-card, #1e3820);
            padding: 1.2em;
            border-radius: 12px;
            border: 1px solid #2d4d2d;
        }
        .route-stats div {
            padding: 0.5em;
            border-bottom: 1px solid #2d4d2d;
            color: var(--app-text-primary, #e8f5e9);
        }
        .route-tags-container {
            margin-top: 1.5em;
        }
        .route-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5em;
            margin-top: 0.8em;
        }
        .route-tag {
            background-color: rgba(109,186,101,0.15);
            color: var(--app-accent, #6dba65);
            border: 1px solid rgba(109,186,101,0.3);
            padding: 0.4em 0.9em;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        @media (max-width: 768px) {
            .route-detail-grid {
                flex-direction: column;
            }
        }

        /* ── 地圖區塊 ────────────────────────────────── */
        #route-map-section {
            max-width: 1000px;
            margin: 0 auto 1.5em;
            padding: 0 1.2em;
        }
        #route-map-section h3 {
            font-size: 1.1em;
            margin-bottom: 0.7em;
            color: var(--app-text-primary, #e8f5e9);
        }
        #route-map {
            width: 100%;
            height: 360px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            background: #1a2917;
        }
        #map-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6em;
            margin-top: 0.6em;
            align-items: center;
        }
        .map-btn {
            padding: 0.5em 1.1em;
            border: 1px solid #2d4d2d;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.88em;
            font-weight: bold;
            transition: all 0.2s;
        }
        #btn-gps {
            background: var(--app-bg-card, #1e3820);
            color: var(--app-text-primary, #e8f5e9);
        }
        #btn-gps:hover { background: #2d5028; }
        #btn-gps.active { background: var(--app-accent, #6dba65); color: #121f14; border-color: transparent; }
        #btn-notify {
            background: rgba(109,186,101,0.15);
            color: var(--app-accent, #6dba65);
            border-color: rgba(109,186,101,0.3);
        }
        #btn-notify:hover { background: rgba(109,186,101,0.25); }

            color: var(--app-text-primary, #e8f5e9);

            display: flex;
            align-items: center;
            gap: 0.8em;
            padding: 0.6em 1em;
            background: var(--app-bg-card, #1e3820);
            border-radius: 8px;
            border: 1px solid #2d4d2d;
            border-left: 3px solid var(--app-accent, #6dba65);
            font-size: 0.92em;
            color: var(--app-text-primary, #e8f5e9);
        }
        .stop-badge {
            background: #2d5028;
            color: var(--app-accent, #6dba65);
            width: 1.8em;
            height: 1.8em;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            font-weight: bold;
            flex-shrink: 0;
        }
        .stop-item.reached {
            border-left-color: var(--app-accent, #6dba65);
            background: #1a3820;
        }
        .stop-item.reached .stop-badge {
            background: var(--app-accent, #6dba65);
            color: #121f14;
        }

        #start-ride-section {

<body>

    <div id="header-placeholder"></div>

    <main class="main-content">
        <section id="route-detail-container">

            </section>

        <!-- ── 騎行啟動 (App Only) ──────────────────────────────────────── -->
        <section id="start-ride-section" class="app-only">

            </div>
        </section>

        <!-- ── 站點列表 ───────────────────────────────────────────────────── -->

    <script src="/js/main.js"></script>
    <script src="/js/pwa.js"></script>
    <script>
    // ── 路線地圖、站點及 GPS 追蹤 ────────────────────────────────────────
    (function () {
      let map = null;
      let userMarker = null;
      let watchId = null;
      let routeStops = [];
      // 50 meters: tight enough to confirm arrival at a stop without false positives,
      // while still reachable given typical GPS accuracy (~5–15m in open areas).
      // Adjust down to ~30m if stops are very close together on a route.
      const STOP_RADIUS_M = 50;
      const notifiedKey = 'ctrc_notified_stops_' + (new URLSearchParams(location.search).get('id') || '');

      // 計算兩點之間的距離（Haversine，返回米）
      function getDistanceM(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) ** 2 +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon / 2) ** 2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

      // 初始化 Leaflet 地圖
      function initMap(centerLat, centerLon, zoom) {
        if (map) return;
        map = L.map('route-map').setView([centerLat, centerLon], zoom || 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
          maxZoom: 19,
        }).addTo(map);
      }

      // 在地圖上加載 GPX 路線
      async function loadGpxOnMap(gpxFile) {
        if (!map) return;
        try {
          const res = await fetch('/gpx/' + gpxFile);
          if (!res.ok) return;
          const gpxText = await res.text();
          const parser = new DOMParser();
          const gpxDoc = parser.parseFromString(gpxText, 'application/xml');

          // 解析 trkpt 節點
          const trkpts = gpxDoc.querySelectorAll('trkpt');
          if (trkpts.length === 0) return;

          const latlngs = [];
          trkpts.forEach(pt => {
            const lat = parseFloat(pt.getAttribute('lat'));
            const lon = parseFloat(pt.getAttribute('lon'));
            if (!isNaN(lat) && !isNaN(lon)) latlngs.push([lat, lon]);
          });

          if (latlngs.length > 0) {
            const polyline = L.polyline(latlngs, { color: '#990000', weight: 4, opacity: 0.8 });
            polyline.addTo(map);
            map.fitBounds(polyline.getBounds(), { padding: [20, 20] });
          }
        } catch (e) {
          console.warn('[Map] GPX 加載失敗:', e);
        }
      }

      // 在地圖上標示站點
      function renderStopsOnMap(stops) {
        if (!map || !stops.length) return;
        stops.forEach(stop => {
          const icon = L.divIcon({
            className: '',
            html: `<div style="background:#1e3820;color:#6dba65;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;border:2px solid #6dba65;">${stop.order}</div>`,
            iconSize: [24, 24],
            iconAnchor: [12, 12],
          });
          L.marker([stop.lat, stop.lon], { icon })
            .bindPopup(`<b>站 ${stop.order}</b><br>${stop.name}`)
            .addTo(map);
        });
      }

      // 渲染站點列表 UI
      function renderStopsList(stops) {
        const list = document.getElementById('stops-list');
        if (!list || !stops.length) return;
        list.innerHTML = '';
        stops.forEach(stop => {
          const li = document.createElement('li');
          li.className = 'stop-item';
          li.id = 'stop-item-' + stop.order;
          li.innerHTML = `<span class="stop-badge">${stop.order}</span><span>${stop.name}</span>`;
          list.appendChild(li);
        });
        document.getElementById('stops-section').style.display = 'block';
      }

      // 更新站點已到達狀態
      function markStopReached(order) {
        const el = document.getElementById('stop-item-' + order);
        if (el) el.classList.add('reached');
      }

      // GPS 追蹤
      function startGpsTracking() {
        if (!('geolocation' in navigator)) {
          document.getElementById('gps-status').textContent = '此瀏覽器不支援 GPS';
          return;
        }
        document.getElementById('btn-gps').classList.add('active');
        document.getElementById('btn-gps').textContent = '⏹ 停止 GPS 追蹤';
        document.getElementById('gps-status').textContent = '正在獲取位置...';

        const notified = JSON.parse(localStorage.getItem(notifiedKey) || '[]');

        watchId = navigator.geolocation.watchPosition(
          (pos) => {
            const { latitude, longitude } = pos.coords;
            document.getElementById('gps-status').textContent =
              `📍 ${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;

            // 更新用戶位置標記
            if (!userMarker) {
              const userIcon = L.divIcon({
                className: '',
                html: '<div style="background:#6dba65;width:16px;height:16px;border-radius:50%;border:3px solid #121f14;box-shadow:0 0 6px rgba(0,0,0,0.6);"></div>',
                iconSize: [16, 16],
                iconAnchor: [8, 8],
              });
              userMarker = L.marker([latitude, longitude], { icon: userIcon }).addTo(map);
            } else {
              userMarker.setLatLng([latitude, longitude]);
            }
            map.panTo([latitude, longitude]);

            // 檢查是否接近站點
            routeStops.forEach(stop => {
              const dist = getDistanceM(latitude, longitude, stop.lat, stop.lon);
              if (dist < STOP_RADIUS_M && !notified.includes(stop.order)) {
                notified.push(stop.order);
                localStorage.setItem(notifiedKey, JSON.stringify(notified));
                markStopReached(stop.order);
                if (window.CTRCHK_PWA) {
                  window.CTRCHK_PWA.sendLocalNotification(
                    '🚏 即將到達',
                    `站 ${stop.order}：${stop.name}`,
                    'ctrc-stop-' + stop.order
                  );
                }
              }
            });
          },
          (err) => {
            document.getElementById('gps-status').textContent = 'GPS 錯誤：' + err.message;
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 5000 }
        );
      }

      function stopGpsTracking() {
        if (watchId !== null) {
          navigator.geolocation.clearWatch(watchId);
          watchId = null;
        }
        document.getElementById('btn-gps').classList.remove('active');
        document.getElementById('btn-gps').textContent = '📍 啟動 GPS 追蹤';
        document.getElementById('gps-status').textContent = '';
      }

      // 主入口：在 main.js 渲染完路線後初始化地圖
      async function initRouteMap() {
        const params = new URLSearchParams(location.search);
        const routeId = params.get('id');
        if (!routeId) return;

        // 取路線及站點數據
        let routeData = null;
        try {
          const res = await fetch('/routes.json');
          if (res.ok) {
            const data = await res.json();
            routeData = (data.routes || []).find(r => r.id === routeId);
          }
        } catch (e) {}
        routeStops = routeData ? (routeData.stops || []) : [];

        const defaultCenter = routeStops.length > 0
          ? [routeStops[0].lat, routeStops[0].lon]
          : [22.3143, 114.2697]; // 將軍澳默認中心

        // 顯示地圖區塊
        document.getElementById('route-map-section').style.display = 'block';
        initMap(defaultCenter[0], defaultCenter[1], 14);

        // 加載 GPX（取第一條 GPX 文件）
        if (routeData && routeData.gpx && routeData.gpx.length > 0) {
          await loadGpxOnMap(routeData.gpx[0].file);
        }

        // 標示站點
        renderStopsOnMap(routeStops);
        renderStopsList(routeStops);

        // 顯示報站按鈕（若支援）
        if ('Notification' in window) {
          document.getElementById('btn-notify').style.display = 'inline-block';
        }

        // GPS 按鈕
        document.getElementById('btn-gps').addEventListener('click', () => {
          if (watchId !== null) {
            stopGpsTracking();
          } else {
            startGpsTracking();
          }
        });

        // 報站通知按鈕
        document.getElementById('btn-notify').addEventListener('click', async () => {
          if (window.CTRCHK_PWA) {
            const granted = await window.CTRCHK_PWA.requestNotificationPermission();
            document.getElementById('btn-notify').textContent = granted ? '🔔 報站提示已開啟' : '🔕 通知被拒絕';
            document.getElementById('btn-notify').disabled = true;
          }
        });
      }

      // 等待 main.js 渲染完成後初始化
      document.addEventListener('DOMContentLoaded', () => {
        // main.js 同步渲染路線，監聽 MutationObserver 確保地圖在內容後初始化
        const container = document.getElementById('route-detail-container');
        if (!container) return;

        const observer = new MutationObserver(() => {
          if (container.children.length > 0) {
            observer.disconnect();
            initRouteMap();
          }
        });
        observer.observe(container, { childList: true, subtree: true });

        // 若已有內容（無需等待）
        if (container.children.length > 0) initRouteMap();
      });
    })();

    // ── 啟動騎行按鈕 ──────────────────────────────────────────────────────
    (function () {
      const ROUTE_UNLOCK = {
        '900':1,'900A':1,'966T':1,
        '914':8,'966A':8,'966':8,
        '900S':15,'901P':15,'910':15,'914B':15,
        '914H':22,'920':22,'966B':22,
        '920X':30,'923':30,'966C':30,
        '928':38,'929':38,'961':38,'961P':38,
        '932':45,'935':45,'939':45,'939M':45,'962':45,'962A':45,
        '955':50,'955A':50,'955H':50,'960':50,'962P':50,'962X':50,
        'X935':50,'S90':50,'S91':50,
      };
      const ROUTE_XP = {
        '900':150,'900A':120,'966':110,'914':80,'966A':90,'900S':130,'901P':140,
        '910':100,'914B':80,'914H':80,'920':130,'966B':90,'920X':100,'923':160,
        '966C':90,'928':170,'929':160,'966T':90,'961':130,'961P':100,'932':220,
        '935':250,'939':120,'939M':120,'955':110,'955A':60,'955H':80,'960':400,
        '962':250,'962A':250,'962P':150,'962X':130,'X935':210,'S90':200,'S91':200,
      };

      async function initStartRide() {
        const params = new URLSearchParams(location.search);
        const routeId = params.get('id');
        if (!routeId) return;

        let routeDataObj = null;
        try {
          const res = await fetch('/routes.json');
          const data = await res.json();
          routeDataObj = (data.routes || []).find(r => r.id === routeId);
        } catch (e) {}

        const section = document.getElementById('start-ride-section');
        if (!section) return;

        const needed = ROUTE_UNLOCK[routeId] || 1;
        let userLvl = 1;
        try {
          const raw = localStorage.getItem('user');
          if (raw) { const u = JSON.parse(raw); userLvl = Math.max(1, parseInt(u.level || 1, 10)); }
        } catch(e) {}

        const isLoggedIn = !!localStorage.getItem('accessToken');
        const isLocked = isLoggedIn && userLvl < needed;
        const xp = ROUTE_XP[routeId] || 0;
        let selectedDir = 0;

        // Direction buttons
        const dirContainer = document.getElementById('direction-btns');
        if (routeDataObj && routeDataObj.gpx && routeDataObj.gpx.length > 0) {
          routeDataObj.gpx.forEach((g, i) => {
            const btn = document.createElement('button');
            btn.className = 'dir-btn' + (i === 0 ? ' selected' : '');
            btn.textContent = g.label || ('方向 ' + (i + 1));
            btn.addEventListener('click', () => {
              document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('selected'));
              btn.classList.add('selected');
              selectedDir = i;
            });
            dirContainer.appendChild(btn);
          });
        }

        if (xp > 0) {
          document.getElementById('start-ride-xp-hint').textContent =
            '完成此路線可獲得 +' + xp + ' XP';
        }

        const startBtn = document.getElementById('btn-start-ride');
        const lockedMsg = document.getElementById('start-ride-locked-msg');

        if (isLocked) {
          startBtn.classList.add('locked');
          startBtn.textContent = '🔒 需要 Lv.' + needed + ' 解鎖';
          lockedMsg.style.display = 'block';
          lockedMsg.textContent = '你目前是 Lv.' + userLvl + '，再升 ' + (needed - userLvl) + ' 級即可解鎖此路線';
        } else {
          startBtn.addEventListener('click', () => {
            window.location.href = '/ride?id=' + routeId + '&dir=' + selectedDir;
          });
        }

        section.style.display = 'block';
      }

      document.addEventListener('DOMContentLoaded', initStartRide);
    })();
    </script>
</html>
