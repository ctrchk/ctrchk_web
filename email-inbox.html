<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收件匣 - CTRCHK MAIL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg-dark: #121212;
            --sidebar-bg: #1e1e1e;
            --list-bg: #252525;
            --content-bg: #1a1a1a;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --text: #e0e0e0;
            --text-dim: #999;
            --border: #333;
            --hover: #3a3a3a;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem 0;
            flex-shrink: 0;
        }

        .brand {
            padding: 0 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--primary);
        }

        .sidebar-btn {
            margin: 0 1rem 0.5rem;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            transition: background 0.2s;
            color: var(--text);
            text-decoration: none;
            border: none;
            background: none;
            width: calc(100% - 2rem);
            text-align: left;
            font-size: 0.95rem;
        }

        .sidebar-btn:hover {
            background-color: var(--hover);
        }

        .sidebar-btn.active {
            background-color: rgba(187, 134, 252, 0.15);
            color: var(--primary);
        }

        .compose-btn {
            background-color: var(--primary) !important;
            color: #121212 !important;
            font-weight: bold;
            margin-bottom: 1.5rem;
            justify-content: center;
        }

        .sidebar-footer {
            margin-top: auto;
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
        }

        /* Middle Column - Email List */
        .email-list {
            width: 380px;
            background-color: var(--list-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .list-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-scroll {
            flex: 1;
            overflow-y: auto;
        }

        .email-item {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }

        .email-item:hover {
            background-color: var(--hover);
        }

        .email-item.selected {
            background-color: rgba(3, 218, 198, 0.1);
            border-left: 4px solid var(--secondary);
        }

        .email-item .sender {
            font-weight: bold;
            font-size: 0.95rem;
            margin-bottom: 0.3rem;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .email-item .subject {
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 0.4rem;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .email-item .timestamp {
            font-size: 0.75rem;
            color: var(--text-dim);
            position: absolute;
            top: 1.2rem;
            right: 1.5rem;
        }

        /* Right Column - Viewer */
        .email-viewer {
            flex: 1;
            background-color: var(--content-bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .viewer-placeholder {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: var(--text-dim);
        }

        .viewer-header {
            padding: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .viewer-header h2 {
            margin: 0 0 1rem 0;
            font-size: 1.5rem;
        }

        .viewer-meta {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .viewer-body {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            line-height: 1.6;
            color: #ddd;
            font-size: 1.05rem;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-card {
            background-color: var(--card-bg);
            background: #252525;
            width: 90%;
            max-width: 650px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .modal-header {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: white;
            padding: 0.8rem;
            margin-bottom: 1rem;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .modal-textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: white;
            padding: 0.8rem;
            height: 250px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
        }

        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            border: none;
        }

        .btn-primary { background-color: var(--primary); color: #121212; }
        .btn-ghost { background: transparent; color: var(--text); }

        /* Utilities */
        .badge-sent { color: #888; font-size: 0.7rem; border: 1px solid #444; padding: 1px 4px; border-radius: 4px; margin-right: 5px; }
        .badge-inbox { color: var(--secondary); font-size: 0.7rem; border: 1px solid var(--secondary); padding: 1px 4px; border-radius: 4px; margin-right: 5px; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

        /* Responsive Styles */
        @media (max-width: 768px) {
            body {
                overflow: hidden;
            }

            #mobile-header {
                display: flex !important;
                height: 60px;
                box-sizing: border-box;
            }

            .app-container {
                height: calc(100vh - 60px);
                width: 200vw; /* Two columns wide for sliding */
                transition: transform 0.3s ease;
            }

            .mobile-view-viewer {
                overflow: hidden;
            }

            .mobile-view-viewer .app-container {
                transform: translateX(-50%); /* Slide to viewer */
            }

            .mobile-view-viewer #mobile-menu-btn {
                display: none !important;
            }

            .mobile-view-viewer #mobile-back-btn {
                display: block !important;
            }

            .sidebar {
                position: fixed;
                left: -260px;
                top: 0;
                bottom: 0;
                z-index: 2000;
                transition: left 0.3s ease;
                box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            }

            .sidebar.active {
                left: 0;
            }

            .email-list {
                width: 100vw;
                flex-shrink: 0;
            }

            .email-viewer {
                width: 100vw;
                flex-shrink: 0;
            }

            .mobile-only-btn {
                display: block !important;
            }

            .viewer-header {
                padding: 1.5rem;
            }

            .viewer-body {
                padding: 1.5rem;
            }

            .email-item {
                padding: 1.5rem 1.2rem;
            }

            .email-item .subject {
                font-size: 1rem;
            }

            .modal-card {
                width: 95%;
                max-height: 90vh;
                overflow-y: auto;
            }
        }
    </style>
</head>
<body>

    <!-- Mobile Header -->
    <div id="mobile-header" style="display: none; background: var(--sidebar-bg); padding: 1rem; align-items: center; gap: 1rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1100;">
        <button id="mobile-menu-btn" class="btn-ghost" onclick="toggleSidebar()" style="font-size: 1.2rem; color: var(--primary);">
            <i class="fas fa-bars"></i>
        </button>
        <button id="mobile-back-btn" class="btn-ghost" onclick="backToList()" style="display: none; font-size: 1.2rem; color: var(--primary);">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div class="brand" style="margin: 0; padding: 0; font-size: 1.1rem;">
            <i class="fas fa-paper-plane"></i> CTRCHK MAIL
        </div>
    </div>

    <div class="app-container">
        <!-- Sidebar Overlay (Mobile) -->
        <div id="sidebar-overlay" onclick="toggleSidebar()" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1500;"></div>

        <!-- Sidebar -->
        <div class="sidebar" id="app-sidebar">
            <div class="brand">
                <i class="fas fa-paper-plane"></i> CTRCHK MAIL
            </div>

            <button class="sidebar-btn compose-btn" onclick="openCompose()">
                <i class="fas fa-edit"></i> 撰寫郵件
            </button>

            <button class="sidebar-btn active" onclick="loadEmails()">
                <i class="fas fa-inbox"></i> 所有郵件
            </button>

            <button class="sidebar-btn" onclick="loadEmails()">
                <i class="fas fa-sync-alt"></i> 重新整理
            </button>

            <div class="sidebar-footer">
                <div id="current-email" style="font-weight: bold; margin-bottom: 0.8rem;">---</div>
                <button class="sidebar-btn" onclick="openChangePassword()" style="margin: 0; padding: 0.5rem 0;">
                    <i class="fas fa-key"></i> 修改密碼
                </button>
                <button class="sidebar-btn" onclick="logout()" style="margin: 0; padding: 0.5rem 0; color: #cf6679;">
                    <i class="fas fa-sign-out-alt"></i> 登出
                </button>
            </div>
        </div>

        <!-- Email List -->
        <div class="email-list">
            <div class="list-header">
                <h3 style="margin:0">收件匣</h3>
                <span id="mail-count" style="font-size: 0.85rem; color: var(--text-dim);">0 封郵件</span>
            </div>
            <div id="mail-list-container" class="list-scroll">
                <!-- Items populated by JS -->
                <div style="text-align:center; padding: 2rem; color: #666;">載入中...</div>
            </div>
        </div>

        <!-- Email Viewer -->
        <div id="viewer-container" class="email-viewer">
            <div class="viewer-placeholder">
                <i class="fas fa-envelope-open" style="font-size: 4rem; margin-bottom: 1.5rem; opacity: 0.2;"></i>
                <p>請選擇一封郵件以閱讀內容</p>
            </div>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div id="password-modal" class="modal-overlay">
        <div class="modal-card" style="max-width: 400px;">
            <div class="modal-header">
                <h3 style="margin:0">修改帳戶密碼</h3>
                <button class="btn-ghost" onclick="closeChangePassword()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div style="margin-bottom: 1rem;">
                    <label style="display:block; margin-bottom:0.5rem; font-size:0.9rem; color:#bbb;">目前密碼</label>
                    <input type="password" id="old-password" class="modal-input" placeholder="請輸入目前密碼">
                </div>
                <div style="margin-bottom: 1rem;">
                    <label style="display:block; margin-bottom:0.5rem; font-size:0.9rem; color:#bbb;">新密碼</label>
                    <input type="password" id="new-password" class="modal-input" placeholder="請輸入新密碼 (至少 8 位)">
                </div>
                <div style="margin-bottom: 1rem;">
                    <label style="display:block; margin-bottom:0.5rem; font-size:0.9rem; color:#bbb;">確認新密碼</label>
                    <input type="password" id="confirm-password" class="modal-input" placeholder="請再次輸入新密碼">
                </div>
                <div id="password-msg" style="font-size:0.85rem; min-height:1.2rem; text-align:center;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeChangePassword()">取消</button>
                <button id="btn-update-password" class="btn btn-primary" onclick="updatePassword()">儲存變更</button>
            </div>
        </div>
    </div>

    <!-- Compose Modal -->
    <div id="compose-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3 style="margin:0">撰寫新郵件</h3>
                <button class="btn-ghost" onclick="closeCompose()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <input type="email" id="compose-to" class="modal-input" placeholder="收件者">
                <input type="text" id="compose-subject" class="modal-input" placeholder="主旨">
                <textarea id="compose-body" class="modal-textarea" placeholder="在這裡輸入您的訊息..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="closeCompose()">取消</button>
                <button id="btn-send" class="btn btn-primary" onclick="sendEmail()">發送郵件</button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('mail_token');
        const userEmail = localStorage.getItem('mail_address');
        let allEmails = [];

        // Auth Check
        if (!token || !userEmail) {
            window.location.href = 'email-login.html';
        }

        document.getElementById('current-email').textContent = userEmail;

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatRelativeTime(dateStr) {
            const now = new Date();
            const date = new Date(dateStr);
            const diffInSeconds = Math.floor((now - date) / 1000);

            if (diffInSeconds < 60) return '剛才';
            if (diffInSeconds < 3600) return `${Math.floor(diffInSeconds / 60)} 分鐘前`;
            if (diffInSeconds < 86400) return `${Math.floor(diffInSeconds / 3600)} 小時前`;
            if (diffInSeconds < 604800) return `${Math.floor(diffInSeconds / 86400)} 天前`;

            return date.toLocaleDateString('zh-HK');
        }

        async function loadEmails() {
            if (window.innerWidth <= 768) {
                toggleSidebar(true);
                backToList();
            }
            const container = document.getElementById('mail-list-container');
            container.innerHTML = '<div style="text-align:center; padding: 2rem; color: #666;"><i class="fas fa-spinner fa-spin"></i> 正在載入郵件...</div>';

            try {
                const response = await fetch('/api/email?action=get-emails', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 401) {
                    logout();
                    return;
                }

                allEmails = await response.json();
                renderEmailList();
                document.getElementById('mail-count').textContent = `${allEmails.length} 封郵件`;
            } catch (error) {
                container.innerHTML = `<div style="text-align:center; padding: 2rem; color: #cf6679;">載入失敗: ${error.message}</div>`;
            }
        }

        function renderEmailList() {
            const container = document.getElementById('mail-list-container');
            if (allEmails.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding: 2rem; color: #666;">尚無郵件</div>';
                return;
            }

            container.innerHTML = allEmails.map(mail => {
                const isSent = mail.direction === 'SENT';
                const label = isSent ? `<span class="badge-sent">寄出</span>` : `<span class="badge-inbox">收件</span>`;
                const displayContact = isSent ? `至: ${mail.recipient}` : `從: ${mail.sender}`;

                return `
                    <div class="email-item" onclick="viewEmail(${mail.id}, this)">
                        <div class="timestamp">${formatRelativeTime(mail.created_at)}</div>
                        <span class="sender">${label} ${escapeHtml(displayContact)}</span>
                        <span class="subject">${escapeHtml(mail.subject) || '(無主旨)'}</span>
                    </div>
                `;
            }).join('');
        }

        function viewEmail(id, element) {
            // UI Feedback
            document.querySelectorAll('.email-item').forEach(el => el.classList.remove('selected'));
            if (element) element.classList.add('selected');

            const mail = allEmails.find(m => m.id === id);
            if (!mail) return;

            const viewer = document.getElementById('viewer-container');

            // Mobile Transition
            if (window.innerWidth <= 768) {
                document.body.classList.add('mobile-view-viewer');
            }

            viewer.innerHTML = `
                <div class="viewer-header">
                    <h2 style="margin:0">${escapeHtml(mail.subject) || '(無主旨)'}</h2>
                    <div class="viewer-meta">
                        <span><strong>寄件者:</strong> ${escapeHtml(mail.sender)}</span>
                        <span><strong>收件者:</strong> ${escapeHtml(mail.recipient)}</span>
                        <span><strong>時間:</strong> ${new Date(mail.created_at).toLocaleString('zh-HK')}</span>
                    </div>
                </div>
                <div class="viewer-body">
                    ${mail.body_html || (mail.body_text ? escapeHtml(mail.body_text).replace(/\n/g, '<br>') : '<em>(無內容)</em>')}
                </div>
            `;
        }

        function backToList() {
            document.body.classList.remove('mobile-view-viewer');
            document.querySelectorAll('.email-item').forEach(el => el.classList.remove('selected'));
        }

        function toggleSidebar(forceClose = false) {
            const sidebar = document.getElementById('app-sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (forceClose) {
                sidebar.classList.remove('active');
                overlay.style.display = 'none';
                return;
            }

            const isActive = sidebar.classList.toggle('active');
            overlay.style.display = isActive ? 'block' : 'none';
        }

        // Compose Logic
        function openCompose() {
            if (window.innerWidth <= 768) toggleSidebar(true);
            document.getElementById('compose-modal').style.display = 'flex';
        }

        function closeCompose() {
            document.getElementById('compose-modal').style.display = 'none';
        }

        async function sendEmail() {
            const to = document.getElementById('compose-to').value.trim();
            const subject = document.getElementById('compose-subject').value.trim();
            const body = document.getElementById('compose-body').value;
            const btn = document.getElementById('btn-send');

            if (!to || !subject || !body) {
                alert('請填寫所有欄位');
                return;
            }

            btn.disabled = true;
            btn.textContent = '發送中...';

            try {
                const response = await fetch('/api/email?action=send', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ to, subject, body })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('郵件已成功發送！');
                    closeCompose();
                    // Clear fields
                    document.getElementById('compose-to').value = '';
                    document.getElementById('compose-subject').value = '';
                    document.getElementById('compose-body').value = '';
                    loadEmails(); // Refresh list
                } else {
                    alert(`錯誤: ${data.message}`);
                }
            } catch (error) {
                alert(`發送失敗: ${error.message}`);
            } finally {
                btn.disabled = false;
                btn.textContent = '發送郵件';
            }
        }

        // Change Password Logic
        function openChangePassword() {
            if (window.innerWidth <= 768) toggleSidebar(true);
            document.getElementById('password-modal').style.display = 'flex';
            document.getElementById('password-msg').textContent = '';
            document.getElementById('password-msg').className = '';
        }

        function closeChangePassword() {
            document.getElementById('password-modal').style.display = 'none';
            // Clear fields
            document.getElementById('old-password').value = '';
            document.getElementById('new-password').value = '';
            document.getElementById('confirm-password').value = '';
        }

        async function updatePassword() {
            const oldPassword = document.getElementById('old-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const msgEl = document.getElementById('password-msg');
            const btn = document.getElementById('btn-update-password');

            if (!oldPassword || !newPassword || !confirmPassword) {
                msgEl.textContent = '❌ 請填寫所有欄位';
                msgEl.className = 'error';
                return;
            }

            if (newPassword.length < 8) {
                msgEl.textContent = '❌ 新密碼長度需至少 8 位';
                msgEl.className = 'error';
                return;
            }

            if (newPassword !== confirmPassword) {
                msgEl.textContent = '❌ 兩次輸入的新密碼不一致';
                msgEl.className = 'error';
                return;
            }

            btn.disabled = true;
            btn.textContent = '儲存中...';
            msgEl.textContent = '⏳ 正在處理...';
            msgEl.className = '';

            try {
                const response = await fetch('/api/email?action=change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ old_password: oldPassword, new_password: newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    msgEl.textContent = '✅ 密碼已成功變更！';
                    msgEl.className = 'success';
                    setTimeout(() => {
                        closeChangePassword();
                    }, 1500);
                } else {
                    msgEl.textContent = `❌ ${data.message || '變更失敗'}`;
                    msgEl.className = 'error';
                }
            } catch (error) {
                msgEl.textContent = `❌ 連線錯誤: ${error.message}`;
                msgEl.className = 'error';
            } finally {
                btn.disabled = false;
                btn.textContent = '儲存變更';
            }
        }

        function logout() {
            localStorage.removeItem('mail_token');
            localStorage.removeItem('mail_address');
            window.location.href = 'email-login.html';
        }

        // Initial Load
        loadEmails();
    </script>
</body>
</html>
