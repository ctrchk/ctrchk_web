<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#121f14">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="城市運輸單車">
    <link rel="apple-touch-icon" href="/images/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任務與成就 - 城市運輸單車</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ── Dark app theme ─────────────────────────────────────────── */
        body {
            background: var(--app-bg-primary, #121f14);
            color: var(--app-text-primary, #e8f5e9);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', sans-serif;
            min-height: 100vh;
        }
        .tasks-container {
            max-width: 600px;
            margin: 0 auto;
            padding: calc(env(safe-area-inset-top) + 0.5em) 0 calc(env(safe-area-inset-bottom) + 5em) 0;
        }
        /* ── Header ────────────────────────────────────────────────── */
        .tasks-hero {
            background: linear-gradient(135deg, #1e3820 0%, #2d5028 100%);
            padding: calc(env(safe-area-inset-top) + 0.9em) 1.2em 1em;
            border-bottom: 1px solid #2d4d2d;
        }
        /* Profile row inside hero */
        .tasks-hero-profile {
            display: flex;
            align-items: center;
            gap: 0.85em;
            margin-bottom: 0.75em;
        }
        .tasks-hero-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #2d4d2d;
            border: 2px solid rgba(109,186,101,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
            color: var(--app-accent, #6dba65);
            flex-shrink: 0;
            overflow: hidden;
        }
        .tasks-hero-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .tasks-hero-info { flex: 1; min-width: 0; }
        .tasks-hero-name {
            font-size: 1em;
            font-weight: 700;
            color: var(--app-text-primary, #e8f5e9);
            margin-bottom: 0.15em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tasks-hero-level-badge {
            display: inline-block;
            background: var(--app-accent, #6dba65);
            color: #121f14;
            font-size: 0.72em;
            font-weight: bold;
            padding: 0.15em 0.55em;
            border-radius: 8px;
        }
        .tasks-hero-settings-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            color: var(--app-text-secondary, #a8d8a0);
            font-size: 1em;
            flex-shrink: 0;
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
        }
        .tasks-hero-settings-btn:hover { background: rgba(255,255,255,0.2); color: var(--app-text-primary, #e8f5e9); }
        /* XP bar row */
        .tasks-hero-xprow {
            display: flex;
            align-items: center;
            gap: 0.6em;
        }
        .tasks-hero-xpbar {
            flex: 1;
            height: 5px;
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
            overflow: hidden;
        }
        .tasks-hero-xpfill {
            height: 100%;
            background: var(--app-accent, #6dba65);
            border-radius: 3px;
            transition: width 0.6s ease;
        }
        .tasks-hero-xplabel {
            font-size: 0.72em;
            color: var(--app-text-secondary, #a8d8a0);
            white-space: nowrap;
            flex-shrink: 0;
        }
        /* ── Tab bar ───────────────────────────────────────────────── */
        .tasks-tabs {
            display: flex;
            border-bottom: 1px solid #2d4d2d;
            background: #1a2d1c;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .tasks-tab {
            flex: 1;
            padding: 0.75em 0.5em;
            text-align: center;
            font-size: 0.85em;
            font-weight: 600;
            color: var(--app-text-secondary, #a8d8a0);
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }
        .tasks-tab.active {
            color: var(--app-accent, #6dba65);
            border-bottom-color: var(--app-accent, #6dba65);
        }
        /* ── Task cards ────────────────────────────────────────────── */
        .tasks-section {
            padding: 1em 1em 0;
        }
        .tasks-section-title {
            font-size: 0.8em;
            font-weight: 700;
            color: var(--app-text-secondary, #a8d8a0);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 0 0 0.7em 0;
        }
        .task-card {
            background: #1a2d1c;
            border: 1px solid #2d4d2d;
            border-radius: 10px;
            padding: 0.9em 1em;
            margin-bottom: 0.7em;
            display: flex;
            align-items: center;
            gap: 0.8em;
            transition: opacity 0.3s;
        }
        .task-card.completed {
            opacity: 0.6;
            border-color: var(--app-accent, #6dba65);
        }
        .task-icon {
            font-size: 1.5em;
            flex-shrink: 0;
            width: 2em;
            text-align: center;
        }
        .task-info {
            flex: 1;
            min-width: 0;
        }
        .task-name {
            font-size: 0.95em;
            font-weight: 600;
            color: var(--app-text-primary, #e8f5e9);
            margin-bottom: 0.2em;
        }
        .task-desc {
            font-size: 0.78em;
            color: var(--app-text-secondary, #a8d8a0);
        }
        .task-reward {
            font-size: 0.78em;
            font-weight: bold;
            color: var(--app-accent, #6dba65);
            background: rgba(109,186,101,0.12);
            padding: 0.2em 0.6em;
            border-radius: 8px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .task-check {
            font-size: 1.1em;
            flex-shrink: 0;
        }
        .task-progress {
            margin-top: 0.4em;
        }
        .task-progress-bar {
            height: 4px;
            background: #2d4d2d;
            border-radius: 2px;
            overflow: hidden;
        }
        .task-progress-fill {
            height: 100%;
            background: var(--app-accent, #6dba65);
            border-radius: 2px;
            transition: width 0.5s ease;
        }
        .task-progress-text {
            font-size: 0.72em;
            color: var(--app-text-secondary, #a8d8a0);
            margin-top: 0.2em;
        }
        /* ── Reset info ─────────────────────────────────────────────── */
        .tasks-reset-info {
            text-align: center;
            font-size: 0.75em;
            color: var(--app-text-secondary, #a8d8a0);
            padding: 0.8em 1em 0;
        }
        /* ── Achievement medals ─────────────────────────────────────── */
        .medals-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8em;
            padding: 1em;
        }
        .medal-card {
            background: #1a2d1c;
            border: 1px solid #2d4d2d;
            border-radius: 12px;
            padding: 1em 0.5em;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4em;
            transition: opacity 0.3s;
        }
        .medal-card.locked {
            opacity: 0.35;
            filter: grayscale(0.7);
        }
        .medal-card.earned {
            border-color: var(--app-accent, #6dba65);
            background: rgba(109,186,101,0.08);
        }
        .medal-icon {
            font-size: 2em;
        }
        .medal-name {
            font-size: 0.72em;
            font-weight: 600;
            color: var(--app-text-primary, #e8f5e9);
            line-height: 1.2;
        }
        .medal-desc {
            font-size: 0.62em;
            color: var(--app-text-secondary, #a8d8a0);
        }
        .medal-date {
            font-size: 0.60em;
            color: var(--app-accent, #6dba65);
        }
        /* ── Daily check-in card ─────────────────────────────────────── */
        .checkin-card {
            background: linear-gradient(135deg, #1a3820, #243824);
            border: 1px solid var(--app-accent, #6dba65);
            border-radius: 12px;
            padding: 1em 1.1em;
            margin: 1em 1em 0.5em;
            display: flex;
            align-items: center;
            gap: 0.9em;
        }
        .checkin-icon { font-size: 2em; flex-shrink: 0; }
        .checkin-info { flex: 1; min-width: 0; }
        .checkin-title {
            font-size: 1em;
            font-weight: 700;
            color: var(--app-text-primary, #e8f5e9);
        }
        .checkin-subtitle {
            font-size: 0.78em;
            color: var(--app-text-secondary, #a8d8a0);
            margin-top: 0.15em;
        }
        .checkin-streak {
            font-size: 0.85em;
            font-weight: 700;
            color: #ffd54f;
            margin-top: 0.2em;
        }
        .checkin-today-reward {
            font-size: 0.78em;
            color: #BFE340;
            margin-top: 0.2em;
            font-weight: 600;
        }
        .checkin-btn {
            background: var(--app-accent, #6dba65);
            color: #121f14;
            border: none;
            border-radius: 20px;
            padding: 0.5em 1.1em;
            font-size: 0.85em;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            transition: background 0.2s, opacity 0.2s;
        }
        .checkin-btn:disabled {
            background: #2d4d2d;
            color: var(--app-text-secondary, #a8d8a0);
            cursor: default;
            opacity: 0.7;
        }
        /* ── Checkin reward table ─────────────────────────────────────── */
        .checkin-table-wrap {
            margin: 0 1em 0.8em;
        }
        .checkin-table-toggle {
            display: flex;
            align-items: center;
            gap: 0.5em;
            background: none;
            border: 1px solid #2d4d2d;
            border-radius: 8px;
            padding: 0.45em 0.9em;
            color: var(--app-text-secondary, #a8d8a0);
            font-size: 0.8em;
            cursor: pointer;
            width: 100%;
            justify-content: space-between;
            transition: border-color 0.2s;
        }
        .checkin-table-toggle:hover { border-color: var(--app-accent, #6dba65); }
        .checkin-table-toggle .arrow { transition: transform 0.2s; }
        .checkin-table-toggle.open .arrow { transform: rotate(180deg); }
        .checkin-reward-table {
            display: none;
            margin-top: 0.6em;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #2d4d2d;
        }
        .checkin-reward-table.open { display: block; }
        .crt-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
        }
        .crt-cell {
            background: #1a2d1c;
            border-right: 1px solid #2d4d2d;
            border-bottom: 1px solid #2d4d2d;
            padding: 0.45em 0.3em;
            text-align: center;
            position: relative;
        }
        .crt-cell:nth-child(4n) { border-right: none; }
        .crt-cell:nth-last-child(-n+4) { border-bottom: none; }
        .crt-day {
            font-size: 0.62em;
            color: var(--app-text-secondary, #a8d8a0);
            margin-bottom: 0.15em;
        }
        .crt-xp {
            font-size: 0.78em;
            font-weight: 700;
            color: #BFE340;
        }
        .crt-coins {
            font-size: 0.68em;
            color: #ffd54f;
        }
        .crt-cell.special-7 { background: rgba(109,186,101,0.12); }
        .crt-cell.special-14 { background: rgba(255,200,50,0.12); }
        .crt-cell.special-21 { background: rgba(100,180,255,0.12); }
        .crt-cell.special-28 {
            background: linear-gradient(135deg, rgba(255,200,50,0.25), rgba(255,120,50,0.25));
            grid-column: span 4;
        }
        .crt-cell.special-28 .crt-xp { font-size: 1em; }
        .crt-cell.today {
            outline: 2px solid var(--app-accent, #6dba65);
            outline-offset: -2px;
        }
        .crt-cell.done::after {
            content: '✓';
            position: absolute;
            top: 2px; right: 3px;
            font-size: 0.6em;
            color: var(--app-accent, #6dba65);
        }
        .crt-cell.future { opacity: 0.5; }
        /* ── Notification toggle ─────────────────────────────────────── */
        .notif-toggle-wrap {
            display: flex;
            align-items: center;
            gap: 0.7em;
            margin: 0 1em 0.8em;
            padding: 0.6em 0.9em;
            background: #1a2d1c;
            border: 1px solid #2d4d2d;
            border-radius: 10px;
        }
        .notif-toggle-label {
            flex: 1;
            font-size: 0.82em;
            color: var(--app-text-secondary, #a8d8a0);
        }
        .notif-toggle-label strong {
            display: block;
            font-size: 1em;
            color: var(--app-text-primary, #e8f5e9);
            margin-bottom: 0.1em;
        }
        .toggle-switch {
            position: relative;
            width: 40px;
            height: 22px;
            flex-shrink: 0;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: #2d4d2d;
            border-radius: 22px;
            transition: background 0.2s;
        }
        .toggle-slider::before {
            content: '';
            position: absolute;
            left: 3px;
            top: 3px;
            width: 16px;
            height: 16px;
            background: #a8d8a0;
            border-radius: 50%;
            transition: transform 0.2s, background 0.2s;
        }
        .toggle-switch input:checked + .toggle-slider { background: var(--app-accent, #6dba65); }
        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(18px);
            background: #121f14;
        }
        /* ── All-tasks bonus card ────────────────────────────────────── */
        .all-tasks-bonus {
            display: flex;
            align-items: center;
            gap: 0.8em;
            background: linear-gradient(135deg, #1e3020, #253a26);
            border: 1px dashed #4d8a45;
            border-radius: 10px;
            padding: 0.8em 1em;
            margin-bottom: 0.7em;
        }
        .all-tasks-bonus .atb-icon { font-size: 1.5em; flex-shrink: 0; }
        .all-tasks-bonus .atb-info { flex: 1; min-width: 0; }
        .all-tasks-bonus .atb-name { font-size: 0.92em; font-weight: 700; color: var(--app-text-primary, #e8f5e9); }
        .all-tasks-bonus .atb-desc { font-size: 0.75em; color: var(--app-text-secondary, #a8d8a0); }
        .all-tasks-bonus .atb-reward {
            font-size: 0.78em; font-weight: bold; color: #BFE340;
            background: rgba(191,227,64,0.12); padding: 0.2em 0.6em; border-radius: 8px; white-space: nowrap;
        }
        .all-tasks-bonus .atb-check { font-size: 1.1em; flex-shrink: 0; }
        /* ── Coming-soon weekly ──────────────────────────────────────── */
        .coming-soon-card {
            text-align: center;
            padding: 3em 2em;
        }
        .coming-soon-icon { font-size: 3em; margin-bottom: 0.3em; }
        .coming-soon-title {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--app-text-primary, #e8f5e9);
            margin-bottom: 0.4em;
        }
        .coming-soon-desc {
            font-size: 0.82em;
            color: var(--app-text-secondary, #a8d8a0);
            line-height: 1.5;
        }
        /* ── Tab content ─────────────────────────────────────────────── */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        /* ── Login prompt ────────────────────────────────────────────── */
        .login-prompt {
            text-align: center;
            padding: 3em 2em;
            color: var(--app-text-secondary, #a8d8a0);
        }
        .login-prompt i { font-size: 2.5em; display: block; margin-bottom: 0.5em; opacity: 0.4; }
        .login-prompt a {
            display: inline-block;
            margin-top: 1em;
            padding: 0.6em 1.5em;
            background: var(--app-accent, #6dba65);
            color: #121f14;
            border-radius: 20px;
            font-weight: bold;
            text-decoration: none;
            font-size: 0.9em;
        }
        /* ── Summary bar ─────────────────────────────────────────────── */
        .tasks-summary {
            display: flex;
            justify-content: space-around;
            padding: 0.8em 1em;
            background: #1a2d1c;
            border-bottom: 1px solid #2d4d2d;
        }
        .summary-item { text-align: center; }
        .summary-value {
            font-size: 1.3em;
            font-weight: bold;
            color: var(--app-accent, #6dba65);
        }
        .summary-label {
            font-size: 0.7em;
            color: var(--app-text-secondary, #a8d8a0);
        }
        /* ── Level-up overlay (tasks page) ──────────────────────────── */
        #tasks-levelup-overlay {
            display: none; position: fixed; inset: 0; z-index: 800;
            background: rgba(0,0,0,0.88);
            align-items: center; justify-content: center; flex-direction: column;
            text-align: center; padding: 2em; overflow: hidden;
        }
        #tasks-levelup-overlay.show { display: flex; animation: tlFadeIn 0.35s ease; }
        @keyframes tlFadeIn { from { opacity: 0; } to { opacity: 1; } }
        #tasks-levelup-inner {
            animation: tlSlideUp 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
            position: relative; z-index: 1;
        }
        @keyframes tlSlideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        #tasks-levelup-overlay h2 { color: #BFE340; font-size: 2.2em; margin-bottom: 0.3em; }
        #tasks-levelup-badge {
            background: #BFE340; color: #1a252f;
            font-size: 2.5em; font-weight: bold;
            padding: 0.4em 1em; border-radius: 16px; margin-bottom: 0.5em;
            display: inline-block;
            animation: tlBadgePulse 0.7s 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        @keyframes tlBadgePulse {
            0%   { transform: scale(0.7); }
            60%  { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        #tasks-levelup-title { color: #fff; font-size: 1.4em; margin-bottom: 0.3em; }
        #tasks-levelup-coins { color: #BFE340; font-size: 1.1em; margin-bottom: 1.5em; }
        #tasks-levelup-btn {
            background: #BFE340; color: #1a252f; border: none;
            padding: 0.8em 2em; border-radius: 10px; font-size: 1em; font-weight: bold;
            cursor: pointer;
        }
        .tasks-confetti-piece {
            position: absolute; border-radius: 2px;
            animation: tasksConfettiFall linear forwards;
            pointer-events: none; z-index: 0;
        }
        @keyframes tasksConfettiFall {
            0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* ── Light theme overrides ───────────────────────────────────── */
        body.app-light-theme .tasks-hero {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            border-bottom-color: var(--app-border, #c8e6c9);
        }
        body.app-light-theme .tasks-hero-avatar { background: var(--app-border, #c8e6c9); border-color: var(--app-accent, #2e7d32); }
        body.app-light-theme .tasks-hero-name { color: var(--app-text-primary, #1b3a1f); }
        body.app-light-theme .tasks-hero-xpbar { background: rgba(0,0,0,0.12); }
        body.app-light-theme .tasks-hero-xplabel { color: var(--app-text-secondary, #2e7d32); }
        body.app-light-theme .tasks-hero-settings-btn { background: rgba(0,0,0,0.08); color: var(--app-text-secondary, #2e7d32); }
        body.app-light-theme .tasks-hero-settings-btn:hover { background: rgba(0,0,0,0.14); color: #1b3a1f; }
        body.app-light-theme .tasks-tabs {
            background: var(--app-bg-secondary, #eaf4ea);
            border-bottom-color: var(--app-border, #c8e6c9);
        }
        body.app-light-theme .task-card {
            background: var(--app-bg-card, #ffffff);
            border-color: var(--app-border, #c8e6c9);
        }
        body.app-light-theme .task-progress-bar { background: var(--app-border, #c8e6c9); }
        body.app-light-theme .checkin-reward-table { border-color: var(--app-border, #c8e6c9); }
        body.app-light-theme .crt-cell {
            background: var(--app-bg-card, #ffffff);
            border-color: var(--app-border, #c8e6c9);
        }
        body.app-light-theme .crt-cell.special-7 { background: rgba(46,125,50,0.08); }
        body.app-light-theme .crt-cell.special-14 { background: rgba(245,175,0,0.12); }
        body.app-light-theme .crt-cell.special-21 { background: rgba(30,130,220,0.1); }
        body.app-light-theme .crt-cell.special-28 { background: linear-gradient(135deg, rgba(245,175,0,0.18), rgba(230,100,30,0.18)); }
        body.app-light-theme .notif-toggle-wrap {
            background: var(--app-bg-card, #ffffff);
            border-color: var(--app-border, #c8e6c9);
        }
        body.app-light-theme .checkin-table-toggle { border-color: var(--app-border, #c8e6c9); }
        /* ── Additional light theme overrides ───────────────────── */
        body.app-light-theme .checkin-card {
            background: linear-gradient(135deg, #e8f5e9, #f0f8f0);
        }
        body.app-light-theme .checkin-streak { color: #e65100; }

            type: 'night_ride',
        },
    ];

    // ── Storage helpers ───────────────────────────────────────────────
    function getTodayKey() {
        return new Date().toISOString().slice(0, 10); // YYYY-MM-DD
    }

    function getWeekKey() {
        const now = new Date();
        const day = now.getDay(); // 0=Sun
        const diff = now.getDate() - day + (day === 0 ? -6 : 1); // Monday
        const monday = new Date(now.getFullYear(), now.getMonth(), diff);
        return monday.toISOString().slice(0, 10);
    }

    // ── Daily check-in 28-day reward table ──────────────────────────
    // Each entry: [xp, coins]. Days 16-20 each add 20XP+1🪙 from day 15.
    // Days 23-27 each add 25XP+1🪙 from day 22.
    const CHECKIN_REWARDS = [
        null,           // index 0 unused (days are 1-indexed)
        [20, 0],        // Day 1
        [30, 2],        // Day 2
        [50, 2],        // Day 3
        [70, 3],        // Day 4
        [80, 3],        // Day 5
        [100, 3],       // Day 6
        [200, 10],      // Day 7  ★ Weekly milestone
        [150, 5],       // Day 8
        [180, 8],       // Day 9
        [200, 8],       // Day 10
        [225, 8],       // Day 11
        [250, 8],       // Day 12
        [250, 10],      // Day 13
        [500, 20],      // Day 14 ★★ Fortnight milestone
        [260, 10],      // Day 15
        [280, 11],      // Day 16  (+20 XP, +1🪙 from day 15)
        [300, 12],      // Day 17
        [320, 13],      // Day 18
        [340, 14],      // Day 19
        [360, 15],      // Day 20
        [600, 30],      // Day 21 ★★★ Three-week milestone
        [375, 15],      // Day 22
        [400, 16],      // Day 23  (+25 XP, +1🪙 from day 22)
        [425, 17],      // Day 24
        [450, 18],      // Day 25
        [475, 19],      // Day 26
        [500, 20],      // Day 27
        [1000, 100],    // Day 28 ★★★★ Ultimate prize
    ];

    function getCheckinData() {
        try {
            return JSON.parse(localStorage.getItem('dailyCheckins') || '{}');
        } catch(e) { return {}; }
    }

    function saveCheckinData(data) {
        localStorage.setItem('dailyCheckins', JSON.stringify(data));
    }

    async function syncProgressFromServer() {
        const token = localStorage.getItem('accessToken');
        if (!token) return;
        try {
            const resp = await fetch('/api/getHistory', {
                headers: { 'Authorization': `Bearer ${token}` },
            });
            if (!resp.ok) return;
            const data = await resp.json();
            const checkins = Array.isArray(data.checkins) ? data.checkins : [];
            const local = getCheckinData();
            checkins.forEach((c) => {
                const d = (c && c.checkin_date ? String(c.checkin_date) : '').slice(0, 10);
                if (!d) return;
                if (!local[d]) local[d] = `${d}T00:00:00.000Z`;
            });
            saveCheckinData(local);
            const serverHistory = Array.isArray(data.normalized_history) ? data.normalized_history : [];
            if (serverHistory.length) {
                const localHistory = getRideHistory();
                const merged = [...localHistory];
                const seen = new Set(localHistory.map(r =>
                    `${r.route_id || ''}|${r.date || ''}|${r.start_time || ''}|${r.duration_minutes || 0}|${r.distance_km || 0}`
                ));
                serverHistory.forEach((r) => {
                    const key = `${r.route_id || ''}|${r.date || ''}|${r.start_time || ''}|${r.duration_minutes || 0}|${r.distance_km || 0}`;
                    if (seen.has(key)) return;
                    seen.add(key);
                    merged.push(r);
                });
                if (merged.length > 200) merged.splice(0, merged.length - 200);
                localStorage.setItem('rideHistory', JSON.stringify(merged));
            }
        } catch (e) {
            console.warn('[Tasks] syncProgressFromServer failed:', e);
        }
    }

    function getCheckinStreak(data) {
        const today = getTodayKey();
        if (!Object.keys(data).length) return 0;
        let streak = 0;
        const oneDayMs = 86400000;
        let check = new Date(today);
        // Walk backwards from today counting consecutive check-in days
        for (let i = 0; i <= 365; i++) {
            const key = check.toISOString().slice(0, 10);
            if (data[key]) {
                streak++;
                check = new Date(check.getTime() - oneDayMs);
            } else {
                break;
            }
        }
        return streak;
    }

    // Returns the effective day within the 28-day cycle (1-28)
    function getCheckinCycleDay(streak) {
        if (streak <= 0) return 1;
        return ((streak - 1) % 28) + 1;
    }

    // Get reward for a specific cycle day
    function getCheckinReward(cycleDay) {
        const d = Math.max(1, Math.min(28, cycleDay));
        return CHECKIN_REWARDS[d] || [20, 0];
    }

    function renderCheckin() {
        const btn = document.getElementById('checkin-btn');
        const streakEl = document.getElementById('checkin-streak');
        const rewardEl = document.getElementById('checkin-today-reward');
        if (!btn) return;
        const data = getCheckinData();
        const today = getTodayKey();
        const streak = getCheckinStreak(data);
        const doneTodayStr = data[today];

        if (doneTodayStr) {
            btn.disabled = true;
            btn.textContent = '已簽到 ✓';
        } else {
            btn.disabled = false;
            btn.textContent = '簽到';
        }
        if (streak > 0) {
            streakEl.textContent = isEn() ? `🔥 ${streak}-day streak` : `🔥 連續 ${streak} 天`;
        } else {
            streakEl.textContent = '';
        }
        // Show today's reward preview or next reward
        const todayStreak = doneTodayStr ? streak : streak + 1;
        const cycleDay = getCheckinCycleDay(todayStreak);
        const [xp, coins] = getCheckinReward(cycleDay);
        const coinsStr = coins > 0 ? ` + ${coins} 🪙` : '';
        if (!doneTodayStr) {
            rewardEl.textContent = isEn()
                ? `Today's Reward (Day ${cycleDay}): +${xp} XP${coinsStr}`
                : `今日獎勵（第 ${cycleDay} 天）：+${xp} XP${coinsStr}`;
        } else {
            rewardEl.textContent = isEn()
                ? `Day ${cycleDay} Reward Claimed ✓`
                : `已獲得第 ${cycleDay} 天獎勵 ✓`;
        }
        renderCheckinTable();
    }

    // Render the 28-day reward grid table
    function renderCheckinTable() {
        const grid = document.getElementById('crt-grid');
        if (!grid) return;
        const data = getCheckinData();
        const today = getTodayKey();
        const streak = getCheckinStreak(data);
        const doneTodayStr = data[today];
        // Current position in cycle (1-28)
        const currentCycleDay = doneTodayStr
            ? getCheckinCycleDay(streak)
            : getCheckinCycleDay(streak + 1);

        grid.innerHTML = '';
        for (let d = 1; d <= 28; d++) {
            const cell = document.createElement('div');
            const [xp, coins] = getCheckinReward(d);
            let cls = 'crt-cell';
            if (d === 7)  cls += ' special-7';
            if (d === 14) cls += ' special-14';
            if (d === 21) cls += ' special-21';
            if (d === 28) cls += ' special-28';
            // Mark days as done/today/future relative to current cycle position
            if (doneTodayStr && d <= currentCycleDay) {
                cls += ' done';
            } else if (!doneTodayStr && d < currentCycleDay) {
                cls += ' done';
            } else if (d === currentCycleDay && !doneTodayStr) {
                cls += ' today';
            } else {
                cls += ' future';
            }
            cell.className = cls;

            const coinsHtml = coins > 0 ? `<div class="crt-coins">${coins} 🪙</div>` : '';
            const label = d === 28 ? (isEn() ? '🏆 Grand Prize' : '🏆 終極大獎') : (d === 7 || d === 14 || d === 21) ? `${isEn() ? 'Day' : '第'} ${d} ★` : `${isEn() ? 'Day' : '第'} ${d}${isEn() ? '' : ' 天'}`;
            cell.innerHTML = `<div class="crt-day">${label}</div><div class="crt-xp">+${xp} XP</div>${coinsHtml}`;
            grid.appendChild(cell);
        }
    }

    window.toggleCheckinTable = function() {
        const btn = document.getElementById('checkin-table-toggle');
        const table = document.getElementById('checkin-reward-table');
        if (!btn || !table) return;
        btn.classList.toggle('open');
        table.classList.toggle('open');
    };

    window.doCheckin = async function() {
        const today = getTodayKey();
        const data = getCheckinData();
        if (data[today]) return; // already checked in

        const token = localStorage.getItem('accessToken');
        if (!token) {
            showCheckinToast('請先登入以獲得簽到獎勵 🔒');
            return;
        }

        // Call the server API first to persist XP and coins before updating the UI
        try {
            const resp = await fetch('/api/getHistory?action=checkin', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`,
                },
                body: JSON.stringify({ checkin_date: today }),
            });
            if (!resp.ok) {
                if (resp.status === 401) {
                    localStorage.removeItem('accessToken');
                    localStorage.removeItem('user');
                    showCheckinToast('登入已過期，請重新登入後簽到 🔒');
                } else {
                    showCheckinToast('簽到失敗，請稍後再試 ❌');
                }
                return;
            }
            const result = await resp.json();

            // Sync localStorage so the UI reflects the server state
            data[today] = new Date().toISOString();
            saveCheckinData(data);
            renderCheckin();

            if (result.already_checked_in) {
                if (result.gameProfile) {
                    localStorage.setItem('gameProfile', JSON.stringify(result.gameProfile));
                }
                const xp = result.xp_earned || 0;
                const coins = result.coins_earned || 0;
                const coinsMsg = coins > 0 ? ` + ${coins} 🪙` : '';
                showCheckinToast(xp > 0 ? `今日已簽到 ✓ 已獲得 +${xp} XP${coinsMsg}` : '今日已簽到 ✓');
                return;
            }

            const xp = result.xp_earned || 0;
            const coins = result.coins_earned || 0;
            const streak = result.streak || getCheckinStreak(data);
            const coinsMsg = coins > 0 ? ` + ${coins} 🪙` : '';
            const streakMsg = streak > 1 ? `（連續 ${streak} 天）` : '';
            showCheckinToast(`🗓️ 簽到成功！+${xp} XP${coinsMsg} ${streakMsg}`);
            launchCheckinConfetti();

            if (result.gameProfile) {
                localStorage.setItem('gameProfile', JSON.stringify(result.gameProfile));
            }
            if (result.level_up && result.gameProfile) {
                setTimeout(() => showTasksLevelUp(result.gameProfile.level, coins), 600);
            }
        } catch (e) {
            console.warn('[doCheckin] API call failed:', e);
            showCheckinToast('簽到失敗，請稍後再試 ❌');
        }
    };

    // ── Task completion logic (from rideHistory) ──────────────────────
    function computeDailyProgress(task) {
        const today = getTodayKey();
        const history = getRideHistory().filter(r => r.date === today);

        switch (task.type) {
            case 'full_routes_completed': {
                const count = history.filter(r => r.all_stops).length;
                return { progress: count, done: count >= task.target };
            }
            case 'stops_visited': {
                const total = history.reduce((s, r) => s + (r.stops_count || 0), 0);
                return { progress: total, done: total >= task.target };
            }
            case 'total_ride_duration_min': {
                const total = history.reduce((s, r) => s + (r.duration_minutes || 0), 0);
                return { progress: total, done: total >= task.target };
            }
            default:
                return { progress: 0, done: false };
        }
    }

    function computeWeeklyProgress(task) {
        const weekStart = getWeekKey();
        const history = getRideHistory().filter(r => r.date >= weekStart);

        switch (task.type) {
            case 'rides_completed':
                return { progress: history.length, done: history.length >= task.target };
            case 'specific_route': {
                const done = history.some(r => r.route_id === task.route_id && r.all_stops);
                return { progress: done ? 1 : 0, done };
            }
            case 'district_stops': {
                const stops = new Set();
                history.forEach(r => (r.tik_stops || []).forEach(s => stops.add(s)));
                return { progress: stops.size, done: stops.size >= task.target };
            }
            case 'total_distance_km': {
                const total = history.reduce((s, r) => s + (r.distance_km || 0), 0);
                const rounded = Math.round(total * 10) / 10;
                return { progress: rounded, done: rounded >= task.target };
            }
            default:
                return { progress: 0, done: false };
        }
    }

    function computeAchievementProgress(ach) {
        const history = getRideHistory();

        switch (ach.type) {
            case 'rides_completed':
                return { progress: history.length, earned: history.length >= ach.target };
            case 'unique_routes': {
                const ids = new Set(history.map(r => r.route_id));
                return { progress: ids.size, earned: ids.size >= ach.target };
            }
            case 'specific_route_full': {
                const earned = history.some(r => r.route_id === ach.route_id && r.all_stops);
                return { progress: earned ? 1 : 0, earned };
            }
            case 'fast_route': {
                const earned = history.some(r =>
                    r.route_id === ach.route_id &&
                    r.all_stops &&
                    r.duration_minutes > 0 &&
                    r.duration_minutes <= ach.max_minutes
                );
                return { progress: earned ? 1 : 0, earned };
            }
            case 'all_stops_single_ride': {
                const earned = history.some(r => r.all_stops);
                return { progress: earned ? 1 : 0, earned };
            }
            case 'districts_in_ride': {
                const maxDistricts = history.reduce((m, r) => Math.max(m, r.districts_count || 0), 0);
                return { progress: maxDistricts, earned: maxDistricts >= ach.target };
            }
            case 'total_distance_km': {
                const total = history.reduce((s, r) => s + (r.distance_km || 0), 0);
                return { progress: Math.round(total * 10) / 10, earned: total >= ach.target };
            }
            case 'unique_stops': {
                const stops = new Set();
                history.forEach(r => (r.stops_reached || []).forEach(s => stops.add(s)));
                return { progress: stops.size, earned: stops.size >= ach.target };
            }
            case 'night_ride': {
                const earned = history.some(r => {
                    if (!r.start_time) return false;
                    const h = new Date(r.start_time).getHours();
                    return h >= 20;
                });
                return { progress: earned ? 1 : 0, earned };
            }
            default:
                return { progress: 0, earned: false };
        }
    }

    // ── Render helpers ────────────────────────────────────────────────
    function renderTaskCard(task, progress, isDaily) {
        const done = progress.done;
        const card = document.createElement('div');
        card.className = 'task-card' + (done ? ' completed' : '');

        let progressHtml = '';
        if (task.target && task.target > 1 && !done) {
            const pct = Math.min(100, Math.round((progress.progress / task.target) * 100));
            progressHtml = `
                <div class="task-progress">
                    <div class="task-progress-bar">
                        <div class="task-progress-fill" style="width:${pct}%"></div>
                    </div>
                    <div class="task-progress-text">${progress.progress} / ${task.target}</div>
                </div>`;
        }

        const rewardParts = [];
        if (task.reward_xp) rewardParts.push(`+${task.reward_xp} XP`);
        if (task.reward_coins) rewardParts.push(`+${task.reward_coins} 🪙`);

        card.innerHTML = `
            <div class="task-icon">${task.icon}</div>
            <div class="task-info">
                <div class="task-name">${task.name}</div>
                <div class="task-desc">${task.desc}</div>
                ${progressHtml}
            </div>
            <div class="task-reward">${rewardParts.join(' ')}</div>
            <div class="task-check">${done ? '✅' : '⬜'}</div>
        `;
        return card;
    }

            <div class="medal-name">${ach.name}</div>
            <div class="medal-desc">${ach.desc}</div>

    // ── Notification toggle ───────────────────────────────────────────
    window.onNotifToggle = async function(enabled) {
        if (enabled) {
            // Request permission if not yet granted
            let granted = Notification.permission === 'granted';
            if (!granted) {
                if (window.CTRCHK_PWA && window.CTRCHK_PWA.requestNotificationPermission) {
                    granted = await window.CTRCHK_PWA.requestNotificationPermission();
                } else if ('Notification' in window) {
                    const p = await Notification.requestPermission();
                    granted = p === 'granted';
                }
            }
            if (granted) {
                localStorage.removeItem('checkinReminderDisabled');
                if (window.CTRCHK_PWA) window.CTRCHK_PWA.scheduleDailyCheckinReminder();
            } else {
                localStorage.setItem('checkinReminderDisabled', '1');
                document.getElementById('notif-toggle').checked = false;
            }
        } else {
            localStorage.setItem('checkinReminderDisabled', '1');
        }
    };

    function initNotifToggle() {
        const toggle = document.getElementById('notif-toggle');
        const wrap = document.getElementById('notif-toggle-wrap');
        if (!toggle) return;

        // Hide if notifications not supported at all
        if (!('Notification' in window)) {
            if (wrap) wrap.style.display = 'none';
            return;
        }

        // If all notifications are disabled in settings, show informational message
        if (localStorage.getItem('pushNotificationsDisabled') === '1') {
            if (wrap) {
                const label = document.createElement('div');
                label.className = 'notif-toggle-label';
                const title = document.createElement('strong');
                title.textContent = '🔔 每日簽到提醒';
                const note = document.createElement('span');
                note.textContent = '已在「我的帳戶」中關閉所有通知';
                note.style.cssText = 'color:#ef9a9a; display:block; margin-top:0.15em;';
                label.appendChild(title);
                label.appendChild(note);
                wrap.innerHTML = '';
                wrap.appendChild(label);
            }
            return;
        }

        // Default ON: reminder is enabled unless user explicitly disabled it
        toggle.checked = localStorage.getItem('checkinReminderDisabled') !== '1';
    }

    function updateHero() {
        try {
            const heroUser = JSON.parse(localStorage.getItem('user') || '{}');
            const gp = JSON.parse(localStorage.getItem('gameProfile') || '{}');
            const avatarEl = document.getElementById('hero-avatar');
            const nameEl = document.getElementById('hero-name');
            const levelBadge = document.getElementById('hero-level-badge');
            const xpFill = document.getElementById('hero-xpfill');
            const xpLabel = document.getElementById('hero-xplabel');
            if (avatarEl) {
                if (heroUser.avatar_url) {
                    avatarEl.innerHTML = `<img src="${heroUser.avatar_url}" alt="頭像" onerror="this.parentElement.innerHTML='<i class=\\'fas fa-user\\'></i>'">`;
                } else {
                    avatarEl.innerHTML = '<i class="fas fa-user"></i>';
                }
            }
            if (nameEl) nameEl.textContent = heroUser.full_name || heroUser.username || '—';
            const level = parseInt(gp.level, 10) || 1;
            const xp = parseInt(gp.xp, 10) || 0;
            if (levelBadge) levelBadge.textContent = `Lv.${level}`;
            const curThresh = HERO_XP_THRESHOLDS[Math.min(level - 1, HERO_XP_THRESHOLDS.length - 1)] || 0;
            const nextThresh = HERO_XP_THRESHOLDS[Math.min(level, HERO_XP_THRESHOLDS.length - 1)] || HERO_XP_THRESHOLDS[HERO_XP_THRESHOLDS.length - 1];
            const pct = nextThresh > curThresh ? Math.min(100, Math.round((xp - curThresh) / (nextThresh - curThresh) * 100)) : 100;
            if (xpFill) xpFill.style.width = pct + '%';
            if (xpLabel) xpLabel.textContent = isEn()
                ? `${xp} XP · ${pct}% to Lv.${level + 1}`
                : `${xp} XP · Lv.${level + 1} 進度 ${pct}%`;
        } catch(_) {}
    }

    // ── Main render ───────────────────────────────────────────────────
    function render() {
        const isLoggedIn = !!localStorage.getItem('accessToken');

        // Daily tasks
        const dailyList = document.getElementById('daily-tasks-list');
        dailyList.innerHTML = '';
        if (!isLoggedIn) {
            dailyList.innerHTML = '<div class="login-prompt"><i class="fas fa-lock"></i>請先登入以查看每日任務<br><a href="/login">登入</a></div>';
        } else {
            DAILY_TASKS.forEach(task => {
                const progress = computeDailyProgress(task);
                dailyList.appendChild(renderTaskCard(task, progress, true));
            });

            // All-tasks bonus card
            const allDone = DAILY_TASKS.every(t => computeDailyProgress(t).done);
            const bonusKey = 'allTasksBonusClaimed_' + getTodayKey();
            const bonusClaimed = !!localStorage.getItem(bonusKey);
            const bonusDiv = document.createElement('div');
            bonusDiv.className = 'all-tasks-bonus' + (allDone ? '' : '');
            bonusDiv.innerHTML = `
                <div class="atb-icon">🎁</div>
                <div class="atb-info">
                    <div class="atb-name">${isEn() ? 'Complete All Tasks' : '完成所有任務'}</div>
                    <div class="atb-desc">${isEn() ? 'Complete all 4 daily tasks for bonus rewards' : '完成今日全部四個任務即可獲得額外獎勵'}</div>
                </div>
                <div class="atb-reward">+80 XP +5 🪙</div>
                <div class="atb-check">${(allDone || bonusClaimed) ? '✅' : '⬜'}</div>
            `;
            if (allDone && !bonusClaimed) {
                localStorage.setItem(bonusKey, '1');
                bonusDiv.querySelector('.atb-check').textContent = '✅';
            }
            dailyList.appendChild(bonusDiv);
        }

        // Achievement medals
        const grid = document.getElementById('medals-grid');
        grid.innerHTML = '';
        ACHIEVEMENTS.forEach(ach => {
            const earnedData = computeAchievementProgress(ach);
            // Save earned achievement to localStorage if newly earned
            const saved = getAchievements();
            if (earnedData.earned && !saved[ach.code]) {
                saved[ach.code] = new Date().toISOString();
                localStorage.setItem('userAchievements', JSON.stringify(saved));
            }
            grid.appendChild(renderMedalCard(ach, earnedData));
        });

        // Summary bar
        if (isLoggedIn) {
            const dailyDone = DAILY_TASKS.filter(t => computeDailyProgress(t).done).length;
            document.getElementById('summary-daily-done').textContent = `${dailyDone}/${DAILY_TASKS.length}`;
            document.getElementById('summary-weekly-done').textContent = isEn() ? 'Coming Soon' : '即將推出';
            const medalCount = ACHIEVEMENTS.filter(a => computeAchievementProgress(a).earned).length;
            document.getElementById('summary-medals').textContent = medalCount;
            document.getElementById('tasks-summary').style.display = '';
        }

        // Reset info
        const now = new Date();
        const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
        const dailyMsLeft = tomorrow - now;
        const dailyHrsLeft = Math.ceil(dailyMsLeft / 3600000);

        document.getElementById('daily-reset-info').textContent = isEn()
            ? `Daily tasks reset at midnight · ${dailyHrsLeft}h left`
            : `每日任務每天午夜重置 · 剩餘 ${dailyHrsLeft} 小時`;
    }

    // ── Daily countdown (precise to seconds) ──────────────────────────
    function updateDailyCountdown() {
        const el = document.getElementById('daily-reset-info');
        if (!el) return;
        const now = new Date();
        const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
        const ms = tomorrow - now;
        const h = Math.floor(ms / 3600000);
        const m = Math.floor((ms % 3600000) / 60000);
        const s = Math.floor((ms % 60000) / 1000);
        const pad = n => String(n).padStart(2, '0');
        el.textContent = isEn()
            ? `Daily tasks reset at midnight · ${pad(h)}:${pad(m)}:${pad(s)} left`
            : `每日任務每天午夜重置 · 剩餘 ${pad(h)}:${pad(m)}:${pad(s)}`;
    }
