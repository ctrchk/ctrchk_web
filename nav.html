<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#121f14">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="城市運輸單車">
  <link rel="apple-touch-icon" href="/images/icon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>單車徑導航 - 城市運輸單車</title>
  <link rel="stylesheet" href="/css/main.css">
  <!-- MapLibre GL JS (free, open-source Mapbox GL fork) -->
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" crossorigin="">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" crossorigin="">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; overflow: hidden;
      background: var(--app-bg-primary, #121f14);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', sans-serif;
      color: var(--app-text-primary, #e8f5e9);
    }

    /* ── Full-screen map ── */
    #nav-map {
      position: fixed; inset: 0; z-index: 0;
      background: var(--app-bg-primary, #121f14);
    }

    /* ── Top bar ── */
    #nav-topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      padding: calc(env(safe-area-inset-top) + 0.55em) 0.8em 0.65em;
      background: linear-gradient(to bottom, rgba(18,31,20,0.96) 78%, transparent);
      color: #e8f5e9;
      display: flex; align-items: center; gap: 0.7em;
    }
    body.app-light-theme #nav-topbar {
      background: linear-gradient(to bottom, rgba(240,248,240,0.97) 75%, transparent);
      color: #1b3a1f;
    }
    #btn-nav-back {
      background: rgba(255,255,255,0.12); border: none; color: inherit;
      width: 38px; height: 38px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1em; flex-shrink: 0; text-decoration: none;
    }
    body.app-light-theme #btn-nav-back { background: rgba(0,0,0,0.08); }
    #nav-title-wrap {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.24em;
    }
    #nav-title {
      font-weight: bold;
      font-size: 1em;
      line-height: 1.15;
    }
    #nav-topbar-meta {
      display: flex;
      align-items: center;
      gap: 0.45em;
      min-width: 0;
      flex-wrap: wrap;
    }
    .nav-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35em;
      padding: 0.22em 0.55em;
      border-radius: 999px;
      font-size: 0.72em;
      line-height: 1.2;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      max-width: 100%;
    }
    body.app-light-theme .nav-chip { background: rgba(0,0,0,0.08); }
    #nav-road-name {
      min-width: 0;
      max-width: 18em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #nav-junction-distance strong { color: #7df9ff; font-weight: 700; }
    #nav-pushbike-warning {
      display: none;
      color: #121f14;
      background: #BFE340;
      font-weight: 700;
    }
    #nav-pushbike-warning.show { display: inline-flex; }
    #btn-heading-up {
      background: rgba(255,255,255,0.12); border: none; color: #e8f5e9;
      width: 38px; height: 38px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1em; flex-shrink: 0; transition: background 0.2s;
    }
    #btn-heading-up.active { background: #04D93C; color: #121f14; }

    /* ── Turn instruction banner (shown during active navigation) ── */
    #turn-banner {
      display: none;
      position: fixed; top: calc(env(safe-area-inset-top) + 3.5em); left: 0; right: 0;
      z-index: 200;
      background: rgba(4, 80, 22, 0.96);
      border-bottom: 2px solid #04D93C;
      padding: 0.7em 1em;
      display: none; align-items: center; gap: 0.8em;
    }
    #turn-banner.show { display: flex; }
    #turn-icon { font-size: 2em; flex-shrink: 0; min-width: 1.8em; text-align: center; }
    #turn-text-wrap { flex: 1; }
    #turn-dist { font-size: 1.3em; font-weight: bold; color: #BFE340; }
    #turn-instruction { font-size: 0.85em; opacity: 0.85; }

    /* ── Route planner panel ── */
    #planner-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
      background: var(--app-bg-secondary, #1a2d1c);
      color: var(--app-text-primary, #e8f5e9);
      border-radius: 18px 18px 0 0;
      padding: 0.9em 1em calc(env(safe-area-inset-bottom) + 0.9em);
      box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    #planner-panel.collapsed { transform: translateY(calc(100% - 3.8em)); }
    body.is-pwa #planner-panel {
      bottom: calc(4.5em + env(safe-area-inset-bottom));
    }

    /* drag handle */
    .panel-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.2); margin: 0 auto 0.8em;
      cursor: pointer;
    }

    /* ── Plan form ── */
    .plan-row {
      display: flex; align-items: center; gap: 0.6em; margin-bottom: 0.6em;
    }
    .plan-row-icon {
      font-size: 1.1em; width: 1.4em; text-align: center; flex-shrink: 0;
    }
    .plan-input {
      flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; color: var(--app-text-primary, #e8f5e9); padding: 0.55em 0.8em; font-size: 0.92em;
      appearance: none; outline: none;
    }
    .plan-input:focus { border-color: #04D93C; }
    .plan-input option { background: var(--app-bg-secondary, #1a2d1c); }

    #btn-plan-route {
      width: 100%; padding: 0.85em; border: none; border-radius: 10px;
      background: #04D93C; color: #121f14; font-size: 1em; font-weight: bold;
      cursor: pointer; margin-top: 0.4em; letter-spacing: 0.03em;
      transition: background 0.2s;
    }
    #btn-plan-route:hover { background: #06f043; }
    #btn-plan-route:disabled { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.4); cursor: default; }

    /* ── Route summary (shown after planning) ── */
    #route-summary {
      display: none; margin-top: 0.6em;
      background: rgba(4,217,60,0.08); border-radius: 10px; border: 1px solid rgba(4,217,60,0.25);
      padding: 0.75em 1em;
    }
    #route-summary.show { display: block; }
    .route-summary-row {
      display: flex; justify-content: space-between;
      font-size: 0.88em; margin-bottom: 0.3em; opacity: 0.85;
    }
    .route-summary-row strong { color: #BFE340; }
    #btn-start-nav {
      width: 100%; padding: 0.85em; border: none; border-radius: 10px;
      background: #BFE340; color: #121f14; font-size: 1em; font-weight: bold;
      cursor: pointer; margin-top: 0.6em; letter-spacing: 0.03em;
      transition: background 0.2s; display: none;
    }
    #btn-start-nav.show { display: block; }
    #btn-start-nav:hover { background: #d4f060; }

    /* ── Active nav stats bar (shown during navigation) ── */
    #nav-stats-bar {
      display: none; gap: 0; border-radius: 10px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
    }
    #nav-stats-bar.show { display: flex; }
    .nav-stat {
      flex: 1; text-align: center; padding: 0.6em 0.3em;
      background: rgba(255,255,255,0.05);
      border-right: 1px solid rgba(255,255,255,0.07);
    }
    .nav-stat:last-child { border-right: none; }
    .nav-stat .val { font-size: 1.1em; font-weight: bold; color: #BFE340; }
    .nav-stat .lbl { font-size: 0.62em; opacity: 0.6; margin-top: 0.1em; }

    #btn-end-nav {
      width: 100%; padding: 0.7em; border: none; border-radius: 8px;
      background: rgba(231,76,60,0.8); color: #fff; font-size: 0.9em; font-weight: bold;
      cursor: pointer; margin-top: 0.5em;
    }

    /* ── GPS accuracy dot ── */
    #gps-dot {
      position: fixed; bottom: calc(env(safe-area-inset-bottom) + 0.5em); left: 1em; z-index: 201;
      display: flex; align-items: center; gap: 0.4em;
      background: rgba(18,31,20,0.8); border-radius: 20px; padding: 0.25em 0.7em;
      font-size: 0.7em; opacity: 0.8; color: var(--app-text-primary, #e8f5e9);
    }
    body.app-light-theme #gps-dot { background: rgba(240,248,240,0.9); color: #1b3a1f; }
    #gps-dot-indicator {
      width: 8px; height: 8px; border-radius: 50%; background: #aaa;
      transition: background 0.5s;
    }
    #gps-dot-indicator.good { background: #04D93C; animation: pulse 1.5s infinite; }
    #gps-dot-indicator.searching { background: #f39c12; }
    body.is-pwa #gps-dot {
      bottom: calc(4.8em + env(safe-area-inset-bottom));
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.4; }
    }

    /* ── Zoom control (reposition above panel) ── */
    .maplibregl-ctrl-bottom-right { bottom: 45vh !important; }

    /* ── Loading overlay ── */
    #nav-loading {
      position: fixed; inset: 0; z-index: 500;
      background: var(--app-bg-primary, #121f14); color: var(--app-text-primary, #e8f5e9);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1em;
    }
    #nav-loading.hidden { display: none; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #04D93C; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Arrived overlay ── */
    #arrived-overlay {
      display: none; position: fixed; inset: 0; z-index: 600;
      background: rgba(18,31,20,0.96); align-items: center; justify-content: center;
      flex-direction: column; text-align: center; padding: 2em;
    }
    body.app-light-theme #arrived-overlay { background: rgba(240,248,240,0.97); color: #1b3a1f; }
    #arrived-overlay.show { display: flex; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    #arrived-emoji { font-size: 4em; margin-bottom: 0.3em; }
    #arrived-title { font-size: 1.8em; font-weight: bold; color: #BFE340; margin-bottom: 0.5em; }
    #arrived-stats { font-size: 0.9em; opacity: 0.8; margin-bottom: 1.5em; line-height: 1.7; }
    #btn-arrived-done {
      background: #04D93C; color: #121f14; border: none;
      padding: 0.85em 2.5em; border-radius: 10px; font-size: 1em; font-weight: bold;
      cursor: pointer;
    }

    /* ── Panel collapsed title ── */
    #panel-collapsed-title {
      display: none; align-items: center; gap: 0.5em;
      font-size: 0.88em; font-weight: bold; color: #a8d8a0;
    }
    #planner-panel.collapsed #panel-collapsed-title { display: flex; }
    #planner-panel.collapsed #planner-form { display: none; }
    #planner-panel.collapsed #route-summary { display: none !important; }
    #planner-panel.collapsed #btn-start-nav { display: none !important; }
    #planner-panel.collapsed #nav-stats-bar { display: none !important; }
    #planner-panel.collapsed #btn-end-nav { display: none; }

    /* ── maplibre custom user dot ── */
    .user-dot {
      width: 18px; height: 18px; border-radius: 50%;
      background: #04D93C; border: 3px solid #fff;
      box-shadow: 0 0 8px rgba(4,217,60,0.6);
    }
    .user-cone {
      width: 0; height: 0; position: absolute; top: -14px; left: 50%;
      transform: translateX(-50%);
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-bottom: 14px solid rgba(4,217,60,0.5);
    }
    .user-dot-wrap {
      position: relative; width: 18px; height: 18px;
    }

    /* ── Light theme overrides ── */
    body.app-light-theme .plan-input,
    body:not(.app-theme-explicit):not(.app-light-theme) .plan-input {
      /* only dark fallback; light applied below */
    }
    body.app-light-theme .plan-input {
      background: rgba(0,0,0,0.06);
      border-color: rgba(0,0,0,0.18);
      color: var(--app-text-primary, #1b3a1f);
    }
    body.app-light-theme .plan-input option { background: var(--app-bg-secondary, #eaf4ea); }
    body.app-light-theme #turn-banner {
      background: rgba(240,248,240,0.97);
      border-bottom-color: #2e7d32;
      color: #1b3a1f;
    }
    body.app-light-theme #turn-dist { color: #2e7d32; }
    body.app-light-theme #nav-stats-bar {
      border-color: rgba(0,0,0,0.12);
    }
    body.app-light-theme .nav-stat {
      background: rgba(0,0,0,0.04);
      border-right-color: rgba(0,0,0,0.08);
    }
    body.app-light-theme .nav-stat .val { color: #2e7d32; }
    body.app-light-theme #btn-plan-route:disabled {
      background: rgba(0,0,0,0.1);
      color: rgba(0,0,0,0.35);
    }
    body.app-light-theme #nav-loading {
      background: var(--app-bg-primary, #f5faf5);
      color: var(--app-text-primary, #1b3a1f);
    }
    body.app-light-theme .panel-handle { background: rgba(0,0,0,0.15); }
    body.app-light-theme #panel-collapsed-title { color: #2e7d32; }
    @media (prefers-color-scheme: light) {
        body:not(.app-theme-explicit) #nav-topbar { background: linear-gradient(to bottom, rgba(240,248,240,0.97) 75%, transparent); color: #1b3a1f; }
        body:not(.app-theme-explicit) #btn-nav-back { background: rgba(0,0,0,0.08); }
        body:not(.app-theme-explicit) .plan-input { background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.18); color: var(--app-text-primary, #1b3a1f); }
        body:not(.app-theme-explicit) .plan-input option { background: var(--app-bg-secondary, #eaf4ea); }
        body:not(.app-theme-explicit) #turn-banner { background: rgba(240,248,240,0.97); border-bottom-color: #2e7d32; color: #1b3a1f; }
        body:not(.app-theme-explicit) #turn-dist { color: #2e7d32; }
        body:not(.app-theme-explicit) #nav-stats-bar { border-color: rgba(0,0,0,0.12); }
        body:not(.app-theme-explicit) .nav-stat { background: rgba(0,0,0,0.04); border-right-color: rgba(0,0,0,0.08); }
        body:not(.app-theme-explicit) .nav-stat .val { color: #2e7d32; }
        body:not(.app-theme-explicit) #btn-plan-route:disabled { background: rgba(0,0,0,0.1); color: rgba(0,0,0,0.35); }
        body:not(.app-theme-explicit) #nav-loading { background: var(--app-bg-primary, #f5faf5); color: var(--app-text-primary, #1b3a1f); }
        body:not(.app-theme-explicit) #gps-dot { background: rgba(240,248,240,0.9); color: #1b3a1f; }
        body:not(.app-theme-explicit) #arrived-overlay { background: rgba(240,248,240,0.97); color: #1b3a1f; }
        body:not(.app-theme-explicit) .panel-handle { background: rgba(0,0,0,0.15); }
        body:not(.app-theme-explicit) #panel-collapsed-title { color: #2e7d32; }
    }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="nav-loading">
    <div class="spinner"></div>
    <p data-i18n="nav_loading">正在載入地圖...</p>
  </div>

  <!-- Full-screen map -->
  <div id="nav-map"></div>

  <!-- Top bar -->
  <div id="nav-topbar">
    <a href="javascript:navBack()" id="btn-nav-back" aria-label="返回">
      <i class="fas fa-chevron-left"></i>
    </a>
    <div id="nav-title-wrap">
      <span id="nav-title" data-i18n="nav_title">🗺️ 單車徑導航</span>
      <div id="nav-topbar-meta">
        <span id="nav-road-name" class="nav-chip" data-i18n="road_searching">定位中…</span>
        <span id="nav-junction-distance" class="nav-chip">下一路口 <strong>--</strong></span>
        <span id="nav-pushbike-warning" class="nav-chip"><i class="fas fa-person-walking"></i><span id="nav-pushbike-text">請推車</span></span>
      </div>
    </div>
    <button id="btn-heading-up" title="切換地圖方向" aria-label="切換地圖方向">
      <i class="fas fa-compass"></i>
    </button>
  </div>

  <!-- Turn instruction banner -->
  <div id="turn-banner" aria-live="polite">
    <div id="turn-icon">↑</div>
    <div id="turn-text-wrap">
      <div id="turn-dist">-- m</div>
      <div id="turn-instruction" data-i18n="nav_continue">沿單車徑繼續前行</div>
    </div>
  </div>

  <!-- GPS accuracy indicator -->
  <div id="gps-dot">
    <div id="gps-dot-indicator"></div>
    <span id="gps-dot-label">GPS</span>
  </div>

  <!-- Bottom planner panel -->
  <div id="planner-panel">
    <div class="panel-handle" id="panel-handle"></div>

    <!-- Collapsed title (only visible when panel is collapsed) -->
    <div id="panel-collapsed-title">
      <i class="fas fa-map-marked-alt"></i>
      <span id="collapsed-summary-text" data-i18n="nav_plan">規劃單車路線</span>
    </div>

    <!-- Full planner form -->
    <div id="planner-form">
      <div class="plan-row">
        <span class="plan-row-icon" style="color:#04D93C;">📍</span>
        <input class="plan-input" id="sel-from" list="landmark-options" aria-label="選擇起點" data-i18n-placeholder="from_placeholder" placeholder="輸入或選擇起點（可自訂地址）">
      </div>
      <div class="plan-row">
        <span class="plan-row-icon" style="color:#e74c3c;">🏁</span>
        <input class="plan-input" id="sel-to" list="landmark-options" aria-label="選擇終點" data-i18n-placeholder="to_placeholder" placeholder="輸入或選擇終點（可自訂地址）">
      </div>
      <datalist id="landmark-options"></datalist>
      <div class="plan-row">
        <span class="plan-row-icon">🚴</span>
        <select id="sel-profile" class="plan-input" aria-label="路線偏好">
          <option value="safety" data-i18n="profile_safety">安全路線（優先單車徑）</option>
          <option value="trekking" data-i18n="profile_trekking">遠足路線（混合路面）</option>
          <option value="fastbike" data-i18n="profile_fastbike">快速路線（最快到達）</option>
          <option value="shortest" data-i18n="profile_shortest">最短路線（最短距離）</option>
        </select>
      </div>
      <button id="btn-plan-route" disabled data-i18n="btn_plan">🔍 規劃路線</button>

      <!-- Route summary (after planning) -->
      <div id="route-summary">
        <div class="route-summary-row">
          <span data-i18n="rs_dist">路線長度</span><strong id="rs-dist">--</strong>
        </div>
        <div class="route-summary-row">
          <span data-i18n="rs_time">預計時間</span><strong id="rs-time">--</strong>
        </div>
        <div class="route-summary-row">
          <span data-i18n="rs_turns">轉向次數</span><strong id="rs-turns">--</strong>
        </div>
      </div>
      <button id="btn-start-nav" data-i18n="btn_start">🚴 開始導航</button>

      <!-- Active navigation stats -->
      <div id="nav-stats-bar">
        <div class="nav-stat">
          <div class="val" id="nav-stat-dist">0 m</div>
          <div class="lbl" data-i18n="stat_dist">已行距離</div>
        </div>
        <div class="nav-stat">
          <div class="val" id="nav-stat-remain">--</div>
          <div class="lbl" data-i18n="stat_remain">剩餘距離</div>
        </div>
        <div class="nav-stat">
          <div class="val" id="nav-stat-eta">--</div>
          <div class="lbl" data-i18n="stat_eta">預計到達</div>
        </div>
        <div class="nav-stat">
          <div class="val" id="nav-stat-speed">--</div>
          <div class="lbl" data-i18n="stat_speed">速度 km/h</div>
        </div>
      </div>
      <button id="btn-end-nav" style="display:none;" data-i18n="btn_end">⏹ 結束導航</button>
    </div>
  </div>

  <!-- Arrived overlay -->
  <div id="arrived-overlay">
    <div id="arrived-emoji">🎉</div>
    <div id="arrived-title" data-i18n="arrived_title">已到達目的地！</div>
    <div id="arrived-stats"></div>
    <button id="btn-arrived-done" data-i18n="btn_done">完成</button>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js" crossorigin=""></script>
  <script src="https://unpkg.com/@turf/turf@7.2.0/turf.min.js" crossorigin=""></script>
  <script src="/js/main.js"></script>
  <script src="/js/pwa.js"></script>
  <script>
  (function () {
    'use strict';

    // ── Landmarks (start/end points for route planning) ────────────────────
    const LANDMARKS = [
      { id: 'poa',   name: '寶琳（新都城二期）', lat: 22.32424, lon: 114.25696 },
      { id: 'kl',    name: '景林邨',             lat: 22.31870, lon: 114.25650 },
      { id: 'tkv',   name: '將軍澳村',           lat: 22.32480, lon: 114.24900 },
      { id: 'hah',   name: '坑口站',             lat: 22.31240, lon: 114.26550 },
      { id: 'tko',   name: '將軍澳中心',         lat: 22.30738, lon: 114.25666 },
      { id: 'tik',   name: '調景嶺（彩明苑）',   lat: 22.30046, lon: 114.25331 },
      { id: 'lhp',   name: '康城（日出康城）',   lat: 22.29070, lon: 114.26692 },
      { id: 'tkoi',  name: '將軍澳創新園',       lat: 22.28570, lon: 114.27240 },
    ];

    // ── Routing engines ────────────────────────────────────────────────────
    // Plan C: Brouter — cycling-optimised, free, no API key required
    // Returns GeoJSON; profiles: safety | trekking | fastbike | shortest
    const BROUTER_BASE = 'https://brouter.de/brouter';
    // Fallback: OSRM public demo (online, free, generic bike profile)
    const OSRM_FALLBACK = 'https://router.project-osrm.org/route/v1/bike';
    const ADDRESS_SUGGEST_MIN_CHARS = 2;
    const ADDRESS_SUGGEST_DEBOUNCE_MS = 250;
    const NOMINATIM_LIMIT = 5;

    // Maximum time (ms) to wait for map initial load before hiding the overlay
    const MAP_LOADING_TIMEOUT_MS = 12000;
    const TKO_DEFAULT_CENTER = [114.2597, 22.3083];
    const DEFAULT_NAV_ZOOM = 18;
    const DEFAULT_NAV_PITCH = 60;
    const VIRTUAL_LINK_MAX_M = 30;
    const SNAP_MAX_METERS = 45;
    const JUNCTION_DETECT_METERS = 15;
    const JUNCTION_HIGHLIGHT_METERS = 80;
    const GRID_CELL_DEG = 0.00045;

    // ── State ─────────────────────────────────────────────────────────────
    let map = null;
    let userMarker = null;
    let watchId = null;
    let headingUp = false;         // true = rotate map to face travel direction
    let lastLat = null, lastLon = null;
    let lastBearing = 0;
    let lastSpeedKmh = 0;
    let fallbackUsed = false;      // prevent repeated fallbackToRasterTiles() calls
    let loadingTimer = null;       // safety timeout for loading overlay

    // Navigation state
    let isNavigating = false;
    let plannedRoute = null;       // route coords [[lon,lat],…]
    let plannedSteps = [];         // turn-by-turn steps
    let currentStepIdx = 0;
    let navStartTime = null;
    let navDistTravelledM = 0;
    let navTotalDistM = 0;
    let plannedFrom = null;        // start point for re-draw after style change
    let plannedTo = null;          // end point for re-draw after style change
    let tkoGeoJsonData = null;     // cached TKO GeoJSON data
    let processedTrackNetwork = null;
    let networkLines = [];
    let networkIndex = new Map();
    let networkJunctions = turf.featureCollection([]);
    let routeLineFeature = null;
    let routeJunctions = [];
    let routeFxTimer = null;
    let lastSnappedLngLat = null;
    let lastCameraBearing = 0;
    let activeMatch = null;
    let activeRouteCoords = null;

    // ── Helpers ──────────────────────────────────────────────────────────
    function haversineM(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
      const Δφ = (lat2 - lat1) * Math.PI / 180;
      const Δλ = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function bearingDeg(lat1, lon1, lat2, lon2) {
      const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
      const Δλ = (lon2 - lon1) * Math.PI / 180;
      const y = Math.sin(Δλ) * Math.cos(φ2);
      const x = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
      return ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
    }

    function formatDist(m) {
      if (m >= 1000) return `${(m / 1000).toFixed(1)} km`;
      return `${Math.round(m)} m`;
    }

    function formatMinutes(mins) {
      if (mins < 60) return `${Math.round(mins)} 分鐘`;
      const h = Math.floor(mins / 60), m = Math.round(mins % 60);
      return `${h} 小時 ${m} 分鐘`;
    }

    function formatJunctionDist(meters) {
      return meters == null || !Number.isFinite(meters) ? '--' : formatDist(meters);
    }

    function getGridKey(lon, lat) {
      return `${Math.floor(lon / GRID_CELL_DEG)}:${Math.floor(lat / GRID_CELL_DEG)}`;
    }

    function getGridKeysForBBox(bbox) {
      const [minX, minY, maxX, maxY] = bbox;
      const keys = [];
      for (let x = Math.floor(minX / GRID_CELL_DEG); x <= Math.floor(maxX / GRID_CELL_DEG); x++) {
        for (let y = Math.floor(minY / GRID_CELL_DEG); y <= Math.floor(maxY / GRID_CELL_DEG); y++) {
          keys.push(`${x}:${y}`);
        }
      }
      return keys;
    }

    function normalizeTrackData(data) {
      const features = [];
      (data && Array.isArray(data.features) ? data.features : []).forEach((feature) => {
        if (!feature || !feature.geometry) return;
        const props = { ...(feature.properties || {}) };
        if (feature.geometry.type === 'LineString') {
          const coords = (feature.geometry.coordinates || [])
            .map(c => [Number(c[0]), Number(c[1])])
            .filter(c => Number.isFinite(c[0]) && Number.isFinite(c[1]));
          if (coords.length >= 2) {
            features.push(turf.lineString(coords, { ...props, linkType: 'cycle-track', isVirtual: false }));
          }
          return;
        }
        if (feature.geometry.type === 'MultiLineString') {
          (feature.geometry.coordinates || []).forEach((part, partIdx) => {
            const coords = (part || [])
              .map(c => [Number(c[0]), Number(c[1])])
              .filter(c => Number.isFinite(c[0]) && Number.isFinite(c[1]));
            if (coords.length >= 2) {
              features.push(turf.lineString(coords, {
                ...props,
                _multiPart: partIdx,
                linkType: 'cycle-track',
                isVirtual: false,
              }));
            }
          });
        }
      });
      return features;
    }

    function buildVirtualLinks(lineFeatures, thresholdMeters) {
      const endpoints = [];
      const buckets = new Map();

      lineFeatures.forEach((feature, lineIdx) => {
        const coords = feature.geometry.coordinates || [];
        if (coords.length < 2) return;
        [
          { lineIdx, endpointType: 'start', coord: coords[0] },
          { lineIdx, endpointType: 'end', coord: coords[coords.length - 1] },
        ].forEach((endpoint) => {
          endpoints.push(endpoint);
          const key = getGridKey(endpoint.coord[0], endpoint.coord[1]);
          if (!buckets.has(key)) buckets.set(key, []);
          buckets.get(key).push(endpoint);
        });
      });

      const links = [];
      const seen = new Set();
      endpoints.forEach((a) => {
        const [lon, lat] = a.coord;
        const x = Math.floor(lon / GRID_CELL_DEG);
        const y = Math.floor(lat / GRID_CELL_DEG);
        for (let dx = -1; dx <= 1; dx++) {
          for (let dy = -1; dy <= 1; dy++) {
            const nearby = buckets.get(`${x + dx}:${y + dy}`) || [];
            nearby.forEach((b) => {
              if (a.lineIdx === b.lineIdx) return;
              const linePairKey = [a.lineIdx, b.lineIdx].sort((m, n) => m - n).join(':');
              const endpointPairKey = `${linePairKey}:${a.endpointType}:${b.endpointType}`;
              const reverseKey = `${linePairKey}:${b.endpointType}:${a.endpointType}`;
              if (seen.has(endpointPairKey) || seen.has(reverseKey)) return;
              const distance = turf.distance(turf.point(a.coord), turf.point(b.coord), { units: 'meters' });
              if (distance >= thresholdMeters || distance === 0) return;
              links.push(turf.lineString([a.coord, b.coord], {
                linkType: 'push-bike',
                isVirtual: true,
                roadName: 'Push Bike Link',
                distance_m: Number(distance.toFixed(2)),
              }));
              seen.add(endpointPairKey);
            });
          }
        }
      });
      return links;
    }

    function buildLineSpatialIndex(lineFeatures) {
      const index = new Map();
      lineFeatures.forEach((feature, idx) => {
        getGridKeysForBBox(turf.bbox(feature)).forEach((key) => {
          if (!index.has(key)) index.set(key, []);
          index.get(key).push(idx);
        });
      });
      return index;
    }

    function getCandidateLineIndexes(coord) {
      const [lon, lat] = coord;
      const x = Math.floor(lon / GRID_CELL_DEG);
      const y = Math.floor(lat / GRID_CELL_DEG);
      const idxs = new Set();
      for (let dx = -1; dx <= 1; dx++) {
        for (let dy = -1; dy <= 1; dy++) {
          const key = `${x + dx}:${y + dy}`;
          (networkIndex.get(key) || []).forEach(v => idxs.add(v));
        }
      }
      return idxs.size ? Array.from(idxs) : networkLines.map((_, idx) => idx);
    }

    function buildJunctionCollection(lineFeatures) {
      const counts = new Map();
      lineFeatures.forEach((feature) => {
        (feature.geometry.coordinates || []).forEach((coord) => {
          const key = `${coord[0].toFixed(6)}:${coord[1].toFixed(6)}`;
          counts.set(key, (counts.get(key) || 0) + 1);
        });
      });
      return turf.featureCollection(
        Array.from(counts.entries())
          .filter(([, count]) => count >= 3)
          .map(([key, count]) => {
            const [lon, lat] = key.split(':').map(Number);
            return turf.point([lon, lat], { degree: count });
          })
      );
    }

    function preprocessTrackNetwork(data) {
      const normalized = normalizeTrackData(data);
      const virtualLinks = buildVirtualLinks(normalized, VIRTUAL_LINK_MAX_M);
      const features = [...normalized, ...virtualLinks];
      return {
        type: 'FeatureCollection',
        features,
      };
    }

    function getNearestNetworkMatch(coord) {
      if (!networkLines.length || typeof turf === 'undefined') return null;
      const point = turf.point(coord);
      let best = null;
      getCandidateLineIndexes(coord).forEach((idx) => {
        const feature = networkLines[idx];
        const snapped = turf.nearestPointOnLine(feature, point, { units: 'meters' });
        const dist = snapped && snapped.properties ? Number(snapped.properties.dist || Infinity) : Infinity;
        if (!best || dist < best.distance) {
          best = {
            feature,
            snapped,
            distance: dist,
          };
        }
      });
      return best;
    }

    function snapCoordinateToNetwork(coord) {
      const match = getNearestNetworkMatch(coord);
      if (!match || !match.snapped || match.distance > SNAP_MAX_METERS) {
        return {
          coordinate: coord,
          match: null,
          isSnapped: false,
        };
      }
      return {
        coordinate: match.snapped.geometry.coordinates.slice(0, 2),
        match,
        isSnapped: true,
      };
    }

    function smoothBearing(nextBearing) {
      if (!Number.isFinite(nextBearing)) return lastCameraBearing;
      const current = Number.isFinite(lastCameraBearing) ? lastCameraBearing : 0;
      const delta = ((nextBearing - current + 540) % 360) - 180;
      lastCameraBearing = (current + delta * 0.28 + 360) % 360;
      return lastCameraBearing;
    }

    function computeHeadingFromMovement(coord) {
      if (!lastSnappedLngLat) return lastCameraBearing || 0;
      const movement = turf.distance(turf.point(lastSnappedLngLat), turf.point(coord), { units: 'meters' });
      if (movement < 1.5) return lastCameraBearing || 0;
      return turf.bearing(turf.point(lastSnappedLngLat), turf.point(coord));
    }

    function extractRoadName(props) {
      if (!props) return '單車徑';
      return props.roadName ||
        props.ROAD_NAME ||
        props.ROADNAME ||
        props.route_name ||
        props.routeName ||
        props.NAME_CHI ||
        props.NAME ||
        props.STREET ||
        props.STREETNAME ||
        props.name ||
        (props.linkType === 'push-bike' ? 'Push Bike Link' : '單車徑');
    }

    function updateTopBarMeta(match, distanceToJunctionMeters) {
      const lang = localStorage.getItem('appLang') === 'en' ? 'en' : 'zh';
      const junctionLabel = lang === 'en' ? 'Next junction' : '下一路口';
      const locatingLabel = lang === 'en' ? 'Locating…' : '定位中…';
      const roadEl = document.getElementById('nav-road-name');
      const junctionEl = document.getElementById('nav-junction-distance');
      const pushBikeEl = document.getElementById('nav-pushbike-warning');
      if (roadEl) roadEl.textContent = match ? extractRoadName(match.feature.properties) : locatingLabel;
      if (junctionEl) junctionEl.innerHTML = `${junctionLabel} <strong>${formatJunctionDist(distanceToJunctionMeters)}</strong>`;
      if (pushBikeEl) pushBikeEl.classList.toggle('show', !!(match && match.feature && match.feature.properties && match.feature.properties.linkType === 'push-bike'));
    }

    function projectRouteToNetwork(coords) {
      if (!Array.isArray(coords) || !coords.length || !networkLines.length) return coords;
      const projected = [];
      coords.forEach((coord) => {
        const snapped = snapCoordinateToNetwork(coord);
        const nextCoord = snapped.isSnapped ? snapped.coordinate : coord;
        const prev = projected[projected.length - 1];
        if (!prev || haversineM(prev[1], prev[0], nextCoord[1], nextCoord[0]) > 1.5) {
          projected.push(nextCoord);
        }
      });
      return projected.length >= 2 ? projected : coords;
    }

    function buildRouteJunctions(coords) {
      if (!coords || coords.length < 2 || !networkJunctions.features.length) return [];
      const routeLine = turf.lineString(coords);
      return networkJunctions.features
        .map((feature) => {
          const snapped = turf.nearestPointOnLine(routeLine, feature, { units: 'meters' });
          const dist = Number(snapped.properties && snapped.properties.dist || Infinity);
          if (!Number.isFinite(dist) || dist > JUNCTION_DETECT_METERS) return null;
          let coordIndex = 0;
          let coordDist = Infinity;
          coords.forEach((coord, idx) => {
            const d = turf.distance(turf.point(coord), feature, { units: 'meters' });
            if (d < coordDist) {
              coordDist = d;
              coordIndex = idx;
            }
          });
          return {
            point: feature,
            routeLocation: Number(snapped.properties && snapped.properties.location || 0),
            coordIndex,
          };
        })
        .filter(Boolean)
        .sort((a, b) => a.routeLocation - b.routeLocation)
        .filter((entry, idx, arr) => idx === 0 || Math.abs(entry.routeLocation - arr[idx - 1].routeLocation) > 20);
    }

    /** Decode OSRM polyline (precision 5 or 6) */
    function decodePolyline(encoded, precision) {
      const factor = Math.pow(10, precision || 5);
      const coords = [];
      let index = 0, lat = 0, lng = 0;
      while (index < encoded.length) {
        let b, shift = 0, result = 0;
        do { b = encoded.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
        lat += (result & 1) ? ~(result >> 1) : result >> 1;
        shift = 0; result = 0;
        do { b = encoded.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
        lng += (result & 1) ? ~(result >> 1) : result >> 1;
        coords.push([lng / factor, lat / factor]);
      }
      return coords;
    }

    /** Turn type → emoji arrow */
    function turnEmoji(modifier) {
      const m = (modifier || '').toLowerCase();
      if (m.includes('sharp right') || m.includes('uturn')) return '↩';
      if (m.includes('right')) return '↱';
      if (m.includes('sharp left')) return '↪';
      if (m.includes('left')) return '↰';
      if (m.includes('slight right')) return '↗';
      if (m.includes('slight left')) return '↖';
      return '↑';
    }

    /** Translate OSRM maneuver to Chinese instruction */
    function stepInstruction(step) {
      if (!step) return '繼續前行';
      const type = step.maneuver && step.maneuver.type;
      const modifier = step.maneuver && step.maneuver.modifier;
      const road = step.name ? `「${step.name}」` : '';
      if (type === 'arrive') return `抵達${road}目的地`;
      if (type === 'depart') return `出發，沿${road}前行`;
      if (type === 'turn') {
        const dir = modifier
          ? modifier.replace('sharp ', '急').replace('slight ', '輕微').replace('right', '右轉').replace('left', '左轉').replace('uturn', 'U形轉').replace('straight', '直行')
          : '直行';
        return `${dir}${road ? `，進入${road}` : ''}`;
      }
      if (type === 'continue') return `繼續沿${road}前行`;
      if (type === 'roundabout' || type === 'rotary') return `進入迴旋處${road}`;
      if (type === 'fork') return `保持${modifier === 'right' ? '右側' : '左側'}分叉${road}`;
      return `繼續前行${road}`;
    }

    /** Convert bearing-change degrees to turn modifier string */
    function turnModifier(delta) {
      if (delta >  90) return 'sharp right';
      if (delta >  45) return 'right';
      if (delta >   0) return 'slight right';
      if (delta === 0) return 'straight';
      if (delta < -90) return 'sharp left';
      if (delta < -45) return 'left';
      return 'slight left';
    }

    /**
     * Derive turn-by-turn navigation steps from a coordinate array.
     * Each step has { maneuver: { type, modifier }, name, pt: [lon, lat] }
     * where pt is the endpoint of that leg (the turn / destination position).
     */
    function computeNavSteps(coords) {
      if (!coords || coords.length < 2) return [];
      const TURN_THRESH_DEG = 30;  // min bearing change to count as a turn
      const MIN_SEP_M = 30;        // min distance between consecutive turns
      const steps = [];
      let prevTurnIdx = 0;

      for (let i = 1; i < coords.length - 1; i++) {
        const bPrev = bearingDeg(coords[i-1][1], coords[i-1][0], coords[i][1], coords[i][0]);
        const bNext = bearingDeg(coords[i][1],   coords[i][0],   coords[i+1][1], coords[i+1][0]);
        const delta = ((bNext - bPrev + 540) % 360) - 180; // normalise to -180..180
        if (Math.abs(delta) < TURN_THRESH_DEG) continue;
        const d = haversineM(coords[prevTurnIdx][1], coords[prevTurnIdx][0], coords[i][1], coords[i][0]);
        if (d < MIN_SEP_M) continue; // merge turns that are too close together
        steps.push({
          maneuver: { type: 'turn', modifier: turnModifier(delta) },
          name: '',
          pt: coords[i],
        });
        prevTurnIdx = i;
      }

      // Prepend depart step.
      // pt points to the first turn (or destination on a straight route) so that
      // updateNavProgress advances the step when the rider reaches that waypoint.
      steps.unshift({
        maneuver: { type: 'depart', modifier: 'straight' },
        name: '出發',
        pt: steps.length ? steps[0].pt : coords[coords.length - 1],
      });

      // Append arrive step
      steps.push({
        maneuver: { type: 'arrive', modifier: '' },
        name: '目的地',
        pt: coords[coords.length - 1],
      });

      return steps;
    }

    // ── Map initialisation ────────────────────────────────────────────────
    function initMap() {
      // Guard: maplibregl may not be available if the CDN script failed to load
      if (typeof maplibregl === 'undefined') {
        const el = document.getElementById('nav-loading');
        if (el) {
          el.innerHTML = '<p style="color:#BFE340; text-align:center; padding:1em; line-height:1.7;">' +
            '⚠️ 地圖庫載入失敗，請檢查網絡連接後重試。<br><br>' +
            '<a href="javascript:history.back()" style="color:#04D93C;">← 返回</a></p>';
        }
        return;
      }
      // Check for WebGL support before attempting to create the map
      if (typeof maplibregl.supported === 'function' && !maplibregl.supported()) {
        const el = document.getElementById('nav-loading');
        el.innerHTML = '<p style="color:#BFE340; text-align:center; padding:1em; line-height:1.7;">' +
          '⚠️ 你的裝置不支援 WebGL，無法顯示地圖。<br>' +
          '<small style="opacity:0.7;">請嘗試在 Safari 或 Chrome 中重新開啟此頁面。</small><br><br>' +
          '<a href="javascript:history.back()" style="color:#04D93C;">← 返回</a></p>';
        return;
      }

      // Safety timeout: hide loading overlay after MAP_LOADING_TIMEOUT_MS even if map fails to load
      loadingTimer = setTimeout(() => {
        document.getElementById('nav-loading').classList.add('hidden');
      }, MAP_LOADING_TIMEOUT_MS);

      // Choose map style based on current theme
      const isLightTheme = document.body.classList.contains('app-light-theme') ||
        (!document.body.classList.contains('app-theme-explicit') &&
          window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches);
      const mapStyle = isLightTheme
        ? 'https://tiles.openfreemap.org/styles/liberty'
        : 'https://tiles.openfreemap.org/styles/dark';

      map = new maplibregl.Map({
        container: 'nav-map',
        // OpenFreeMap free vector tiles (no API key, no usage limits)
        style: mapStyle,
        center: TKO_DEFAULT_CENTER,
        zoom: DEFAULT_NAV_ZOOM,
        pitch: DEFAULT_NAV_PITCH,
        bearing: 0,
        antialias: true,
        attributionControl: false,
      });

      map.addControl(new maplibregl.AttributionControl({ compact: true }), 'bottom-left');
      map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'bottom-right');

      map.on('load', () => {
        clearTimeout(loadingTimer);
        addCyclewayLayers();
        loadTkoGeoJson();
        map.easeTo({ zoom: DEFAULT_NAV_ZOOM, pitch: DEFAULT_NAV_PITCH, duration: 0 });
        document.getElementById('nav-loading').classList.add('hidden');
        startGPS();
      });

      map.on('error', (e) => {
        console.warn('[Nav] Map error:', e);
        // Fallback to OSM raster tiles if vector tile source fails.
        // Guard ensures this runs at most once — the 'error' event fires for
        // every failed tile request, so without the guard each tile 404 would
        // call setStyle() again and crash the browser.
        fallbackToRasterTiles();
      });
    }

    /** Fallback raster tiles if OpenFreeMap unavailable */
    function fallbackToRasterTiles() {
      // Guard: only run once. The MapLibre 'error' event fires for every failed
      // tile request, so without this flag each 404 would call setStyle() again,
      // causing repeated map resets that freeze/crash the browser on mobile.
      if (fallbackUsed) return;
      fallbackUsed = true;

      clearTimeout(loadingTimer);
      document.getElementById('nav-loading').classList.add('hidden');
      // Replace style with a simple raster source
      try {
        const isLight = document.body.classList.contains('app-light-theme') ||
          (!document.body.classList.contains('app-theme-explicit') &&
            window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches);
        const fallbackTiles = isLight
          ? ['https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png']
          : ['https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'];
        map.setStyle({
          version: 8,
          sources: {
            'osm-raster': {
              type: 'raster',
              tiles: fallbackTiles,
              tileSize: 256,
              attribution: '© OpenStreetMap © CartoDB',
              maxzoom: 19,
            },
          },
          layers: [{ id: 'osm-raster', type: 'raster', source: 'osm-raster' }],
        });
        map.once('styledata', () => {
          addTkoLocalLayer(tkoGeoJsonData);
          // Re-draw planned route if one was active before the style reset
          if (plannedRoute && plannedRoute.length && plannedFrom && plannedTo) {
            drawPlannedRoute(plannedRoute, plannedFrom, plannedTo);
          }
        });
      } catch (e) { console.warn('[Nav] Fallback raster also failed', e); }
    }

    /** Add custom cycleway style layers on top of the vector basemap */
    function addCyclewayLayers() {
      // Find transportation source by checking common source IDs and any vector source with transportation layer
      const candidateIds = ['openmaptiles', 'maptiler_planet', 'planet', 'openfreemap', 'vectorTiles'];
      let src = null;
      for (const id of candidateIds) {
        if (map.getSource(id)) { src = id; break; }
      }
      // Fallback: scan all sources for a vector type
      if (!src) {
        const style = map.getStyle();
        if (style && style.sources) {
          for (const [id, s] of Object.entries(style.sources)) {
            if (s.type === 'vector') { src = id; break; }
          }
        }
      }
      if (!src) return;

      // Layer 1: Cycleway background fill (wide green strip)
      if (!map.getLayer('ctrc-cycleway-fill')) {
        map.addLayer({
          id: 'ctrc-cycleway-fill',
          type: 'line',
          source: src,
          'source-layer': 'transportation',
          filter: ['any',
            ['==', ['get', 'subclass'], 'cycleway'],
            ['all', ['==', ['get', 'class'], 'path'], ['==', ['get', 'bicycle'], 'designated']],
          ],
          paint: {
            'line-color': '#00C853',
            'line-width': ['interpolate', ['linear'], ['zoom'],
              12, 2, 15, 5, 17, 10, 19, 18],
            'line-opacity': 0.75,
          },
        }, findFirstSymbolLayer());
      }

      // Layer 2: Dashed centerline (mimics road markings)
      if (!map.getLayer('ctrc-cycleway-center')) {
        map.addLayer({
          id: 'ctrc-cycleway-center',
          type: 'line',
          source: src,
          'source-layer': 'transportation',
          filter: ['any',
            ['==', ['get', 'subclass'], 'cycleway'],
            ['all', ['==', ['get', 'class'], 'path'], ['==', ['get', 'bicycle'], 'designated']],
          ],
          minzoom: 15,
          paint: {
            'line-color': '#FFFFFF',
            'line-width': 1.2,
            'line-dasharray': [4, 4],
            'line-opacity': 0.65,
          },
        }, findFirstSymbolLayer());
      }
    }

    /** Find first symbol layer to insert below it */
    function findFirstSymbolLayer() {
      const layers = map.getStyle().layers || [];
      for (const layer of layers) {
        if (layer.type === 'symbol') return layer.id;
      }
      return undefined;
    }

    /** Load TKO GeoJSON cycling track overlay */
    async function loadTkoGeoJson() {
      const candidates = [
        '/data/tko_tracks.json',
        '/CYCFACI.gdb_CYCTRACK_converted.geojson',
        '/gpx/tko/cycling_tracks_tko.geojson',
      ];
      for (const url of candidates) {
        try {
          const resp = await fetch(url);
          if (!resp.ok) continue;
          const data = await resp.json();
          if (!data || !Array.isArray(data.features)) continue;
          tkoGeoJsonData = data;
          processedTrackNetwork = preprocessTrackNetwork(data);
          networkLines = processedTrackNetwork.features.slice();
          networkIndex = buildLineSpatialIndex(networkLines);
          networkJunctions = buildJunctionCollection(networkLines);
          addTkoLocalLayer(processedTrackNetwork);
          updateTopBarMeta(null, null);
          return;
        } catch (e) {
          console.warn('[Nav] TKO GeoJSON load candidate failed', url, e);
        }
      }
      console.warn('[Nav] TKO GeoJSON load failed: no usable dataset found');
    }

    function addTkoLocalLayer(data) {
      if (!map) return;
      if (map.getSource('tko-cycleways')) {
        // Source already exists — just update the data if we have real data
        if (data) map.getSource('tko-cycleways').setData(data);
        return;
      }

      map.addSource('tko-cycleways', {
        type: 'geojson',
        data: data || { type: 'FeatureCollection', features: [] },
      });

      // Background: bright green track (official/local data takes precedence visually)
      map.addLayer({
        id: 'tko-cycleway-bg',
        type: 'line',
        source: 'tko-cycleways',
        paint: {
          'line-color': ['case',
            ['==', ['get', 'linkType'], 'push-bike'], '#FFD166',
            '#00E5FF'
          ],
          'line-width': ['interpolate', ['linear'], ['zoom'],
            12, 3, 15, 6, 17, 12, 19, 20],
          'line-opacity': 0.82,
          'line-cap': 'round',
          'line-join': 'round',
        },
      });

      // Dashed centerline overlay
      map.addLayer({
        id: 'tko-cycleway-center',
        type: 'line',
        source: 'tko-cycleways',
        minzoom: 14,
        paint: {
          'line-color': '#FFFFFF',
          'line-width': 1.5,
          'line-dasharray': ['case',
            ['==', ['get', 'linkType'], 'push-bike'], ['literal', [1.2, 1.8]],
            ['literal', [4, 5]]
          ],
          'line-opacity': 0.6,
        },
      });

      // Edge outline for lane-level clarity
      map.addLayer({
        id: 'tko-cycleway-edge',

        source: 'tko-cycleways',

          'line-color': ['case',
            ['==', ['get', 'linkType'], 'push-bike'], '#8C6A00',
