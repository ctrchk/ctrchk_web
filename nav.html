    // ── GPS ───────────────────────────────────────────────────────────────
    const GPS_OPTS = { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 };

    function clearGpsWatch() {
      if (watchId !== null && 'geolocation' in navigator) {
        navigator.geolocation.clearWatch(watchId);
      }
      watchId = null;
    }

    function startGPS() {
      if (!('geolocation' in navigator)) {
        setGpsDot('error', '不支援 GPS');
        return;
      }
      setGpsDot('searching', '搜尋中...');
      navigator.geolocation.getCurrentPosition(
        pos => { handlePosition(pos); startWatch(); },
        err => { setGpsDot('error', 'GPS 錯誤'); startWatch(); },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    }

    function startWatch() {
      if (watchId !== null) return;
      watchId = navigator.geolocation.watchPosition(handlePosition, onGpsError, GPS_OPTS);
    }

    function updateCamera(lngLat, bearing) {
      if (!map) return;
      const nextBearing = headingUp ? smoothBearing(bearing) : 0;
      map.easeTo({
       center: lngLat,
       bearing: nextBearing,
       zoom: DEFAULT_NAV_ZOOM,
       pitch: DEFAULT_NAV_PITCH,
       duration: 550,
       easing: t => 1 - Math.pow(1 - t, 2),
      });
    }

    function handlePosition(pos) {
      const { latitude: lat, longitude: lon, accuracy, speed, heading } = pos.coords;
      const acc = Math.round(accuracy);
      setGpsDot(acc < 20 ? 'good' : acc < 50 ? 'fair' : 'searching', `±${acc} m`);

      const rawCoord = [lon, lat];
      const snapped = snapCoordinateToNetwork(rawCoord);
      const activeCoord = snapped.coordinate;
      activeMatch = snapped.match;

      if (lastSnappedLngLat) {
       const d = haversineM(lastSnappedLngLat[1], lastSnappedLngLat[0], activeCoord[1], activeCoord[0]);
       if (d > 1.2 && isNavigating) navDistTravelledM += d;
      }
      if (lastLat !== null && lastLon !== null && !snapped.isSnapped) {
       const dRaw = haversineM(lastLat, lastLon, lat, lon);
       if (dRaw > 2 && isNavigating && !lastSnappedLngLat) navDistTravelledM += dRaw;
      }
      lastLat = lat; lastLon = lon;
      lastSpeedKmh = speed != null ? speed * 3.6 : 0;

      const liveHeading = Number.isFinite(heading) && heading >= 0 ? heading : computeHeadingFromMovement(activeCoord);
      lastBearing = smoothBearing(liveHeading);

      updateUserMarker(activeCoord[1], activeCoord[0], lastBearing);
      updateCamera(activeCoord, lastBearing);

      if (isNavigating) {
       updateNavProgress(activeCoord[1], activeCoord[0], activeMatch);
      } else {
       updateTopBarMeta(activeMatch, getDistanceToNextJunction(activeCoord));
      }

      lastSnappedLngLat = activeCoord;
    }

    function onGpsError(err) {
      setGpsDot('error', err.message.length < 30 ? err.message : 'GPS 錯誤');
    }

    function setGpsDot(state, text) {
      const dot = document.getElementById('gps-dot-indicator');
      const lbl = document.getElementById('gps-dot-label');
      dot.className = 'gps-dot-indicator';
      if (state === 'good') dot.classList.add('good');
      else if (state === 'searching' || state === 'fair') dot.classList.add('searching');
      if (lbl && text) lbl.textContent = text;
    }

    // ── User marker (with direction cone) ────────────────────────────────
    function updateUserMarker(lat, lon, bearing) {
      const el = document.getElementById('user-marker-el') || createUserMarkerEl();
      const cone = el.querySelector('.user-cone');
      if (cone) cone.style.transform = `translateX(-50%) rotate(${bearing - 180}deg)`;

      if (!userMarker) {
        userMarker = new maplibregl.Marker({ element: el, anchor: 'center' })
          .setLngLat([lon, lat])
          .addTo(map);
      } else {
        userMarker.setLngLat([lon, lat]);
      }
    }

    function createUserMarkerEl() {
      const wrap = document.createElement('div');
      wrap.id = 'user-marker-el';
      wrap.className = 'user-dot-wrap';
      wrap.innerHTML = '<div class="user-cone"></div><div class="user-dot"></div>';
      return wrap;
    }

    // ── Route planning ────────────────────────────────────────────────────
    function resolveLandmark(rawValue) {
      const v = (rawValue || '').trim();
      if (!v) return null;
      if (v === '__gps__' || v === '📍 使用目前位置') return { id: '__gps__' };
      return LANDMARKS.find(l => l.id === v || l.name === v) || null;
    }

    async function geocodeAddress(rawValue) {
      const q = String(rawValue || '').trim();
      if (!q) return null;
      const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(q + ', Hong Kong')}`;
      const resp = await fetch(url, {
        headers: { 'Accept': 'application/json' }
      });
      if (!resp.ok) return null;
      const rows = await resp.json();
      if (!Array.isArray(rows) || !rows.length) return null;
      const hit = rows[0];
      return {
        id: '__custom__',
        name: q,
        lat: parseFloat(hit.lat),
        lon: parseFloat(hit.lon),
      };
    }

    function getLandmarkSuggestions(keyword) {
      const q = String(keyword || '').trim();
      if (!q) return [];
      const lower = q.toLowerCase();
      return LANDMARKS
        .map(l => l.name)
        .filter(name => name.toLowerCase().includes(lower))
        .slice(0, 8);
    }

    let suggestionAbortController = null;
    let suggestionSeq = 0;
    async function fetchAddressSuggestions(rawValue) {
      const q = String(rawValue || '').trim();
      if (q.length < ADDRESS_SUGGEST_MIN_CHARS) {
        populateSelects();
        return;
      }
      const localMatches = getLandmarkSuggestions(q);
      populateSelects(localMatches);
      const seq = ++suggestionSeq;
      if (suggestionAbortController) suggestionAbortController.abort();
      suggestionAbortController = new AbortController();
      const url = `https://nominatim.openstreetmap.org/search?format=json&limit=${NOMINATIM_LIMIT}&q=${encodeURIComponent(q + ', Hong Kong')}`;
      try {
        const resp = await fetch(url, {
          headers: { 'Accept': 'application/json' },
          signal: suggestionAbortController.signal
        });
        if (!resp.ok) {
          populateSelects();
          return;
        }
        const rows = await resp.json();
        if (seq !== suggestionSeq) return;
        const options = Array.isArray(rows)
          ? rows.map(r => String(r.display_name || '').trim()).filter(Boolean)
          : [];
        populateSelects([...localMatches, ...options]);
      } catch (e) {
        if (e && e.name === 'AbortError') return;
        populateSelects(localMatches);
      }
    }

    async function planRoute() {
      const fromRaw = document.getElementById('sel-from').value;
      const toRaw   = document.getElementById('sel-to').value;
      if (!fromRaw || !toRaw) return;
      if (fromRaw.trim() === toRaw.trim()) return;

      let fromResolved = resolveLandmark(fromRaw);
      let toResolved = resolveLandmark(toRaw);
      if (!fromResolved) fromResolved = await geocodeAddress(fromRaw);
      if (!toResolved) toResolved = await geocodeAddress(toRaw);
      if (!fromResolved || !toResolved) {
        alert('無法解析起點或終點地址，請重新輸入。');
        return;
      }

      const fromId = fromResolved.id;
      const toId = toResolved.id;
      let from = fromResolved.id === '__gps__' ? null : fromResolved;
      let to   = toResolved.id === '__gps__' ? null : toResolved;

      // Handle GPS-based locations
      if (fromId === '__gps__' || toId === '__gps__') {
        const btn = document.getElementById('btn-plan-route');
        btn.disabled = true;
        btn.textContent = '正在取得位置...';
        try {
          const pos = await new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 10000 });
          });
          const gpsLoc = { id: '__gps__', name: '目前位置', lat: pos.coords.latitude, lon: pos.coords.longitude };
          if (fromId === '__gps__') from = gpsLoc;
          if (toId === '__gps__') to = gpsLoc;
        } catch(e) {
          alert('無法取得目前位置，請確保已授予定位權限。');
          const btn2 = document.getElementById('btn-plan-route');
          btn2.disabled = false;
          btn2.textContent = '🔍 規劃路線';
          return;
        }
      }

      if (!from || !to) return;

      const btn = document.getElementById('btn-plan-route');
      btn.disabled = true;
      btn.textContent = '正在規劃...';
      document.getElementById('route-summary').classList.remove('show');
      document.getElementById('btn-start-nav').classList.remove('show');

      // Remove any existing planned route layer
      clearRouteLayers();

      const profile = document.getElementById('sel-profile').value || 'safety';
      let routeSuccess = false;

      // ── Try Brouter first (Plan C: cycling-optimised routing) ─────────────
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000);
        const brouterUrl = `${BROUTER_BASE}?lonlat=${from.lon},${from.lat}|${to.lon},${to.lat}` +
          `&profile=${encodeURIComponent(profile)}&alternativeidx=0&format=geojson`;
        let resp;
        try {
          resp = await fetch(brouterUrl, { signal: controller.signal });
        } finally {
          clearTimeout(timeoutId);
        }
        if (!resp.ok) throw new Error('Brouter HTTP ' + resp.status);
        const data = await resp.json();
        if (!data.features || !data.features.length) throw new Error('Brouter: no route found');

        const feature = data.features[0];
        const coords = feature.geometry.coordinates.map(c => [c[0], c[1]]);
        const laneCoords = projectRouteToNetwork(coords);
        const distM  = parseFloat(feature.properties['track-length'] || 0);
        const timeS  = parseFloat(feature.properties['total-time'] || 0);

        plannedRoute  = laneCoords;
        activeRouteCoords = laneCoords;
        routeLineFeature = turf.lineString(laneCoords);
        routeJunctions = buildRouteJunctions(laneCoords);
        plannedSteps  = computeNavSteps(laneCoords);
        navTotalDistM = distM;

        drawPlannedRoute(laneCoords, from, to);

        const distKm = (distM / 1000).toFixed(1);
        const mins   = Math.round(timeS / 60);
        document.getElementById('rs-dist').textContent = `${distKm} km`;
        document.getElementById('rs-time').textContent = formatMinutes(mins);
        document.getElementById('rs-turns').textContent =
          `${plannedSteps.filter(s => s.maneuver.type === 'turn').length} 個`;
        document.getElementById('route-summary').classList.add('show');
        document.getElementById('btn-start-nav').classList.add('show');

        const lngs = laneCoords.map(c => c[0]), lats = laneCoords.map(c => c[1]);
        map.fitBounds([
          [Math.min(...lngs), Math.min(...lats)],
          [Math.max(...lngs), Math.max(...lats)],
        ], { padding: { top: 80, bottom: 320, left: 40, right: 40 } });

        expandPanel();
        routeSuccess = true;
      } catch (brouterErr) {
        console.warn('[Nav] Brouter failed, falling back to OSRM:', brouterErr.message);
      }

      // ── OSRM fallback (generic bike routing) ─────────────────────────────
      if (!routeSuccess) {
        try {
          const url = `${OSRM_FALLBACK}/${from.lon},${from.lat};${to.lon},${to.lat}` +
            // steps=false: turn instructions are derived by computeNavSteps() from geometry
            `?overview=full&geometries=polyline6&steps=false&annotations=false`;
          const resp = await fetch(url);
          if (!resp.ok) throw new Error('OSRM returned ' + resp.status);
          const data = await resp.json();
          if (data.code !== 'Ok' || !data.routes || !data.routes.length) throw new Error('No route found');
          const route  = data.routes[0];
          const coords = decodePolyline(route.geometry, 6);
          const laneCoords = projectRouteToNetwork(coords);

          plannedRoute  = laneCoords;
          activeRouteCoords = laneCoords;
          routeLineFeature = turf.lineString(laneCoords);
          routeJunctions = buildRouteJunctions(laneCoords);
          plannedSteps  = computeNavSteps(laneCoords);
          navTotalDistM = route.distance;

          drawPlannedRoute(laneCoords, from, to);

          const distKm = (route.distance / 1000).toFixed(1);
          const mins   = Math.round(route.duration / 60);
          document.getElementById('rs-dist').textContent = `${distKm} km`;
          document.getElementById('rs-time').textContent = formatMinutes(mins);
          document.getElementById('rs-turns').textContent =
            `${plannedSteps.filter(s => s.maneuver.type === 'turn').length} 個`;
          document.getElementById('route-summary').classList.add('show');
          document.getElementById('btn-start-nav').classList.add('show');

          const lngs = laneCoords.map(c => c[0]), lats = laneCoords.map(c => c[1]);
          map.fitBounds([
            [Math.min(...lngs), Math.min(...lats)],
            [Math.max(...lngs), Math.max(...lats)],
          ], { padding: { top: 80, bottom: 320, left: 40, right: 40 } });

          expandPanel();
        } catch (osrmErr) {
          console.error('[Nav] Both Brouter and OSRM failed:', osrmErr);
          alert('路線規劃失敗，請檢查網絡連接後再試。\n（如問題持續，可嘗試更換起點/終點。）');
        }
      }

      btn.disabled = false;
      btn.textContent = '🔍 規劃路線';
    }

    function startRouteFx() {
      stopRouteFx();
      let phase = 0;
      routeFxTimer = setInterval(() => {
        if (!map) return;
        if (map.getLayer('planned-route-flow')) {
          phase = (phase + 1) % 10;
          map.setPaintProperty('planned-route-flow', 'line-dasharray', [0.8 + phase * 0.12, 2.4]);
        }
        if (map.getLayer('planned-route-junction-guide')) {
          const opacity = 0.35 + ((Math.sin(phase / 1.5) + 1) * 0.22);
          map.setPaintProperty('planned-route-junction-guide', 'line-opacity', opacity);
        }
      }, 180);
    }

    function stopRouteFx() {
      if (routeFxTimer) clearInterval(routeFxTimer);
      routeFxTimer = null;
    }

    function getDistanceToNextJunction(coord) {
      if (!coord) return null;
      const currentPoint = turf.point(coord);
      if (routeLineFeature && routeJunctions.length) {
        const onRoute = turf.nearestPointOnLine(routeLineFeature, currentPoint, { units: 'meters' });
        const routeLocation = Number(onRoute.properties && onRoute.properties.location || 0);
        const nextRouteJunction = routeJunctions.find(j => j.routeLocation > routeLocation + 5);
        if (nextRouteJunction) {
          return turf.distance(currentPoint, nextRouteJunction.point, { units: 'meters' });
        }
      }
      let nearest = Infinity;
      networkJunctions.features.forEach((feature) => {
        const dist = turf.distance(currentPoint, feature, { units: 'meters' });
        if (dist < nearest) nearest = dist;
      });
      return Number.isFinite(nearest) && nearest < 250 ? nearest : null;
    }

    function updateJunctionGuide(coord) {
      if (!map || !map.getSource('planned-route-junction-guide')) return null;
      let guideFeature = turf.featureCollection([]);
      let distanceToNext = null;
      if (coord && routeLineFeature && routeJunctions.length && activeRouteCoords && activeRouteCoords.length > 1) {
        const currentPoint = turf.point(coord);
        const onRoute = turf.nearestPointOnLine(routeLineFeature, currentPoint, { units: 'meters' });
        const routeLocation = Number(onRoute.properties && onRoute.properties.location || 0);
        const nextJunction = routeJunctions.find(j => j.routeLocation > routeLocation + 5);
        if (nextJunction) {
          distanceToNext = turf.distance(currentPoint, nextJunction.point, { units: 'meters' });
          if (distanceToNext <= JUNCTION_HIGHLIGHT_METERS) {
            const start = Math.max(0, nextJunction.coordIndex - 1);
            const end = Math.min(activeRouteCoords.length, nextJunction.coordIndex + 4);
            const coords = activeRouteCoords.slice(start, end);
            if (coords.length >= 2) {
              guideFeature = turf.featureCollection([turf.lineString(coords)]);
            }
          }
        }
      }
      map.getSource('planned-route-junction-guide').setData(guideFeature);
      return distanceToNext;
    }

    function drawPlannedRoute(coords, from, to) {
      if (!map) return;
      // Save for re-draw after potential style change (e.g. fallback to raster)
      plannedFrom = from;
      plannedTo = to;
      activeRouteCoords = coords;

      // Route polyline source
      if (!map.getSource('planned-route')) {
        map.addSource('planned-route', {
          type: 'geojson',
          data: { type: 'Feature', geometry: { type: 'LineString', coordinates: coords } },
        });
      } else {
        map.getSource('planned-route').setData(
          { type: 'Feature', geometry: { type: 'LineString', coordinates: coords } }
        );
      }

      // Route shadow (for depth)
      if (!map.getLayer('planned-route-shadow')) {
        map.addLayer({
          id: 'planned-route-shadow',
          type: 'line',
          source: 'planned-route',
          paint: { 'line-color': '#02172d', 'line-width': 14, 'line-opacity': 0.2, 'line-blur': 4 },
        });
      }

      // Main neon route highlight
      if (!map.getLayer('planned-route-line')) {
        map.addLayer({
          id: 'planned-route-line',
          type: 'line',
          source: 'planned-route',
          paint: {
            'line-color': '#00AEEF',
            'line-width': 8,
            'line-opacity': 0.55,
            'line-cap': 'round',
            'line-join': 'round',
          },
        });
      }

      if (!map.getLayer('planned-route-flow')) {
        map.addLayer({
          id: 'planned-route-flow',
          type: 'line',
          source: 'planned-route',
          paint: {
            'line-color': '#7DF9FF',
            'line-width': 4.6,
            'line-opacity': 0.95,
            'line-dasharray': [0.8, 2.4],
            'line-cap': 'round',
            'line-join': 'round',
          },
        });
      }

      // Animated direction arrows on route
      if (!map.getLayer('planned-route-arrows')) {
        map.addLayer({
          id: 'planned-route-arrows',
          type: 'symbol',
          source: 'planned-route',
          minzoom: 13,
          layout: {
            'symbol-placement': 'line',
            'symbol-spacing': 42,
            'icon-image': 'triangle-11',   // built-in MapLibre icon
            'icon-size': 0.8,
            'icon-rotate': 90,
            'icon-rotation-alignment': 'map',
            'icon-allow-overlap': true,
          },
          paint: {
            'icon-color': '#ffffff',
            'icon-opacity': 0.9,
            'icon-halo-color': '#00E5FF',
            'icon-halo-width': 1.2,
          },
        });
      }

      if (!map.getSource('planned-route-junction-guide')) {
        map.addSource('planned-route-junction-guide', {
          type: 'geojson',
          data: turf.featureCollection([]),
        });
      }

      if (!map.getLayer('planned-route-junction-guide')) {
        map.addLayer({
          id: 'planned-route-junction-guide',
          type: 'line',
          source: 'planned-route-junction-guide',
          paint: {
            'line-color': '#00FFFF',
            'line-width': 9,
            'line-opacity': 0.4,
            'line-blur': 1.5,
            'line-cap': 'round',
            'line-join': 'round',
          },
        });
      }

      // Start / end markers
      addRouteMarker('start-marker', from.lon, from.lat, '#04D93C', '🚴');
      addRouteMarker('end-marker',   to.lon,   to.lat,   '#e74c3c', '🏁');
      startRouteFx();
    }

    function addRouteMarker(id, lon, lat, color, emoji) {
      const existing = document.getElementById(id);
      if (existing) existing.remove();
      const el = document.createElement('div');
      el.id = id;
      el.style.cssText = `width:32px;height:32px;border-radius:50%;background:${color};
        display:flex;align-items:center;justify-content:center;font-size:1em;
        border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.4);`;
      el.textContent = emoji;
      new maplibregl.Marker({ element: el, anchor: 'center' }).setLngLat([lon, lat]).addTo(map);
    }

    function clearRouteLayers() {
      stopRouteFx();
      ['planned-route-junction-guide','planned-route-arrows','planned-route-flow','planned-route-line','planned-route-shadow'].forEach(id => {
        if (map.getLayer(id)) map.removeLayer(id);
      });
      if (map.getSource('planned-route-junction-guide')) map.removeSource('planned-route-junction-guide');
      if (map.getSource('planned-route')) map.removeSource('planned-route');
      ['start-marker','end-marker'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.remove();
      });
      routeLineFeature = null;
      routeJunctions = [];
      activeRouteCoords = null;
    }

    // ── Active navigation ─────────────────────────────────────────────────
    function startNavigation() {
      if (!plannedRoute || !plannedSteps.length) return;
      isNavigating = true;
      navStartTime = Date.now();
      navDistTravelledM = 0;
      currentStepIdx = 0;

      // Switch UI to nav mode
      document.getElementById('btn-start-nav').classList.remove('show');
      document.getElementById('route-summary').classList.remove('show');
      document.getElementById('nav-stats-bar').classList.add('show');
      document.getElementById('btn-end-nav').style.display = '';
      document.getElementById('turn-banner').classList.add('show');

      // Enable heading-up mode
      headingUp = true;
      document.getElementById('btn-heading-up').classList.add('active');

      collapsePanel();
      updateTurnBanner();
      updateNavStats();
      if (lastSnappedLngLat) {
        updateTopBarMeta(activeMatch, updateJunctionGuide(lastSnappedLngLat));
      }
    }

    function updateNavProgress(lat, lon, match) {
      if (!isNavigating || !plannedSteps.length) return;
      const currentCoord = [lon, lat];

      // Find next waypoint in current step
      const step = plannedSteps[currentStepIdx];
      if (!step || !step.pt) return;

      const lastPt = step.pt;  // [lon, lat] — endpoint of this leg
      const distToEnd = haversineM(lat, lon, lastPt[1], lastPt[0]);

      // Advance step when within 20 m of step end
      if (distToEnd < 20 && currentStepIdx < plannedSteps.length - 1) {
        currentStepIdx++;
        updateTurnBanner();
      }

      // Update distance to next turn
      document.getElementById('turn-dist').textContent = formatDist(distToEnd);
      const nextJunctionDistance = updateJunctionGuide(currentCoord);
      updateTopBarMeta(match || activeMatch, nextJunctionDistance);

      // Check if arrived (within 30 m of destination)
      const dest = plannedRoute[plannedRoute.length - 1];
      const distToDest = haversineM(lat, lon, dest[1], dest[0]);
      if (distToDest < 30) {
        showArrived();
        return;
      }

      updateNavStats();

      // Auto-zoom near intersections
      if (distToEnd < 80) {
        map.easeTo({ zoom: DEFAULT_NAV_ZOOM, pitch: DEFAULT_NAV_PITCH, duration: 500 });
      } else if (distToEnd > 200 && map.getZoom() > DEFAULT_NAV_ZOOM) {
        map.easeTo({ zoom: DEFAULT_NAV_ZOOM, pitch: DEFAULT_NAV_PITCH, duration: 500 });
      }
    }

    function updateTurnBanner() {
      const step = plannedSteps[currentStepIdx];
      if (!step) return;
      const next = plannedSteps[currentStepIdx + 1];
      const modifier = next && next.maneuver ? next.maneuver.modifier : null;
      document.getElementById('turn-icon').textContent = next ? turnEmoji(modifier) : '✅';
      document.getElementById('turn-instruction').textContent = stepInstruction(next || step);
      document.getElementById('turn-dist').textContent = '-- m';
    }

    function updateNavStats() {
      const remain = Math.max(0, navTotalDistM - navDistTravelledM);
      const avgSpeed = navDistTravelledM > 0 && navStartTime
        ? (navDistTravelledM / 1000) / ((Date.now() - navStartTime) / 3600000)
        : null;
      const etaMins = (avgSpeed && avgSpeed > 1)
        ? (remain / 1000) / avgSpeed * 60
        : remain / 1000 / 15 * 60; // assume 15 km/h default

      document.getElementById('nav-stat-dist').textContent    = formatDist(navDistTravelledM);
      document.getElementById('nav-stat-remain').textContent  = formatDist(remain);
      document.getElementById('nav-stat-eta').textContent     = formatMinutes(etaMins);
      document.getElementById('nav-stat-speed').textContent   = lastSpeedKmh.toFixed(1);
    }

    function showArrived() {
      isNavigating = false;

      const elapsed = navStartTime ? Math.round((Date.now() - navStartTime) / 60000) : 0;
      document.getElementById('arrived-stats').textContent =
        `騎行距離：${formatDist(navDistTravelledM)}\n用時：${formatMinutes(elapsed)}\n平均速度：${navDistTravelledM > 0 && elapsed > 0 ? ((navDistTravelledM/1000)/(elapsed/60)).toFixed(1) : '--'} km/h`;
      document.getElementById('arrived-overlay').classList.add('show');
    }

    function endNavigation() {
      isNavigating = false;
      document.getElementById('turn-banner').classList.remove('show');
      document.getElementById('nav-stats-bar').classList.remove('show');
      document.getElementById('btn-end-nav').style.display = 'none';
      document.getElementById('btn-start-nav').classList.remove('show');
      document.getElementById('route-summary').classList.remove('show');
      headingUp = false;
      document.getElementById('btn-heading-up').classList.remove('active');
      map.easeTo({ bearing: 0, duration: 500 });
      expandPanel();
      clearRouteLayers();
      plannedRoute = null;
      plannedFrom = null;
      plannedTo = null;
      plannedSteps = [];
      navTotalDistM = 0;
      currentStepIdx = 0;
      document.getElementById('sel-from').value = '';
      document.getElementById('sel-to').value = '';
      updateTopBarMeta(activeMatch, getDistanceToNextJunction(lastSnappedLngLat));
      checkPlanBtn();
    }

    // ── Panel collapse / expand ───────────────────────────────────────────
    function collapsePanel() {
      document.getElementById('planner-panel').classList.add('collapsed');
    }
    function expandPanel() {
      document.getElementById('planner-panel').classList.remove('collapsed');
    }

    // ── Heading-up toggle ─────────────────────────────────────────────────
    document.getElementById('btn-heading-up').addEventListener('click', () => {
      headingUp = !headingUp;
      document.getElementById('btn-heading-up').classList.toggle('active', headingUp);
      if (!headingUp) map.easeTo({ bearing: 0, pitch: DEFAULT_NAV_PITCH, zoom: DEFAULT_NAV_ZOOM, duration: 500 });
    });

    function cleanupNavRuntime() {
      clearGpsWatch();
      stopRouteFx();
    }

    // ── Back navigation ───────────────────────────────────────────────────
    window.navBack = function () {
      if (isNavigating) {
        if (!confirm('確定結束導航嗎？')) return;
        endNavigation();
      }
      cleanupNavRuntime();
      history.back();
    };

      // ── Populate landmark options ─────────────────────────────────────────
      function populateSelects(extraOptions = []) {
      const list = document.getElementById('landmark-options');
      if (!list) return;
      list.innerHTML = '';

      const gpsOpt = document.createElement('option');
      gpsOpt.value = '📍 使用目前位置';
      list.appendChild(gpsOpt);

      LANDMARKS.forEach(l => {
        const opt = document.createElement('option');
        opt.value = l.name;
        list.appendChild(opt);
      });

      const seen = new Set(['📍 使用目前位置', ...LANDMARKS.map(l => l.name)]);
      extraOptions.forEach(name => {
        const value = String(name || '').trim();
        if (!value || seen.has(value)) return;
        const opt = document.createElement('option');
        opt.value = value;
        list.appendChild(opt);
        seen.add(value);
      });
    }

    function checkPlanBtn() {
      const from = (document.getElementById('sel-from').value || '').trim();
      const to   = (document.getElementById('sel-to').value || '').trim();
      document.getElementById('btn-plan-route').disabled = !from || !to || from === to;
    }

    // ── Event listeners ───────────────────────────────────────────────────
    let suggestionTimer = null;
    function handleAddressInput(e) {
      checkPlanBtn();
      if (suggestionTimer) clearTimeout(suggestionTimer);
      const value = e && e.target ? e.target.value : '';
      suggestionTimer = setTimeout(() => { fetchAddressSuggestions(value); }, ADDRESS_SUGGEST_DEBOUNCE_MS);
    }
    document.getElementById('sel-from').addEventListener('input', handleAddressInput);
    document.getElementById('sel-to').addEventListener('input', handleAddressInput);
    document.getElementById('btn-plan-route').addEventListener('click', planRoute);
    document.getElementById('btn-start-nav').addEventListener('click', startNavigation);
    document.getElementById('btn-end-nav').addEventListener('click', () => {
      if (confirm('確定結束導航？')) endNavigation();
    });
    document.getElementById('btn-arrived-done').addEventListener('click', () => {
      document.getElementById('arrived-overlay').classList.remove('show');
      endNavigation();
    });
    window.addEventListener('pagehide', cleanupNavRuntime);
    window.addEventListener('beforeunload', cleanupNavRuntime);

    // Panel handle toggle
    document.getElementById('panel-handle').addEventListener('click', () => {
      const panel = document.getElementById('planner-panel');
      panel.classList.toggle('collapsed');
    });

    // ── Init ──────────────────────────────────────────────────────────────
    populateSelects();
    try {
      initMap();
    } catch (e) {
      console.error('[Nav] initMap failed:', e);
      const el = document.getElementById('nav-loading');
      if (el) {
        const msg = document.createElement('p');
        msg.style.cssText = 'color:#BFE340;text-align:center;padding:1em;line-height:1.7';
        const errSpan = document.createElement('small');
        errSpan.style.opacity = '0.7';
        errSpan.textContent = e.message;
        const backBtn = document.createElement('button');
        backBtn.style.cssText = 'color:#04D93C;background:none;border:none;cursor:pointer;font-size:1em;';
        backBtn.textContent = '← 返回';
        backBtn.addEventListener('click', () => history.back());
        msg.append('⚠️ 地圖初始化失敗。', document.createElement('br'), errSpan, document.createElement('br'), document.createElement('br'), backBtn);
        el.innerHTML = '';
        el.appendChild(msg);
      }
    }

  })();

  // ── i18n translations for nav page ───────────────────────────────────
  const NAV_I18N = {
    zh: {
      nav_loading: '正在載入地圖...',
      nav_title: '🗺️ 單車徑導航',
      nav_continue: '沿單車徑繼續前行',
      nav_plan: '規劃單車路線',
      from_placeholder: '輸入或選擇起點（可自訂地址）',
      to_placeholder: '輸入或選擇終點（可自訂地址）',
      profile_safety: '安全路線（優先單車徑）',
      profile_trekking: '遠足路線（混合路面）',
      profile_fastbike: '快速路線（最快到達）',
      profile_shortest: '最短路線（最短距離）',
      btn_plan: '🔍 規劃路線',
      rs_dist: '路線長度',
      rs_time: '預計時間',
      rs_turns: '轉向次數',
      btn_start: '🚴 開始導航',
      road_searching: '定位中…',
      pushbike_warning: '請推車',
      stat_dist: '已行距離',
      stat_remain: '剩餘距離',
      stat_eta: '預計到達',
      stat_speed: '速度 km/h',
      btn_end: '⏹ 結束導航',
      arrived_title: '已到達目的地！',
      btn_done: '完成',
    },
    en: {
      nav_loading: 'Loading map...',
      nav_title: '🗺️ Cycling Navigation',
      nav_continue: 'Continue along the cycle path',
      nav_plan: 'Plan a Cycle Route',
      from_placeholder: 'Enter or select start point',
      to_placeholder: 'Enter or select destination',
      profile_safety: 'Safe Route (cycle paths preferred)',
      profile_trekking: 'Trekking Route (mixed surfaces)',
      profile_fastbike: 'Fast Route (fastest arrival)',
      profile_shortest: 'Shortest Route (minimum distance)',
      btn_plan: '🔍 Plan Route',
      rs_dist: 'Distance',
      rs_time: 'Est. Time',
      rs_turns: 'Turns',
      btn_start: '🚴 Start Navigation',
      road_searching: 'Locating…',
      pushbike_warning: 'Please Push Bike',
      stat_dist: 'Travelled',
      stat_remain: 'Remaining',
      stat_eta: 'ETA',
      stat_speed: 'Speed km/h',
      btn_end: '⏹ End Navigation',
      arrived_title: 'Arrived at Destination!',
      btn_done: 'Done',
    }
  };
  (function applyNavLang() {
    const lang = localStorage.getItem('appLang') === 'en' ? 'en' : 'zh';
    const t = NAV_I18N[lang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (t[key] !== undefined) el.textContent = t[key];
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.dataset.i18nPlaceholder;
      if (t[key] !== undefined) el.placeholder = t[key];
    });
    // Translate select options
    document.querySelectorAll('option[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (t[key] !== undefined) el.textContent = t[key];
    });
    const pushBikeText = document.getElementById('nav-pushbike-text');
    if (pushBikeText && t.pushbike_warning) pushBikeText.textContent = t.pushbike_warning;
  })();
  </script>
</body>
