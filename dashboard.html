<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2c3e50">    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="城市運輸單車">
    <link rel="apple-touch-icon" href="/images/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用戶儀表板 - 城市運輸單車</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ── App Dashboard Theme ──────────────────────────────────── */
        /* Dark theme applied only in app (PWA) mode */
        body.is-pwa {
            background: var(--app-bg-primary, #121f14);
            color: var(--app-text-primary, #e8f5e9);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', sans-serif;
        }
        body.is-pwa footer {
            background: var(--app-bg-primary, #121f14);
            color: var(--app-text-secondary, #a8d8a0);
            border-top: 1px solid #2d4d2d;
        }
        @media (display-mode: standalone) {
            body { background: var(--app-bg-primary, #121f14); color: var(--app-text-primary, #e8f5e9); }
            footer { background: var(--app-bg-primary, #121f14); color: var(--app-text-secondary, #a8d8a0); border-top: 1px solid #2d4d2d; }
        }
        .hero {
            background: linear-gradient(135deg, #1e3820 0%, #2d5028 100%);
            padding: calc(env(safe-area-inset-top) + 1.5em) 1.4em 1.5em;
            border-bottom: 1px solid #2d4d2d;
        }
        .hero h1 {
            color: var(--app-text-primary, #e8f5e9);
            margin: 0 0 0.3em 0;
            font-size: 1.5em;
        }
        #welcome-email {
            color: var(--app-accent, #6dba65);
            font-weight: 600;
            margin: 0;
        }
        #membership-status {
            margin-top: 0.3em;
            font-size: 0.9em;
        }

        /* ── 電郵未驗證提醒 ──────────────────────────────── */
        #email-verify-notice {
            background: #2a1f0a;
            border: 1px solid #ff9800;
            color: #ffcc80;
            margin: 1em;
            border-radius: 10px;
            padding: 1em 1.2em;
        }
        #email-verify-notice p { margin: 0; }

        /* ── 遊戲進度卡片 ──────────────────────────────── */
        #game-profile-card {
            display: none;
            margin: 1em;
            background: linear-gradient(135deg, #1e3820 0%, #2d5028 100%);
            color: var(--app-text-primary, #e8f5e9);
            border-radius: 14px;
            padding: 1.2em 1.4em;
            border: 1px solid #2d4d2d;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }
        .game-card-header {
            display: flex;
            align-items: center;
            gap: 0.8em;
            margin-bottom: 0.9em;
            flex-wrap: wrap;
        }
        .game-level-badge {
            background: var(--app-accent, #6dba65);
            color: #121f14;
            font-size: 1.2em;
            font-weight: bold;
            padding: 0.2em 0.7em;
            border-radius: 8px;
        }
        .game-title {
            font-size: 1.1em;
            font-weight: bold;
            color: var(--app-text-primary, #e8f5e9);
        }
        .game-coins {
            margin-left: auto;
            font-size: 0.9em;
            background: rgba(255,255,255,0.1);
            padding: 0.3em 0.8em;
            border-radius: 6px;
            color: #ffd54f;
        }
        .xp-bar-container {
            background: rgba(255,255,255,0.15);
            border-radius: 6px;
            height: 8px;
            overflow: hidden;
            margin: 0.4em 0;
        }
        .xp-bar-fill {
            background: var(--app-accent, #6dba65);
            height: 100%;
            border-radius: 6px;
            transition: width 0.8s ease;
        }
        .xp-label {
            font-size: 0.8em;
            color: var(--app-text-secondary, #a8d8a0);
        }

        /* ── 升級提醒 ─────────────────────────────────── */
        #upgrade-notice {
            background: #1a2a0a;
            border: 1px solid #6dba65;
            margin: 1em;
            border-radius: 10px;
            padding: 1.2em;
            text-align: center;
        }
        #upgrade-notice h3 {
            color: var(--app-accent, #6dba65);
            margin-top: 0;
            font-size: 1em;
        }
        #upgrade-notice p {
            color: var(--app-text-secondary, #a8d8a0);
            font-size: 0.9em;
        }
        #upgrade-notice .cta-button {
            background: var(--app-accent, #6dba65);
            color: #121f14;
            font-weight: bold;
            border-radius: 8px;
        }

        /* ── 騎行歷史 ────────────────────────────────── */
        .content {
            padding: 0.5em 1em 5em;
        }
        .content h2 {
            color: var(--app-text-primary, #e8f5e9);
            font-size: 1.1em;
            margin-bottom: 0.8em;
            padding-bottom: 0.4em;
            border-bottom: 1px solid #2d4d2d;
        }
        .ride-item {
            background: var(--app-bg-card, #1e3820);
            border-radius: 10px;
            padding: 0.9em 1em;
            margin-bottom: 0.7em;
            border-left: 3px solid var(--app-accent, #6dba65);
            border: 1px solid #2d4d2d;
            border-left: 3px solid var(--app-accent, #6dba65);
        }
        .ride-item .ride-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.4em;
        }
        .ride-route-name {
            font-weight: bold;
            font-size: 0.95em;
            color: var(--app-text-primary, #e8f5e9);
        }
        .ride-xp {
            font-size: 0.82em;
            color: #121f14;
            background: var(--app-accent, #6dba65);
            padding: 0.2em 0.6em;
            border-radius: 10px;
            font-weight: bold;
        }
        .ride-details {
            font-size: 0.82em;
            color: var(--app-text-secondary, #a8d8a0);
            margin-top: 0.25em;
        }

        /* ── 管理員面板 ─────────────────────────────── */
        #admin-section h2 {
            color: var(--app-text-primary, #e8f5e9);
        }
        #admin-section .cta-button {
            background: #4a1942;
            color: #f3a0ef;
            border-radius: 8px;
        }
    </style>
    
    <script>
        // 這是「頁面守衛」，它會在頁面渲染前執行
        // 檢查是否有 Supabase session 或傳統 token
        function checkAuth() {
            const token = localStorage.getItem('accessToken');
            
            if (!token) {
                window.location.replace('/login'); 
                return false;
            }
            return true;
        }
        
        // 立即檢查
        if (!checkAuth()) {
            // 如果檢查失敗，停止執行
            throw new Error('未授權訪問');
        }
    </script>
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="hero">
            <h1>歡迎回來！</h1>
            <p id="welcome-email">正在載入你的資料...</p>
            <p id="membership-status" style="font-size: 0.9em;"></p>
        </section>

        <!-- 電郵未驗證提醒 -->
        <div id="email-verify-notice" style="display: none;">
            <p>
                <i class="fas fa-envelope" style="color: #ff9800;"></i>
                <strong>請驗證你的電子郵件！</strong>
                我們已向你的電郵發送了驗證連結，請查收並點擊連結以完成驗證。
            </p>
        </div>

        <!-- 遊戲進度卡片 -->
        <div id="game-profile-card">
            <div class="game-card-header">
                <span class="game-level-badge" id="game-level-badge">Lv.1</span>
                <span class="game-title" id="game-title">新手騎士</span>
                <span class="game-coins" id="game-coins">💰 0 里程幣</span>
            </div>
            <div class="xp-bar-container">
                <div class="xp-bar-fill" id="xp-bar" style="width:0%"></div>
            </div>
            <div class="xp-label" id="xp-label">XP: 0 / 300</div>
        </div>

        <div id="upgrade-notice" style="display: none;">
            <h3>
                <i class="fas fa-star" style="color: #6dba65;"></i>
                升級為高級會員以享受完整功能
            </h3>
            <p>完善您的個人資料即可升級為高級會員，解鎖所有功能！</p>
            <a href="/profile-setup.html" class="cta-button" style="display: inline-block; margin-top: 0.8em;">
                <i class="fas fa-arrow-right"></i> 立即升級
            </a>
        </div>

        <section class="content animated-element">
            <h2>你的騎行歷史</h2>
            <div id="history-container">
            </div>
            
            <div id="admin-section" style="display:none; margin-top: 3em;">
                <h2>管理員面板</h2>
                <p>你可以管理網站用戶及查看資料。</p>
                <a href="/admin.html" class="cta-button">前往管理員後台</a>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 香港城市運輸單車. All Rights Reserved.</p>
    </footer>

    <script src="/js/main.js"></script>
    <script src="/js/login.js"></script> 
    
    <script>
        // 等待所有東西載入完畢
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                // 從 localStorage 取得 JWT 登入的用戶資料
                const user = getUserData();
                let userRole = 'junior';
                
                if (!user) {
                    window.location.href = '/login';
                    return;
                }

                // 從後端取得最新的用戶角色及遊戲進度
                try {
                    const token = localStorage.getItem('accessToken');
                    const dbResponse = await fetch(`/api/get-user?user_id=${user.id}`, {
                        headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                    });
                    if (dbResponse.ok) {
                        const dbUser = await dbResponse.json();
                        userRole = dbUser.user_role || user.user_role || 'junior';
                        // 更新本地快取
                        user.user_role = userRole;
                        localStorage.setItem('user', JSON.stringify(user));
                        // 顯示遊戲進度卡片
                        if (dbUser.level !== undefined) {
                            renderGameProfile(dbUser.level, dbUser.xp, dbUser.coins);
                        }
                    } else {
                        userRole = user.user_role || user.role || 'junior';
                    }
                } catch (error) {
                    console.error('Error fetching user from database:', error);
                    userRole = user.user_role || user.role || 'junior';
                }
                
                const displayName = user.full_name || user.email;
                document.getElementById('welcome-email').textContent = `你好, ${displayName}`;

                // 顯示電郵未驗證提醒
                if (user.email_verified === false) {
                    document.getElementById('email-verify-notice').style.display = 'block';
                }
                
                // Display membership status
                const statusElement = document.getElementById('membership-status');
                if (userRole === 'admin') {
                    statusElement.innerHTML = '<i class="fas fa-shield-alt" style="color: #f3a0ef;"></i> 管理員';
                    statusElement.style.color = '#f3a0ef';
                } else if (userRole === 'senior') {
                    statusElement.innerHTML = '<i class="fas fa-star" style="color: #ffd54f;"></i> 高級會員';
                    statusElement.style.color = '#ffd54f';
                } else {
                    statusElement.innerHTML = '<i class="fas fa-user" style="color: #666;"></i> 初級會員';
                    // Show upgrade notice for junior members
                    document.getElementById('upgrade-notice').style.display = 'block';
                }
                
                // 檢查是否為管理員
                if (userRole === 'admin' || user.role === 'admin') {
                    document.getElementById('admin-section').style.display = 'block';
                }
            
            // 載入騎行歷史
            loadCyclingHistory();
            
            } catch (error) {
                console.error('獲取用戶資料失敗:', error);
            }
        });

        // 等級稱號對照表（與 routes_config / level_config 同步）
        // 每5級更換一個稱號：Lv1-5 新手騎士，Lv6-10 城市騎手，Lv11-15 路線達人，Lv16-20 都市傳奇
        const LEVEL_TITLES = {
            1: '新手騎士', 2: '新手騎士', 3: '新手騎士', 4: '新手騎士', 5: '新手騎士',
            6: '城市騎手', 7: '城市騎手', 8: '城市騎手', 9: '城市騎手', 10: '城市騎手',
            11: '路線達人', 12: '路線達人', 13: '路線達人', 14: '路線達人', 15: '路線達人',
            16: '都市傳奇', 17: '都市傳奇', 18: '都市傳奇', 19: '都市傳奇', 20: '都市傳奇'
        };
        // 累計 XP 以達到對應等級（後期升級要求已適當降低）
        const LEVEL_XP = [
            0,      // Lv1
            80,     // Lv2
            200,    // Lv3
            380,    // Lv4
            620,    // Lv5
            950,    // Lv6
            1400,   // Lv7
            1980,   // Lv8
            2700,   // Lv9
            3600,   // Lv10
            4000,   // Lv11
            5100,   // Lv12
            6500,   // Lv13
            8100,   // Lv14
            10000,  // Lv15
            12200,  // Lv16
            14800,  // Lv17
            17800,  // Lv18
            21200,  // Lv19
            25200,  // Lv20
            Infinity
        ];

        function renderGameProfile(level, xp, coins) {
            const card = document.getElementById('game-profile-card');
            if (!card) return;
            const lvl = Math.max(1, Math.min(level || 1, 20));
            const currentXp = xp || 0;
            const currentCoins = coins || 0;
            const xpCurrent = LEVEL_XP[lvl - 1] || 0;
            const xpNext = LEVEL_XP[lvl];
            const xpBar = lvl >= 20 ? 100 : Math.round(Math.max(0, Math.min(100, (currentXp - xpCurrent) / Math.max(1, xpNext - xpCurrent) * 100)));

            document.getElementById('game-level-badge').textContent = `Lv.${lvl}`;
            document.getElementById('game-title').textContent = LEVEL_TITLES[lvl] || '';
            document.getElementById('game-coins').textContent = `💰 ${currentCoins.toLocaleString()} 里程幣`;
            document.getElementById('xp-bar').style.width = xpBar + '%';
            document.getElementById('xp-label').textContent = lvl >= 20
                ? `XP: ${currentXp.toLocaleString()}（已達最高等級）`
                : `XP: ${currentXp.toLocaleString()} / ${xpNext.toLocaleString()}（下一級需 ${(xpNext - currentXp).toLocaleString()} XP）`;
            card.style.display = 'block';
        }

        async function loadCyclingHistory() {
            const container = document.getElementById('history-container');
            container.textContent = '正在載入歷史紀錄...';
            
            try {
                const token = localStorage.getItem('accessToken');
                const response = await fetch('/api/getHistory', {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
                if (response.status === 401) {
                    window.location.href = '/login';
                    return;
                }
                if (!response.ok) throw new Error('Server error ' + response.status);
                const data = await response.json();

                // 同步遊戲進度（若尚未渲染）
                if (data.gameProfile && document.getElementById('game-profile-card').style.display === 'none') {
                    renderGameProfile(data.gameProfile.level, data.gameProfile.xp, data.gameProfile.coins);
                }

                const historyData = Array.isArray(data) ? data : (data.history || []);

                if (historyData.length === 0) {
                    container.innerHTML = '<p style="color: var(--app-text-secondary, #a8d8a0);">你目前沒有任何騎行歷史。<br><a href="/routes" style="color: var(--app-accent, #6dba65);">瀏覽路線</a>開始你的第一次騎行吧！</p>';
                    return;
                }

                container.innerHTML = '';
                historyData.forEach(ride => {
                    const div = document.createElement('div');
                    div.className = 'ride-item';
                    const routeLabel = ride.route_name || '未命名路線';
                    const dateStr = ride.ride_date ? ride.ride_date.slice(0, 10) : '';
                    const distStr = ride.distance_km ? `${ride.distance_km} km` : '';
                    const durStr = ride.duration_minutes ? `${ride.duration_minutes} 分鐘` : '';
                    const speedStr = ride.avg_speed_kmh ? `${ride.avg_speed_kmh} km/h` : '';
                    const xpStr = ride.xp_earned ? `+${ride.xp_earned} XP` : '';
                    const sourceIcon = { pwa: '📱', app: '📲', gpx: '📂' }[ride.source] || '🌐';

                    div.innerHTML = `
                        <div class="ride-main">
                            <span class="ride-route-name">${sourceIcon} ${routeLabel}</span>
                            ${xpStr ? `<span class="ride-xp">${xpStr}</span>` : ''}
                        </div>
                        <div class="ride-details">
                            📅 ${dateStr}
                            ${distStr ? ` &nbsp;|&nbsp; 🚴 ${distStr}` : ''}
                            ${durStr ? ` &nbsp;|&nbsp; ⏱ ${durStr}` : ''}
                            ${speedStr ? ` &nbsp;|&nbsp; 💨 平均 ${speedStr}` : ''}
                        </div>
                    `;
                    container.appendChild(div);
                });
                
            } catch (error) {
                console.error('載入歷史失敗:', error);
                container.textContent = `載入失敗: ${error.message}`;
            }
        }
    </script>
    <script src="/js/pwa.js"></script>
</body>
</html>
