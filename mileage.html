<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1f2f25">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>里程計劃 - 城市運輸單車</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .ml-wrap { max-width: 980px; margin: 0 auto; padding: 1.2em 1em 2.2em; color: #e8f3e9; }
        .ml-hero {
            background: linear-gradient(145deg,#1b2f22,#16241b);
            border:1px solid #2e4a35;
            border-radius: 16px;
            padding: 1.15em;
            margin-bottom: 1em;
        }
        .ml-hero h1 { margin: 0 0 0.45em; font-size: 1.45em; color: #BFE340; }
        .ml-stats { display:grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap:0.55em; }
        .ml-stat { background: rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 0.7em; }
        .ml-stat .k { font-size: 0.76em; color:#a7c1aa; }
        .ml-stat .v { font-size: 1.15em; font-weight: 800; margin-top: 0.2em; }
        .ml-progress { margin-top: 0.8em; }
        .ml-progress-bar { height: 12px; border-radius: 999px; background: #132018; overflow: hidden; border:1px solid #2f4b36; }
        .ml-progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg,#6dba65,#BFE340); }
        .ml-progress-label { font-size: 0.78em; margin-top: 0.35em; color: #a7c1aa; }
        .ml-section-title { margin:1.15em 0 0.35em; font-size:1em; color:#BFE340; }
        .ml-section-desc { margin: 0 0 0.8em; color:#9cb29e; font-size:0.82em; line-height:1.55; }
        .ml-benefits-grid { display:grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap:0.7em; margin-top:0.3em; }
        .ml-card {
            border-radius: 14px;
            padding: 0.95em;
            border:1px solid #324f38;
            background: #1a2b1f;
            box-shadow: 0 4px 14px rgba(0,0,0,0.16);
        }
        .ml-card-head { margin-bottom: 0.65em; }
        .ml-card h3 { margin: 0 0 0.25em; font-size: 1.02em; }
        .ml-card p { margin: 0; font-size:0.8em; color:#b9cfbc; line-height:1.5; }
        .ml-card ul { margin:0; padding-left: 1.15em; color: #d4e8d6; font-size: 0.86em; line-height: 1.58; }
        .ml-card li + li { margin-top: 0.35em; }
        .ml-card.bronze h3 { color:#d8a56b; }
        .ml-card.silver h3 { color:#d1d9df; }
        .ml-card.gold h3 { color:#f0d372; }
        .ml-tag {
            display:inline-flex;
            align-items:center;
            gap:0.35em;
            padding:0.18em 0.65em;
            border-radius:999px;
            font-size:0.72em;
            font-weight:700;
            letter-spacing:0.03em;
            margin-bottom:0.45em;
            border:1px solid currentColor;
        }
        .ml-tag.bronze { color:#d8a56b; background: rgba(216,165,107,0.12); }
        .ml-tag.silver { color:#d1d9df; background: rgba(209,217,223,0.12); }
        .ml-tag.gold { color:#f0d372; background: rgba(240,211,114,0.14); }
        .ml-action-grid { display:grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap:0.55em; }
        .ml-action { text-decoration:none; text-align:center; border-radius: 10px; border:1px solid #325239; background:#1c3122; color:#d9efdb; padding:0.7em 0.65em; font-weight: 700; font-size:0.85em; }
        .ml-note { margin-top:0.8em; color:#9cb29e; font-size:0.8em; line-height:1.55; }
        body.app-light-theme .ml-wrap { color: var(--app-text-primary, #1b3a1f); }
        body.app-light-theme .ml-hero {
            background: linear-gradient(145deg, #ffffff, #f0f8f0);
            border-color: var(--app-border, #c8e6c9);
            box-shadow: 0 8px 24px rgba(46,125,50,0.08);
        }
        body.app-light-theme .ml-hero h1,
        body.app-light-theme .ml-section-title { color: var(--app-accent, #2e7d32); }
        body.app-light-theme .ml-stat,
        body.app-light-theme .ml-card,
        body.app-light-theme .ml-action {
            background: var(--app-bg-card, #ffffff);
            border-color: var(--app-border, #c8e6c9);
        }
        body.app-light-theme .ml-stat .k,
        body.app-light-theme .ml-progress-label,
        body.app-light-theme .ml-section-desc,
        body.app-light-theme .ml-card p,
        body.app-light-theme .ml-note,
        body.app-light-theme .ml-card ul { color: var(--app-text-secondary, #2e7d32); }
        body.app-light-theme .ml-progress-bar { background: rgba(0,0,0,0.08); border-color: var(--app-border, #c8e6c9); }
        body.app-light-theme .ml-action { color: var(--app-text-primary, #1b3a1f); }
        body.app-light-theme .ml-tag.bronze { color:#a56a31; background: rgba(216,165,107,0.16); }
        body.app-light-theme .ml-tag.silver { color:#65727c; background: rgba(209,217,223,0.16); }
        body.app-light-theme .ml-tag.gold { color:#8d6a00; background: rgba(240,211,114,0.22); }
        @media (prefers-color-scheme: light) {
            body:not(.app-theme-explicit) .ml-wrap { color: var(--app-text-primary, #1b3a1f); }
            body:not(.app-theme-explicit) .ml-hero {
                background: linear-gradient(145deg, #ffffff, #f0f8f0);
                border-color: var(--app-border, #c8e6c9);
                box-shadow: 0 8px 24px rgba(46,125,50,0.08);
            }
            body:not(.app-theme-explicit) .ml-hero h1,
            body:not(.app-theme-explicit) .ml-section-title { color: var(--app-accent, #2e7d32); }
            body:not(.app-theme-explicit) .ml-stat,
            body:not(.app-theme-explicit) .ml-card,
            body:not(.app-theme-explicit) .ml-action {
                background: var(--app-bg-card, #ffffff);
                border-color: var(--app-border, #c8e6c9);
            }
            body:not(.app-theme-explicit) .ml-stat .k,
            body:not(.app-theme-explicit) .ml-progress-label,
            body:not(.app-theme-explicit) .ml-section-desc,
            body:not(.app-theme-explicit) .ml-card p,
            body:not(.app-theme-explicit) .ml-note,
            body:not(.app-theme-explicit) .ml-card ul { color: var(--app-text-secondary, #2e7d32); }
            body:not(.app-theme-explicit) .ml-progress-bar { background: rgba(0,0,0,0.08); border-color: var(--app-border, #c8e6c9); }
            body:not(.app-theme-explicit) .ml-action { color: var(--app-text-primary, #1b3a1f); }
        }
        @media (max-width: 760px) {
            .ml-stats, .ml-benefits-grid, .ml-action-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    <main class="ml-wrap">
        <section class="ml-hero">
            <h1><i class="fas fa-road"></i> 里程計劃</h1>
            <div class="ml-stats">
                <div class="ml-stat"><div class="k">目前里程卡</div><div class="v" id="ml-card">銅卡</div></div>
                <div class="ml-stat"><div class="k">近 365 天里程</div><div class="v" id="ml-km">0.0 km</div></div>
                <div class="ml-stat"><div class="k">騎行次數</div><div class="v" id="ml-rides">0</div></div>
            </div>
            <div class="ml-progress">
                <div class="ml-progress-bar"><div class="ml-progress-fill" id="ml-progress-fill"></div></div>
                <div class="ml-progress-label" id="ml-progress-label">完成騎行後會自動更新里程進度</div>
            </div>
        </section>

        <div class="ml-section-title">金銀銅卡權益總覽</div>
        <p class="ml-section-desc">以下整理自「我的」頁面會員權益，並依里程卡等級重新編排；你可以直接看見目前可用與下一階段可解鎖的內容。</p>
        <section class="ml-benefits-grid" id="ml-benefits-grid"></section>

        <div class="ml-section-title">快速體驗</div>
        <section class="ml-action-grid">
            <a class="ml-action" href="/routes"><i class="fas fa-biking"></i> 立即開始騎行</a>
            <a class="ml-action" href="/dashboard"><i class="fas fa-chart-line"></i> 查看我的進度</a>
            <a class="ml-action" href="/weather"><i class="fas fa-cloud-sun"></i> 查看天氣資訊</a>
        </section>
        <p class="ml-note">
            里程卡依近 365 天騎行總里程計算：銅卡 0–499.9 km、銀卡 500–1999.9 km、金卡 2000 km 以上。金卡保級線為 1500 km，銀卡保級線為 400 km。
        </p>
    </main>
    <footer><p>&copy; 2026 香港城市運輸單車. All Rights Reserved.</p></footer>

    <script src="/js/main.js"></script>
    <script src="/js/pwa.js"></script>
    <script>
    function renderMileageBenefits() {
        const grid = document.getElementById('ml-benefits-grid');
        const defs = Array.isArray(window.CTRCHK_PERMISSION_DEFS) ? window.CTRCHK_PERMISSION_DEFS : [];
        if (!grid || !defs.length) return;

        const groups = {
            bronze: defs.filter(def => def.rank === 'bronze'),
            silver: defs.filter(def => def.rank === 'silver'),
            gold: defs.filter(def => def.rank === 'gold'),
        };
        const copy = {
            bronze: { title: '銅卡｜穩健起步', desc: '打好基礎，先把導航、數據、海報與獎勵都準備好。' },
            silver: { title: '銀卡｜進階加速', desc: '解鎖更順手的地圖、通知與加成，騎行體驗再升級。' },
            gold: { title: '金卡｜旗艦禮遇', desc: '最高階支援與專屬體驗，讓每次出發都更有存在感。' },
        };

        grid.innerHTML = ['bronze', 'silver', 'gold'].map(rank => {
            const items = groups[rank].map(def => `<li>${def.label}</li>`).join('');
            return `
                <article class="ml-card ${rank}">
                    <div class="ml-card-head">
                        <div class="ml-tag ${rank}">${rank === 'gold' ? '金卡' : (rank === 'silver' ? '銀卡' : '銅卡')}</div>
                        <h3>${copy[rank].title}</h3>
                        <p>${copy[rank].desc}</p>
                    </div>
                    <ul>${items}</ul>
                </article>
            `;
        }).join('');
    }

    (async function initMileagePage() {
        const token = localStorage.getItem('accessToken');
        renderMileageBenefits();
        if (!token) return;
        try {
            const cached = JSON.parse(localStorage.getItem('user') || '{}');
            const userId = cached.id;
            if (userId) {
                const userResp = await fetch('/api/user?user_id=' + userId, { headers: { Authorization: 'Bearer ' + token } });
                if (userResp.ok) {
                    const user = await userResp.json();
                    const km = Number(user.mileage_rolling_km || user.mileage_km_365 || 0);
                    const rides = Number(user.total_rides || 0);
                    const card = user.mileage_card || '銅卡';
                    renderMileage(card, km, rides);
                }
            }
            const histResp = await fetch('/api/getHistory', { headers: { Authorization: 'Bearer ' + token } });
            if (histResp.ok) {
                const data = await histResp.json();
                const profile = data.gameProfile || {};
                const history = Array.isArray(data.history) ? data.history : [];
                const km = Number(profile.mileage_km_365 || profile.mileage_rolling_km || 0);
                const card = profile.mileage_rank === 'gold' ? '金卡' : (profile.mileage_rank === 'silver' ? '銀卡' : '銅卡');
                renderMileage(card, km, history.length);
            }
        } catch (_) {}
    })();

    function renderMileage(card, km, rides) {
        const cardEl = document.getElementById('ml-card');
        const kmEl = document.getElementById('ml-km');
        const ridesEl = document.getElementById('ml-rides');
        const fill = document.getElementById('ml-progress-fill');
        const label = document.getElementById('ml-progress-label');
        cardEl.textContent = card || '銅卡';
        kmEl.textContent = (Number(km || 0)).toFixed(1) + ' km';
        ridesEl.textContent = Number(rides || 0).toLocaleString();
        const v = Number(km || 0);
        let pct = 0;
        let msg = '距離銀卡還有 ' + Math.max(0, 500 - v).toFixed(1) + ' km';
        if (v >= 2000) {
            pct = 100;
            msg = '已達金卡，維持 1500 km 可保級';
        } else if (v >= 500) {
            pct = Math.max(5, Math.min(100, ((v - 500) / 1500) * 100));
            msg = '距離金卡還有 ' + Math.max(0, 2000 - v).toFixed(1) + ' km';
        } else {
            pct = Math.max(3, (v / 500) * 100);
        }
        fill.style.width = pct.toFixed(1) + '%';
        label.textContent = msg;
    }
    </script>
</body>
</html>
