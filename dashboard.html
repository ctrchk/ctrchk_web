<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#121f14">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="城市運輸單車">
    <link rel="apple-touch-icon" href="/images/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 - 城市運輸單車</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
    /* ──────────────────────────────────────────────────────────────
       Dashboard styles
    ────────────────────────────────────────────────────────────── */
    body.is-pwa,
    body.is-pwa footer {
        background: var(--app-bg-primary, #121f14);
        color: var(--app-text-primary, #e8f5e9);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', sans-serif;
    }
    @media (display-mode: standalone) {
        body { background: var(--app-bg-primary, #121f14); color: var(--app-text-primary, #e8f5e9); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', sans-serif; }
        footer { background: var(--app-bg-primary, #121f14); border-top: 1px solid var(--app-border, #2d4d2d); }
    }

    /* ── Top bar (app/PWA only) ── */
    .db-top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: calc(env(safe-area-inset-top) + 0.8em) 1.2em 0.7em;
        background: var(--app-bg-primary, #121f14);
    }
    .db-top-title {
        font-size: 1.25em;
        font-weight: bold;
        color: var(--app-text-primary, #e8f5e9);
    }
    .db-settings-btn {
        width: 38px; height: 38px;
        border-radius: 50%;
        background: var(--app-bg-card, #1e3820);
        border: 1px solid var(--app-border, #2d4d2d);
        display: flex; align-items: center; justify-content: center;
        color: var(--app-text-secondary, #a8d8a0);
        font-size: 1em;
        text-decoration: none;
        transition: background 0.2s;
    }
    .db-settings-btn:hover { background: var(--app-bg-card2, #243824); }

    /* ── Profile card ── */
    .db-profile-card {
        margin: 0 1em 0.8em;
        background: linear-gradient(135deg, var(--app-bg-card, #1e3820) 0%, var(--app-bg-card2, #243824) 100%);
        border-radius: 16px;
        padding: 1.2em 1.4em;
        border: 1px solid var(--app-border, #2d4d2d);
        box-shadow: 0 4px 16px rgba(0,0,0,0.25);
        display: flex;
        align-items: center;
        gap: 1em;
    }
    .db-avatar {
        width: 60px; height: 60px;
        border-radius: 50%;
        background: var(--app-bg-card2, #243824);
        border: 2px solid var(--app-accent, #6dba65);
        display: flex; align-items: center; justify-content: center;
        font-size: 1.5em;
        color: var(--app-accent, #6dba65);
        overflow: hidden;
        flex-shrink: 0;
    }
    .db-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .db-user-meta { flex: 1; min-width: 0; }
    .db-user-name {
        font-size: 1.2em;
        font-weight: bold;
        color: var(--app-text-primary, #e8f5e9);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 0.3em;
    }
    .db-role-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.3em;
        font-size: 0.78em;
        font-weight: bold;
        padding: 0.2em 0.65em;
        border-radius: 20px;
    }
    .db-role-admin  { background: #4a1942; color: #f3a0ef; }
    .db-role-senior { background: rgba(255,213,79,0.15); color: #ffd54f; border: 1px solid rgba(255,213,79,0.3); }
    .db-role-junior { background: var(--app-bg-card2, #243824); color: var(--app-text-secondary, #a8d8a0); border: 1px solid var(--app-border, #2d4d2d); }
    .db-profile-edit-btn {
        flex-shrink: 0;
        color: var(--app-text-secondary, #a8d8a0);
        text-decoration: none;
        font-size: 1.1em;
        padding: 0.4em;
    }
    .db-profile-edit-btn:hover { color: var(--app-accent, #6dba65); }

    /* Web hero */
    body:not(.is-pwa) .db-top-bar { display: none; }
    body.is-pwa .db-web-hero { display: none; }
    @media (display-mode: standalone) { .db-web-hero { display: none; } }
    .db-web-hero { padding: 1.5em 1.4em 1em; }
    .db-web-hero h1 { margin: 0 0 0.2em; font-size: 1.6em; }

    /* ── Level & XP card ── */
    .db-level-card {
        margin: 0 1em 0.8em;
        background: linear-gradient(135deg, #1a3a1a 0%, #2d5028 60%, #1e3820 100%);
        border-radius: 16px;
        padding: 1.1em 1.4em 1.2em;
        border: 1px solid var(--app-border, #2d4d2d);
        box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .db-level-header {
        display: flex;
        align-items: center;
        gap: 0.7em;
        margin-bottom: 0.8em;
        flex-wrap: wrap;
    }
    .db-level-badge {
        background: var(--app-accent, #6dba65);
        color: #121f14;
        font-size: 1em;
        font-weight: bold;
        padding: 0.25em 0.8em;
        border-radius: 8px;
        white-space: nowrap;
    }
    .db-level-title {
        font-size: 1em;
        font-weight: bold;
        color: var(--app-text-primary, #e8f5e9);
        flex: 1;
    }
    .db-coins-display {
        font-size: 0.85em;
        background: rgba(255,213,79,0.12);
        color: #ffd54f;
        padding: 0.25em 0.7em;
        border-radius: 20px;
        border: 1px solid rgba(255,213,79,0.25);
        white-space: nowrap;
    }
    .db-xp-bar-wrap {
        background: rgba(255,255,255,0.12);
        border-radius: 6px;
        height: 9px;
        overflow: hidden;
        margin-bottom: 0.45em;
    }
    .db-xp-bar-fill {
        background: var(--app-accent, #6dba65);
        height: 100%;
        border-radius: 6px;
        transition: width 0.9s ease;
        min-width: 4px;
    }
    .db-xp-label {
        font-size: 0.78em;
        color: var(--app-text-secondary, #a8d8a0);
    }

    /* ── Stats pills ── */
    .db-pills-row {
        display: flex;
        gap: 0.7em;
        padding: 0 1em;
        margin-bottom: 1em;
    }
    .db-pill {
        flex: 1;
        background: var(--app-bg-card, #1e3820);
        border: 1px solid var(--app-border, #2d4d2d);
        border-radius: 12px;
        padding: 0.7em 0.5em;
        text-align: center;
    }
    .db-pill-val {
        display: block;
        font-size: 1.2em;
        font-weight: bold;
        color: var(--app-accent, #6dba65);
        margin-bottom: 0.15em;
    }
    .db-pill-lbl { font-size: 0.68em; color: var(--app-text-secondary, #a8d8a0); }

    /* ── Section title ── */
    .db-section-title {
        font-size: 0.82em;
        font-weight: bold;
        color: var(--app-text-secondary, #a8d8a0);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        padding: 0 1em;
        margin: 0.2em 0 0.5em;
    }

    /* ── Notices ── */
    #email-verify-notice {
        margin: 0 1em 0.8em;
        background: #2a1f0a;
        border: 1px solid #ff9800;
        border-radius: 12px;
        padding: 0.9em 1.1em;
        color: #ffcc80;
        font-size: 0.88em;
        display: flex;
        gap: 0.6em;
        align-items: flex-start;
    }
    #email-verify-notice i { font-size: 1.2em; margin-top: 0.1em; flex-shrink: 0; }
    #upgrade-notice {
        margin: 0 1em 0.8em;
        background: rgba(109,186,101,0.08);
        border: 1px solid var(--app-accent, #6dba65);
        border-radius: 12px;
        padding: 1em 1.2em;
        text-align: center;
    }
    #upgrade-notice h3 { color: var(--app-accent, #6dba65); margin: 0 0 0.4em; font-size: 0.95em; }
    #upgrade-notice p { font-size: 0.84em; color: var(--app-text-secondary, #a8d8a0); margin: 0 0 0.8em; }
    .db-cta-btn {
        display: inline-block;
        background: var(--app-accent, #6dba65);
        color: #121f14;
        font-weight: bold;
        font-size: 0.88em;
        padding: 0.45em 1.4em;
        border-radius: 20px;
        text-decoration: none;
    }

    /* ── Ride history ── */
    .db-history-list {
        padding: 0 1em;
        display: flex;
        flex-direction: column;
        gap: 0.5em;
        margin-bottom: 0.5em;
    }
    .db-ride-item {
        background: var(--app-bg-card, #1e3820);
        border: 1px solid var(--app-border, #2d4d2d);
        border-left: 3px solid var(--app-accent, #6dba65);
        border-radius: 10px;
        padding: 0.85em 1em;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.5em;
        flex-wrap: wrap;
    }
    .db-ride-main { flex: 1; min-width: 0; }
    .db-ride-name {
        font-weight: bold;
        font-size: 0.9em;
        color: var(--app-text-primary, #e8f5e9);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .db-ride-meta { font-size: 0.76em; color: var(--app-text-secondary, #a8d8a0); margin-top: 0.15em; }
    .db-ride-xp {
        font-size: 0.8em;
        font-weight: bold;
        color: #121f14;
        background: var(--app-accent, #6dba65);
        padding: 0.2em 0.55em;
        border-radius: 8px;
        white-space: nowrap;
        flex-shrink: 0;
    }
    #db-history-empty {
        padding: 1.8em 1em;
        text-align: center;
        color: var(--app-text-secondary, #a8d8a0);
        font-size: 0.9em;
    }
    #db-history-empty i { font-size: 2.5em; display: block; margin-bottom: 0.4em; opacity: 0.35; }

    /* ── Admin card ── */
    .db-admin-card {
        margin: 0 1em 0.8em;
        background: rgba(74,25,66,0.3);
        border: 1px solid #6a2a60;
        border-radius: 12px;
        padding: 1em 1.2em;
    }
    .db-admin-card h3 { color: #f3a0ef; margin: 0 0 0.4em; font-size: 0.95em; }
    .db-admin-card p { font-size: 0.84em; color: var(--app-text-secondary, #a8d8a0); margin: 0 0 0.8em; }
    .db-admin-btn {
        display: inline-block;
        background: #4a1942;
        color: #f3a0ef;
        font-size: 0.85em;
        font-weight: bold;
        padding: 0.4em 1.2em;
        border-radius: 8px;
        text-decoration: none;
    }

    /* ── More links grid ── */
    .db-more-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.7em;
        padding: 0 1em;
        margin-bottom: 0.5em;
    }
    .db-more-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.35em;
        padding: 0.8em 0.4em;
        background: var(--app-bg-card, #1e3820);
        border: 1px solid var(--app-border, #2d4d2d);
        border-radius: 12px;
        color: var(--app-text-secondary, #a8d8a0);
        text-decoration: none;
        font-size: 0.72em;
        font-weight: bold;
        text-align: center;
        cursor: pointer;
        transition: background 0.2s;
        font-family: inherit;
        width: 100%;
    }
    .db-more-item:active, button.db-more-item:active { background: var(--app-bg-card2, #243824); }
    .db-more-item i { font-size: 1.5em; color: var(--app-accent, #6dba65); }
    .db-more-item.danger { color: #ef9a9a; }
    .db-more-item.danger i { color: #ef9a9a; }

    /* ── Bottom spacer ── */
    body.is-pwa .db-content,
    body.is-pwa footer { padding-bottom: calc(5em + env(safe-area-inset-bottom)); }
    @media (display-mode: standalone) {
        .db-content { padding-bottom: calc(5em + env(safe-area-inset-bottom)); }
    }

    /* ── Light theme overrides ── */
    body.app-light-theme .db-profile-card {
        background: linear-gradient(135deg, #f0f8f0 0%, #e0f2e0 100%);
        border-color: var(--app-border, #c8e6c9);
        box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    body.app-light-theme .db-level-card {
        background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 60%, #dcedc8 100%);
        border-color: var(--app-border, #c8e6c9);
        box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    body.app-light-theme .db-xp-bar-wrap { background: rgba(0,0,0,0.1); }
    body.app-light-theme #email-verify-notice { background: #fff8e1; color: #7a4000; }
    body.app-light-theme #upgrade-notice { background: rgba(46,125,50,0.06); }
    @media (prefers-color-scheme: light) {
        body:not(.app-theme-explicit) .db-profile-card {
            background: linear-gradient(135deg, #f0f8f0 0%, #e0f2e0 100%);
            border-color: var(--app-border, #c8e6c9);
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        body:not(.app-theme-explicit) .db-level-card {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 60%, #dcedc8 100%);
            border-color: var(--app-border, #c8e6c9);
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        body:not(.app-theme-explicit) .db-xp-bar-wrap { background: rgba(0,0,0,0.1); }
        body:not(.app-theme-explicit) #email-verify-notice { background: #fff8e1; color: #7a4000; }
        body:not(.app-theme-explicit) #upgrade-notice { background: rgba(46,125,50,0.06); }
    }
    </style>

    <script>
        // 頁面守衛：在渲染前確認已登入
        (function checkAuth() {
            if (!localStorage.getItem('accessToken')) {
                window.location.replace('/login');
                throw new Error('未授權訪問');
            }
        })();
    </script>
</head>

    <script>
    // ── Level config ──────────────────────────────────────────────────────────
    var LEVEL_TITLES = {
        1:'新手騎士',2:'新手騎士',3:'新手騎士',4:'新手騎士',5:'新手騎士',
        6:'城市騎手',7:'城市騎手',8:'城市騎手',9:'城市騎手',10:'城市騎手',
        11:'路線達人',12:'路線達人',13:'路線達人',14:'路線達人',15:'路線達人',
        16:'都市傳奇',17:'都市傳奇',18:'都市傳奇',19:'都市傳奇',20:'都市傳奇'
    };
    var LEVEL_XP = [
        0,80,200,380,620,950,1400,1980,2700,3600,
        4000,5100,6500,8100,10000,12200,14800,17800,21200,25200,
        Infinity
    ];

    function formatNum(n) {
        if (n >= 10000) return (n / 10000).toFixed(1) + 'w';
        if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
        return String(n);
    }

    function renderGameProfile(level, xp, coins, ridesCount) {
        var lvl = Math.max(1, Math.min(level || 1, 20));
        var currentXp = xp || 0;
        var currentCoins = coins || 0;
        var xpCurrent = LEVEL_XP[lvl - 1] || 0;
        var xpNext = LEVEL_XP[lvl];
        var xpBar = lvl >= 20 ? 100 : Math.round(Math.max(0, Math.min(100,
            (currentXp - xpCurrent) / Math.max(1, xpNext - xpCurrent) * 100)));

        document.getElementById('db-level-badge').textContent = 'Lv.' + lvl;
        document.getElementById('db-level-title').textContent = LEVEL_TITLES[lvl] || '殿堂騎士';
        document.getElementById('db-coins-display').textContent = '💰 ' + currentCoins.toLocaleString() + ' 里程幣';
        document.getElementById('db-xp-bar').style.width = xpBar + '%';
        document.getElementById('db-xp-label').textContent = lvl >= 20
            ? 'XP: ' + currentXp.toLocaleString() + '（已達最高等級）'
            : 'XP: ' + currentXp.toLocaleString() + ' / ' + xpNext.toLocaleString() + '（還需 ' + (xpNext - currentXp).toLocaleString() + ' XP）';
        document.getElementById('db-level-card').style.display = '';

        if (typeof ridesCount !== 'undefined') {
            document.getElementById('db-rides-count').textContent = ridesCount;
        }
        document.getElementById('db-total-xp').textContent = formatNum(currentXp);
        document.getElementById('db-coins-pill').textContent = formatNum(currentCoins);
        document.getElementById('db-pills-row').style.display = '';
    }

    // ── Shared auth helpers ───────────────────────────────────────────────────
    function _clearAuth() {
        localStorage.removeItem('accessToken');
        localStorage.removeItem('user');
    }

    // ── Main init ─────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async function () {
        try {
            var user;
            try {
                user = (typeof getUserData === 'function') ? getUserData() : null;
            } catch (e) {
                console.error('無法讀取登入資料:', e);
                user = null;
            }
            if (!user) { window.location.href = '/login'; return; }

            if (user.email_verified === false) {
                window.location.href = '/verify-email?pending=1';
                return;
            }

            _applyUserUI(user);
            if (user.level !== undefined) {
                renderGameProfile(user.level, user.xp, user.coins);
            }

            var userRole = user.user_role || user.role || 'junior';

            try {
                var token = localStorage.getItem('accessToken');
                var res = await fetch('/api/user?user_id=' + user.id, {
                    headers: token ? { 'Authorization': 'Bearer ' + token } : {}
                });
                if (res.ok) {
                    var dbUser = await res.json();
                    userRole = dbUser.user_role || userRole;
                    user.user_role = userRole;
                    if (dbUser.level !== undefined) {
                        user.level = dbUser.level;
                        user.xp = dbUser.xp;
                        user.coins = dbUser.coins;
                    }
                    if (Array.isArray(dbUser.unlocked_coin_routes)) {
                        localStorage.setItem('unlockedCoinRoutes', JSON.stringify(dbUser.unlocked_coin_routes));
                    }
                    localStorage.setItem('user', JSON.stringify(user));
                    _applyUserUI(user);
                }
            } catch (e) { /* use cached data */ }

            _applyRoleUI(userRole);
            await loadHistory();

        } catch (e) {
            console.error('儀表板初始化失敗:', e);
        }
    });

    function _applyUserUI(user) {
        document.getElementById('db-user-name').textContent =
            user.full_name || user.username || user.email || '騎士';
        var avatarEl = document.getElementById('db-avatar');
        if (user.avatar_url) {
            var img = document.createElement('img');
            img.alt = '頭像';
            img.src = user.avatar_url;
            img.onerror = function () { avatarEl.innerHTML = '<i class="fas fa-user"></i>'; };
            avatarEl.innerHTML = '';
            avatarEl.appendChild(img);
        }
        if (user.email_verified === false) {
            document.getElementById('email-verify-notice').style.display = '';
        }
    }

    function _applyRoleUI(role) {
        var badge = document.getElementById('db-role-badge');
        badge.className = 'db-role-badge';
        if (role === 'admin') {
            badge.classList.add('db-role-admin');
            badge.innerHTML = '<i class="fas fa-shield-alt"></i> 管理員';
            document.getElementById('admin-section').style.display = '';
        } else if (role === 'senior') {
            badge.classList.add('db-role-senior');
            badge.innerHTML = '<i class="fas fa-star"></i> 高級會員';
        } else {
            badge.classList.add('db-role-junior');
            badge.innerHTML = '<i class="fas fa-user"></i> 初級會員';
            document.getElementById('upgrade-notice').style.display = '';
        }
    }

    function _sessionExpired(container) {
        _clearAuth();
        container.innerHTML = '<div style="padding:1.5em;text-align:center;color:var(--app-text-secondary,#a8d8a0);">' +
            '<i class="fas fa-lock" style="font-size:2em;opacity:0.4;display:block;margin-bottom:0.4em;"></i>' +
            '登入已過期，請 <a href="/login" style="color:var(--app-accent,#6dba65);">重新登入</a>。</div>';
    }

    async function loadHistory() {
        var list = document.getElementById('db-history-list');
        list.innerHTML = '<div style="padding:1.5em;text-align:center;color:var(--app-text-secondary,#a8d8a0);"><i class="fas fa-spinner fa-spin"></i> 載入中...</div>';
        try {
            var token = localStorage.getItem('accessToken');
            var res = await fetch('/api/getHistory', {
                headers: token ? { 'Authorization': 'Bearer ' + token } : {}
            });
            if (res.status === 401) { _sessionExpired(list); return; }
            if (!res.ok) throw new Error('server ' + res.status);

            var data = await res.json();
            if (data.gameProfile) {
                var histArr = Array.isArray(data) ? data : (data.history || []);
                renderGameProfile(data.gameProfile.level, data.gameProfile.xp, data.gameProfile.coins, histArr.length);
            }

            var history = Array.isArray(data) ? data : (data.history || []);
            list.innerHTML = '';

            if (history.length === 0) {
                var emptyEl = document.getElementById('db-history-empty');
                emptyEl.style.display = '';
                list.appendChild(emptyEl);
                return;
            }

            var sourceIcon = { pwa: '📱', app: '📲', gpx: '📂' };
            history.forEach(function (ride) {
                var dateStr = ride.ride_date ? ride.ride_date.slice(0, 10) : '';
                var icon = sourceIcon[ride.source] || '🌐';
                var metaParts = [];
                if (dateStr) metaParts.push('📅 ' + dateStr);
                if (ride.distance_km) metaParts.push('🚴 ' + parseFloat(ride.distance_km).toFixed(1) + ' km');
                if (ride.duration_minutes) metaParts.push('⏱ ' + ride.duration_minutes + ' 分鐘');
                if (ride.avg_speed_kmh) metaParts.push('💨 ' + ride.avg_speed_kmh + ' km/h');
                var meta = metaParts.join('  ');

                var item = document.createElement('div');
                item.className = 'db-ride-item';
                item.innerHTML =
                    '<div class="db-ride-main">' +
                        '<div class="db-ride-name">' + icon + ' ' + (ride.route_name || '未命名路線') + '</div>' +
                        '<div class="db-ride-meta">' + meta + '</div>' +
                    '</div>' +
                    (ride.xp_earned ? '<span class="db-ride-xp">+' + ride.xp_earned + ' XP</span>' : '');
                list.appendChild(item);
            });
        } catch (e) {
            console.error('載入歷史失敗:', e);
            list.innerHTML = '<div style="padding:1em;color:var(--app-text-secondary,#a8d8a0);font-size:0.88em;">載入失敗，請稍後再試。</div>';
        }
    }

    // Logout
    document.addEventListener('DOMContentLoaded', function () {
        var btn = document.getElementById('db-logout-btn');
        if (btn) {
            btn.addEventListener('click', function () {
                _clearAuth();
                window.location.href = '/login';
            });
        }
    });
    </script>
    <script src="/js/pwa.js"></script>
</body>
</html>
