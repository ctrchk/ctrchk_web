  <style>
    /* ── Industrial HUD System 4.0 ── */
    :root {
      --hud-green: #2ecc71;
      --hud-red: #e74c3c;
      --hud-highway-green: rgba(27, 94, 32, 0.95);
      --hud-bg: rgba(18, 31, 20, 0.9);
      --hud-blur: blur(16px);
      --app-accent: #BFE340;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #1a252f; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', sans-serif; }

    #ride-map { position: fixed; inset: 0; z-index: 0; background: #0d1a24; }

    /* --- Industrial HUD Layout --- */
    .hud-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    }

    /* Top: Instructions Panel */
    .hud-top {
      pointer-events: auto;
      background: var(--hud-highway-green);
      backdrop-filter: var(--hud-blur);
      -webkit-backdrop-filter: var(--hud-blur);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 16px 20px;
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .hud-top.hidden { transform: translateY(-150%); }

    .nav-next-icon { font-size: 32px; color: #fff; min-width: 40px; text-align: center; }
    .nav-instruction-wrap { flex: 1; min-width: 0; }
    .nav-next-road { font-size: 12px; opacity: 0.9; color: rgba(255,255,255,0.9); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .nav-instruction { font-size: 20px; font-weight: 800; color: #fff; line-height: 1.2; }
    .nav-dist-wrap { text-align: right; border-left: 1px solid rgba(255,255,255,0.2); padding-left: 16px; min-width: 70px; }
    .nav-dist-val { font-size: 26px; font-weight: 900; color: #fff; line-height: 1; }
    .nav-dist-unit { font-size: 11px; color: var(--app-accent); opacity: 0.8; }

    /* Bottom: Combined Stats and Controls Panel */
    .hud-bottom-panel {
      pointer-events: auto;
      background: var(--hud-bg);
      backdrop-filter: var(--hud-blur);
      -webkit-backdrop-filter: var(--hud-blur);
      border-top: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px 24px 0 0;
      padding: 20px 24px calc(env(safe-area-inset-bottom) + 20px);
      margin: 0 -16px -16px;
      box-shadow: 0 -8px 32px rgba(0,0,0,0.5);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .hud-bottom-panel.hidden { transform: translateY(100%); }

    .stats-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 12px;
    }
    .stat-box {
      flex: 1;
      text-align: center;
    }
    .stat-label { font-size: 11px; color: #a8d8a0; opacity: 0.8; margin-bottom: 4px; text-transform: uppercase; font-weight: bold; }
    .stat-value { font-size: 24px; font-weight: 900; color: #fff; line-height: 1; }
    .stat-value span { font-size: 14px; font-weight: normal; margin-left: 2px; color: var(--app-accent); }

    .controls-row {
      display: flex;
      gap: 12px;
    }
    .btn-action {
      flex: 1;
      border: none;
      padding: 16px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.1s, background 0.2s;
    }
    .btn-action:active { transform: scale(0.96); }
    .btn-pause { background: #f1c232; color: #000; }
    .btn-end { background: var(--hud-red); color: #fff; }
    .btn-exit { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }

    /* ── Off-Route Warning ── */
    #off-route-warning {
      position: fixed;
      top: calc(env(safe-area-inset-top) + 110px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--hud-red);
      color: #fff;
      padding: 10px 24px;
      border-radius: 12px;
      font-weight: bold;
      z-index: 1000;
      display: none;
      animation: pulse 1s infinite;
      box-shadow: 0 4px 15px rgba(231, 76, 60, 0.6);
    }
    @keyframes pulse {
      0% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.05); }
      100% { transform: translateX(-50%) scale(1); }
    }

    /* ── User Navigation Arrow ── */
    .user-nav-arrow {
      width: 0; height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-bottom: 40px solid #6dba65;
      filter: drop-shadow(0 0 10px rgba(109, 186, 101, 0.6));
      transform-origin: center 75%;
    }

    /* ── Go-to-start banner ── */
    #go-to-start-banner {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
      background: var(--hud-bg); backdrop-filter: var(--hud-blur);
      -webkit-backdrop-filter: var(--hud-blur);
      color: #fff; border-radius: 24px 24px 0 0;
      padding: 24px 24px calc(env(safe-area-inset-bottom) + 24px);
      text-align: center; box-shadow: 0 -8px 32px rgba(0,0,0,0.5);
    }
    #go-to-start-banner h3 { font-size: 20px; font-weight: 800; color: var(--app-accent); margin-bottom: 8px; }
    #gts-dist-val { font-size: 32px; font-weight: 900; margin: 12px 0; display: block; }

    #gts-stop-select {
      width: 100%; background: rgba(255,255,255,0.1); color: #fff;
      border: 1px solid rgba(255,255,255,0.2); border-radius: 12px;
      padding: 12px; font-size: 15px; margin-bottom: 12px;
    }

    /* ── Loading ── */
    #ride-loading {
      position: fixed; inset: 0; z-index: 500;
      background: #1a252f; color: #fff;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1em;
    }
    .spinner {
      width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #BFE340; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Summary ── */
    #ride-summary {
      display: none; position: fixed; inset: 0; z-index: 600;
      background: rgba(26,37,47,0.98); color: #fff;
      flex-direction: column; align-items: center; justify-content: center;
      padding: 2em; text-align: center;
    }
    #ride-summary.show { display: flex; }
    #summary-xp-badge { background: #BFE340; color: #1a252f; font-size: 24px; font-weight: 900; padding: 12px 32px; border-radius: 16px; margin: 20px 0; }

    /* ── Locked ── */
    #ride-locked {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: #1a252f; color: #fff;
      flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 2em;
    }
    #ride-locked.show { display: flex; }
  </style>

  <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
  <script>
  (function () {
    'use strict';

    const params = new URLSearchParams(location.search);
    const routeId = params.get('id') || '';
    const dirIndex = parseInt(params.get('dir') || '0', 10);
    const startStopIdx = parseInt(params.get('startStopIdx') || '0', 10);
    const mode = params.get('mode');
    const friendMode = params.get('friendMode') === '1';

    let map = null;
    let userMarker = null;
    let watchId = null;
    let rideStarted = false;
    let goToStartPhase = true;
    let isFreeMode = (mode === 'free');
    let startTime = null;
    let timerInterval = null;
    let heartbeatInterval = null;
    let reachedStops = new Set();
    let totalDistM = 0;
    let lastLat = null, lastLon = null;
    let sessionXp = 0;
    let gpxCoords = [];
    let routeStops = [];
    let routeData = null;
    let allRoutes = [];
    let friendMarkers = new Map();

    const STOP_DETECTION_RADIUS_M = 40;
    const OFF_ROUTE_THRESHOLD_M = 50;

    function haversineM(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function formatTime(ms) {
      const s = Math.floor(ms / 1000), m = Math.floor(s / 60), h = Math.floor(m / 60);
      return h > 0 ? `${h}:${String(m % 60).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}` : `${String(m).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}`;
    }

    function formatDist(m) { return m >= 1000 ? `${(m / 1000).toFixed(2)} km` : `${Math.round(m)} m`; }

    async function initMap(center) {
        try {
            const configResp = await fetch('/api/user?action=config');
            const config = await configResp.json();
            mapboxgl.accessToken = config.mapboxToken;

            map = new mapboxgl.Map({
                container: 'ride-map',
                style: 'mapbox://styles/mapbox/dark-v11',
                center: [center[1], center[0]],
                zoom: 18.5,
                pitch: 75,
                bearing: 0,
                antialias: true
            });

            map.on('load', () => {
                const layers = map.getStyle().layers;
                const labelLayerId = layers.find(l => l.type === 'symbol' && l.layout['text-field'])?.id;
                map.addLayer({
                    'id': '3d-buildings',
                    'source': 'composite',
                    'source-layer': 'building',
                    'filter': ['==', 'extrude', 'true'],
                    'type': 'fill-extrusion',
                    'minzoom': 15,
                    'paint': {
                        'fill-extrusion-color': '#aaa',
                        'fill-extrusion-height': ['interpolate', ['linear'], ['zoom'], 15, 0, 15.05, ['get', 'height']],
                        'fill-extrusion-base': ['interpolate', ['linear'], ['zoom'], 15, 0, 15.05, ['get', 'min_height']],
                        'fill-extrusion-opacity': 0.6
                    }
                }, labelLayerId);

                if (routeData && gpxCoords.length > 0) {
                    drawRoute(gpxCoords, routeData.color || '#BFE340');
                }
                document.getElementById('ride-loading').style.display = 'none';

                // Initial marker if position already known
                if (lastLat !== null) updateUserMarker([lastLon, lastLat], 0);
            });

            map.on('error', (e) => {
                console.error('Mapbox error:', e);
                document.getElementById('ride-loading').innerHTML = '<p style="color:#e74c3c;">地圖載入失敗，請檢查網絡連接或 Token。</p>';
            });

        } catch (e) {
            console.error('initMap error:', e);
            document.getElementById('ride-loading').innerHTML = '<p style="color:#e74c3c;">系統初始化失敗</p>';
        }
    }

    function drawRoute(coords, color) {
        if (!map) return;
        const geojson = { 'type': 'Feature', 'geometry': { 'type': 'LineString', 'coordinates': coords } };
        map.addSource('route', { 'type': 'geojson', 'data': geojson });
        map.addLayer({ 'id': 'route-line-glow', 'type': 'line', 'source': 'route', 'paint': { 'line-color': color, 'line-width': 12, 'line-opacity': 0.3 } });
        map.addLayer({ 'id': 'route-line', 'type': 'line', 'source': 'route', 'paint': { 'line-color': color, 'line-width': 6, 'line-opacity': 0.8 } });
    }

    function updateUserMarker(coords, heading) {
        if (!map) return;
        if (!userMarker) {
            const el = document.createElement('div');
            el.className = 'user-nav-arrow';
            userMarker = new mapboxgl.Marker({ element: el, rotationAlignment: 'map', pitchAlignment: 'map' }).setLngLat(coords).addTo(map);
        } else {
            userMarker.setLngLat(coords);
            userMarker.getElement().style.transform = `rotate(${heading || 0}deg)`;
        }
        if (rideStarted) {
            map.easeTo({ center: coords, bearing: heading || 0, pitch: 75, zoom: 19, duration: 1000 });
        }
    }

    function onPosition(pos) {
        if (!map) return;
        const { latitude: lat, longitude: lon, accuracy, speed, heading } = pos.coords;
        const speedKmh = speed != null ? (speed * 3.6) : 0;
        const coords = [lon, lat];

        document.getElementById('gps-status-text').textContent = `GPS 精確度: ±${Math.round(accuracy)} m`;
        document.getElementById('speed-val').innerHTML = speedKmh.toFixed(1) + '<span>km/h</span>';

        updateUserMarker(coords, heading);

        if (rideStarted) {
            if (lastLat !== null) {
                const d = haversineM(lastLat, lastLon, lat, lon);
                if (d >= 2 && d < 500 && accuracy <= 50) totalDistM += d;
            }
            if (gpxCoords.length > 1) {
                const snapped = turf.nearestPointOnLine(turf.lineString(gpxCoords), turf.point(coords), { units: 'meters' });
                document.getElementById('off-route-warning').style.display = snapped.properties.dist > OFF_ROUTE_THRESHOLD_M ? 'block' : 'none';
            }
        }
        lastLat = lat; lastLon = lon;
        document.getElementById('dist-val').innerHTML = (totalDistM / 1000).toFixed(1) + '<span>km</span>';

        if (goToStartPhase && routeStops.length > 0) {
            const dist = haversineM(lat, lon, routeStops[startStopIdx].lat, routeStops[startStopIdx].lon);
            document.getElementById('gts-dist-val').textContent = formatDist(dist);
            if (dist <= STOP_DETECTION_RADIUS_M) beginRide();
        } else if (rideStarted && !isFreeMode) {
            updateHUD(coords, speedKmh);
            checkStops(lat, lon);
        }
    }

    function updateHUD(coords, speed) {
        const next = routeStops.find(s => !reachedStops.has(s.order)) || routeStops[routeStops.length - 1];
        const dist = haversineM(coords[1], coords[0], next.lat, next.lon);
        document.getElementById('next-dist').textContent = Math.round(dist);
        document.getElementById('next-road').textContent = routeId + ' ' + (routeData?.alias || '');
        document.getElementById('next-instruction').textContent = reachedStops.has(next.order) ? '即將到達終點' : `前往：${next.name}`;
        document.getElementById('next-dist').textContent = Math.round(dist);
    }

    function checkStops(lat, lon) {
        const next = routeStops.find(s => !reachedStops.has(s.order));
        if (next && haversineM(lat, lon, next.lat, next.lon) <= STOP_DETECTION_RADIUS_M) {
            reachedStops.add(next.order);
            sessionXp += (next.xp || 10);
            document.getElementById('stat-stops').textContent = `${reachedStops.size}/${routeStops.length}`;
        }
    }

    function beginRide() {
        if (rideStarted) return;
        rideStarted = true; goToStartPhase = false; startTime = Date.now();
        document.getElementById('go-to-start-banner').style.display = 'none';
        if (!isFreeMode) {
            document.getElementById('hud-top').classList.remove('hidden');
        } else {
            document.getElementById('free-mode-hud').style.display = 'block';
        }
        document.getElementById('hud-bottom').classList.remove('hidden');
        timerInterval = setInterval(() => {
            document.getElementById('stat-time').textContent = formatTime(Date.now() - startTime);
        }, 1000);
        heartbeatInterval = setInterval(syncActiveRide, 5000);
    }

    async function syncActiveRide() {
        const token = localStorage.getItem('accessToken');
        if (!token) return;
        const state = { type: 'route', routeId, dirIndex, totalDistM, reachedStops: [...reachedStops], startTime, sessionXp, lastLat, lastLon, routeAlias: routeData?.alias || routeId };
        try {
            const res = await fetch('/api/user', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ action: 'active-ride', state, share_location: friendMode }) });
            if (res.ok && friendMode) {
                const data = await res.json();
                updateFriendMarkers(data.friends_locations || []);
            }
        } catch (e) {}
    }

    function updateFriendMarkers(friends) {
        if (!map) return;
        friends.forEach(f => {
            const myId = JSON.parse(localStorage.getItem('user') || '{}').id;
            if (Number(f.user_id) === Number(myId)) return;
            let m = friendMarkers.get(f.user_id);
            if (!m) {
                const el = document.createElement('div');
                el.style.cssText = 'background:#3498db; width:32px; height:32px; border-radius:50%; border:2px solid #fff; display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px; font-weight:bold; box-shadow:0 2px 6px rgba(0,0,0,0.3);';
                el.textContent = f.username ? f.username[0].toUpperCase() : '?';
                m = new mapboxgl.Marker(el).setLngLat([f.lng, f.lat]).addTo(map);
                friendMarkers.set(f.user_id, m);
            } else { m.setLngLat([f.lng, f.lat]); }
        });
    }

    window.skipGoToStart = beginRide;
    window.startFromSelectedStop = () => {
        const idx = parseInt(document.getElementById('gts-stop-select').value);
        routeStops = routeStops.slice(idx).map((s, i) => ({ ...s, order: i + 1 }));
        buildStopsUI(); beginRide();
    };

    function buildStopsUI() {
        document.getElementById('stat-stops').textContent = `0/${routeStops.length}`;
        const sel = document.getElementById('gts-stop-select');
        sel.innerHTML = routeStops.slice(0, -1).map((s, i) => `<option value="${i}">${s.name}</option>`).join('');
        if (routeStops.length > 0 && !isFreeMode) {
            document.getElementById('go-to-start-banner').style.display = 'block';
            document.getElementById('gts-start-name').textContent = routeStops[0].name;
        }
    }

    async function endRide() {
        clearInterval(timerInterval); clearInterval(heartbeatInterval);
        if (watchId) navigator.geolocation.clearWatch(watchId);
        const durationMins = Math.round((Date.now() - startTime) / 60000), distKm = parseFloat((totalDistM / 1000).toFixed(2));
        const token = localStorage.getItem('accessToken');
        const res = await fetch('/api/getHistory', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ route_id: routeId, ride_date: new Date().toISOString().slice(0, 10), distance_km: distKm, duration_minutes: durationMins, stops_reached: [...reachedStops], all_stops: reachedStops.size === routeStops.length, xp_earned_override: sessionXp }) });
        const result = await res.json();
        document.getElementById('s-time').textContent = durationMins + 'm'; document.getElementById('s-dist').textContent = distKm + 'km';
        document.getElementById('summary-xp-badge').textContent = `+${result.xp_earned || 0} XP`;
        document.getElementById('ride-summary').classList.add('show');
    }

    window.confirmLeave = () => { if (!rideStarted || confirm('確定要放棄此次騎行嗎？資料將不會儲存。')) location.href = '/dashboard'; };
    document.getElementById('btn-pause-ride').onclick = async () => { if (confirm('暫停行程？可稍後繼續。')) { await syncActiveRide(); location.href = '/dashboard'; } };
    document.getElementById('btn-end-ride').onclick = () => { if (confirm('結束並儲存？')) endRide(); };
    document.getElementById('btn-skip-loading').onclick = () => document.getElementById('ride-loading').style.display = 'none';

    (async function init() {
        const [r1, r2] = await Promise.all([fetch('/routes.json'), fetch('/api/user?action=route-data')]);
        const d1 = await r1.json(), d2 = await r2.json();
        allRoutes = d1.routes;
        routeData = d2.routes.find(r => String(r.route_id) === String(routeId)) || allRoutes.find(r => String(r.id) === String(routeId));
        if (mode === 'free') {
            await initMap([22.3143, 114.2697]);
            beginRide();
        } else if (routeData) {
            routeStops = routeData.stops || [];
            if (routeData.gpx && routeData.gpx[dirIndex]) {
                const gpxRes = await fetch('/gpx/' + routeData.gpx[dirIndex].file);
                const gpxText = await gpxRes.text();
                gpxCoords = [...(new DOMParser().parseFromString(gpxText, 'application/xml')).querySelectorAll('trkpt')].map(p => [parseFloat(p.getAttribute('lon')), parseFloat(p.getAttribute('lat'))]);
            }
            await initMap(routeStops.length > 0 ? [routeStops[0].lat, routeStops[0].lon] : [22.3143, 114.2697]);
            buildStopsUI();
        } else { location.href = '/routes'; }
        if (navigator.geolocation) {
            watchId = navigator.geolocation.watchPosition(onPosition, e => { console.warn(e); }, { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 });
        }
    })();
  })();
  </script>
</body>
