<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重設密碼 - 城市運輸單車</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="content animated-element">
            <div class="contact-form-container" style="max-width: 500px; margin: 3em auto;">

                <!-- 載入中 -->
                <div id="reset-loading" style="text-align: center; padding: 2em 0;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 2.5em; color: #04D93C;"></i>
                    <p style="color: #555; margin-top: 0.5em;">正在驗證連結...</p>
                </div>

                <!-- 重設密碼表單 -->
                <div id="reset-form-section" style="display: none;">
                    <h2 style="text-align: left;">重設密碼</h2>
                    <p style="color: #555; margin-bottom: 1.5em;">請設置您的新密碼（至少 8 個字元）。</p>

                    <form id="reset-password-form">
                        <div class="form-group">
                            <label for="new-password">新密碼</label>
                            <input type="password" id="new-password" name="password"
                                   required minlength="8" placeholder="至少 8 個字元">
                        </div>
                        <div class="form-group">
                            <label for="confirm-password">確認新密碼</label>
                            <input type="password" id="confirm-password" name="confirm_password"
                                   required minlength="8" placeholder="再次輸入新密碼">
                        </div>
                        <button type="submit" class="cta-button" id="reset-submit-btn">
                            確認重設密碼
                        </button>
                    </form>
                </div>

                <!-- 成功 -->
                <div id="reset-success-section" style="display: none; text-align: center; padding: 2em 0;">
                    <i class="fas fa-check-circle" style="font-size: 4em; color: #04D93C; margin-bottom: 0.5em;"></i>
                    <h2 style="color: #2c3e50;">密碼重設成功！</h2>
                    <p style="color: #555;">您的密碼已成功更新，請使用新密碼登入。</p>
                    <a href="/login.html" class="cta-button" style="display: inline-block; margin-top: 1.5em;">
                        前往登入
                    </a>
                </div>

                <!-- 錯誤（無效或過期連結） -->
                <div id="reset-error-section" style="display: none; text-align: center; padding: 2em 0;">
                    <i class="fas fa-times-circle" style="font-size: 4em; color: #e74c3c; margin-bottom: 0.5em;"></i>
                    <h2 style="color: #2c3e50;">連結無效</h2>
                    <p id="reset-error-msg" style="color: #555;"></p>
                    <a href="/forgot-password.html" class="cta-button" style="display: inline-block; margin-top: 1.5em;">
                        重新申請重設密碼
                    </a>
                </div>

            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 香港城市運輸單車. All Rights Reserved.</p>
    </footer>

    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            const loadingEl = document.getElementById('reset-loading');
            const formSection = document.getElementById('reset-form-section');
            const successSection = document.getElementById('reset-success-section');
            const errorSection = document.getElementById('reset-error-section');
            const errorMsg = document.getElementById('reset-error-msg');
            const submitBtn = document.getElementById('reset-submit-btn');

            // 無 token，顯示錯誤
            if (!token) {
                loadingEl.style.display = 'none';
                errorMsg.textContent = '缺少重設 token，請使用郵件中的連結。';
                errorSection.style.display = 'block';
                return;
            }

            // 有 token，顯示表單（token 合法性在提交時由後端驗證）
            loadingEl.style.display = 'none';
            formSection.style.display = 'block';

            const form = document.getElementById('reset-password-form');
            form.addEventListener('submit', async function (e) {
                e.preventDefault();

                const password = document.getElementById('new-password').value;
                const confirmPassword = document.getElementById('confirm-password').value;

                if (password !== confirmPassword) {
                    alert('兩次輸入的密碼不一致，請重新輸入。');
                    return;
                }

                if (password.length < 8) {
                    alert('密碼長度至少需要 8 個字元。');
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = '處理中...';

                try {
                    const response = await fetch('/api/password-reset', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token, password })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        formSection.style.display = 'none';
                        successSection.style.display = 'block';
                    } else {
                        formSection.style.display = 'none';
                        errorMsg.textContent = data.message || '密碼重設失敗，請稍後再試。';
                        errorSection.style.display = 'block';
                    }
                } catch (error) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = '確認重設密碼';
                    alert('發生錯誤，請稍後再試。');
                }
            });
        });
    </script>
</body>
</html>
