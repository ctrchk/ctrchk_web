<!DOCTYPE html>
<html lang="zh-Hant">
<head>

  window.dataLayer = window.dataLayer || [];

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO Meta Tags -->
    <title>網誌文章 | 香港城市運輸單車 (CTRC HK)</title>
    <meta name="description" content="閱讀最新的單車故事與城市騎行心得。">
    <meta name="keywords" content="單車文章, 騎行故事, 香港單車, CTRC HK">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="article">
    <meta property="og:title" content="網誌文章 - 香港城市運輸單車 (CTRC HK)">
    <meta property="og:description" content="深入了解香港城市騎行的魅力與故事。">

    <!-- Structured Data (JSON-LD) will be injected dynamically if needed,
         but we add a base Article schema here -->
    <script type="application/ld+json" id="article-schema">
    {
      "@context": "https://schema.org",
      "@type": "BlogPosting",
      "publisher": {
        "@type": "Organization",
        "name": "香港城市運輸單車",
        "logo": "https://ctrchk.com/images/icon-192.png"
      }
    }
    </script>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* === Blog 文章詳情頁專屬樣式 === */
        .blog-post-full {
            max-width: 800px;
            margin: 2em auto;
            padding: 0 1em;
        }

        .post-header {
            text-align: center;
            margin-bottom: 2em;
            padding-bottom: 1.5em;
            border-bottom: 1px solid #eee;
        }

        .post-header h1 {
            font-size: 2.5em;
            color: #2c3e50;
            margin-bottom: 0.3em;
        }

        .post-meta {
            color: #666;
            font-size: 0.9em;
        }

        .post-meta span {
            margin: 0 0.8em;
        }

        .post-featured-image {
            width: 100%;
            max-height: 400px; /* 限制圖片最大高度 */
            object-fit: cover; /* 保持圖片比例並裁剪 */
            border-radius: 8px;
            margin-bottom: 2em;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .post-content p,
        .post-content ul,
        .post-content ol {
            line-height: 1.8;
            margin-bottom: 1.2em;
        }
         .post-content ul,
         .post-content ol {
            padding-left: 1.5em; /* 列表縮排 */
         }
        .post-content a {
            color: #04D93C;
            text-decoration: underline;
        }
        .post-content a:hover {
            color: #BFE340;
        }
        .back-to-blog {
             display: inline-block;
             margin-top: 3em;
             color: #2c3e50;
             font-weight: bold;
             text-decoration: none;
             border: 1px solid #ccc;
             padding: 0.5em 1em;
             border-radius: 5px;
             transition: background-color 0.3s, color 0.3s;
         }
         .back-to-blog:hover {
             background-color: #f4f4f4;
         }
         .back-to-blog i {
             margin-right: 0.5em;
         }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div id="blog-post-container" class="blog-post-full animated-element">
            <p style="text-align: center;">正在載入文章...</p>
        </div>
    </main>

    <footer>
         <p>&copy; 2026 香港城市運輸單車. All Rights Reserved.</p>
     </footer>

    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            if (typeof loadSharedComponents === 'function') {
                loadSharedComponents();
            }

            const container = document.getElementById('blog-post-container');
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('id');

            if (!postId) {
                container.innerHTML = '<p style="text-align:center;">文章 ID 無效。</p>';
                document.title = '文章 ID 無效 - 香港城市運輸單車';
                return;
            }

            async function renderPost(post) {
                const fullTitle = `${post.title} | 香港城市運輸單車 (CTRC HK)`;
                document.title = fullTitle;

                // Dynamic SEO Updates
                const desc = post.summary || post.content.replace(/<[^>]*>/g, '').substring(0, 150);
                document.querySelector('meta[name="description"]')?.setAttribute('content', desc);
                document.querySelector('meta[property="og:title"]')?.setAttribute('content', fullTitle);
                document.querySelector('meta[property="og:description"]')?.setAttribute('content', desc);
                const postImg = post.image_url || post.image;
                if (postImg) {
                    document.querySelector('meta[property="og:image"]')?.setAttribute('content', postImg.startsWith('http') ? postImg : 'https://ctrchk.com/' + postImg);
                }

                // Update JSON-LD
                const schemaEl = document.getElementById('article-schema');
                if (schemaEl) {
                    const schema = JSON.parse(schemaEl.text);
                    schema.headline = post.title;
                    schema.description = desc;
                    schema.author = { "@type": "Person", "name": post.author_name || post.author || "管理員" };
                    schema.datePublished = post.created_at || post.date;
                    if (postImg) schema.image = postImg.startsWith('http') ? postImg : 'https://ctrchk.com/' + postImg;
                    schemaEl.text = JSON.stringify(schema);
                }

                const imgHtml = postImg
                    ? `<img src="${escHtml(postImg)}" alt="${escHtml(post.title)}" class="post-featured-image">`
                    : '';

                container.innerHTML = `
                    <div class="post-header">
                        <h1>${escHtml(post.title)}</h1>
                        <div class="post-meta">
                            <span><i class="fas fa-user"></i> ${escHtml(post.author_name || post.author || '管理員')}</span>
                            <span><i class="fas fa-calendar-alt"></i> ${new Date(post.created_at || post.date).toLocaleDateString('zh-HK')}</span>
                        </div>
                    </div>
                    ${imgHtml}
                    <div class="post-content">${post.content || ''}</div>
                    <a href="/blog" class="back-to-blog"><i class="fas fa-arrow-left"></i> 返回網誌列表</a>
                `;

                if (window.initAnimatedElements) window.initAnimatedElements();
            }

            try {
                // Try API first
                const resp = await fetch(`/api/blog?id=${encodeURIComponent(postId)}`);
                if (resp.ok) {
                    const data = await resp.json();
                    if (data.post) {
                        renderPost(data.post);
                        return;
                    }
                }

                // If not found in API, try hardcoded posts
                if (window.blogPosts && Array.isArray(window.blogPosts)) {
                    const post = window.blogPosts.find(p => String(p.id) === String(postId));
                    if (post) {
                        renderPost(post);
                        return;
                    }
                }

                container.innerHTML = '<p style="text-align:center;">找不到指定的文章。</p>';
                document.title = '找不到文章 - 香港城市運輸單車';

            } catch (err) {
                container.innerHTML = `<p style="text-align:center; color:#e74c3c;">載入文章失敗：${err.message}</p>`;
                document.title = '載入失敗 - 香港城市運輸單車';
                console.error('loadPost error:', err);
            }

            function escHtml(str) {
                if (!str) return '';
                return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
            }
        });
    </script>
    <script src="/js/pwa.js"></script>
</body>
</html>
