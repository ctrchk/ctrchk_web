<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天氣資訊 - 城市運輸單車</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .wx-wrap { max-width: 900px; margin: 0 auto; padding: 1.1em 1em 2em; color: var(--app-text-primary, #e6f2e8); }
        .wx-card { border:1px solid var(--app-border, #2f4c36); background: var(--app-bg-card, #1a2c1f); border-radius:14px; padding: 1em; margin-bottom: 0.75em; }

        .wx-main { display:flex; align-items:center; justify-content:space-between; gap:0.8em; }
        .wx-main h1 { margin:0; font-size:1.25em; color:#BFE340; }
        .wx-temp { font-size:2.2em; font-weight: 800; line-height:1; }
        .wx-meta { color: var(--app-text-secondary, #aac2ad); font-size:0.85em; margin-top:0.25em; }

        .wx-grid { display:grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap:0.65em; }
        .wx-item { border:1px solid var(--app-border, #36573e); background: var(--app-bg-card2, #16241b); border-radius:10px; padding:0.7em; }

        .wx-item .k { color:#9db4a0; font-size:0.76em; }
        .wx-item .v { font-size:1.02em; font-weight:700; margin-top:0.2em; }
        .wx-warning { color:#ffe29b; font-size:0.9em; line-height:1.5; margin-top:0.35em; }
        .wx-rank-tip { font-size:0.82em; color:#a9c2ac; margin-top:0.5em; }
        .wx-actions { display:grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap:0.55em; margin-top:0.7em; }
        .wx-btn { text-decoration:none; text-align:center; border:1px solid #3b6044; background:#1e3224; color:#d8eedb; border-radius:10px; padding:0.65em; font-weight:700; font-size:0.84em; }
        @media (max-width: 720px) {
            .wx-grid, .wx-actions { grid-template-columns: 1fr; }
            .wx-main { align-items:flex-start; flex-direction:column; }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    <main class="wx-wrap">
        <section class="wx-card">
            <div class="wx-main">
                <div>
                    <h1><i class="fas fa-cloud-sun"></i> 即時天氣資訊</h1>
                    <div class="wx-meta" id="wx-updated">載入中...</div>
                </div>
                <div class="wx-temp" id="wx-temp">--°C</div>
            </div>
            <div class="wx-rank-tip" id="wx-rank-tip">你可以在本頁快速查看出發前所需的天氣重點。</div>
        </section>

        <section class="wx-grid">
            <div class="wx-item"><div class="k">你的位置</div><div class="v" id="wx-location">定位中...</div></div>
            <div class="wx-item"><div class="k">相對濕度</div><div class="v" id="wx-humidity">--%</div></div>
            <div class="wx-item"><div class="k">天氣描述</div><div class="v" id="wx-desc">--</div></div>
            <div class="wx-item"><div class="k">天氣警告</div><div class="v" id="wx-warning-title">目前沒有警告</div></div>
            <div class="wx-item"><div class="k">體感提醒</div><div class="v" id="wx-advice">出發前請先檢查路況與裝備</div></div>
        </section>
        <div class="wx-warning" id="wx-warning-list"></div>

        <section class="wx-actions">
            <a class="wx-btn" href="/routes"><i class="fas fa-biking"></i> 開始騎行</a>
            <a class="wx-btn" href="/mileage"><i class="fas fa-road"></i> 查看里程計劃</a>
            <a class="wx-btn" href="/dashboard"><i class="fas fa-chart-line"></i> 我的進度</a>
        </section>
    </main>

    <footer><p>&copy; 2026 香港城市運輸單車. All Rights Reserved.</p></footer>
    <script src="/js/main.js"></script>
    <script src="/js/pwa.js"></script>
    <script>
    (async function initWeather() {
        if (typeof window.confirmLocationPermission === 'function') {
            window.confirmLocationPermission(() => {
                _initWeatherActual();
            }, () => {
                _initWeatherActual(); // Even if custom prompt denied, try loading weather (will use default HK)
            });
        } else {
            _initWeatherActual();
        }
    })();

    async function _initWeatherActual() {
        const rank = resolveRankFromUser();
        const rankTip = document.getElementById('wx-rank-tip');
        rankTip.textContent = rank === 'gold'
            ? '金卡：可優先體驗天氣相關新功能，建議持續留意更新。'
            : (rank === 'silver'
                ? '銀卡：可優先獲得天氣提醒相關功能更新。'
                : '銅卡：你可在本頁快速查看出發前所需的天氣重點。');
        let userPos = null;
        let localCurrent = null;

        const isApp = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true || document.body.classList.contains('is-pwa');

        if (isApp) {
            try {
                userPos = await getUserPosition();
                document.getElementById('wx-location').textContent = `${userPos.coords.latitude.toFixed(5)}, ${userPos.coords.longitude.toFixed(5)}`;
                localCurrent = await fetchOpenMeteoCurrent(userPos.coords.latitude, userPos.coords.longitude);
            } catch (_) {
                document.getElementById('wx-location').textContent = '未能取得定位（已改用香港整體天氣）';
            }
        } else {
            document.getElementById('wx-location').textContent = '香港（預設）';
            // Provide a way for web users to manually get location if they want
            const locEl = document.getElementById('wx-location');
            locEl.style.cursor = 'pointer';
            locEl.title = '點擊以獲取精確位置天氣';
            locEl.innerHTML = '香港 (點擊獲取定位) <i class="fas fa-location-arrow" style="font-size:0.8em; margin-left:4px; opacity:0.6;"></i>';
            locEl.onclick = async () => {
                locEl.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 定位中...';
                try {
                    userPos = await getUserPosition();
                    locEl.textContent = `${userPos.coords.latitude.toFixed(5)}, ${userPos.coords.longitude.toFixed(5)}`;
                    localCurrent = await fetchOpenMeteoCurrent(userPos.coords.latitude, userPos.coords.longitude);
                    // Re-render with new data
                    const [rhrResult, warnResult] = await Promise.allSettled([
                        fetchWeatherApi('rhrread'),
                        fetchWeatherApi('warnsum')
                    ]);
                    if (rhrResult.status === 'fulfilled' && rhrResult.value.ok) {
                        const rhrData = await rhrResult.value.json();
                        let warnData = {};
                        if (warnResult.status === 'fulfilled' && warnResult.value.ok) {
                            warnData = await warnResult.value.json();
                        }
                        renderWeather(rhrData, warnData, localCurrent);
                    }
                } catch (e) {
                    locEl.textContent = '定位失敗';
                }
            };
        }

        try {
            const [rhrResult, warnResult] = await Promise.allSettled([
                fetchWeatherApi('rhrread'),
                fetchWeatherApi('warnsum')
            ]);
            if (rhrResult.status !== 'fulfilled' || !rhrResult.value.ok) {
                throw new Error('weather api failed');
            }
            const rhrData = await rhrResult.value.json();
            let warnData = {};
            if (warnResult.status === 'fulfilled' && warnResult.value.ok) {
                warnData = await warnResult.value.json();
            }
            renderWeather(rhrData, warnData, localCurrent);
        } catch (_) {
            document.getElementById('wx-updated').textContent = '天氣資料載入失敗，請稍後再試';
        }
    async function fetchWeatherApi(dataType) {
        const langs = ['tc', 'zh', 'en'];
        let lastResp = null;
        for (const lang of langs) {
            const proxyUrl = `/api/_weather/${dataType}?lang=${encodeURIComponent(lang)}`;
            const directUrl = `https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=${encodeURIComponent(dataType)}&lang=${encodeURIComponent(lang)}`;
            let resp = await fetch(proxyUrl).catch(() => null);
            if (!resp || !resp.ok) {
                resp = await fetch(directUrl).catch(() => null);
            }
            if (resp && resp.ok) return resp;
            if (resp) lastResp = resp;
        }
        return lastResp;
    }

    function getUserPosition() {
        if (!('geolocation' in navigator)) return Promise.reject(new Error('geolocation unsupported'));
        return new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, (err) => {
                // If high accuracy fails or times out, try low accuracy as fallback
                navigator.geolocation.getCurrentPosition(resolve, reject, {
                    enableHighAccuracy: false,
                    timeout: 10000,
                    maximumAge: 300000
                });
            }, {
                enableHighAccuracy: true,
                timeout: 15000,
                maximumAge: 60000
            });
        });
    }

    async function fetchOpenMeteoCurrent(lat, lon) {
        try {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${encodeURIComponent(lat)}&longitude=${encodeURIComponent(lon)}&current=temperature_2m,relative_humidity_2m`;
            const resp = await fetch(url);
            if (!resp.ok) return null;
            const data = await resp.json();
            return data?.current || null;
        } catch (_) {
            return null;
        }
    }

    function resolveRankFromUser() {
        try {
            const u = JSON.parse(localStorage.getItem('user') || '{}');
            const raw = String(u.permission_rank || u.mileage_rank || u.mileage_card || '').toLowerCase();
            if (raw.includes('gold') || raw.includes('金')) return 'gold';
            if (raw.includes('silver') || raw.includes('銀')) return 'silver';
        } catch (_) {}
        return 'bronze';
    }

    function renderWeather(rhrData, warnData, localCurrent) {
        const tempFromHko = Number(rhrData?.temperature?.data?.[0]?.value ?? NaN);
        const humidityFromHko = Number(rhrData?.humidity?.data?.[0]?.value ?? NaN);
        const temp = Number.isFinite(Number(localCurrent?.temperature_2m)) ? Number(localCurrent.temperature_2m) : tempFromHko;
        const humidity = Number.isFinite(Number(localCurrent?.relative_humidity_2m)) ? Number(localCurrent.relative_humidity_2m) : humidityFromHko;

        // Improve description
        let desc = '資料更新中';
        if (rhrData?.weatherDescription && rhrData.weatherDescription.length > 0) {
            desc = Array.isArray(rhrData.weatherDescription) ? rhrData.weatherDescription[0] : rhrData.weatherDescription;
        } else if (rhrData?.icon?.length) {
            desc = '香港天文台最新天氣';
        }

        document.getElementById('wx-temp').textContent = Number.isFinite(temp) ? `${temp}°C` : '--°C';
        document.getElementById('wx-humidity').textContent = Number.isFinite(humidity) ? `${humidity}%` : '--%';
        document.getElementById('wx-desc').textContent = desc;
        document.getElementById('wx-updated').textContent = '更新時間：' + (rhrData?.updateTime || new Date().toISOString()).replace('T', ' ').slice(0, 16);

        const warnings = [];
        if (warnData) {
            Object.values(warnData).forEach(w => {
                if (w && w.name) warnings.push(w.name);
            });
        }

        const warningTitle = document.getElementById('wx-warning-title');
        const warningList = document.getElementById('wx-warning-list');
        const adviceEl = document.getElementById('wx-advice');

        if (warnings.length === 0) {
            warningTitle.textContent = '目前沒有警告';
            warningList.textContent = '';

            // Temperature-based advice
            if (temp > 32) adviceEl.textContent = '天氣酷熱，請補充足夠水分，避免長時間暴曬。';
            else if (temp < 12) adviceEl.textContent = '天氣寒冷，請穿著足夠防風保暖衣物。';
            else adviceEl.textContent = '天氣穩定，祝你騎行順利！';
        } else {
            warningTitle.textContent = warnings.join('、');
            warningList.innerHTML = warnings.map(k => `• ${k}`).join('<br>');

            // Warning-based advice
            let advice = '建議檢查裝備與路面狀況後再出發。';
            const allWarns = warnings.join(' ');
            if (allWarns.includes('雨')) advice = '正在下雨，路面濕滑，請減速慢行並注意剎車距離。';
            if (allWarns.includes('雷')) advice = '有雷暴警告，請儘快前往室內安全地方暫避，切勿在空曠地方停留。';
            if (allWarns.includes('風')) advice = '風力強勁，請小心強陣風，抓緊把手並注意平衡。';
            if (allWarns.includes('酷熱')) advice = '酷熱天氣警告生效，請多喝水並適時休息，預防中暑。';

            adviceEl.textContent = advice;
        }
    }
    </script>
</body>
</html>
