  <style>
    /* ── Badge Earned Overlay ── */
    #badge-earned-overlay {
        display: none; position: fixed; inset: 0; z-index: 800;
        background: rgba(0,0,0,0.88);
        align-items: center; justify-content: center; flex-direction: column;
        text-align: center; padding: 2em; overflow: hidden;
    }
    #badge-earned-overlay.show { display: flex; animation: tlFadeIn 0.35s ease; }
    @keyframes tlFadeIn { from { opacity: 0; } to { opacity: 1; } }
    #badge-earned-inner {
        animation: tlSlideUp 0.55s cubic-bezier(0.34,1.56,0.64,1) both;

    #badge-earned-viewer { width: 100%; height: 250px; margin-bottom: 1em; }
    #badge-earned-name { color: #BFE340; font-size: 1.8em; font-weight: 900; margin-bottom: 0.2em; }
    #badge-earned-desc { color: #fff; opacity: 0.8; font-size: 1em; margin-bottom: 1.5em; max-width: 300px; }
    #badge-earned-btn {
        background: #BFE340; color: #1a252f; border: none;
        padding: 0.8em 2em; border-radius: 14px; font-size: 1em; font-weight: bold;
        cursor: pointer; box-shadow: 0 4px 12px rgba(191,227,64,0.3);
    }

    /* ── Industrial HUD System 4.2 (Leaflet Optimized) ── */
    :root {
      --hud-green: #2ecc71;
      --hud-red: #e74c3c;
      --hud-highway-green: rgba(27, 94, 32, 0.95);
      --hud-bg: rgba(18, 31, 20, 0.9);
      --hud-blur: blur(16px);
      --app-accent: #BFE340;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #1a252f; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', sans-serif; }

    #ride-map { position: fixed; inset: 0; z-index: 0; background: #0d1a24; }

    /* Custom Leaflet overrides */
    .leaflet-v-layer { filter: brightness(0.6) contrast(1.2); }
    .leaflet-control-zoom { display: none !important; }

    /* --- Industrial HUD Layout 5.0 --- */
    .hud-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      display: flex;
      flex-direction: column;
    }

    /* Top: Main Stats Panel (Industrial Design) */
    .hud-top-industrial {
      pointer-events: auto;
      padding: calc(env(safe-area-inset-top) + 10px) 20px 20px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(18, 31, 20, 0.85);
      backdrop-filter: var(--hud-blur);
      -webkit-backdrop-filter: var(--hud-blur);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .hud-top-industrial.collapsed {
        transform: translateY(-80%);
    }
    .hud-top-industrial.hidden { display: none; }

    .hud-status-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        color: #fff;
    }
    .status-item { text-align: center; flex: 1; border-right: 1px solid rgba(255,255,255,0.1); }
    .status-item:last-of-type { border-right: none; }
    .status-val { font-size: 20px; font-weight: 900; color: #BFE340; display: block; }
    .status-lbl { font-size: 11px; opacity: 0.6; display: flex; align-items: center; justify-content: center; gap: 4px; }

    .btn-toggle-hud {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        color: #fff;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 12px;
        cursor: pointer;
    }

    .big-stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 24px;
    }
    .big-stat-card {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 16px;
        padding: 20px;
        text-align: center;
        backdrop-filter: blur(10px);
    }
    .big-stat-val { font-size: 32px; font-weight: 900; color: #BFE340; display: block; margin-bottom: 4px; }
    .big-stat-lbl { font-size: 13px; color: #fff; opacity: 0.6; display: flex; align-items: center; justify-content: center; gap: 6px; }

    .hud-section-title {
        font-size: 14px;
        color: #BFE340;
        font-weight: bold;
        margin-bottom: 12px;
    }

    /* Top Overlay: Turn-by-Turn Instruction */
    .hud-top {
      pointer-events: auto;
      background: var(--hud-highway-green);
      backdrop-filter: var(--hud-blur);
      -webkit-backdrop-filter: var(--hud-blur);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 16px 20px;
      margin: 8px 16px 0;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .hud-top.hidden { display: none; }

    .nav-next-icon { font-size: 32px; color: #fff; min-width: 40px; text-align: center; }
    .nav-instruction-wrap { flex: 1; min-width: 0; }
    .nav-next-road { font-size: 12px; opacity: 0.9; color: rgba(255,255,255,0.9); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .nav-instruction { font-size: 20px; font-weight: 800; color: #fff; line-height: 1.2; }
    .nav-dist-wrap { text-align: right; border-left: 1px solid rgba(255,255,255,0.2); padding-left: 16px; min-width: 70px; }
    .nav-dist-val { font-size: 26px; font-weight: 900; color: #fff; line-height: 1; }
    .nav-dist-unit { font-size: 11px; color: var(--app-accent); opacity: 0.8; }

    /* Bottom: Combined Stats and Controls Panel */
    .hud-bottom-panel {
      pointer-events: auto;
      background: var(--hud-bg);
      backdrop-filter: var(--hud-blur);
      -webkit-backdrop-filter: var(--hud-blur);
      border-top: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px 24px 0 0;
      padding: 20px 24px calc(env(safe-area-inset-bottom) + 12px);
      margin: 0;
      box-shadow: 0 -8px 32px rgba(0,0,0,0.5);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      width: 100%;
    }
    .hud-bottom-panel.hidden { transform: translateY(100%); }

    /* Detailed Stops Overview */
    .stops-overview {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 12px;
        margin-bottom: 16px;
        scrollbar-width: none;
    }
    .stops-overview::-webkit-scrollbar { display: none; }
    .stop-pill {
        flex-shrink: 0;
        background: rgba(255,255,255,0.1);
        padding: 6px 12px;
        border-radius: 12px;
        font-size: 13px;
        color: rgba(255,255,255,0.6);
        border: 1px solid rgba(255,255,255,0.1);
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .stop-pill.reached {
        background: rgba(46, 204, 113, 0.2);
        color: var(--hud-green);
        border-color: var(--hud-green);
    }
    .stop-pill.next {
        background: rgba(191, 227, 64, 0.2);
        color: var(--app-accent);
        border-color: var(--app-accent);
        font-weight: bold;
    }

    .stats-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 12px;
    }
    .stat-box {
      flex: 1;
      text-align: center;
    }
    .stat-label { font-size: 11px; color: #a8d8a0; opacity: 0.8; margin-bottom: 4px; text-transform: uppercase; font-weight: bold; }
    .stat-value { font-size: 24px; font-weight: 900; color: #fff; line-height: 1; }
    .stat-value span { font-size: 14px; font-weight: normal; margin-left: 2px; color: var(--app-accent); }

    .controls-row {
      display: flex;
      gap: 12px;
    }
    .btn-action {
      flex: 1;
      border: none;
      padding: 16px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.1s, background 0.2s;
    }
    .btn-action:active { transform: scale(0.96); }
    .btn-pause { background: #f1c232; color: #000; }
    .btn-end { background: var(--hud-red); color: #fff; }
    .btn-exit { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }

    /* ── Off-Route Warning ── */
    #off-route-warning {
      position: fixed;
      top: calc(env(safe-area-inset-top) + 110px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--hud-red);
      color: #fff;
      padding: 10px 24px;
      border-radius: 12px;
      font-weight: bold;
      z-index: 1000;
      display: none;
      animation: pulse 1s infinite;
      box-shadow: 0 4px 15px rgba(231, 76, 60, 0.6);
    }
    @keyframes pulse {
      0% { transform: translateX(-50%) scale(1); }
      50% { transform: translateX(-50%) scale(1.05); }
      100% { transform: translateX(-50%) scale(1); }
    }

    /* ── User Arrow ── */
    .user-arrow-icon {
        width: 32px; height: 32px;
        background: #6dba65; clip-path: polygon(50% 0%, 0% 100%, 50% 80%, 100% 100%);
        border: 2px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    /* ── Go-to-start banner ── */
    #go-to-start-banner {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
      background: var(--hud-bg); backdrop-filter: var(--hud-blur);
      -webkit-backdrop-filter: var(--hud-blur);
      color: #fff; border-radius: 24px 24px 0 0;
      padding: 24px 24px calc(env(safe-area-inset-bottom) + 24px);
      text-align: center; box-shadow: 0 -8px 32px rgba(0,0,0,0.5);
    }
    #go-to-start-banner h3 { font-size: 20px; font-weight: 800; color: var(--app-accent); margin-bottom: 8px; }
    #gts-dist-val { font-size: 32px; font-weight: 900; margin: 12px 0; display: block; }

    #gts-stop-select {
      width: 100%; background: rgba(255,255,255,0.1); color: #fff;
      border: 1px solid rgba(255,255,255,0.2); border-radius: 12px;
      padding: 12px; font-size: 15px; margin-bottom: 12px;
    }

    /* ── Summary ── */
    #ride-summary {
      display: none; position: fixed; inset: 0; z-index: 600;
      background: rgba(18,31,20,0.98); color: #fff;
      flex-direction: column; align-items: center; justify-content: center;
      padding: 2em; text-align: center;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    #ride-summary.show { display: flex; }
    #summary-xp-badge { background: #BFE340; color: #1a252f; font-size: 24px; font-weight: 900; padding: 12px 32px; border-radius: 16px; margin: 12px 0; box-shadow: 0 4px 15px rgba(191,227,64,0.4); }
    .summary-stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 360px; margin-bottom: 24px; }
    .summary-card { background: rgba(255,255,255,0.06); padding: 16px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); }
    .summary-card-lbl { font-size: 11px; opacity: 0.6; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
    .summary-card-val { font-size: 22px; font-weight: 900; color: #fff; }
    .summary-card-val span { font-size: 12px; font-weight: normal; margin-left: 2px; color: var(--app-accent); }
    .summary-actions { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 360px; }
    .btn-download-track { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  </style>
</head>

      <button class="btn-download-track" onclick="downloadTrackMap()"><i class="fas fa-file-image"></i> 下載透明軌跡圖</button>
      <button id="btn-summary-done" style="background: var(--hud-green); color: #fff; border: none; padding: 18px; border-radius: 14px; font-size: 18px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 12px rgba(46,204,113,0.3);" onclick="window.location.href='/dashboard'">確認並返回儀表板</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  <script>
  (function () {
    'use strict';

    const params = new URLSearchParams(location.search);
    const routeId = params.get('id') || '';
    const dirIndex = parseInt(params.get('dir') || '0', 10);
    const startStopIdx = parseInt(params.get('startStopIdx') || '0', 10);
    const mode = params.get('mode');
    const friendMode = params.get('friendMode') === '1';
    const roomCode = params.get('room') || null;

    let map = null;
    let userMarker = null;
    let watchId = null;
    let rideStarted = false;
    let goToStartPhase = true;
    let isFreeMode = (mode === 'free');
    let startTime = null;
    let timerInterval = null;
    let heartbeatInterval = null;
    let reachedStops = new Set();
    let totalDistM = 0;
    let lastLat = null, lastLon = null;
    let sessionXp = 0;
    let gpxCoords = [];
    let trackingCoords = [];
    let breadcrumbLine = null;
    let fullRouteStops = [];
    let routeStops = [];
    let routeData = null;
    let friendMarkers = new Map();
    let wakeLock = null;
    let earnedBadges = new Set(); // IDs of badges earned in this session

    const STOP_DETECTION_RADIUS_M = 40;
    const OFF_ROUTE_THRESHOLD_M = 50;

    function haversineM(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function formatTime(ms) {
      const s = Math.floor(ms / 1000), m = Math.floor(s / 60), h = Math.floor(m / 60);
      return h > 0 ? `${h}:${String(m % 60).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}` : `${String(m).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}`;
    }

    function formatDist(m) { return m >= 1000 ? `${(m / 1000).toFixed(2)} km` : `${Math.round(m)} m`; }

    async function initMap(center) {
        if (map) return;
        map = L.map('ride-map', { zoomControl: false, attributionControl: false }).setView(center, 18);
        const isLight = document.body.classList.contains('app-light-theme');
        const tiles = isLight ? 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png' : 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
        L.tileLayer(tiles, { maxZoom: 20 }).addTo(map);

        if (routeData && gpxCoords.length > 0) {
            L.polyline(gpxCoords, { color: routeData.color || '#BFE340', weight: 6, opacity: 0.8 }).addTo(map);
        }

        breadcrumbLine = L.polyline([], { color: '#BFE340', weight: 4, dashArray: '5, 10', opacity: 0.9 }).addTo(map);
    }

    function updateUserMarker(lat, lon, heading) {
        if (!map) return;
        const icon = L.divIcon({
            className: '',
            html: `<div class="user-arrow-icon" style="transform: rotate(${heading || 0}deg);"></div>`,
            iconSize: [32, 32], iconAnchor: [16, 16]
        });
        if (!userMarker) {
            userMarker = L.marker([lat, lon], { icon }).addTo(map);
        } else {
            userMarker.setLatLng([lat, lon]);
            userMarker.setIcon(icon);
        }
        if (rideStarted) {
            map.panTo([lat, lon], { animate: true, duration: 1 });
        }
    }

    function onPosition(pos) {
        if (!map) return;
        const { latitude: lat, longitude: lon, accuracy, speed, heading } = pos.coords;
        const speedKmh = speed != null ? (speed * 3.6) : 0;

        const speedText = speedKmh.toFixed(1);
        const speedTop = document.getElementById('stat-speed-top');
        if (speedTop) speedTop.textContent = speedText;

        if (accuracy < 50) {
            const gpsMsg = document.getElementById('gps-status-msg');
            if (gpsMsg) gpsMsg.style.display = 'none';
        }

        updateUserMarker(lat, lon, heading);

        if (rideStarted) {
            if (lastLat !== null) {
                const d = haversineM(lastLat, lastLon, lat, lon);
                if (d >= 2 && d < 500 && accuracy <= 50) {
                    totalDistM += d;
                    trackingCoords.push([lat, lon]);
                    if (breadcrumbLine) breadcrumbLine.addLatLng([lat, lon]);
                }
            } else {
                trackingCoords.push([lat, lon]);
            }

            // Off-route Warning logic
            if (gpxCoords.length > 1) {
                try {
                    const p = turf.point([lon, lat]);
                    const line = turf.lineString(gpxCoords.map(c => [c[1], c[0]]));
                    const snapped = turf.nearestPointOnLine(line, p, { units: 'meters' });
                    const distToRoute = snapped.properties.dist;

                    const warningEl = document.getElementById('off-route-warning');
                    if (distToRoute > OFF_ROUTE_THRESHOLD_M) {
                        warningEl.style.display = 'block';
                    } else {
                        warningEl.style.display = 'none';
                    }
                } catch (e) {
                    console.warn('Off-route check failed:', e);
                }
            }
        }
        lastLat = lat; lastLon = lon;

        const distKm = (totalDistM / 1000);
        const distText = totalDistM >= 1000 ? distKm.toFixed(2) + ' km' : Math.round(totalDistM) + ' m';
        const distTop = document.getElementById('stat-dist-top');
        if (distTop) distTop.textContent = distText;

        const xpEl = document.getElementById('stat-xp');
        if (xpEl) xpEl.textContent = Math.round(sessionXp);

        if (goToStartPhase && routeStops.length > 0) {
            // After potential slicing in init, the target start stop is always routeStops[0]
            const dist = haversineM(lat, lon, routeStops[0].lat, routeStops[0].lon);
            document.getElementById('gts-dist-val').textContent = formatDist(dist);
            if (dist <= STOP_DETECTION_RADIUS_M) beginRide();
        } else if (rideStarted && !isFreeMode) {
            updateHUD(lat, lon, speedKmh);
            checkStops(lat, lon);
        }
    }

    function updateHUD(lat, lon, speed) {
        const next = routeStops.find(s => !reachedStops.has(s.order)) || routeStops[routeStops.length - 1];
        const dist = haversineM(lat, lon, next.lat, next.lon);
        document.getElementById('next-dist').textContent = Math.round(dist);
        document.getElementById('next-road').textContent = routeId + ' ' + (routeData?.alias || '');
        document.getElementById('next-instruction').textContent = reachedStops.has(next.order) ? '即將到達終點' : `前往：${next.name}`;
        updateStopsOverview();
    }

    function checkStops(lat, lon) {
        const next = routeStops.find(s => !reachedStops.has(s.order));
        if (next && haversineM(lat, lon, next.lat, next.lon) <= STOP_DETECTION_RADIUS_M) {
            reachedStops.add(next.order);
            sessionXp += (next.xp || 10);
            const stopText = `${reachedStops.size}/${routeStops.length}`;
            const stopTop = document.getElementById('stat-stops-top');
            if (stopTop) stopTop.textContent = stopText;
            updateStopsOverview();
        }
    }

    function updateStopsOverview() {
        const container = document.getElementById('stops-overview');
        if (!container) return;
        const nextStop = routeStops.find(s => !reachedStops.has(s.order));
        container.innerHTML = routeStops.map(s => {
            let cls = 'stop-pill';
            if (reachedStops.has(s.order)) cls += ' reached';
            else if (nextStop && s.order === nextStop.order) cls += ' next';
            return `<div class="${cls}">${reachedStops.has(s.order) ? '✓' : '•'} ${s.name}</div>`;
        }).join('');
        // Auto-scroll to next stop
        const nextEl = container.querySelector('.stop-pill.next');
        if (nextEl) nextEl.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }

    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
                wakeLock.addEventListener('release', () => { console.log('Wake Lock was released'); });
            }
        } catch (err) { console.warn(`${err.name}, ${err.message}`); }
    }

    async function beginRide() {
        if (rideStarted) return;

        // If in multiplayer room, tell server ride has started
        if (roomCode) {
            const token = localStorage.getItem('accessToken');
            try {
                await fetch('/api/user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ action: 'start-room', room_code: roomCode })
                });
            } catch (e) {}
        }

        rideStarted = true; goToStartPhase = false; startTime = Date.now();

        requestWakeLock();
        document.getElementById('go-to-start-banner').style.display = 'none';

        document.getElementById('hud-main-bottom').classList.remove('hidden');
        document.getElementById('hud-nav-instruction').classList.toggle('hidden', isFreeMode);

        if (isFreeMode) {
            const progressTitle = document.querySelector('.hud-section-title');
            if (progressTitle) progressTitle.style.display = 'none';
            const stopsOverview = document.getElementById('stops-overview');
            if (stopsOverview) stopsOverview.style.display = 'none';
            const stopsItem = document.querySelector('.status-item:last-of-type');
            if (stopsItem) stopsItem.style.visibility = 'hidden';
        }

        timerInterval = setInterval(() => {
            const timeStr = formatTime(Date.now() - startTime);
            const timeTop = document.getElementById('stat-time-top');
            if (timeTop) timeTop.textContent = timeStr;
        }, 1000);
        heartbeatInterval = setInterval(syncActiveRide, 5000);
        updateStopsOverview();
    }

    async function syncActiveRide() {
        const token = localStorage.getItem('accessToken');
        if (!token) return;
        const state = {
            type: 'route',
            routeId,
            dirIndex,
            totalDistM,
            reachedStops: [...reachedStops],
            startTime,
            sessionXp,
            lastLat,
            lastLon,
            routeAlias: routeData?.alias || routeId,
            roomCode: roomCode
        };
        try {
            const res = await fetch('/api/user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({
                    action: 'active-ride',
                    state,
                    share_location: friendMode || !!roomCode
                })
            });
            if (res.ok && (friendMode || roomCode)) {
                const data = await res.json();
                updateFriendMarkers(data.friends_locations || []);
            }
        } catch (e) {}
    }

    function updateFriendMarkers(friends) {
        if (!map) return;

        const activeIds = new Set(friends.map(f => f.user_id));
        for (const [id, marker] of friendMarkers.entries()) {
            if (!activeIds.has(id)) {
                map.removeLayer(marker);
                friendMarkers.delete(id);
            }
        }

        const hudList = document.getElementById('room-member-list-hud');
        if (hudList) hudList.innerHTML = '';

        friends.forEach(f => {
            const myId = JSON.parse(localStorage.getItem('user') || '{}').id;
            const isMe = Number(f.user_id) === Number(myId);

            // HUD listing
            if (hudList) {
                const item = document.createElement('div');
                item.style.cssText = 'flex-shrink:0; display:flex; align-items:center; gap:6px; background:rgba(255,255,255,0.05); padding:4px 10px; border-radius:10px; border:1px solid rgba(255,255,255,0.1);';
                item.innerHTML = `
                    <div style="width:8px; height:8px; border-radius:50%; background:${isMe ? '#BFE340' : '#3498db'};"></div>
                    <span style="font-size:11px; color:#fff; font-weight:bold;">${f.username}${isMe ? ' (你)' : ''}</span>
                `;
                hudList.appendChild(item);
            }

            if (isMe) return;

            let m = friendMarkers.get(f.user_id);
            const iconHtml = `
                <div style="position:relative;">
                    <div style="background:#3498db; width:36px; height:36px; border-radius:50%; border:3px solid #fff; display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; font-weight:bold; box-shadow:0 4px 10px rgba(0,0,0,0.4);">
                        ${f.username ? f.username[0].toUpperCase() : '?'}
                    </div>
                    <div style="position:absolute; bottom:-15px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.7); color:#fff; font-size:10px; padding:2px 6px; border-radius:10px; white-space:nowrap; border:1px solid rgba(255,255,255,0.2);">
                        ${f.username || '朋友'}
                    </div>
                </div>
            `;

            const icon = L.divIcon({
                className: '',
                html: iconHtml,
                iconSize: [36, 36],
                iconAnchor: [18, 18]
            });

            if (!m) {
                m = L.marker([f.lat, f.lng], { icon }).addTo(map);
                friendMarkers.set(f.user_id, m);
            } else {
                m.setLatLng([f.lat, f.lng]);
                m.setIcon(icon);
            }
        });

        const panel = document.getElementById('room-members-panel');
        if (panel) panel.style.display = (roomCode || friends.length > 0) ? 'block' : 'none';
    }

    window.skipGoToStart = beginRide;
    window.startFromSelectedStop = () => {
        const idx = parseInt(document.getElementById('gts-stop-select').value);
        routeStops = fullRouteStops.slice(idx).map((s, i) => ({ ...s, order: i + 1 }));

        // Reset reachedStops if starting fresh from a mid-station
        reachedStops = new Set();

        buildStopsUI(false); // don't show banner again
        beginRide();
    };

    window.toggleHudExpand = () => {
        const area = document.getElementById('hud-expanded-area');
        const btn = document.getElementById('btn-hud-toggle');
        if (area.style.display === 'none') {
            area.style.display = 'block';
            btn.textContent = '收起 ▼';
        } else {
            area.style.display = 'none';
            btn.textContent = '展開 ▲';
        }
    };

    function buildStopsUI(showBanner = true) {
        const stopTop = document.getElementById('stat-stops-top');
        if (stopTop) stopTop.textContent = `0/${routeStops.length}`;
        const sel = document.getElementById('gts-stop-select');
        // The dropdown should show all stops from the ORIGINAL route
        sel.innerHTML = fullRouteStops.slice(0, -1).map((s, i) => `<option value="${i}">${s.name}</option>`).join('');

        // Find the current index of the first stop of routeStops within fullRouteStops
        const currentStartIdx = fullRouteStops.findIndex(s => s.name === routeStops[0].name);
        sel.value = currentStartIdx >= 0 ? currentStartIdx : 0;

        if (routeStops.length > 0 && !isFreeMode && showBanner) {
            document.getElementById('go-to-start-banner').style.display = 'block';
            document.getElementById('gts-start-name').textContent = routeStops[0].name;
        }
        updateStopsOverview();
    }

    async function endRide() {
        clearInterval(timerInterval); clearInterval(heartbeatInterval);
        if (watchId) navigator.geolocation.clearWatch(watchId);
        if (wakeLock) { wakeLock.release(); wakeLock = null; }

        const durationMins = Math.max(1, Math.round((Date.now() - startTime) / 60000));
        const distKm = parseFloat((totalDistM / 1000).toFixed(2));
        const avgSpeed = parseFloat((distKm / (durationMins / 60)).toFixed(1));

        const token = localStorage.getItem('accessToken');
        const res = await fetch('/api/getHistory', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({
                route_id: routeId,
                ride_date: new Date().toISOString().slice(0, 10),
                distance_km: distKm,
                duration_minutes: durationMins,
                avg_speed_kmh: avgSpeed,
                stops_reached: [...reachedStops],
                all_stops: reachedStops.size === routeStops.length,
                xp_earned_override: sessionXp,
                gpx_track: trackingCoords,
                ride_mode: isFreeMode ? 'free' : 'route'
            })
        });

        const result = await res.json();

        // Check for new badges
        if (result.challenge_completed) {
            showBadgeEarned(result.challenge_completed);
        }

        // Update Settlement UI
        document.getElementById('summary-route-name').textContent = isFreeMode ? '自由模式' : (routeData?.alias || routeId);
        document.getElementById('s-time').textContent = durationMins + 'm';
        document.getElementById('s-dist').textContent = distKm + 'km';
        document.getElementById('s-speed').innerHTML = avgSpeed + '<span>km/h</span>';
        document.getElementById('s-coins').innerHTML = (result.coins_earned || 0) + '<span>🪙</span>';
        document.getElementById('summary-xp-badge').textContent = `+${result.xp_earned || 0} XP`;
        document.getElementById('ride-summary').classList.add('show');

        // Confetti effect
        if (typeof confetti === 'function') {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#BFE340', '#2ecc71', '#ffffff'] });
        }
    }

    window.downloadTrackMap = () => {
        if (!trackingCoords.length) { alert('無軌跡數據可供下載'); return; }

        const canvas = document.createElement('canvas');
        canvas.width = 1080; canvas.height = 1080;
        const ctx = canvas.getContext('2d');

        // Find bounds
        let minLat = Infinity, maxLat = -Infinity, minLon = Infinity, maxLon = -Infinity;
        trackingCoords.forEach(([lat, lon]) => {
            minLat = Math.min(minLat, lat); maxLat = Math.max(maxLat, lat);
            minLon = Math.min(minLon, lon); maxLon = Math.max(maxLon, lon);
        });

        const pad = 0.1;
        const dLat = maxLat - minLat, dLon = maxLon - minLon;
        const centerLat = (maxLat + minLat) / 2, centerLon = (maxLon + minLon) / 2;
        const zoom = 0.8 / Math.max(dLat, dLon || 0.001);

        ctx.strokeStyle = '#BFE340'; ctx.lineWidth = 8; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        ctx.beginPath();
        trackingCoords.forEach(([lat, lon], i) => {
            const x = 540 + (lon - centerLon) * zoom * 1000;
            const y = 540 - (lat - centerLat) * zoom * 1000;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();

        const link = document.createElement('a');
        link.download = `ctrc-track-${Date.now()}.png`;
        link.href = canvas.toDataURL();
        link.click();
    };

    window.confirmLeave = () => { if (!rideStarted || confirm('確定要放棄此次騎行嗎？資料將不會儲存。')) location.href = '/dashboard'; };

    async function showBadgeEarned(tierOrId) {
        try {
            const res = await fetch('/api/admin?action=badges');
            const badges = await res.json();
            const b = badges.find(x => x.tier === tierOrId || x.id == tierOrId);
            if (!b) return;

            document.getElementById('badge-earned-name').textContent = b.name;
            document.getElementById('badge-earned-desc').textContent = b.description || '';
            document.getElementById('badge-earned-container').innerHTML = `
                <model-viewer
                    src="${b.model_url_glb}"
                    ios-src="${b.model_url_usdz}"
                    alt="${b.name}"
                    auto-rotate
                    camera-controls
                    shadow-intensity="1"
                    style="width:100%; height:100%;">
                </model-viewer>`;

            document.getElementById('badge-earned-overlay').classList.add('show');
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#BFE340', '#3498db', '#ffffff'] });
        } catch(e) {}
    }

    window.closeBadgeEarned = () => {
        document.getElementById('badge-earned-overlay').classList.remove('show');
    };

    function showPauseModal() {
        const modal = document.getElementById('custom-pause-modal');
        const msg = document.getElementById('pause-modal-msg');
        msg.innerHTML = `暫停行程？可稍後繼續。<br><br>系統將會為你同步至雲端並儲存為未完成路線，你可以隨時在主頁或路線頁面恢復行程。`;

        const btnResume = document.getElementById('btn-pause-resume');
        btnResume.textContent = "繼續騎行";
        btnResume.onclick = () => { modal.style.display = 'none'; };

        const btnClose = document.getElementById('btn-pause-close');
        btnClose.textContent = "暫時關閉";
        btnClose.onclick = async () => {
            await syncActiveRide();
            location.href = '/dashboard';
        };

        const btnDelete = document.getElementById('btn-pause-delete');
        btnDelete.style.display = 'none'; // Only show delete for resumes

        modal.style.display = 'flex';
    }

    document.getElementById('btn-pause-ride').onclick = () => {
        showPauseModal();
    };
    document.getElementById('btn-end-ride').onclick = () => { if (confirm('結束並儲存？')) endRide(); };

    (async function init() {
        const [r1, r2] = await Promise.all([fetch('/routes.json'), fetch('/api/user?action=route-data')]);
        const d1 = await r1.json(), d2 = await r2.json();
        routeData = d2.routes.find(r => String(r.route_id) === String(routeId)) || d1.routes.find(r => String(r.id) === String(routeId));
        if (mode === 'free') {
            await initMap([22.3143, 114.2697]);
            beginRide();
        } else if (routeData) {
            fullRouteStops = (routeData.stops || []).map((s, i) => ({ ...s, order: i + 1 }));
            routeStops = [...fullRouteStops];

            if (startStopIdx > 0 && startStopIdx < routeStops.length) {
                routeStops = routeStops.slice(startStopIdx).map((s, i) => ({ ...s, order: i + 1 }));
            }

            if (routeData.gpx && routeData.gpx[dirIndex]) {
                const gpxRes = await fetch('/gpx/' + routeData.gpx[dirIndex].file);
                const gpxText = await gpxRes.text();
                gpxCoords = [...(new DOMParser().parseFromString(gpxText, 'application/xml')).querySelectorAll('trkpt')].map(p => [parseFloat(p.getAttribute('lat')), parseFloat(p.getAttribute('lon'))]);
            }
            await initMap(routeStops.length > 0 ? [routeStops[0].lat, routeStops[0].lon] : [22.3143, 114.2697]);
            buildStopsUI();
        } else { location.href = '/routes'; }
        if (navigator.geolocation) {
            watchId = navigator.geolocation.watchPosition(onPosition, e => { console.warn(e); }, { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 });
        }
    })();
  })();
  </script>
</body>
