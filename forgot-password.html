<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘記密碼 - CTRC HK</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="content animated-element">
            <div class="contact-form-container" style="max-width: 500px; margin: 3em auto;">
                <h2 style="text-align: left;">忘記密碼</h2>
                <p style="color: #555; margin-bottom: 1.5em;">
                    請輸入您的電子郵件地址，我們將向您發送密碼重設連結。
                </p>

                <div id="forgot-form-section">
                    <form id="forgot-password-form">
                        <div class="form-group">
                            <label for="forgot-email">電子郵件</label>
                            <input type="email" id="forgot-email" name="email" required
                                   placeholder="請輸入您的電子郵件">
                        </div>
                        <button type="submit" class="cta-button" id="forgot-submit-btn">
                            發送重設郵件
                        </button>
                    </form>
                </div>

                <div id="forgot-success-section" style="display: none; text-align: center; padding: 2em 0;">
                    <i class="fas fa-envelope-open-text" style="font-size: 3.5em; color: #04D93C; margin-bottom: 0.5em;"></i>
                    <h3 style="color: #2c3e50;">郵件已發送！</h3>
                    <p id="forgot-success-msg" style="color: #555;"></p>
                    <p style="color: #888; font-size: 0.9em;">若未收到郵件，請檢查垃圾郵件資料夾。</p>
                </div>

                <p style="margin-top: 1.5em;">
                    <a href="/login.html" style="color: #04D93C; text-decoration: underline;">
                        <i class="fas fa-arrow-left"></i> 返回登入
                    </a>
                </p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 香港城市運輸單車 CTRC HK. All Rights Reserved.</p>
    </footer>

    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('forgot-password-form');
            const submitBtn = document.getElementById('forgot-submit-btn');
            const formSection = document.getElementById('forgot-form-section');
            const successSection = document.getElementById('forgot-success-section');
            const successMsg = document.getElementById('forgot-success-msg');

            form.addEventListener('submit', async function (e) {
                e.preventDefault();
                const email = document.getElementById('forgot-email').value.trim();

                submitBtn.disabled = true;
                submitBtn.textContent = '發送中...';

                try {
                    const response = await fetch('/api/forgot-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });

                    const data = await response.json();

                    formSection.style.display = 'none';
                    successMsg.textContent = data.message || '如果此電子郵件已註冊，您將收到密碼重設郵件。';
                    successSection.style.display = 'block';

                } catch (error) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = '發送重設郵件';
                    alert('發送失敗，請稍後再試。');
                }
            });
        });
    </script>
</body>
</html>
