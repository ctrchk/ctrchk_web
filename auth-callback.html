<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入中 - CTRC HK</title>
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #04D93C;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 1em;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="spinner"></div>
        <h2>正在處理登入...</h2>
        <p>請稍候，我們正在驗證您的身份</p>
    </div>

    <script>
        // auth-callback.html 現在只用於舊版 Supabase OAuth 重定向的回退
        // 新版 Google 登入使用 GIS（彈出視窗模式），不需要此頁面
        // 如果有人訪問此頁面，自動跳轉到登入頁面
        window.addEventListener('load', function() {
            console.log('auth-callback: 已跳轉至登入頁面');
            window.location.href = '/login.html';
        });
    </script>
</body>
</html>
